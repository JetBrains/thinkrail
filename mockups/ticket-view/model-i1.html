<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I1: Sidebar + Inline Subsessions — Bonsai Ticket View</title>
<link rel="stylesheet" href="shared/base.css">
<link rel="stylesheet" href="shared/sidebar.css">
<style>
/* ── Ticket summary in sidebar ────────────────────────────── */

.sidebar-summary {
  padding: 12px 14px; border-bottom: 1px solid var(--border);
}
.sidebar-summary .ss-id {
  font-family: var(--mono); font-size: 11px; color: var(--accent);
  background: var(--accent-sub); padding: 2px 6px; border-radius: 3px; font-weight: 600;
}
.sidebar-summary .ss-title {
  font-size: 12px; font-weight: 600; color: var(--text); margin-top: 6px;
  line-height: 1.4;
}
.sidebar-summary .ss-meta {
  font-size: 10px; color: var(--text-dim); margin-top: 4px;
  display: flex; gap: 8px; align-items: center;
}
.sidebar-summary .ss-badge {
  font-size: 9px; font-weight: 700; text-transform: uppercase;
  padding: 1px 5px; border-radius: 3px; letter-spacing: 0.04em;
}
.sidebar-summary .ss-badge.feature { background: var(--purple-sub); color: var(--purple); }
.sidebar-summary .ss-badge.phase-badge { background: var(--accent-sub); color: var(--accent); }

.sidebar.collapsed .sidebar-summary { padding: 8px 0; text-align: center; }
.sidebar.collapsed .sidebar-summary .ss-title,
.sidebar.collapsed .sidebar-summary .ss-meta { display: none; }

/* ── Subsession suggestion card ───────────────────────────── */

.subsession-suggest {
  border: 1px solid var(--yellow-sub); border-left: 3px solid var(--yellow);
  border-radius: var(--r); padding: 12px 16px; margin: 8px 0;
  animation: fadeIn 0.35s ease both;
}
.subsession-suggest .sss-title {
  font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 4px;
}
.subsession-suggest .sss-desc {
  font-size: 12px; color: var(--text-sec); margin-bottom: 10px; line-height: 1.5;
}
.subsession-suggest .sss-actions { display: flex; gap: 6px; }
.subsession-suggest .sss-btn {
  padding: 5px 12px; border-radius: 6px; font-size: 11px; font-weight: 500;
  cursor: pointer; border: 1px solid var(--border); background: var(--elevated);
  color: var(--text-sec); transition: all 0.15s; font-family: inherit;
}
.subsession-suggest .sss-btn:hover { border-color: var(--accent); color: var(--text); }
.subsession-suggest .sss-btn.primary {
  border-color: var(--yellow); color: var(--yellow); background: var(--yellow-sub);
}
.subsession-suggest .sss-btn.primary:hover { background: rgba(210,153,34,0.2); }

/* ── Inline subsession ────────────────────────────────────── */

.subsession-inline {
  border: 1px solid var(--border); border-left: 3px solid var(--yellow);
  border-radius: var(--r); margin: 8px 0 8px 12px; padding: 12px 16px;
  background: var(--surface); animation: fadeIn 0.35s ease both;
}
.subsession-inline .ssi-header {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; font-weight: 600; color: var(--yellow); margin-bottom: 8px;
}
.subsession-inline .ssi-msg {
  padding: 4px 0 4px 12px; font-size: 13px; line-height: 1.6;
  border-left: 2px solid var(--yellow); color: var(--text-sec); margin: 6px 0;
}
.subsession-inline .ssi-msg strong { color: var(--text); font-weight: 600; }
.subsession-inline .ssi-recommendation {
  border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px;
  margin: 8px 0; background: var(--elevated); font-size: 12px; color: var(--text-sec);
}
.subsession-inline .ssi-recommendation strong { color: var(--text); }
.subsession-inline .ssi-actions { display: flex; gap: 6px; margin-top: 8px; }
.subsession-inline .ssi-actions .sss-btn {
  padding: 5px 12px; border-radius: 6px; font-size: 11px; font-weight: 500;
  cursor: pointer; border: 1px solid var(--border); background: var(--elevated);
  color: var(--text-sec); transition: all 0.15s; font-family: inherit;
}
.subsession-inline .ssi-actions .sss-btn:hover { border-color: var(--accent); color: var(--text); }
.subsession-inline .ssi-actions .sss-btn.primary {
  border-color: var(--green); color: var(--green); background: var(--green-sub);
}
.subsession-inline .ssi-input {
  display: flex; gap: 6px; margin-top: 8px;
}
.subsession-inline .ssi-input input {
  flex: 1; padding: 6px 10px; border-radius: 6px; font-size: 12px;
  border: 1px solid var(--border); background: var(--elevated);
  color: var(--text); outline: none; font-family: inherit;
}
.subsession-inline .ssi-input input:focus { border-color: var(--yellow); }
.subsession-inline .ssi-input button {
  padding: 6px 12px; border-radius: 6px; font-size: 11px; font-weight: 600;
  cursor: pointer; border: none; background: var(--yellow); color: #fff;
  font-family: inherit; transition: all 0.15s;
}
.subsession-inline .ssi-complete-btn {
  font-size: 11px; color: var(--text-dim); cursor: pointer;
  text-align: right; margin-top: 6px; transition: color 0.15s;
}
.subsession-inline .ssi-complete-btn:hover { color: var(--text-sec); }

/* ── Collapsed subsession ─────────────────────────────────── */

.subsession-collapsed {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; color: var(--green); padding: 6px 0; margin-left: 12px;
  animation: fadeIn 0.35s ease both;
}

/* ── Dim main conversation during subsession ──────────────── */

body.subsession-active .conv-inner > :not(.subsession-inline):not(.subsession-collapsed) { opacity: 0.5; }
body.subsession-active .conv-inner > .subsession-inline { opacity: 1; }

/* ── Split mode adjustment for sidebar ────────────────────── */

body.split-mode .conversation { flex: 0 0 auto; width: 35%; }
</style>
</head>

<div class="main-area">

  <div class="sidebar" id="sidebar">
    <div class="sidebar-summary" id="sidebarSummary">

<!-- Shared scripts -->

<script>
// ── I1-specific state ──────────────────────────────────────────

var subsessionActive = false;
var subsessionCount = 0;

// ── Sidebar phase label updater ────────────────────────────────

function updateSidebarPhase(label) {
  var el = document.getElementById('sidebarPhase');
  if (el) el.textContent = label;
}

// ── Sidebar navigation handler ─────────────────────────────────

window.onSidebarNavigate = function(key) {
  // Open artifact in right panel when clicked
  var artifactMap = {
    'description': { type: 'card' },
    'product-design': { type: 'doc' },
    'auth-readme': { type: 'diff', idx: 0 },
    'design-doc': { type: 'diff', idx: 1 },
    'core-readme': { type: 'diff', idx: 2 },
    'impl-plan': { type: 'plan' }
  };
  var art = artifactMap[key];
  if (!art) return;

  // Save current state if panel is open
  if (document.body.classList.contains('split-mode') && !peekMode) {
    peekSavedState = {
      header: document.getElementById('apHeader').innerHTML,
      body: document.getElementById('apBody').innerHTML,
      actions: document.getElementById('apActions').innerHTML
    };
  }
  peekMode = true;
  document.body.classList.add('split-mode', 'peek-mode');
  setActiveSidebarItem(key);

  var headerEl = document.getElementById('apHeader');
  var bodyEl = document.getElementById('apBody');
  var actionsEl = document.getElementById('apActions');
  var closeBtn = '<button class="ap-close" onclick="closePeek()" style="display:inline-flex">&larr; Back to flow</button>';

  if (art.type === 'card') {
    headerEl.innerHTML = '<span class="ap-badge doc">DOC</span><span class="ap-path">Ticket Description</span><span class="ap-stats"></span>' + closeBtn;
    bodyEl.innerHTML = '<div class="doc-preview"><h1>Ticket: Add user authentication</h1><h2>What</h2><p>Add JWT-based user authentication with signup, login, session management, and role-based access control.</p><h2>Purpose</h2><p>Enable multi-user access to Bonsai workspaces with permission boundaries between admin, regular, and viewer roles.</p><h2>Success Criteria</h2><ul><li>Users can sign up, log in, receive a JWT token</li><li>Access resources according to their role</li><li>Admin can manage users and permissions</li></ul></div>';
    actionsEl.innerHTML = closeBtn;
  } else if (art.type === 'doc') {
    headerEl.innerHTML = '<span class="ap-badge doc">DOC</span><span class="ap-path">product-design.md</span><span class="ap-stats"></span>' + closeBtn;
    bodyEl.innerHTML = DOC_SECTIONS.full;
    actionsEl.innerHTML = closeBtn;
  } else if (art.type === 'diff') {
    var d = DIFFS[art.idx];
    headerEl.innerHTML = '<span class="ap-badge ' + d.badgeClass + '">' + d.badge + '</span><span class="ap-path">' + d.path + '</span><span class="ap-stats">' + d.stats + '</span>' + closeBtn;
    bodyEl.innerHTML = '<div class="diff-view">' + d.content + '</div>';
    actionsEl.innerHTML = closeBtn;
  } else if (art.type === 'plan') {
    headerEl.innerHTML = '<span class="ap-badge new">PLAN</span><span class="ap-path">Implementation Plan</span><span class="ap-stats">2 milestones &middot; 6 steps</span>' + closeBtn;
    bodyEl.innerHTML = buildStepsHTML('plan');
    actionsEl.innerHTML = closeBtn;
  }
};

// ── Subsession rendering ───────────────────────────────────────

function addSubsessionSuggestion(id, title, desc) {
  var div = document.createElement('div');
  div.className = 'subsession-suggest fade-in';
  div.id = 'ss-suggest-' + id;
  div.innerHTML =
    '<div class="sss-title">&#128300; Suggested: ' + title + '</div>' +
    '<div class="sss-desc">' + desc + '</div>' +
    '<div class="sss-actions">' +
      '<button class="sss-btn primary" onclick="openSubsession(\'' + id + '\')">Open discussion</button>' +
      '<button class="sss-btn" onclick="skipSubsession(\'' + id + '\')">Skip &mdash; use defaults</button>' +
    '</div>';
  if (convInner) convInner.appendChild(div);
  scrollConv();
}

function openSubsession(id) {
  // Remove suggestion card
  var suggest = document.getElementById('ss-suggest-' + id);
  if (suggest) suggest.remove();

  subsessionActive = true;
  document.body.classList.add('subsession-active');

  var div = document.createElement('div');
  div.className = 'subsession-inline fade-in';
  div.id = 'ss-inline-' + id;

  if (id === 'jwt-research') {
    div.innerHTML =
      '<div class="ssi-header">&#128300; JWT Token Expiry Research</div>' +
      '<div class="ssi-msg">Researching JWT best practices for workspace tools...</div>' +
      '<div class="ssi-msg">Industry standard for SaaS tools:<br>' +
        '<strong>&bull; Access tokens:</strong> 1 hour<br>' +
        '<strong>&bull; Refresh tokens:</strong> 30 days<br>' +
        '<strong>&bull; Rotation on refresh use</strong></div>' +
      '<div class="ssi-recommendation"><strong>Recommendation:</strong> Access: 1hr &middot; Refresh: 30d &middot; Rotation &#10003;</div>' +
      '<div class="ssi-actions">' +
        '<button class="sss-btn primary" onclick="completeSubsession(\'' + id + '\', \'Access: 1hr, Refresh: 30d, rotation enabled\')">Accept recommendations</button>' +
        '<button class="sss-btn" onclick="completeSubsession(\'' + id + '\', \'Custom token config\')">Adjust</button>' +
      '</div>' +
      '<div class="ssi-input">' +
        '<input type="text" placeholder="Ask about this..." id="ssInput-' + id + '">' +
        '<button onclick="ssInputSend(\'' + id + '\')">Send</button>' +
      '</div>' +
      '<div class="ssi-complete-btn" onclick="completeSubsession(\'' + id + '\', \'Access: 1hr, Refresh: 30d, rotation enabled\')">Complete subsession &#8594;</div>';
  } else if (id === 'testing-strategy') {
    div.innerHTML =
      '<div class="ssi-header">&#128300; Testing Strategy Discussion</div>' +
      '<div class="ssi-msg">Let\'s discuss testing approach for the auth module...</div>' +
      '<div class="ssi-msg">Recommended test coverage:<br>' +
        '<strong>&bull; Unit tests:</strong> models, service, storage<br>' +
        '<strong>&bull; Integration:</strong> API endpoints, middleware<br>' +
        '<strong>&bull; Security:</strong> token expiry, role enforcement</div>' +
      '<div class="ssi-recommendation"><strong>Recommendation:</strong> 12 unit + 4 integration + 3 security tests</div>' +
      '<div class="ssi-actions">' +
        '<button class="sss-btn primary" onclick="completeSubsession(\'' + id + '\', \'12 unit + 4 integration + 3 security tests\')">Accept plan</button>' +
        '<button class="sss-btn" onclick="completeSubsession(\'' + id + '\', \'Custom test plan\')">Adjust</button>' +
      '</div>' +
      '<div class="ssi-input">' +
        '<input type="text" placeholder="Ask about this..." id="ssInput-' + id + '">' +
        '<button onclick="ssInputSend(\'' + id + '\')">Send</button>' +
      '</div>' +
      '<div class="ssi-complete-btn" onclick="completeSubsession(\'' + id + '\', \'12 unit + 4 integration + 3 security tests\')">Complete subsession &#8594;</div>';
  }

  if (convInner) convInner.appendChild(div);
  scrollConv();
}

function skipSubsession(id) {
  var suggest = document.getElementById('ss-suggest-' + id);
  if (suggest) {
    suggest.innerHTML = '<div class="sss-title" style="color:var(--text-dim)">&#128300; Skipped: ' +
      (id === 'jwt-research' ? 'JWT Research' : 'Testing Strategy') +
      ' &mdash; using defaults</div>';
    suggest.style.borderColor = 'var(--border)';
    suggest.style.borderLeftColor = 'var(--border)';
  }
  waitingForInteraction = false;
  if (!playing) setTimeout(function() { advanceInteractive(); }, 400);
}

function completeSubsession(id, summary) {
  subsessionActive = false;
  document.body.classList.remove('subsession-active');

  var inline = document.getElementById('ss-inline-' + id);
  if (inline) inline.remove();

  var collapsed = document.createElement('div');
  collapsed.className = 'subsession-collapsed fade-in';
  collapsed.innerHTML = '&#10003; &#128300; ' +
    (id === 'jwt-research' ? 'JWT Research' : 'Testing Strategy') +
    ' &mdash; ' + summary + '.';
  if (convInner) convInner.appendChild(collapsed);
  scrollConv();

  waitingForInteraction = false;
  if (!playing) setTimeout(function() { advanceInteractive(); }, 400);
}

function ssInputSend(id) {
  var input = document.getElementById('ssInput-' + id);
  if (!input || !input.value.trim()) return;
  var text = input.value.trim();
  input.value = '';

  var inline = document.getElementById('ss-inline-' + id);
  if (!inline) return;
  var actions = inline.querySelector('.ssi-actions');
  if (actions) {
    var msgDiv = document.createElement('div');
    msgDiv.className = 'ssi-msg';
    msgDiv.style.borderLeftColor = 'var(--purple)';
    msgDiv.innerHTML = '<strong>' + escapeHtml(text) + '</strong>';
    inline.insertBefore(msgDiv, actions);

    var replyDiv = document.createElement('div');
    replyDiv.className = 'ssi-msg';
    replyDiv.textContent = 'That\'s a good point. The recommendation already accounts for that.';
    inline.insertBefore(replyDiv, actions);
  }
  scrollConv();
}

// ── Auto-play subsession handling ──────────────────────────────

function autoOpenSubsession(id) {
  openSubsession(id);
}

function autoCompleteSubsession(id, summary) {
  completeSubsession(id, summary);
}

function autoSkipSubsession(id) {
  skipSubsession(id);
}

// ── Custom step handler ────────────────────────────────────────

window.onStepExecute = function(step) {
  if (step.type === 'subsession-suggest') {
    addSubsessionSuggestion(step.id, step.title, step.desc);
  } else if (step.type === 'subsession-open') {
    openSubsession(step.ssId);
  } else if (step.type === 'subsession-complete') {
    completeSubsession(step.ssId, step.summary);
  } else if (step.type === 'subsession-skip') {
    skipSubsession(step.ssId);
  } else if (step.type === 'sidebar-add') {
    addSidebarItem(step.key, step.group, step.label, step.icon);
  } else if (step.type === 'sidebar-status') {
    setSidebarStatus(step.key, step.status, step.duration);
  } else if (step.type === 'sidebar-phase') {
    updateSidebarPhase(step.label);
  }
};

// ── Reset handler ──────────────────────────────────────────────

window.onReset = function() {
  subsessionActive = false;
  subsessionCount = 0;
  document.body.classList.remove('subsession-active');

  // Reset sidebar
  sidebarItems = {};
  var groups = ['ticket', 'specs', 'plan'];
  groups.forEach(function(g) {
    var el = document.getElementById('gi-' + g);
    if (el) el.innerHTML = '';
  });
  updateSidebarPhase('Describe');

  // Reset sidebar collapse
  sidebarCollapsed = false;
  var sidebar = document.getElementById('sidebar');
  if (sidebar) sidebar.classList.remove('collapsed');
};

var _origAdvanceAutoPlay = null;

<script>
// ── B key for sidebar toggle ───────────────────────────────────

document.addEventListener('keydown', function(e) {
  if (userInput && e.target === userInput) return;
  if (e.code === 'KeyB') {
    e.preventDefault();
    toggleSidebarCollapse();
  }
});

// ── Patch engine for subsession auto-play timing ───────────────

(function() {
  var origAdvanceAutoPlay = window.advanceAutoPlay;
  var patchedAutoPlay = function() {
    if (!playing || !window.SCRIPT || currentStep >= window.SCRIPT.length) { pause(); return; }
    var step = window.SCRIPT[currentStep];

    if (step.type === 'subsession-suggest') {
      executeStep(step);
      currentStep++;
      stepTimer = setTimeout(advanceAutoPlay, 1200);
      return;
    }
    if (step.type === 'subsession-open') {
      executeStep(step);
      currentStep++;
      stepTimer = setTimeout(advanceAutoPlay, 1500);
      return;
    }
    if (step.type === 'subsession-complete') {
      executeStep(step);
      currentStep++;
      stepTimer = setTimeout(advanceAutoPlay, 800);
      return;
    }
    if (step.type === 'subsession-skip') {
      executeStep(step);
      currentStep++;
      stepTimer = setTimeout(advanceAutoPlay, 600);
      return;
    }
    if (step.type === 'sidebar-add' || step.type === 'sidebar-status' || step.type === 'sidebar-phase') {
      executeStep(step);
      currentStep++;
      stepTimer = setTimeout(advanceAutoPlay, 300);
      return;
    }

    origAdvanceAutoPlay();
  };
  window.advanceAutoPlay = patchedAutoPlay;

  // Also patch interactive mode for subsession steps
  var origAdvanceInteractive = window.advanceInteractive;
  var patchedInteractive = function() {
    if (!window.SCRIPT || currentStep >= window.SCRIPT.length) return;
    var step = window.SCRIPT[currentStep];

    if (step.type === 'subsession-suggest' && !playing) {
      executeStep(step);
      currentStep++;
      waitingForInteraction = true;
      return;
    }
    if (step.type === 'subsession-open' && !playing) {
      executeStep(step);
      currentStep++;
      waitingForInteraction = true;
      return;
    }
    if (step.type === 'subsession-complete' || step.type === 'subsession-skip') {
      // These are triggered by user clicking buttons
      executeStep(step);
      currentStep++;
      setTimeout(function() { advanceInteractive(); }, 400);
      return;
    }
    if (step.type === 'sidebar-add' || step.type === 'sidebar-status' || step.type === 'sidebar-phase') {
      executeStep(step);
      currentStep++;
      setTimeout(function() { advanceInteractive(); }, 200);
      return;
    }

    origAdvanceInteractive();
  };
  window.advanceInteractive = patchedInteractive;

  // Patch stepForward for subsession interaction skipping
  var origStepForward = window.stepForward;
  window.stepForward = function() {
    if (playing) return;
    if (peekMode) { closePeek(); return; }

    if (waitingForInteraction && window.SCRIPT) {
      var step = window.SCRIPT[currentStep - 1] || window.SCRIPT[currentStep];
      if (step && step.type === 'subsession-suggest') {
        // Auto-skip: remove suggestion, advance
        var suggest = document.getElementById('ss-suggest-' + step.ssId);
        if (suggest) {
          suggest.innerHTML = '<div class="sss-title" style="color:var(--text-dim)">&#128300; Skipped: ' + step.title + ' &mdash; using defaults</div>';
          suggest.style.borderColor = 'var(--border)';
          suggest.style.borderLeftColor = 'var(--border)';
        }
        waitingForInteraction = false;
        setTimeout(function() { advanceInteractive(); }, 200);
        return;
      }
      if (step && step.type === 'subsession-open') {
        // Auto-complete if open
        var id = step.ssId;
        var summary = id === 'jwt-research' ? 'Access: 1hr, Refresh: 30d, rotation enabled' : '12 unit + 4 integration + 3 security tests';
        completeSubsession(id, summary);
        return;
      }
    }
    origStepForward();
  };
})();
</script>
