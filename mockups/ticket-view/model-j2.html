<style>
/* ── J2: Structured subsession blocks ─────────────────────── */

.ss-block {
  border: 1px solid var(--border); border-radius: var(--r);
  margin: 10px 0; overflow: hidden;
  transition: all 0.3s;
  animation: fadeIn 0.35s ease both;
}
.ss-block.active { border-left: 3px solid var(--accent); }
.ss-block.done { border-color: var(--green-sub); }

.ss-block-header {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 14px; background: var(--elevated);
  border-bottom: 1px solid var(--border);
  font-size: 12px; cursor: pointer;
}
.ss-block-header .ss-icon { font-size: 12px; }
.ss-block-header .ss-title { font-weight: 600; color: var(--text); }
.ss-block-header .ss-status { margin-left: auto; font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; }
.ss-block-header .ss-status.active { color: var(--accent); }
.ss-block-header .ss-status.done { color: var(--green); }
.ss-block-header .ss-expand { font-size: 10px; color: var(--text-dim); margin-left: 4px; }
.ss-block-header .ss-summary { flex: 1; color: var(--text-dim); font-size: 11px; margin-left: 8px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.ss-block-body {
  padding: 10px 14px; max-height: 2000px;
  transition: max-height 0.3s, padding 0.3s;
}
.ss-block.collapsed .ss-block-body {
  max-height: 0; padding: 0 14px; overflow: hidden;
}
.ss-block-body .msg { font-size: 13px; padding: 5px 0 5px 12px; }
.ss-block-body .msg.agent { border-left-color: var(--accent); background: rgba(88,166,255,0.03); }

/* Nested subsession (indented within parent) */
.ss-block .ss-block { margin: 8px 0 8px 8px; }

/* ── Subsession result card (inside block) ────────────────── */

.ss-result {
  border: 1px solid var(--border); border-radius: 6px;
  background: var(--surface); margin: 8px 0; padding: 10px 14px;
  font-size: 12px; color: var(--text-sec); line-height: 1.5;
}
.ss-result strong { color: var(--text); }

/* ── Subsession action buttons (inside block) ─────────────── */

.ss-actions {
  display: flex; gap: 8px; margin-top: 8px; padding-top: 8px;
  border-top: 1px solid var(--border);
}
.ss-action-btn {
  padding: 5px 12px; border-radius: 6px; font-size: 11px; font-weight: 500;
  cursor: pointer; border: 1px solid var(--border); background: var(--elevated);
  color: var(--text-sec); transition: all 0.15s; font-family: inherit;
}
.ss-action-btn:hover { border-color: var(--accent); color: var(--accent); }
.ss-action-btn.primary {
  border-color: var(--accent); color: var(--accent); background: var(--accent-sub);
}
.ss-action-btn.primary:hover { background: rgba(88,166,255,0.2); }

/* ── Quick-create buttons ─────────────────────────────────── */

.quick-create {
  display: flex; gap: 6px; margin-top: 6px;
  animation: fadeIn 0.35s ease both;
}
.qc-btn {
  padding: 4px 10px; border-radius: 6px; font-size: 10px; font-weight: 500;
  cursor: pointer; border: 1px dashed var(--border); background: transparent;
  color: var(--text-dim); transition: all 0.15s; font-family: inherit;
}
.qc-btn:hover { border-color: var(--accent); color: var(--accent); border-style: solid; }

/* ── Breadcrumb ───────────────────────────────────────────── */

.breadcrumb {
  padding: 6px 14px; font-size: 11px; color: var(--text-dim);
  background: var(--elevated); border-bottom: 1px solid var(--border);
  display: none; align-items: center; gap: 6px;
  flex-shrink: 0;
}
.breadcrumb.visible { display: flex; }
.breadcrumb .bc-item { color: var(--text-dim); cursor: pointer; transition: color 0.15s; }
.breadcrumb .bc-item:hover { color: var(--accent); }
.breadcrumb .bc-item.current { color: var(--accent); font-weight: 600; }
.breadcrumb .bc-sep { color: var(--text-dim); opacity: 0.4; font-size: 10px; }

/* ── Notify message ───────────────────────────────────────── */

.notify-msg {
  padding: 6px 12px; font-size: 11px; color: var(--text-dim);
  border-left: 2px solid var(--border); font-style: italic;
  animation: fadeIn 0.35s ease both;
}
.notify-msg.success { border-left-color: var(--green); color: var(--green); }
</style>

<script>
// ── J2: Subsession Block Management ──────────────────────────────

function createSSBlock(key) {
  var def = null;
  if (window.SUBSESSIONS) {
    def = window.SUBSESSIONS.find(function(s) { return s.key === key; });
  }
  if (!def) return null;

  var block = document.createElement('div');
  block.className = 'ss-block active';
  block.id = 'ssb-' + key;

  var header = document.createElement('div');
  header.className = 'ss-block-header';
  header.onclick = function() { toggleSSBlock(key); };
  header.innerHTML =
    '<span class="ss-icon">' + (def.icon || '●') + '</span>' +
    '<span class="ss-title">' + def.label + '</span>' +
    '<span class="ss-summary" id="ss-summary-' + key + '"></span>' +
    '<span class="ss-status active" id="ss-status-' + key + '">ACTIVE</span>' +
    '<span class="ss-expand" id="ss-expand-' + key + '"></span>';

  var body = document.createElement('div');
  body.className = 'ss-block-body';
  body.id = 'ss-body-' + key;

  block.appendChild(header);
  block.appendChild(body);

  return block;
}

function addSSBlockMsg(key, role, text) {
  var body = document.getElementById('ss-body-' + key);
  if (!body) return;
  var msg = document.createElement('div');
  msg.className = 'msg ' + role + ' fade-in';
  if (role === 'agent') msg.innerHTML = text;
  else msg.textContent = text;
  body.appendChild(msg);
  scrollConv();
}

function addSSTyping(key) {
  var body = document.getElementById('ss-body-' + key);
  if (!body) return;
  var d = document.createElement('div');
  d.className = 'typing-indicator fade-in';
  d.id = 'ssTyping-' + key;
  d.innerHTML = '<span class="dot"></span><span class="dot"></span><span class="dot"></span>';
  body.appendChild(d);
  scrollConv();
}

function removeSSTyping(key) {
  var el = document.getElementById('ssTyping-' + key);
  if (el) el.remove();
}

function addSSResult(key, html) {
  var body = document.getElementById('ss-body-' + key);
  if (!body) return;
  var r = document.createElement('div');
  r.className = 'ss-result fade-in';
  r.innerHTML = html;
  body.appendChild(r);
  scrollConv();
}

function addSSActions(key, actions) {
  var body = document.getElementById('ss-body-' + key);
  if (!body) return;
  var wrap = document.createElement('div');
  wrap.className = 'ss-actions fade-in';
  wrap.id = 'ssActions-' + key;
  actions.forEach(function(a) {
    var btn = document.createElement('button');
    btn.className = 'ss-action-btn' + (a.primary ? ' primary' : '');
    btn.textContent = a.label;
    btn.onclick = function() { handleSSAction(key, a.label); };
    wrap.appendChild(btn);
  });
  body.appendChild(wrap);
  scrollConv();
}

function handleSSAction(key, label) {
  var acts = document.getElementById('ssActions-' + key);
  if (acts) {
    acts.innerHTML = '<span style="font-size:11px;color:var(--green);font-weight:500;">✓ ' + label + '</span>';
  }
  waitingForInteraction = false;
  if (!playing) setTimeout(function() { advanceInteractive(); }, 400);
}

function completeSSBlock(key, summary) {
  var block = document.getElementById('ssb-' + key);
  if (!block) return;
  block.classList.remove('active');
  block.classList.add('done', 'collapsed');

  var status = document.getElementById('ss-status-' + key);
  if (status) { status.textContent = '✓ DONE'; status.className = 'ss-status done'; }

  var sumEl = document.getElementById('ss-summary-' + key);
  if (sumEl && summary) sumEl.textContent = summary;

  var expand = document.getElementById('ss-expand-' + key);
  if (expand) expand.textContent = '▸';
}

function toggleSSBlock(key) {
  var block = document.getElementById('ssb-' + key);
  if (!block) return;
  if (block.classList.contains('active')) return; // Don't collapse active
  block.classList.toggle('collapsed');
  var expand = document.getElementById('ss-expand-' + key);
  if (expand) {
    expand.textContent = block.classList.contains('collapsed') ? '▸' : '▾';
  }
}

function addSSArtifactLink(key, artifactIdx) {
  var body = document.getElementById('ss-body-' + key);
  if (!body) return;
  var d = DIFFS[artifactIdx];
  if (!d) return;
  var card = document.createElement('div');
  card.className = 'artifact-card fade-in';
  card.style.margin = '8px 0';
  card.innerHTML =
    '<div class="ac-header">' + d.badge + ' — ' + d.path + '</div>' +
    '<div class="ac-body" style="font-size:12px;">Click to review in side panel →</div>' +
    '<span class="card-peek-hint">Click to review →</span>';
  card.onclick = function() { peekArtifact(artifactIdx); };
  body.appendChild(card);
  scrollConv();
}

function peekArtifact(idx) {
  var d = DIFFS[idx];
  if (!d) return;

  peekMode = true;
  peekSavedState = null;

  document.body.classList.add('split-mode', 'peek-mode');

  var headerEl = document.getElementById('apHeader');
  if (headerEl) {
    var cnt = approvedArtifacts.filter(Boolean).length;
    headerEl.innerHTML =
      '<span class="ap-badge ' + d.badgeClass + '">' + d.badge + '</span>' +
      '<span class="ap-path">' + d.path + '</span>' +
      '<span class="ap-stats">' + d.stats + ' · ' + cnt + '/3 approved</span>' +
      '<button class="ap-close" onclick="closePeek()">&#215; Close</button>';
  }
  var bodyEl = document.getElementById('apBody');
  if (bodyEl) bodyEl.innerHTML = '<div class="diff-view">' + d.content + '</div>';

  var actionsEl = document.getElementById('apActions');
  if (actionsEl) {
    currentArtifact = idx;
    actionsEl.innerHTML = approvedArtifacts[idx]
      ? '<span style="font-size:13px;color:var(--green);font-weight:600;">✓ Approved</span>'
      : '<button class="btn-request" onclick="requestChanges()">Request Changes</button><button class="btn-approve" onclick="handleApprove()">Approve ✓</button>';
  }
}

// ── J2: Breadcrumb ───────────────────────────────────────────────

function updateBreadcrumb(stack) {
  breadcrumbStack = stack || [];
  var el = document.getElementById('breadcrumb');
  if (!el) return;
  if (breadcrumbStack.length === 0) {
    el.classList.remove('visible');
    return;
  }
  el.classList.add('visible');
  var items = ['<span class="bc-item" onclick="handleBreadcrumbClick(-1)">Main</span>'];
  breadcrumbStack.forEach(function(name, i) {
    var isCurrent = i === breadcrumbStack.length - 1;
    items.push('<span class="bc-sep">›</span>');
    items.push('<span class="bc-item' + (isCurrent ? ' current' : '') + '">' + name + '</span>');
  });
  el.innerHTML = items.join('');
}

function handleBreadcrumbClick(idx) {
  // Breadcrumb navigation is visual in mockup
}

// ── J2: Quick-create buttons ─────────────────────────────────────

function addQuickCreate(buttons) {
  var wrap = document.createElement('div');
  wrap.className = 'quick-create fade-in';
  buttons.forEach(function(label) {
    var btn = document.createElement('button');
    btn.className = 'qc-btn';
    btn.textContent = '+ ' + label;
    btn.onclick = function() { btn.textContent = '✓ ' + label; btn.style.color = 'var(--green)'; btn.style.borderColor = 'var(--green-sub)'; };
    wrap.appendChild(btn);
  });
  if (convInner) convInner.appendChild(wrap);
  scrollConv();
}

// ── J2: Override step execution ──────────────────────────────────

window.onStepExecute = function(step) {
  switch (step.type) {
    case 'ss-enter':
      var parentKey = step.parent || null;
      var block = createSSBlock(step.key);
      if (!block) break;

      if (parentKey && document.getElementById('ss-body-' + parentKey)) {
        // Nest inside parent subsession body
        document.getElementById('ss-body-' + parentKey).appendChild(block);
      } else {
        if (convInner) convInner.appendChild(block);
      }
      activeSSBlocks[step.key] = { el: block, parentKey: parentKey };
      scrollConv();
      break;

    case 'ss-msg':
      removeSSTyping(step.key);
      addSSBlockMsg(step.key, step.role, step.text);
      break;

    case 'ss-typing':
      addSSTyping(step.key);
      break;

    case 'ss-result':
      addSSResult(step.key, step.html);
      break;

    case 'ss-actions':
      addSSActions(step.key, step.actions);
      break;

    case 'ss-accept':
      var acts = document.getElementById('ssActions-' + step.key);
      if (acts) {
        acts.innerHTML = '<span style="font-size:11px;color:var(--green);font-weight:500;">✓ Accepted</span>';
      }
      break;

    case 'ss-done':
      completeSSBlock(step.key, step.summary);
      break;

    case 'ss-artifact':
      addSSArtifactLink(step.key, step.artifact);
      break;

    case 'breadcrumb':
      updateBreadcrumb(step.stack);
      break;

    case 'quick-create':
      addQuickCreate(step.buttons);
      break;

    case 'sidebar-add':
      addSidebarItem(step.key);
      if (step.status === 'active') setSidebarStatus(step.key, 'active');
      break;

    case 'sidebar-done':
      setSidebarStatus(step.key, 'done', step.duration);
      break;

    case 'notify':
      var n = document.createElement('div');
      n.className = 'notify-msg fade-in';
      n.innerHTML = step.text;
      if (convInner) convInner.appendChild(n);
      scrollConv();
      break;
  }
};

// ── J2: Override advanceAutoPlay ──────────────────────────────────

var _origAutoPlay = advanceAutoPlay;
advanceAutoPlay = function() {
  if (!playing || currentStep >= SCRIPT.length) { pause(); return; }

  var step = SCRIPT[currentStep];
  executeStep(step);
  currentStep++;

  var delay;

  if (step.type === 'typing') {
    delay = step.duration;
  } else if (step.type === 'ss-typing') {
    delay = step.duration || 800;
    var ssKey = step.key;
    setTimeout(function() { if (playing) removeSSTyping(ssKey); }, (step.duration || 800) - 100);
  } else if (step.type === 'decision') {
    delay = 1800;
    var sid = step.id, rec = step.options[step.recommended];
    setTimeout(function() {
      if (playing) resolveDecisionCard(sid, rec.replace(/\s*★/, ''));
    }, 1500);
  } else if (step.type === 'approve') {
    delay = 1200;
    var ai = step.artifact;
    setTimeout(function() { if (playing) autoApprove(ai); }, 900);
  } else if (step.type === 'approve-doc') {
    delay = 1200;
    setTimeout(function() { if (playing) autoApproveDoc(); }, 900);
  } else if (step.type === 'ss-actions') {
    delay = 1500;
    var actionKey = step.key;
    setTimeout(function() {
      if (playing) {
        var acts = document.getElementById('ssActions-' + actionKey);
        if (acts) acts.innerHTML = '<span style="font-size:11px;color:var(--green);font-weight:500;">✓ Accepted</span>';
      }
    }, 1200);
  } else if (step.type === 'all-approved') {
    delay = 1500;
  } else if (step.type === 'exec-progress') {
    runExecAnimation(function() {
      if (playing) stepTimer = setTimeout(advanceAutoPlay, 600);
    });
    return;
  } else if (step.type === 'complete') {
    return;
  } else if (step.type === 'user') {
    delay = 800;
  } else if (step.type === 'phase') {
    delay = 800;
  } else if (step.type === 'layout') {
    delay = 700;
  } else if (step.type === 'switch-artifact') {
    delay = 500;
  } else if (step.type.indexOf('ss-') === 0 || step.type.indexOf('sidebar') === 0 || step.type === 'breadcrumb' || step.type === 'quick-create' || step.type === 'notify') {
    delay = 500;
  } else {
    delay = 600;
  }

  stepTimer = setTimeout(advanceAutoPlay, delay);
};

// ── J2: Override advanceInteractive ──────────────────────────────

advanceInteractive = function() {
  if (currentStep >= SCRIPT.length) return;
  var step = SCRIPT[currentStep];

  // Wait states
  if (step.type === 'user' && step.interactive && !playing) {
    currentStep++;
    waitingForInteraction = true;
    if (userInput) { userInput.value = ''; userInput.placeholder = step.placeholder || 'Type a message...'; userInput.focus(); }
    if (sendBtn) sendBtn.disabled = false;
    return;
  }
  if (step.type === 'decision' && !playing) {
    executeStep(step); currentStep++; waitingForInteraction = true; return;
  }
  if (step.type === 'approve' && !playing) {
    if (step.artifact !== undefined && approvedArtifacts[step.artifact]) {
      currentStep++; setTimeout(function() { advanceInteractive(); }, 200); return;
    }
    waitingForInteraction = true; currentStep++; return;
  }
  if (step.type === 'approve-doc' && !playing) {
    if (productDesignApproved) {
      currentStep++; setTimeout(function() { advanceInteractive(); }, 200); return;
    }
    waitingForInteraction = true; currentStep++; return;
  }
  if (step.type === 'ss-actions' && !playing) {
    executeStep(step); currentStep++; waitingForInteraction = true; return;
  }

  executeStep(step);
  currentStep++;

  // Delays
  if (step.type === 'typing') {
    setTimeout(function() { advanceInteractive(); }, step.duration);
  } else if (step.type === 'ss-typing') {
    var tKey = step.key;
    setTimeout(function() { removeSSTyping(tKey); advanceInteractive(); }, step.duration || 800);
  } else if (step.type === 'exec-progress') {
    runExecAnimation(function() {
      setTimeout(function() { advanceInteractive(); }, 600);
    });
  } else if (step.type === 'all-approved') {
    setTimeout(function() { advanceInteractive(); }, 1200);
  } else if (step.type === 'layout') {
    setTimeout(function() { advanceInteractive(); }, 500);
  } else if (step.type === 'switch-artifact') {
    setTimeout(function() { advanceInteractive(); }, 400);
  } else if (step.type === 'complete') {
    // Done
  } else if (step.type.indexOf('ss-') === 0 || step.type.indexOf('sidebar') === 0 || step.type === 'breadcrumb' || step.type === 'quick-create' || step.type === 'notify') {
    setTimeout(function() { advanceInteractive(); }, 400);
  } else {
    setTimeout(function() { advanceInteractive(); }, 600);
  }
};

// ── J2: Override resetFlow ───────────────────────────────────────

var _origReset = resetFlow;
resetFlow = function() {
  pause();
  currentStep = 0;
  approvedArtifacts = [false, false, false];
  currentArtifact = 0;
  waitingForInteraction = false;
  currentPhase = null;
  peekMode = false;
  peekSavedState = null;
  productDesignApproved = false;
  execAnimationRunning = false;
  activeSSBlocks = {};
  breadcrumbStack = [];
  ssCounter = 0;
  sidebarItems = {};

  if (convInner) convInner.innerHTML = '';
  closeArtifactPanel();
  if (stepNumEl) stepNumEl.textContent = '0';
  if (progressFill) progressFill.style.width = '0%';
  if (userInput) { userInput.value = ''; userInput.placeholder = 'Type a message...'; }
  if (sendBtn) sendBtn.disabled = true;

  // Reset breadcrumb
  updateBreadcrumb([]);

  // Reset phase dots
  ['D','S','P','E','V'].forEach(function(ph) {
    var el = document.getElementById('pd-' + ph);
    if (!el) return;
    el.classList.remove('is-done', 'is-active');
    var dot = el.querySelector('.dot');
    var label = el.querySelector('.label');
    if (dot) dot.className = 'dot pending';
    if (label) label.className = 'label';
  });

  // Reset sidebar groups
  ['ticket','specs','plan'].forEach(function(g) {
    var items = document.getElementById('gi-' + g);
    var toggle = document.getElementById('gt-' + g);
    if (items) { items.innerHTML = ''; items.classList.remove('collapsed'); }
    if (toggle) toggle.classList.remove('collapsed');
  });

  // Reset artifact panel actions
  var actionsEl = document.getElementById('apActions');
  if (actionsEl) {
    actionsEl.innerHTML =
      '<button class="btn-request" onclick="requestChanges()">Request Changes</button>' +
      '<button class="btn-approve" id="approveBtn" onclick="handleApprove()">Approve ✓</button>';
  }

  setTimeout(function() { advanceInteractive(); }, 300);
};

// ── J2: Sidebar navigation -> scroll to block ───────────────────

window.onSidebarNavigate = function(key) {
  var block = document.getElementById('ssb-' + key);
  if (block) {
    // If collapsed, expand it
    if (block.classList.contains('collapsed')) {
      block.classList.remove('collapsed');
      var expand = document.getElementById('ss-expand-' + key);
      if (expand) expand.textContent = '▾';
    }
    block.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
};

// ── J2: Extra keyboard shortcut: B for sidebar ──────────────────

document.addEventListener('keydown', function(e) {
  if (userInput && e.target === userInput) return;
  if (e.target && e.target.tagName === 'INPUT') return;
  if (e.code === 'KeyB') {
    e.preventDefault();
    toggleSidebarCollapse();
  }
});
</script>
