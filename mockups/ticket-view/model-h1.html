<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>H1: Takeover — Bonsai Ticket View</title>
<link rel="stylesheet" href="shared/base.css">
<link rel="stylesheet" href="shared/sidebar.css">
<style>
  /* ── H1-specific: Breadcrumb bar ────────────────────────────── */

  .breadcrumb {
    height: 30px; min-height: 30px;
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 0 20px; display: flex; align-items: center; gap: 4px;
    font-size: 12px; flex-shrink: 0;
    transition: background 0.2s;
  }
  .bc-item {
    color: var(--text-dim); cursor: pointer; padding: 2px 4px; border-radius: 3px;
    transition: all 0.15s; white-space: nowrap;
  }
  .bc-item:hover { color: var(--accent); background: var(--accent-sub); }
  .bc-item.current { color: var(--text); font-weight: 600; cursor: default; }
  .bc-item.current:hover { background: transparent; color: var(--text); }
  .bc-sep { color: var(--text-dim); opacity: 0.4; }
  .bc-context {
    margin-left: auto; font-size: 10px; color: var(--text-dim);
    font-style: italic; opacity: 0.7;
  }

  /* ── H1-specific: Summary cards (main thread view) ──────────── */

  .summary-card {
    border: 1px solid var(--border); border-radius: var(--r);
    background: var(--surface); overflow: hidden;
    animation: fadeIn 0.35s ease both;
    cursor: pointer;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .summary-card:hover { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent-sub); }
  .summary-card.is-active { border-color: var(--accent); background: var(--accent-sub); }
  .sc-header {
    padding: 10px 14px; display: flex; align-items: center; gap: 10px;
    border-bottom: 1px solid var(--border);
  }
  .sc-icon { font-size: 14px; flex-shrink: 0; }
  .sc-icon.done { color: var(--green); }
  .sc-icon.active { color: var(--accent); }
  .sc-icon.pending { color: var(--text-dim); opacity: 0.4; }
  .sc-title { font-size: 13px; font-weight: 600; color: var(--text); flex: 1; }
  .sc-duration {
    font-size: 10px; color: var(--text-dim); font-family: var(--mono);
    padding: 2px 8px; background: var(--elevated); border-radius: 4px;
  }
  .sc-enter {
    font-size: 11px; color: var(--accent); font-weight: 500;
    padding: 3px 10px; border-radius: 4px; border: 1px solid var(--accent);
    background: transparent; cursor: pointer; transition: all 0.15s;
    font-family: inherit; white-space: nowrap;
  }
  .sc-enter:hover { background: var(--accent-sub); }
  .sc-body {
    padding: 10px 14px; font-size: 12px; color: var(--text-sec); line-height: 1.6;
  }
  .sc-artifact {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 10px; color: var(--text-dim); font-family: var(--mono);
    padding: 2px 8px; background: var(--elevated); border-radius: 4px;
    margin-top: 4px;
  }
  .sc-artifact.cat-ticket { border-left: 2px solid var(--purple); }
  .sc-artifact.cat-spec { border-left: 2px solid var(--yellow); }
  .sc-artifact.cat-plan { border-left: 2px solid var(--accent); }

  /* ── H1-specific: Progress card ─────────────────────────────── */

  .progress-card {
    border: 1px solid var(--border); border-radius: var(--r);
    background: var(--surface); overflow: hidden; padding: 14px;
    animation: fadeIn 0.35s ease both;
  }
  .pc-step {
    font-size: 13px; line-height: 1.8; font-family: var(--mono);
    display: flex; align-items: center; gap: 8px;
  }
  .pc-step.done { color: var(--green); }
  .pc-step.running { color: var(--accent); }
  .pc-step.running .pc-icon { animation: progressPulse 1.2s infinite; }
  .pc-step.pending { color: var(--text-dim); }
  .pc-icon { width: 16px; text-align: center; flex-shrink: 0; }
</style>
</head>

<script>
// ── H1-specific: Override engine functions for takeover model ─────
//
// H1 introduces: enter-sub, exit-sub, main-msg, exec-batch step
// types, plus view-stack navigation with breadcrumbs and summary
// cards on the main thread. We override executeStep, advanceAutoPlay,
// advanceInteractive, resetFlow, stepForward, and the keyboard
// handler to add these behaviors.

// ── Sidebar click handler ─────────────────────────────────────────

window.onSidebarNavigate = function(key) {
  var state = sidebarItems[key] || subsessionState[key];
  if (!state) return;
  if (state.status === 'done') {
    peekSubsession(key);
  }
};

// ── Breadcrumb management ─────────────────────────────────────────

function updateBreadcrumb() {
  var bc = document.getElementById('breadcrumb');
  var html = '<span class="bc-item' + (viewStack.length === 0 ? ' current' : '') + '" onclick="navigateToLevel(0)">AUTH-42</span>';

  for (var i = 0; i < viewStack.length; i++) {
    var def = SUBSESSIONS.find(function(s) { return s.key === viewStack[i]; });
    if (!def) continue;

    if (i === 0) {
      var phaseLabel = def.phase.charAt(0).toUpperCase() + def.phase.slice(1);
      html += '<span class="bc-sep">&rsaquo;</span>';
      html += '<span class="bc-item" onclick="navigateToLevel(0)">' + phaseLabel + '</span>';
    }

    html += '<span class="bc-sep">&rsaquo;</span>';
    var isCurrent = (i === viewStack.length - 1);
    html += '<span class="bc-item' + (isCurrent ? ' current' : '') + '"' +
      (isCurrent ? '' : ' onclick="navigateToLevel(' + (i + 1) + ')"') +
      '>' + def.label + '</span>';
  }

  if (viewStack.length > 0) {
    var activeDef = SUBSESSIONS.find(function(s) { return s.key === viewStack[viewStack.length - 1]; });
    if (activeDef) {
      html += '<span class="bc-context">Context: ' + activeDef.context + '</span>';
    }
  }

  bc.innerHTML = html;
}

function navigateToLevel(level) {
  if (level === 0 && viewStack.length > 0) {
    viewStack = [];
    updateBreadcrumb();
    updateContextIndicator();
  }
}

function updateContextIndicator() {
  var ctx = document.getElementById('bcContext');
  if (!ctx) return;
  if (viewStack.length > 0) {
    var activeDef = SUBSESSIONS.find(function(s) { return s.key === viewStack[viewStack.length - 1]; });
    if (activeDef) {
      ctx.textContent = 'Context: ' + activeDef.context;
    }
  } else {
    ctx.textContent = '';
  }
}

// ── Summary cards on main thread ──────────────────────────────────

function addSummaryCard(key, summary, artifactLabel, artifactCat) {
  var def = SUBSESSIONS.find(function(s) { return s.key === key; });
  if (!def) return;

  var state = subsessionState[key] || {};
  var statusIcon = state.status === 'done' ? '✓' : (state.status === 'active' ? '●' : '○');
  var iconClass = state.status === 'done' ? 'done' : (state.status === 'active' ? 'active' : 'pending');
  var duration = state.duration || '';
  var isActive = state.status === 'active';

  var div = document.createElement('div');
  div.className = 'summary-card fade-in' + (isActive ? ' is-active' : '');
  div.onclick = function() { handleSidebarClick(key); };

  var artifactHtml = '';
  if (artifactLabel) {
    artifactHtml = '<div><span class="sc-artifact cat-' + (artifactCat || 'ticket') + '">' + artifactLabel + '</span></div>';
  }

  div.innerHTML =
    '<div class="sc-header">' +
      '<span class="sc-icon ' + iconClass + '">' + statusIcon + '</span>' +
      '<span class="sc-title">' + def.label + '</span>' +
      (duration ? '<span class="sc-duration">' + duration + '</span>' : '') +
      '<button class="sc-enter" onclick="event.stopPropagation(); handleSidebarClick(\'' + key + '\')">Enter &rarr;</button>' +
    '</div>' +
    '<div class="sc-body">' + summary + artifactHtml + '</div>';
  convInner.appendChild(div);
  scrollConv();
}

// ── Peek at completed subsession ──────────────────────────────────

function peekSubsession(key) {
  var def = SUBSESSIONS.find(function(s) { return s.key === key; });
  if (!def) return;

  peekMode = true;
  document.body.classList.add('split-mode', 'peek-mode');

  var badge = 'DOC';
  var badgeClass = 'doc';
  var path = def.label;
  var stats = def.context;
  var bodyHtml = '<div class="doc-preview"><h2>' + def.label + '</h2><p>Completed subsession. Context: ' + def.context + '</p><p style="color:var(--text-dim);font-style:italic;margin-top:16px">Full conversation replay not implemented in mockup.</p></div>';

  document.getElementById('apHeader').innerHTML = '<span class="ap-badge ' + badgeClass + '">' + badge + '</span><span class="ap-path">' + path + '</span><span class="ap-stats">' + stats + '</span><button class="ap-close" onclick="closePeek()" style="display:inline-flex;align-items:center;gap:4px;margin-left:auto;cursor:pointer;font-size:12px;color:var(--text-dim);background:none;border:1px solid var(--border);border-radius:4px;padding:4px 12px;font-family:inherit">&times; Close</button>';
  document.getElementById('apBody').innerHTML = bodyHtml;
  document.getElementById('apActions').innerHTML = '<button class="ap-close" onclick="closePeek()" style="display:inline-flex;align-items:center;gap:4px;margin-left:auto;cursor:pointer;font-size:12px;color:var(--text-dim);background:none;border:1px solid var(--border);border-radius:4px;padding:4px 12px;font-family:inherit">&larr; Back to flow</button>';
}

// ── Subsession enter/exit ─────────────────────────────────────────

function enterSubsession(key) {
  addSidebarItem(key);
  setSidebarStatus(key, 'active');
  // Also track in H1-specific subsessionState for summary cards
  if (!subsessionState[key]) subsessionState[key] = { status: 'active', duration: null };
  else subsessionState[key].status = 'active';
  viewStack.push(key);
  updateBreadcrumb();
  convInner.innerHTML = '';
}

function exitSubsession(key, duration) {
  setSidebarStatus(key, 'done', duration);
  if (!subsessionState[key]) subsessionState[key] = { status: 'done', duration: duration };
  else { subsessionState[key].status = 'done'; subsessionState[key].duration = duration; }

  var idx = viewStack.indexOf(key);
  if (idx >= 0) viewStack.splice(idx, 1);
  updateBreadcrumb();
  convInner.innerHTML = '';

  var def = SUBSESSIONS.find(function(s) { return s.key === key; });
  if (!def) return;

  addSummaryCard(key, getSummaryText(key), getArtifactLabel(key), getArtifactCat(key));
  renderMainThreadSummaries(key);
}

// ── Summary text / artifact metadata ──────────────────────────────

function getSummaryText(key) {
  var summaries = {
    'build-desc': 'Scoped ticket: JWT auth, 3 roles, token-based.',
    'product-design': 'Built 5-section product doc. Approved.',
    'review-auth': 'Reviewed module spec. JWT strategy, 3 decisions made.',
    'jwt-research': 'Confirmed JWT + refresh token pattern.',
    'review-dd': 'Added auth module to architecture overview. Quick review.',
    'review-core': 'Updated core dependencies for auth module.',
    'build-plan': '2 milestones, 6 steps. Layer-by-layer approach.',
    'run-checks': 'All checks passed &mdash; tests green, types valid, lint clean.'
  };
  for (var i = 1; i <= 6; i++) {
    summaries['exec-step-' + i] = 'Step ' + i + ': ' + EXEC_STEPS[i-1].name + '. Created ' + EXEC_STEPS[i-1].file + '.';
  }
  return summaries[key] || 'Completed.';
}

function getArtifactLabel(key) {
  var artifacts = {
    'build-desc': 'Description',
    'product-design': 'product-design.md',
    'review-auth': 'auth/README.md',
    'review-dd': 'DESIGN_DOC.md',
    'review-core': 'core/README.md',
    'build-plan': 'Implementation Plan'
  };
  return artifacts[key] || null;
}

function getArtifactCat(key) {
  var cats = {
    'build-desc': 'ticket',
    'product-design': 'ticket',
    'review-auth': 'spec',
    'review-dd': 'spec',
    'review-core': 'spec',
    'build-plan': 'plan'
  };
  return cats[key] || 'ticket';
}

function renderMainThreadSummaries(latestKey) {
  convInner.innerHTML = '';

  var completedOrder = SUBSESSIONS.filter(function(s) {
    return subsessionState[s.key] && subsessionState[s.key].status === 'done' && !s.parent;
  });

  var currentPhaseLabel = null;
  completedOrder.forEach(function(def) {
    var phaseLabel = def.phase.charAt(0).toUpperCase() + def.phase.slice(1);
    if (phaseLabel !== currentPhaseLabel) {
      currentPhaseLabel = phaseLabel;
      addPhaseDivider(phaseLabel.toUpperCase());
    }
    addSummaryCard(def.key, getSummaryText(def.key), getArtifactLabel(def.key), getArtifactCat(def.key));
  });
}

// ── Progress card (H1-specific) ───────────────────────────────────

function addProgressCard(steps) {
  var div = document.createElement('div');
  div.className = 'progress-card fade-in';
  div.id = 'progressCard';
  var html = '';
  steps.forEach(function(s, i) {
    html += '<div class="pc-step pending" id="pc-step-' + i + '"><span class="pc-icon">○</span>' + s + '</div>';
  });
  div.innerHTML = html;
  convInner.appendChild(div);
  scrollConv();
  animateProgress(steps);
}

function animateProgress(steps) {
  var i = 0;
  function nextStep() {
    if (i >= steps.length) {
      if (!waitingForInteraction) advanceSoon(600);
      return;
    }
    var el = document.getElementById('pc-step-' + i);
    el.className = 'pc-step running';
    el.querySelector('.pc-icon').textContent = '●';
    scrollConv();
    setTimeout(function() {
      el.className = 'pc-step done';
      el.querySelector('.pc-icon').textContent = '✓';
      i++;
      nextStep();
    }, 500 + Math.random() * 300);
  }
  nextStep();
}

// ── Override: executeStep (add H1 step types) ─────────────────────

var _engineExecuteStep = executeStep;

executeStep = function(step) {
  if (stepNumEl) stepNumEl.textContent = currentStep + 1;
  if (progressFill && window.SCRIPT) {
    var pct = ((currentStep + 1) / window.SCRIPT.length) * 100;
    progressFill.style.width = pct + '%';
  }

  switch (step.type) {
    case 'enter-sub':
      enterSubsession(step.sub);
      break;

    case 'exit-sub':
      exitSubsession(step.sub, step.duration);
      break;

    case 'main-msg':
      removeTypingIndicator();
      addAgentMsg(step.text);
      break;

    case 'exec-batch':
      for (var i = 1; i <= 6; i++) {
        addSidebarItem('exec-step-' + i);
      }
      openExecPanel();
      break;

    case 'complete':
      completeAllPhases();
      viewStack = [];
      updateBreadcrumb();
      addAgentMsg('Ticket complete! All phases finished successfully.');
      pause();
      break;

    default:
      _engineExecuteStep(step);
      break;
  }
};

// ── Override: runExecAnimation (add sidebar updates) ──────────────

var _engineRunExecAnimation = runExecAnimation;

runExecAnimation = function(callback) {
  execAnimationRunning = true;
  var stepIdx = 0;
  var msgIdx = 0;

  function runNextExecStep() {
    if (stepIdx >= EXEC_STEPS.length) {
      execAnimationRunning = false;
      var counter = document.getElementById('execCounter');
      if (counter) counter.textContent = '6/6 complete';
      if (callback) callback();
      return;
    }

    var execKey = 'exec-step-' + (stepIdx + 1);
    setSidebarStatus(execKey, 'active');
    if (!subsessionState[execKey]) subsessionState[execKey] = { status: 'active', duration: null };
    else subsessionState[execKey].status = 'active';

    var stepEl = document.getElementById('sr-' + stepIdx);
    if (stepEl) {
      stepEl.className = 'step-row running';
      stepEl.querySelector('.step-icon').textContent = '●';
    }

    var codeHeader = document.getElementById('codePreviewHeader');
    if (codeHeader) {
      codeHeader.innerHTML = '<span class="cph-file">' + EXEC_STEPS[stepIdx].file + '</span>';
    }

    var codeBody = document.getElementById('codePreviewBody');
    if (codeBody && EXEC_CODE_SNIPPETS) {
      codeBody.innerHTML = '';
      var snippet = EXEC_CODE_SNIPPETS[stepIdx];
      var lineIdx = 0;

      function addNextLine() {
        if (lineIdx >= snippet.length) {
          setTimeout(function() {
            if (stepEl) {
              stepEl.className = 'step-row done';
              stepEl.querySelector('.step-icon').textContent = '✓';
            }
            var counter = document.getElementById('execCounter');
            if (counter) counter.textContent = (stepIdx + 1) + '/6 complete';

            setSidebarStatus(execKey, 'done', '<1min');
            if (subsessionState[execKey]) { subsessionState[execKey].status = 'done'; subsessionState[execKey].duration = '<1min'; }

            if (msgIdx < EXEC_MESSAGES.length) {
              addAgentMsg(EXEC_MESSAGES[msgIdx]);
              msgIdx++;
            }
            if (msgIdx < EXEC_MESSAGES.length) {
              setTimeout(function() {
                addAgentMsg(EXEC_MESSAGES[msgIdx]);
                msgIdx++;
                stepIdx++;
                setTimeout(runNextExecStep, 200);
              }, 250);
            } else {
              stepIdx++;
              setTimeout(runNextExecStep, 200);
            }
          }, 300);
          return;
        }
        var line = snippet[lineIdx];
        var lineEl = document.createElement('div');
        if (line.t === 'hunk') {
          lineEl.className = 'diff-hunk-header';
          lineEl.textContent = line.v;
        } else {
          lineEl.className = 'diff-line add';
          lineEl.style.animationDelay = (lineIdx * 0.03) + 's';
          lineEl.innerHTML = '<span class="ln">' + line.ln + '</span>' + escapeHtml(line.v);
        }
        codeBody.appendChild(lineEl);
        codeBody.scrollTop = codeBody.scrollHeight;
        lineIdx++;
        setTimeout(addNextLine, 60 + Math.random() * 40);
      }
      addNextLine();
    } else {
      stepIdx++;
      setTimeout(runNextExecStep, 500);
    }
  }

  if (EXEC_MESSAGES.length > 0) {
    addAgentMsg(EXEC_MESSAGES[msgIdx]);
    msgIdx++;
  }
  setTimeout(runNextExecStep, 400);
};

// ── Override: advanceAutoPlay (add H1 step type delays) ───────────

advanceAutoPlay = function() {
  if (!playing || currentStep >= SCRIPT.length) { pause(); return; }

  var step = SCRIPT[currentStep];
  executeStep(step);
  currentStep++;

  var delay;
  if (step.type === 'typing') {
    delay = step.duration;
  } else if (step.type === 'decision') {
    delay = 1800;
    var stepId = step.id;
    var recOption = step.options[step.recommended];
    setTimeout(function() {
      if (playing) {
        resolveDecisionCard(stepId, recOption.replace(/\s*★/, '').replace(/\s*★/, ''));
      }
    }, 1500);
  } else if (step.type === 'approve') {
    delay = 1200;
    var artIdx = step.artifact;
    setTimeout(function() {
      if (playing) autoApprove(artIdx);
    }, 900);
  } else if (step.type === 'approve-doc') {
    delay = 1200;
    setTimeout(function() {
      if (playing) autoApproveDoc();
    }, 900);
  } else if (step.type === 'layout') {
    delay = 700;
  } else if (step.type === 'enter-sub') {
    delay = 600;
  } else if (step.type === 'exit-sub') {
    delay = 800;
  } else if (step.type === 'main-msg') {
    delay = 1000;
  } else if (step.type === 'all-approved') {
    delay = 1500;
  } else if (step.type === 'exec-batch') {
    runExecAnimation(function() {
      if (playing) {
        closeArtifactPanel();
        addAgentMsg('All 6 steps complete.');
        stepTimer = setTimeout(advanceAutoPlay, 600);
      }
    });
    return;
  } else if (step.type === 'complete') {
    return;
  } else if (step.type === 'user') {
    delay = 800;
  } else if (step.type === 'phase') {
    delay = 800;
  } else {
    delay = 1200;
  }

  stepTimer = setTimeout(advanceAutoPlay, delay);
};

// ── Override: advanceInteractive (add H1 step types) ──────────────

advanceInteractive = function() {
  if (currentStep >= SCRIPT.length) return;

  var step = SCRIPT[currentStep];

  if (step.type === 'user' && step.interactive && !playing) {
    currentStep++;
    waitingForInteraction = true;
    if (userInput) {
      userInput.value = '';
      userInput.placeholder = step.placeholder || 'Type a message...';
      userInput.focus();
    }
    if (sendBtn) sendBtn.disabled = false;
    return;
  }

  if (step.type === 'decision' && !playing) {
    executeStep(step);
    currentStep++;
    waitingForInteraction = true;
    return;
  }

  if (step.type === 'approve' && !playing) {
    if (step.artifact !== undefined && approvedArtifacts[step.artifact]) {
      currentStep++;
      setTimeout(function() { advanceInteractive(); }, 200);
      return;
    }
    waitingForInteraction = true;
    currentStep++;
    return;
  }

  if (step.type === 'approve-doc' && !playing) {
    if (productDesignApproved) {
      currentStep++;
      setTimeout(function() { advanceInteractive(); }, 200);
      return;
    }
    waitingForInteraction = true;
    currentStep++;
    return;
  }

  executeStep(step);
  currentStep++;

  if (step.type === 'typing') {
    setTimeout(function() { advanceInteractive(); }, step.duration);
  } else if (step.type === 'exec-batch') {
    runExecAnimation(function() {
      closeArtifactPanel();
      addAgentMsg('All 6 steps complete.');
      setTimeout(function() { advanceInteractive(); }, 600);
    });
    return;
  } else if (step.type === 'all-approved') {
    setTimeout(function() { advanceInteractive(); }, 1200);
  } else if (step.type === 'layout') {
    setTimeout(function() { advanceInteractive(); }, 500);
  } else if (step.type === 'enter-sub' || step.type === 'exit-sub') {
    setTimeout(function() { advanceInteractive(); }, 500);
  } else if (step.type === 'main-msg') {
    setTimeout(function() { advanceInteractive(); }, 800);
  } else if (step.type === 'complete') {
    // Done
  } else {
    setTimeout(function() { advanceInteractive(); }, 600);
  }
};

// ── Override: resetFlow (add H1-specific state reset) ─────────────

resetFlow = function() {
  pause();
  currentStep = 0;
  approvedArtifacts = [false, false, false];
  currentArtifact = 0;
  waitingForInteraction = false;
  currentPhase = null;
  peekMode = false;
  peekSavedState = null;
  productDesignApproved = false;
  execAnimationRunning = false;
  viewStack = [];
  subsessionState = {};

  // Reset shared sidebar state
  sidebarItems = {};

  if (convInner) convInner.innerHTML = '';
  closeArtifactPanel();
  if (stepNumEl) stepNumEl.textContent = '0';
  if (progressFill) progressFill.style.width = '0%';
  if (userInput) {
    userInput.value = '';
    userInput.placeholder = 'Type a message...';
  }
  if (sendBtn) sendBtn.disabled = true;

  // Reset sidebar contents
  ['describe', 'specify', 'plan', 'execute', 'verify'].forEach(function(g) {
    var items = document.getElementById('gi-' + g);
    var toggle = document.getElementById('gt-' + g);
    if (items) { items.innerHTML = ''; items.classList.remove('collapsed'); }
    if (toggle) toggle.classList.remove('collapsed');
  });

  // Reset phase dots
  ['D', 'S', 'P', 'E', 'V'].forEach(function(ph) {
    var el = document.getElementById('pd-' + ph);
    if (!el) return;
    el.classList.remove('is-done', 'is-active');
    var dot = el.querySelector('.dot');
    var label = el.querySelector('.label');
    if (dot) dot.className = 'dot pending';
    if (label) label.className = 'label';
  });

  // Reset breadcrumb
  updateBreadcrumb();

  // Reset artifact panel
  var actionsEl = document.getElementById('apActions');
  if (actionsEl) {
    actionsEl.innerHTML =
      '<button class="btn-request" onclick="requestChanges()">Request Changes</button>' +
      '<button class="btn-approve" id="approveBtn" onclick="handleApprove()">Approve ✓</button>';
  }

  setTimeout(function() { advanceInteractive(); }, 300);
};

// ── Override: resetFlow (viewStack-aware Escape) ──────────────────
// The engine's keydown handler calls resetFlow() on Escape. We wrap
// it so that Escape first navigates up the view stack before fully
// resetting. This avoids needing a duplicate keydown listener.

var _h1ResetFlow = resetFlow;  // capture the just-assigned override above

resetFlow = function() {
  // If we're in a subsession, Escape goes up instead of resetting
  if (viewStack.length > 0) {
    navigateToLevel(0);
    return;
  }
  _h1ResetFlow();
};

// ── Extra keyboard: B to toggle sidebar ───────────────────────────
// The engine handles Space/ArrowRight/Escape. We just add B.

document.addEventListener('keydown', function(e) {
  if (userInput && e.target === userInput) return;
  if (e.code === 'KeyB') {
    e.preventDefault();
    toggleSidebarCollapse();
  }
});
</script>
