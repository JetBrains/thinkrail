<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K2: Inline + Focus &#8212; Bonsai Ticket View</title>
<link rel="stylesheet" href="shared/base.css">
<link rel="stylesheet" href="shared/sidebar.css">
<style>
/* ── Ticket summary in sidebar ────────────────────────────── */

.sidebar-summary {
  padding: 12px 14px; border-bottom: 1px solid var(--border);
}
.sidebar-summary .ss-id {
  font-family: var(--mono); font-size: 11px; color: var(--accent);
  background: var(--accent-sub); padding: 2px 6px; border-radius: 3px; font-weight: 600;
}
.sidebar-summary .ss-title {
  font-size: 12px; font-weight: 600; color: var(--text); margin-top: 6px;
  line-height: 1.4;
}
.sidebar-summary .ss-meta {
  font-size: 10px; color: var(--text-dim); margin-top: 4px;
  display: flex; gap: 8px; align-items: center;
}
.sidebar-summary .ss-badge {
  font-size: 9px; font-weight: 700; text-transform: uppercase;
  padding: 1px 5px; border-radius: 3px; letter-spacing: 0.04em;
}
.sidebar-summary .ss-badge.feature { background: var(--purple-sub); color: var(--purple); }
.sidebar-summary .ss-badge.phase-badge { background: var(--accent-sub); color: var(--accent); }

.sidebar.collapsed .sidebar-summary { padding: 8px 0; text-align: center; }
.sidebar.collapsed .sidebar-summary .ss-title,
.sidebar.collapsed .sidebar-summary .ss-meta { display: none; }

/* ── Subsession enter divider ─────────────────────────────── */

.ss-enter {
  display: flex; align-items: center; gap: 8px;
  padding: 4px 0; margin: 12px 0 8px; font-size: 12px; color: var(--text-dim);
  animation: fadeIn 0.35s ease both;
}
.ss-enter::before, .ss-enter::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}
.ss-enter .ss-icon { font-size: 12px; }
.ss-enter .ss-name { font-weight: 600; }

/* ── Subsession exit divider ──────────────────────────────── */

.ss-exit {
  display: flex; align-items: center; gap: 8px;
  padding: 4px 0; margin: 8px 0 12px; font-size: 12px; color: var(--green);
  cursor: pointer; animation: fadeIn 0.35s ease both;
}
.ss-exit::before, .ss-exit::after {
  content: ''; flex: 1; height: 1px; background: var(--green); opacity: 0.3;
}
.ss-exit:hover { color: var(--accent); }
.ss-exit .expand-hint { font-size: 10px; color: var(--text-dim); margin-left: 4px; }

/* ── Expanded subsession history ──────────────────────────── */

.ss-history {
  display: none; margin: 0 0 12px 16px; padding: 8px 12px;
  border-left: 2px solid var(--border); font-size: 12px; color: var(--text-dim);
  animation: fadeIn 0.25s ease both;
}
.ss-history.visible { display: block; }
.ss-history .msg { font-size: 12px; padding: 4px 0 4px 10px; }

/* ── Quick-create buttons after agent messages ────────────── */

.quick-create {
  display: flex; gap: 6px; margin-top: 4px; padding-left: 14px;
  animation: fadeIn 0.35s ease both;
}
.quick-create-btn {
  font-size: 10px; color: var(--text-dim); padding: 3px 8px;
  border: 1px solid transparent; border-radius: 4px;
  cursor: pointer; background: none; transition: all 0.15s;
  display: flex; align-items: center; gap: 3px;
  font-family: inherit;
}
.quick-create-btn:hover {
  color: var(--accent); border-color: var(--accent-sub); background: var(--accent-sub);
}

/* ── Breadcrumb bar ───────────────────────────────────────── */

.breadcrumb {
  height: 28px; background: var(--surface); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 20px; gap: 4px;
  font-size: 12px; flex-shrink: 0;
}
.bc-item { color: var(--text-dim); cursor: pointer; transition: color 0.15s; }
.bc-item:hover { color: var(--accent); }
.bc-item.current { color: var(--text); font-weight: 500; cursor: default; }
.bc-sep { color: var(--text-dim); opacity: 0.4; font-size: 10px; }

/* ── Artifact action buttons (subsession creators) ────────── */

.ap-subsession-actions {
  padding: 8px 16px 12px; border-top: 1px solid var(--border);
  display: flex; gap: 6px; background: var(--surface);
}
.ap-ss-btn {
  font-size: 10px; color: var(--text-dim); padding: 4px 10px;
  border: 1px solid var(--border); border-radius: 4px;
  cursor: pointer; background: none; transition: all 0.15s;
  display: flex; align-items: center; gap: 3px;
  font-family: inherit;
}
.ap-ss-btn:hover {
  color: var(--accent); border-color: var(--accent-sub); background: var(--accent-sub);
}

/* ── Split mode adjustment for sidebar ────────────────────── */

body.split-mode .conversation { flex: 0 0 auto; width: 35%; }

/* ── K2: Focus mode (takeover for nested subsessions) ─────── */

.focus-header {
  display: none; padding: 8px 16px;
  background: var(--surface); border-bottom: 2px solid var(--yellow);
  align-items: center; gap: 8px; font-size: 12px;
}
.focus-header.visible { display: flex; }
.focus-back {
  color: var(--accent); cursor: pointer; font-weight: 500;
  display: flex; align-items: center; gap: 4px;
}
.focus-back:hover { text-decoration: underline; }
.focus-title { font-weight: 600; color: var(--yellow); margin-left: 4px; }

body.focus-mode .conv-inner { display: none; }
body.focus-mode .focus-conv { display: block; }
body.focus-mode .focus-header { display: flex; }

.focus-conv {
  display: none;
  padding: 0;
  max-width: 700px; margin: 0 auto;
}
.focus-conv > * + * { margin-top: 16px; }
.focus-conv .msg { /* same as regular messages */ }

/* ── Output card (subsession result) ──────────────────────── */

.output-card {
  border: 1px solid var(--green); border-radius: var(--r);
  background: var(--green-sub); overflow: hidden;
  animation: fadeIn 0.35s ease both;
  margin: 8px 0;
}
.output-card .oc-header {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.06em; color: var(--green);
  padding: 8px 14px; background: rgba(63,185,80,0.05);
  border-bottom: 1px solid rgba(63,185,80,0.2);
}
.output-card .oc-body {
  padding: 10px 14px; font-size: 13px; color: var(--text-sec); line-height: 1.6;
}
.output-card .oc-body strong { color: var(--text); }
</style>
</head>
<body>

<a href="index.html" class="back-link">&#8592; All Models</a>
<span class="model-tag">K2: Inline + Focus</span>

<!-- Controls bar -->
<div class="controls">
  <button class="ctrl-btn" id="playBtn" onclick="togglePlay()">&#9654; Play</button>
  <button class="ctrl-btn" onclick="resetFlow()">&#10227; Reset</button>
  <span class="step-counter">Step <span id="stepNum">0</span> / <span id="stepTotal">0</span></span>
  <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
  <span class="kbd-hint"><kbd>Space</kbd> play <kbd>&#8594;</kbd> step <kbd>B</kbd> sidebar <kbd>Esc</kbd> reset/exit focus</span>
</div>

<!-- Status bar -->
<div class="status-bar">
  <span class="ticket-id">AUTH-42</span>
  <div class="sb-sep"></div>
  <span class="ticket-title">Add user authentication</span>
  <div class="sb-spacer"></div>
  <div class="phase-dots">
    <div class="phase-dot" id="pd-D"><span class="dot pending"></span><span class="check">&#10003;</span><span class="label">Describe</span></div>
    <span class="phase-sep">&#8250;</span>
    <div class="phase-dot" id="pd-S"><span class="dot pending"></span><span class="check">&#10003;</span><span class="label">Specify</span></div>
    <span class="phase-sep">&#8250;</span>
    <div class="phase-dot" id="pd-P"><span class="dot pending"></span><span class="check">&#10003;</span><span class="label">Plan</span></div>
    <span class="phase-sep">&#8250;</span>
    <div class="phase-dot" id="pd-E"><span class="dot pending"></span><span class="check">&#10003;</span><span class="label">Execute</span></div>
    <span class="phase-sep">&#8250;</span>
    <div class="phase-dot" id="pd-V"><span class="dot pending"></span><span class="check">&#10003;</span><span class="label">Verify</span></div>
  </div>
</div>

<!-- Breadcrumb -->
<div class="breadcrumb" id="breadcrumb">
  <span class="bc-item current" id="bc-main">AUTH-42</span>
</div>

<!-- Focus header (visible only in focus mode) -->
<div class="focus-header" id="focusHeader">
  <span class="focus-back" onclick="exitFocusMode()">&#8592; Back to <span id="focusParentLabel"></span></span>
  <span class="focus-title" id="focusChildLabel"></span>
</div>

<!-- Main area -->
<div class="main-area">
  <!-- Left sidebar: Artifacts -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-summary" id="sidebarSummary">
      <span class="ss-id">AUTH-42</span>
      <div class="ss-title">Add user authentication</div>
      <div class="ss-meta">
        <span class="ss-badge feature">Feature</span>
        <span class="ss-badge phase-badge" id="sidebarPhase">Describe</span>
      </div>
    </div>
    <div class="sidebar-scroll">
      <div class="sidebar-group">
        <div class="sidebar-group-header" onclick="toggleSidebarGroup('ticket')">
          <span class="group-toggle" id="gt-ticket">&#9662;</span>
          <span>Ticket</span>
        </div>
        <div class="sidebar-group-items" id="gi-ticket"></div>
      </div>
      <div class="sidebar-group">
        <div class="sidebar-group-header" onclick="toggleSidebarGroup('specs')">
          <span class="group-toggle" id="gt-specs">&#9662;</span>
          <span>Specs</span>
        </div>
        <div class="sidebar-group-items" id="gi-specs"></div>
      </div>
      <div class="sidebar-group">
        <div class="sidebar-group-header" onclick="toggleSidebarGroup('plan')">
          <span class="group-toggle" id="gt-plan">&#9662;</span>
          <span>Plan</span>
        </div>
        <div class="sidebar-group-items" id="gi-plan"></div>
      </div>
    </div>
    <div class="sidebar-toggle" onclick="toggleSidebarCollapse()">
      <span class="toggle-icon">&#9664;</span>
      <span class="toggle-label">Collapse</span>
    </div>
  </div>

  <!-- Conversation panel -->
  <div class="conversation">
    <div class="conv-scroll" id="convScroll">
      <div class="conv-inner" id="convInner"></div>
      <!-- Focus conversation (replaces convInner when in focus mode) -->
      <div class="focus-conv" id="focusConv"></div>
    </div>
    <div class="input-bar">
      <input type="text" id="userInput" placeholder="Type a message..." onkeydown="handleInputKey(event)">
      <button class="send-btn" id="sendBtn" onclick="handleSend()" disabled>Send</button>
    </div>
  </div>

  <!-- Artifact panel (right side) -->
  <div class="artifact-panel" id="artifactPanel">
    <div class="ap-header" id="apHeader">
      <span class="ap-badge new" id="apBadge">NEW</span>
      <span class="ap-path" id="apPath"></span>
      <span class="ap-stats" id="apStats"></span>
      <button class="ap-close" onclick="closePeek()">&#215; Close</button>
    </div>
    <div class="ap-body" id="apBody"></div>
    <div class="ap-actions" id="apActions">
      <button class="btn-request" onclick="requestChanges()">Request Changes</button>
      <button class="btn-approve" id="approveBtn" onclick="handleApprove()">Approve &#10003;</button>
    </div>
  </div>
</div>

<!-- Shared scripts -->
<script src="shared/data.js"></script>
<script>
// ── K2-specific state ─────────────────────────────────────────

var breadcrumbStack = ['AUTH-42'];
var expandedHistories = {};
var inFocusMode = false;
var focusConvEl = null;

// ── Sidebar phase label updater ───────────────────────────────

function updateSidebarPhase(label) {
  var el = document.getElementById('sidebarPhase');
  if (el) el.textContent = label;
}

// ── Breadcrumb management ─────────────────────────────────────

function updateBreadcrumb() {
  var bc = document.getElementById('breadcrumb');
  if (!bc) return;
  var html = '';
  breadcrumbStack.forEach(function(item, i) {
    if (i > 0) html += '<span class="bc-sep">&#8250;</span>';
    var isCurrent = (i === breadcrumbStack.length - 1);
    html += '<span class="bc-item' + (isCurrent ? ' current' : '') + '"' +
      (!isCurrent ? ' onclick="popBreadcrumbTo(' + i + ')"' : '') +
      '>' + item + '</span>';
  });
  bc.innerHTML = html;
}

function pushBreadcrumb(label) {
  breadcrumbStack.push(label);
  updateBreadcrumb();
}

function popBreadcrumb() {
  if (breadcrumbStack.length > 1) breadcrumbStack.pop();
  updateBreadcrumb();
}

function popBreadcrumbTo(idx) {
  breadcrumbStack = breadcrumbStack.slice(0, idx + 1);
  updateBreadcrumb();
}

// ── Subsession enter divider (inline, for flat subsessions) ──

function addSubsessionEnter(icon, name) {
  var div = document.createElement('div');
  div.className = 'ss-enter fade-in';
  div.innerHTML = '<span class="ss-icon">' + icon + '</span> <span class="ss-name">' + name + '</span>';
  if (convInner) convInner.appendChild(div);
  pushBreadcrumb(icon + ' ' + name);
  scrollConv();
}

// ── Subsession exit divider (inline, for flat subsessions) ───

function addSubsessionExit(icon, name, summary, historyId) {
  var div = document.createElement('div');
  div.className = 'ss-exit fade-in';
  div.id = 'ss-exit-' + historyId;
  div.innerHTML = '&#10003; ' + icon + ' ' + name + ' &#183; ' + summary +
    '<span class="expand-hint">(click to expand)</span>';
  div.onclick = function() { toggleHistory(historyId); };
  if (convInner) convInner.appendChild(div);

  // Add hidden history block
  var hist = document.createElement('div');
  hist.className = 'ss-history';
  hist.id = 'ss-history-' + historyId;
  hist.innerHTML = expandedHistories[historyId] || '';
  if (convInner) convInner.appendChild(hist);

  popBreadcrumb();
  scrollConv();
}

function toggleHistory(historyId) {
  var el = document.getElementById('ss-history-' + historyId);
  if (el) el.classList.toggle('visible');
}

// ── Quick-create buttons ──────────────────────────────────────

function addQuickCreate() {
  var target = inFocusMode ? focusConvEl : convInner;
  var div = document.createElement('div');
  div.className = 'quick-create fade-in';
  div.innerHTML =
    '<button class="quick-create-btn" onclick="handleQuickCreate(\'discuss\')">&#128172; Discuss this</button>' +
    '<button class="quick-create-btn" onclick="handleQuickCreate(\'research\')">&#128300; Research</button>';
  if (target) target.appendChild(div);
  scrollConv();
}

function handleQuickCreate(type) {
  addAgentMsg('(User-initiated ' + type + ' subsession would open here.)');
}

// ── K2: Focus mode management ─────────────────────────────────

function enterFocusMode(parentLabel, childIcon, childName) {
  inFocusMode = true;
  focusConvEl = document.getElementById('focusConv');

  // Clear focus conv
  if (focusConvEl) focusConvEl.innerHTML = '';

  // Set focus header labels
  var parentLabelEl = document.getElementById('focusParentLabel');
  var childLabelEl = document.getElementById('focusChildLabel');
  if (parentLabelEl) parentLabelEl.textContent = parentLabel;
  if (childLabelEl) childLabelEl.textContent = childIcon + ' ' + childName;

  // Activate focus mode CSS
  document.body.classList.add('focus-mode');
  var fh = document.getElementById('focusHeader');
  if (fh) fh.classList.add('visible');

  // Update breadcrumb to show depth
  pushBreadcrumb(childIcon + ' ' + childName);

  scrollConv();
}

function exitFocusMode() {
  inFocusMode = false;
  focusConvEl = null;

  document.body.classList.remove('focus-mode');
  var fh = document.getElementById('focusHeader');
  if (fh) fh.classList.remove('visible');

  popBreadcrumb();
  scrollConv();
}

// ── Focus-mode aware message helpers ──────────────────────────

function addFocusAgentMsg(text) {
  var target = focusConvEl;
  if (!target) return;
  var div = document.createElement('div');
  div.className = 'msg agent fade-in';
  div.innerHTML = text;
  target.appendChild(div);
  scrollConv();
}

function addFocusTypingIndicator() {
  var target = focusConvEl;
  if (!target) return;
  var div = document.createElement('div');
  div.className = 'typing-indicator fade-in';
  div.id = 'focusTypingIndicator';
  div.innerHTML = '<span class="dot"></span><span class="dot"></span><span class="dot"></span>';
  target.appendChild(div);
  scrollConv();
}

function removeFocusTypingIndicator() {
  var el = document.getElementById('focusTypingIndicator');
  if (el) el.remove();
}

function addFocusDecisionCard(step) {
  var target = focusConvEl;
  if (!target) return;
  var div = document.createElement('div');
  div.className = 'decision-card fade-in';
  div.id = 'dc-' + step.id;
  var optsHtml = '';
  step.options.forEach(function(opt, i) {
    var rec = i === step.recommended ? ' recommended' : '';
    optsHtml += '<button class="dc-opt' + rec + '" onclick="handleDecision(' + step.id + ', ' + i + ', \'' + opt.replace(/'/g, "\\'") + '\')">' + opt + '</button>';
  });
  var hintHtml = step.hint ? '<div class="dc-hint">' + step.hint + '</div>' : '';
  div.innerHTML = '<div class="dc-label">DECISION</div><div class="dc-q">' + step.question + '</div><div class="dc-opts">' + optsHtml + '</div>' + hintHtml;
  target.appendChild(div);
  scrollConv();
}

function addFocusOutputCard(summary) {
  var target = focusConvEl;
  if (!target) return;
  var div = document.createElement('div');
  div.className = 'output-card fade-in';
  div.innerHTML = '<div class="oc-header">&#10003; Output</div><div class="oc-body">' + summary + '</div>';
  target.appendChild(div);
  scrollConv();
}

// ── Add output card to main conversation ──────────────────────

function addOutputCard(icon, name, summary) {
  var div = document.createElement('div');
  div.className = 'output-card fade-in';
  div.innerHTML = '<div class="oc-header">&#10003; ' + icon + ' ' + name + '</div><div class="oc-body">' + summary + '</div>';
  if (convInner) convInner.appendChild(div);
  scrollConv();
}

// ── Sidebar navigation handler ────────────────────────────────

window.onSidebarNavigate = function(key) {
  var artifactMap = {
    'description': { type: 'card' },
    'product-design': { type: 'doc' },
    'auth-readme': { type: 'diff', idx: 0 },
    'design-doc': { type: 'diff', idx: 1 },
    'core-readme': { type: 'diff', idx: 2 },
    'impl-plan': { type: 'plan' }
  };
  var art = artifactMap[key];
  if (!art) return;

  if (document.body.classList.contains('split-mode') && !peekMode) {
    peekSavedState = {
      header: document.getElementById('apHeader').innerHTML,
      body: document.getElementById('apBody').innerHTML,
      actions: document.getElementById('apActions').innerHTML
    };
  }
  peekMode = true;
  document.body.classList.add('split-mode', 'peek-mode');
  setActiveSidebarItem(key);

  var headerEl = document.getElementById('apHeader');
  var bodyEl = document.getElementById('apBody');
  var actionsEl = document.getElementById('apActions');
  var closeBtn = '<button class="ap-close" onclick="closePeek()" style="display:inline-flex">&#8592; Back to flow</button>';

  if (art.type === 'card') {
    headerEl.innerHTML = '<span class="ap-badge doc">DOC</span><span class="ap-path">Ticket Description</span><span class="ap-stats"></span>' + closeBtn;
    bodyEl.innerHTML = '<div class="doc-preview"><h1>Ticket: Add user authentication</h1><h2>What</h2><p>Add JWT-based user authentication with signup, login, session management, and role-based access control.</p><h2>Purpose</h2><p>Enable multi-user access to Bonsai workspaces with permission boundaries between admin, regular, and viewer roles.</p><h2>Success Criteria</h2><ul><li>Users can sign up, log in, receive a JWT token</li><li>Access resources according to their role</li><li>Admin can manage users and permissions</li></ul></div>';
    actionsEl.innerHTML = closeBtn;
  } else if (art.type === 'doc') {
    headerEl.innerHTML = '<span class="ap-badge doc">DOC</span><span class="ap-path">product-design.md</span><span class="ap-stats"></span>' + closeBtn;
    bodyEl.innerHTML = DOC_SECTIONS.full;
    actionsEl.innerHTML = closeBtn;
  } else if (art.type === 'diff') {
    var d = DIFFS[art.idx];
    headerEl.innerHTML = '<span class="ap-badge ' + d.badgeClass + '">' + d.badge + '</span><span class="ap-path">' + d.path + '</span><span class="ap-stats">' + d.stats + '</span>' + closeBtn;
    bodyEl.innerHTML = '<div class="diff-view">' + d.content + '</div>';
    actionsEl.innerHTML = closeBtn;
  } else if (art.type === 'plan') {
    headerEl.innerHTML = '<span class="ap-badge new">PLAN</span><span class="ap-path">Implementation Plan</span><span class="ap-stats">2 milestones &#183; 6 steps</span>' + closeBtn;
    bodyEl.innerHTML = buildStepsHTML('plan');
    actionsEl.innerHTML = closeBtn;
  }
};

// ── Custom step handler ───────────────────────────────────────

window.onStepExecute = function(step) {
  if (step.type === 'ss-enter') {
    addSubsessionEnter(step.icon, step.name);
  } else if (step.type === 'ss-exit') {
    addSubsessionExit(step.icon, step.name, step.summary, step.historyId);
  } else if (step.type === 'quick-create') {
    addQuickCreate();
  } else if (step.type === 'sidebar-add') {
    addSidebarItem(step.key, step.group, step.label, step.icon, step.parent);
  } else if (step.type === 'sidebar-status') {
    setSidebarStatus(step.key, step.status, step.duration);
  } else if (step.type === 'sidebar-phase') {
    updateSidebarPhase(step.label);
  } else if (step.type === 'breadcrumb-push') {
    pushBreadcrumb(step.label);
  } else if (step.type === 'breadcrumb-pop') {
    popBreadcrumb();
  // ── K2: Focus mode step types ──────────────────────────────
  } else if (step.type === 'enter-focus') {
    enterFocusMode(step.parentLabel, step.childIcon, step.childName);
  } else if (step.type === 'exit-focus') {
    exitFocusMode();
  } else if (step.type === 'focus-agent') {
    removeFocusTypingIndicator();
    addFocusAgentMsg(step.text);
  } else if (step.type === 'focus-typing') {
    addFocusTypingIndicator();
  } else if (step.type === 'focus-decision') {
    addFocusDecisionCard(step);
  } else if (step.type === 'focus-output') {
    addFocusOutputCard(step.summary);
  } else if (step.type === 'output-card') {
    addOutputCard(step.icon, step.name, step.summary);
  }
};

// ── Reset handler ─────────────────────────────────────────────

window.onReset = function() {
  breadcrumbStack = ['AUTH-42'];
  expandedHistories = {};
  updateBreadcrumb();

  // Exit focus mode if active
  inFocusMode = false;
  focusConvEl = null;
  document.body.classList.remove('focus-mode');
  var fh = document.getElementById('focusHeader');
  if (fh) fh.classList.remove('visible');
  var fc = document.getElementById('focusConv');
  if (fc) fc.innerHTML = '';

  sidebarItems = {};
  var groups = ['ticket', 'specs', 'plan'];
  groups.forEach(function(g) {
    var el = document.getElementById('gi-' + g);
    if (el) el.innerHTML = '';
  });
  updateSidebarPhase('Describe');

  sidebarCollapsed = false;
  var sidebar = document.getElementById('sidebar');
  if (sidebar) sidebar.classList.remove('collapsed');
};

// ── Subsession history content ────────────────────────────────

<script>
// ── B key for sidebar toggle, Esc also exits focus mode ──────

document.addEventListener('keydown', function(e) {
  if (userInput && e.target === userInput) return;
  if (e.code === 'KeyB') {
    e.preventDefault();
    toggleSidebarCollapse();
  }
  // Esc: exit focus mode first, then reset
  if (e.code === 'Escape') {
    if (inFocusMode) {
      e.preventDefault();
      e.stopImmediatePropagation();
      exitFocusMode();
      // Also advance past any remaining focus steps
      waitingForInteraction = false;
      if (!playing) {
        setTimeout(function() { advanceInteractive(); }, 400);
      }
      return;
    }
    // Default Esc behavior (reset) is handled by engine.js
  }
});

// ── Patch engine for K2 step types ───────────────────────────

(function() {
  var origAdvanceAutoPlay = window.advanceAutoPlay;
  window.advanceAutoPlay = function() {
    if (!playing || !window.SCRIPT || currentStep >= window.SCRIPT.length) { pause(); return; }
    var step = window.SCRIPT[currentStep];

    // ── K2 focus mode steps ──
    if (step.type === 'enter-focus') {
      executeStep(step);
      currentStep++;
      stepTimer = setTimeout(advanceAutoPlay, 600);
      return;
    }
    if (step.type === 'exit-focus') {
      executeStep(step);
      currentStep++;
      stepTimer = setTimeout(advanceAutoPlay, 600);
      return;
    }
    if (step.type === 'focus-agent') {
      executeStep(step);
      currentStep++;
      stepTimer = setTimeout(advanceAutoPlay, 800);
      return;
    }
    if (step.type === 'focus-typing') {
      executeStep(step);
      currentStep++;
      var dur = step.duration || 800;
      setTimeout(function() { if (playing) removeFocusTypingIndicator(); }, dur - 100);
      stepTimer = setTimeout(advanceAutoPlay, dur);
      return;
    }
    if (step.type === 'focus-decision') {
      executeStep(step);
      currentStep++;
      var sid = step.id, rec = step.options[step.recommended];
      setTimeout(function() {
        if (playing) resolveDecisionCard(sid, rec.replace(/\s*★/, ''));
      }, 1500);
      stepTimer = setTimeout(advanceAutoPlay, 1800);
      return;
    }
    if (step.type === 'focus-output') {
      executeStep(step);
      currentStep++;
      stepTimer = setTimeout(advanceAutoPlay, 800);
      return;
    }
    if (step.type === 'output-card') {
      executeStep(step);
      currentStep++;
      stepTimer = setTimeout(advanceAutoPlay, 800);
      return;
    }

    // ── Inline subsession steps (same as K1/J1) ──
    if (step.type === 'ss-enter' || step.type === 'ss-exit' || step.type === 'quick-create') {
      executeStep(step);
      currentStep++;
      stepTimer = setTimeout(advanceAutoPlay, step.type === 'ss-enter' ? 600 : step.type === 'ss-exit' ? 800 : 400);
      return;
    }
    if (step.type === 'sidebar-add' || step.type === 'sidebar-status' || step.type === 'sidebar-phase') {
      executeStep(step);
      currentStep++;
      stepTimer = setTimeout(advanceAutoPlay, 300);
      return;
    }
    if (step.type === 'breadcrumb-push' || step.type === 'breadcrumb-pop') {
      executeStep(step);
      currentStep++;
      stepTimer = setTimeout(advanceAutoPlay, 200);
      return;
    }

    origAdvanceAutoPlay();
  };

  var origAdvanceInteractive = window.advanceInteractive;
  window.advanceInteractive = function() {
    if (!window.SCRIPT || currentStep >= window.SCRIPT.length) return;
    var step = window.SCRIPT[currentStep];

    // ── K2 focus mode steps ──
    if (step.type === 'enter-focus') {
      executeStep(step);
      currentStep++;
      setTimeout(function() { advanceInteractive(); }, 400);
      return;
    }
    if (step.type === 'exit-focus') {
      executeStep(step);
      currentStep++;
      setTimeout(function() { advanceInteractive(); }, 400);
      return;
    }
    if (step.type === 'focus-agent') {
      executeStep(step);
      currentStep++;
      setTimeout(function() { advanceInteractive(); }, 600);
      return;
    }
    if (step.type === 'focus-typing') {
      executeStep(step);
      currentStep++;
      var dur = step.duration || 800;
      setTimeout(function() {
        removeFocusTypingIndicator();
        advanceInteractive();
      }, dur);
      return;
    }
    if (step.type === 'focus-decision' && !playing) {
      // Render decision in focus area, wait for click
      executeStep(step);
      currentStep++;
      waitingForInteraction = true;
      return;
    }
    if (step.type === 'focus-output') {
      executeStep(step);
      currentStep++;
      setTimeout(function() { advanceInteractive(); }, 500);
      return;
    }
    if (step.type === 'output-card') {
      executeStep(step);
      currentStep++;
      setTimeout(function() { advanceInteractive(); }, 500);
      return;
    }

    // ── Inline subsession steps ──
    if (step.type === 'ss-enter' || step.type === 'ss-exit' || step.type === 'quick-create') {
      executeStep(step);
      currentStep++;
      setTimeout(function() { advanceInteractive(); }, step.type === 'ss-enter' ? 400 : step.type === 'ss-exit' ? 500 : 300);
      return;
    }
    if (step.type === 'sidebar-add' || step.type === 'sidebar-status' || step.type === 'sidebar-phase') {
      executeStep(step);
      currentStep++;
      setTimeout(function() { advanceInteractive(); }, 200);
      return;
    }
    if (step.type === 'breadcrumb-push' || step.type === 'breadcrumb-pop') {
      executeStep(step);
      currentStep++;
      setTimeout(function() { advanceInteractive(); }, 150);
      return;
    }

    origAdvanceInteractive();
  };
})();
