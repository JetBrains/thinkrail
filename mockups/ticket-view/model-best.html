<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Best — Flow-Guided Ticket View</title>
<style>
  :root {
    --bg-base: #0e1117; --bg-surface: #161b22; --bg-elevated: #1c2129; --bg-hover: #242b35; --bg-inset: #0d1117;
    --border: #2d333b; --border-bright: #3d444d;
    --text-primary: #e6edf3; --text-secondary: #8b949e; --text-muted: #656d76;
    --accent: #58a6ff; --accent-subtle: #1f3a5f;
    --green: #3fb950; --green-subtle: #1a3a2a;
    --yellow: #d29922; --yellow-subtle: #3d2e00;
    --purple: #bc8cff; --purple-subtle: #2a1f3d;
    --red: #f85149; --red-subtle: #3d1418;
    --orange: #db6d28; --orange-subtle: #3d2200;
    --radius: 8px; --radius-lg: 12px;
    --mono: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
    --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg-base);
    color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Back link ───────────────────────────────── */
  .back-link {
    position: fixed; top: 10px; right: 16px; z-index: 500;
    font-size: 12px; color: var(--text-muted); text-decoration: none;
    padding: 5px 12px; border-radius: 6px;
    background: var(--bg-elevated); border: 1px solid var(--border);
    transition: all 0.15s;
  }
  .back-link:hover { color: var(--accent); border-color: var(--accent); }

  /* ── Animations ──────────────────────────────── */
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideRight { from { opacity: 0; transform: translateX(-12px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  @keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
  @keyframes checkPop { 0%{transform:scale(0)} 60%{transform:scale(1.3)} 100%{transform:scale(1)} }
  @keyframes bannerPulse { 0%,100%{box-shadow:0 0 0 0 rgba(88,166,255,0.2)} 50%{box-shadow:0 0 0 8px rgba(88,166,255,0)} }
  .fade-in { animation: fadeIn 0.3s ease; }

  /* ── Header ──────────────────────────────────── */
  .header {
    height: 56px; min-height: 56px;
    background: var(--bg-surface);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center;
    padding: 0 24px; gap: 12px;
    flex-shrink: 0; z-index: 10;
  }
  .ticket-id { font-size: 13px; font-weight: 700; font-family: var(--mono); color: var(--accent); }
  .header-sep { color: var(--border-bright); font-size: 16px; }
  .ticket-title { font-size: 15px; font-weight: 600; }
  .ticket-type {
    font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em;
    padding: 3px 10px; border-radius: 100px;
    background: var(--purple-subtle); color: var(--purple);
  }
  .header-spacer { flex: 1; }
  .model-tag {
    font-size: 10px; font-weight: 600; color: var(--accent);
    background: var(--accent-subtle); padding: 3px 10px; border-radius: 100px;
  }

  /* ── Progress Bar ────────────────────────────── */
  .progress-bar {
    height: 48px; min-height: 48px;
    background: var(--bg-surface);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center;
    padding: 0 24px; gap: 0;
    flex-shrink: 0;
  }
  .phase-item {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 16px; border-radius: 6px;
    cursor: pointer; transition: all 0.2s;
    position: relative; user-select: none;
  }
  .phase-item:hover { background: var(--bg-hover); }
  .phase-item.active { background: var(--accent-subtle); }
  .phase-icon {
    width: 22px; height: 22px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; flex-shrink: 0;
    transition: all 0.3s;
  }
  .phase-icon.done { background: var(--green); color: #fff; }
  .phase-icon.active { background: var(--accent); color: #fff; animation: pulse 2s infinite; }
  .phase-icon.pending { background: var(--bg-elevated); color: var(--text-muted); border: 1.5px solid var(--border-bright); }
  .phase-label { font-size: 13px; font-weight: 500; color: var(--text-secondary); white-space: nowrap; }
  .phase-item.active .phase-label { color: var(--text-primary); font-weight: 600; }
  .phase-item.done-phase .phase-label { color: var(--text-muted); }
  .phase-count { font-size: 10px; color: var(--text-muted); font-weight: 500; }
  .phase-connector {
    width: 32px; height: 1px; background: var(--border);
    margin: 0 4px; flex-shrink: 0;
  }
  .phase-connector.done { background: var(--green); opacity: 0.5; }

  /* ── Next Action Banner ──────────────────────── */
  .next-action {
    margin: 16px 24px 0;
    background: var(--accent-subtle);
    border: 1px solid rgba(88,166,255,0.25);
    border-radius: var(--radius);
    padding: 12px 16px;
    display: flex; align-items: center; gap: 12px;
    animation: bannerPulse 3s ease-in-out infinite;
    transition: all 0.3s;
  }
  .next-action.complete {
    background: var(--green-subtle);
    border-color: rgba(63,185,80,0.25);
    animation: none;
  }
  .next-action-arrow {
    font-size: 16px; color: var(--accent);
    font-weight: 700; flex-shrink: 0;
  }
  .next-action.complete .next-action-arrow { color: var(--green); }
  .next-action-text { flex: 1; font-size: 14px; font-weight: 500; }
  .next-action.complete .next-action-text { color: var(--green); }
  .next-action-btn {
    padding: 6px 14px; border-radius: 6px;
    font-size: 12px; font-weight: 600;
    cursor: pointer; border: none;
    background: var(--accent); color: #fff;
    transition: all 0.15s;
  }
  .next-action-btn:hover { opacity: 0.85; }
  .next-action-btn.secondary {
    background: transparent; color: var(--text-secondary);
    border: 1px solid var(--border);
  }
  .next-action-btn.secondary:hover { border-color: var(--text-muted); }

  /* ── Main content area ───────────────────────── */
  .main-scroll {
    flex: 1; overflow-y: auto;
    padding: 16px 24px 120px;
  }
  .main-scroll::-webkit-scrollbar { width: 6px; }
  .main-scroll::-webkit-scrollbar-track { background: transparent; }
  .main-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .main-inner { max-width: 900px; margin: 0 auto; }

  /* ── Content sections ────────────────────────── */

  /* Description content */
  .desc-content {
    background: var(--bg-surface); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 28px;
    font-size: 14px; line-height: 1.7; color: var(--text-secondary);
  }
  .desc-content h3 { font-size: 15px; font-weight: 600; color: var(--text-primary); margin: 20px 0 8px; }
  .desc-content h3:first-child { margin-top: 0; }
  .desc-content code { font-family: var(--mono); font-size: 13px; background: var(--bg-inset); padding: 1px 5px; border-radius: 3px; color: var(--accent); }
  .desc-content ul { padding-left: 20px; margin: 6px 0; }
  .desc-content li { margin: 4px 0; }
  .desc-content em { color: var(--yellow); font-style: normal; }
  .desc-content p { margin: 6px 0; }

  /* Diff viewer */
  .diff-viewer {
    background: var(--bg-surface); border: 1px solid var(--border);
    border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 12px;
  }
  .diff-file-header {
    padding: 10px 16px;
    background: var(--bg-elevated); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; font-family: var(--mono); color: var(--text-muted);
  }
  .op-tag {
    font-size: 10px; padding: 2px 8px; border-radius: 100px;
    font-weight: 600; text-transform: uppercase;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  .op-tag.new { background: var(--green-subtle); color: var(--green); }
  .op-tag.modified { background: var(--yellow-subtle); color: var(--yellow); }
  .diff-stats { margin-left: auto; display: flex; gap: 8px; font-size: 11px; }
  .diff-stats .add { color: var(--green); }
  .diff-stats .del { color: var(--red); }
  .diff-body { background: var(--bg-inset); position: relative; }
  .diff-line {
    padding: 1px 16px 1px 52px;
    font-family: var(--mono); font-size: 12px; line-height: 1.7;
    white-space: pre; position: relative; min-height: 22px;
  }
  .diff-line .ln {
    position: absolute; left: 0; width: 44px;
    text-align: right; padding-right: 8px;
    color: var(--text-muted); opacity: 0.5; user-select: none;
  }
  .diff-line.add { background: rgba(63,185,80,0.1); color: var(--green); }
  .diff-line.del { background: rgba(248,81,73,0.1); color: var(--red); }
  .diff-line.ctx { color: var(--text-muted); }
  .diff-line.hunk { background: var(--accent-subtle); color: var(--accent); font-weight: 600; padding-left: 16px; }
  .diff-line.highlight { background: rgba(63,185,80,0.22); transition: background 2s; }
  .diff-actions {
    padding: 12px 16px; border-top: 1px solid var(--border);
    display: flex; gap: 8px; justify-content: flex-end;
    background: var(--bg-surface);
  }
  .btn-approve {
    padding: 7px 18px; border-radius: 6px; font-size: 13px; font-weight: 600;
    cursor: pointer; border: none;
    background: var(--green); color: #fff; transition: all 0.15s;
  }
  .btn-approve:hover { opacity: 0.85; }
  .btn-approve:disabled { background: var(--bg-elevated); color: var(--text-muted); border: 1px solid var(--border); cursor: default; }
  .btn-changes {
    padding: 7px 18px; border-radius: 6px; font-size: 13px; font-weight: 500;
    cursor: pointer; border: 1px solid var(--border); background: transparent;
    color: var(--text-secondary); transition: all 0.15s;
  }
  .btn-changes:hover { border-color: var(--text-muted); }
  .approved-overlay {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(63,185,80,0.06);
    display: flex; align-items: center; justify-content: center;
    z-index: 5; pointer-events: none;
  }
  .approved-stamp {
    color: var(--green); font-size: 18px; font-weight: 700;
    border: 3px solid var(--green); padding: 6px 20px;
    border-radius: 8px; transform: rotate(-8deg); opacity: 0.5;
    animation: checkPop 0.4s ease;
  }

  /* Agent note (inline, contextual) */
  .agent-note {
    background: var(--bg-surface); border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: var(--radius); padding: 10px 14px;
    margin: 12px 16px; font-size: 13px; line-height: 1.5;
    color: var(--text-secondary);
    display: flex; align-items: flex-start; gap: 8px;
  }
  .agent-note-icon { color: var(--accent); font-size: 14px; flex-shrink: 0; margin-top: 1px; }
  .agent-note code {
    font-family: var(--mono); font-size: 12px;
    background: var(--bg-inset); padding: 1px 4px; border-radius: 3px; color: var(--accent);
  }
  .agent-note .status-update {
    color: var(--green); font-weight: 500;
  }

  /* Decision card (inline, prominent) */
  .decision-card {
    background: var(--bg-surface);
    border: 1px solid rgba(88,166,255,0.3);
    border-left: 3px solid var(--accent);
    border-radius: var(--radius); padding: 14px 16px;
    margin: 12px 16px;
    transition: all 0.3s;
  }
  .decision-card.answered { opacity: 0.6; }
  .decision-card.collapsed {
    padding: 8px 16px; opacity: 0.5;
  }
  .decision-label {
    font-size: 10px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.06em; color: var(--accent); margin-bottom: 6px;
  }
  .decision-question { font-size: 14px; font-weight: 500; margin-bottom: 10px; line-height: 1.4; }
  .decision-options { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
  .decision-btn {
    padding: 7px 14px; border-radius: 6px; font-size: 12px; font-weight: 500;
    cursor: pointer; border: 1px solid var(--border-bright);
    background: var(--bg-elevated); color: var(--text-primary);
    transition: all 0.15s;
  }
  .decision-btn:hover { border-color: var(--accent); background: var(--accent-subtle); }
  .decision-btn.recommended { border-color: var(--accent); background: var(--accent-subtle); color: var(--accent); }
  .decision-btn.selected {
    border-color: var(--green); background: var(--green-subtle);
    color: var(--green); pointer-events: none;
  }
  .decision-btn.dimmed { opacity: 0.35; pointer-events: none; }
  .decision-hint { font-size: 11px; color: var(--text-muted); line-height: 1.4; }
  .decision-hint code { font-family: var(--mono); font-size: 11px; background: var(--bg-inset); padding: 1px 3px; border-radius: 3px; color: var(--accent); }
  .decision-answer {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--green); font-weight: 500;
    margin-top: 6px;
  }

  /* Diff selector strip */
  .diff-selector {
    display: flex; align-items: center; gap: 4px;
    padding: 10px 16px;
    background: var(--bg-surface); border: 1px solid var(--border);
    border-radius: var(--radius); margin-top: 12px;
  }
  .diff-selector-label { font-size: 11px; color: var(--text-muted); margin-right: 8px; white-space: nowrap; }
  .diff-tab {
    padding: 5px 12px; border-radius: 6px;
    font-size: 12px; font-weight: 500;
    cursor: pointer; border: 1px solid transparent;
    background: transparent; color: var(--text-secondary);
    transition: all 0.15s; display: flex; align-items: center; gap: 5px;
    white-space: nowrap;
  }
  .diff-tab:hover { background: var(--bg-hover); }
  .diff-tab.active { background: var(--accent-subtle); color: var(--accent); border-color: rgba(88,166,255,0.3); }
  .diff-tab.approved { color: var(--green); }
  .diff-tab .dt-status {
    width: 8px; height: 8px; border-radius: 50%;
    display: inline-block; flex-shrink: 0;
  }
  .dt-status.reviewing { background: var(--accent); }
  .dt-status.pending { background: var(--text-muted); opacity: 0.5; }
  .dt-status.approved { background: var(--green); }
  .dt-status.draft { background: var(--yellow); }

  /* Plan steps */
  .plan-container { display: flex; flex-direction: column; gap: 10px; }
  .plan-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 4px;
  }
  .plan-header h3 { font-size: 16px; font-weight: 600; }
  .btn-execute-all {
    padding: 7px 18px; border-radius: 6px; font-size: 13px; font-weight: 600;
    cursor: pointer; border: none;
    background: var(--accent); color: #fff; transition: all 0.15s;
    display: flex; align-items: center; gap: 6px;
  }
  .btn-execute-all:hover { opacity: 0.85; }
  .btn-execute-all:disabled { opacity: 0.4; cursor: default; }
  .plan-step {
    background: var(--bg-surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 16px;
    display: flex; align-items: flex-start; gap: 12px;
    transition: border-color 0.2s;
  }
  .plan-step:hover { border-color: var(--border-bright); }
  .plan-step.executing { border-color: var(--accent); border-left: 3px solid var(--accent); }
  .plan-step.done { border-color: var(--green-subtle); opacity: 0.7; }
  .step-num {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--bg-elevated); border: 1.5px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: var(--text-muted);
    flex-shrink: 0; transition: all 0.3s;
  }
  .plan-step.done .step-num { background: var(--green-subtle); border-color: var(--green); color: var(--green); }
  .plan-step.executing .step-num { background: var(--accent-subtle); border-color: var(--accent); color: var(--accent); animation: pulse 2s infinite; }
  .step-info { flex: 1; }
  .step-title { font-size: 14px; font-weight: 500; margin-bottom: 2px; }
  .step-desc { font-size: 12px; color: var(--text-muted); line-height: 1.4; }
  .step-files { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 4px; }
  .step-file {
    font-size: 11px; font-family: var(--mono); padding: 3px 8px;
    background: var(--bg-elevated); border: 1px solid var(--border);
    border-radius: 4px; color: var(--text-secondary); cursor: pointer;
    transition: all 0.15s; display: flex; align-items: center; gap: 4px;
  }
  .step-file:hover { border-color: var(--accent); color: var(--accent); }
  .step-file .sf-change { font-size: 9px; color: var(--green); }
  .step-actions { display: flex; flex-direction: column; gap: 4px; align-items: flex-end; flex-shrink: 0; }
  .btn-execute {
    padding: 5px 14px; border-radius: 6px; font-size: 12px; font-weight: 600;
    cursor: pointer; border: none;
    background: var(--accent); color: #fff; transition: all 0.15s;
  }
  .btn-execute:hover { opacity: 0.85; }
  .btn-execute:disabled { background: var(--bg-elevated); color: var(--text-muted); border: 1px solid var(--border); cursor: default; }
  .step-status-tag {
    font-size: 10px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .step-status-tag.ready { color: var(--text-muted); }
  .step-status-tag.running { color: var(--accent); }
  .step-status-tag.done { color: var(--green); }

  /* Code diff drill-in (from plan step) */
  .breadcrumb-nav {
    display: flex; align-items: center; gap: 6px;
    margin-bottom: 12px; font-size: 13px;
  }
  .bc-back {
    color: var(--accent); cursor: pointer; font-weight: 500;
    display: flex; align-items: center; gap: 4px;
    padding: 4px 8px; border-radius: 4px; transition: all 0.15s;
  }
  .bc-back:hover { background: var(--bg-hover); }
  .bc-sep { color: var(--text-muted); font-size: 11px; }
  .bc-current { color: var(--text-primary); font-weight: 500; }

  /* Verify phase */
  .verify-container { display: flex; flex-direction: column; gap: 12px; }
  .verify-card {
    background: var(--bg-surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px;
  }
  .verify-card h4 { font-size: 14px; font-weight: 600; margin-bottom: 8px; }
  .verify-check {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 0; font-size: 13px;
    border-bottom: 1px solid var(--border);
  }
  .verify-check:last-child { border-bottom: none; }
  .verify-icon { font-size: 14px; flex-shrink: 0; width: 20px; text-align: center; }
  .verify-icon.pass { color: var(--green); }
  .verify-icon.pending { color: var(--text-muted); }
  .verify-icon.fail { color: var(--red); }
  .verify-text { flex: 1; color: var(--text-secondary); }
  .btn-run-verify {
    padding: 8px 20px; border-radius: 6px; font-size: 13px; font-weight: 600;
    cursor: pointer; border: none;
    background: var(--green); color: #fff; transition: all 0.15s;
    margin-top: 8px;
  }
  .btn-run-verify:hover { opacity: 0.85; }
  .btn-run-verify:disabled { background: var(--bg-elevated); color: var(--text-muted); border: 1px solid var(--border); cursor: default; }

  /* ── Ticket Notes (bottom fixed) ─────────────── */
  .ticket-notes-panel {
    position: sticky; bottom: 0;
    background: var(--bg-surface);
    border-top: 1px solid var(--border);
    padding: 12px 24px; z-index: 20;
  }
  .ticket-notes-inner { max-width: 900px; margin: 0 auto; }
  .notes-list { max-height: 120px; overflow-y: auto; margin-bottom: 8px; display: flex; flex-direction: column; gap: 6px; }
  .notes-list:empty { display: none; }
  .note-card {
    background: var(--bg-elevated); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 8px 12px;
    font-size: 13px; line-height: 1.5; color: var(--text-secondary);
    display: flex; align-items: flex-start; gap: 8px;
    animation: slideUp 0.2s ease;
  }
  .note-avatar {
    width: 20px; height: 20px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 700; flex-shrink: 0;
    background: var(--purple-subtle); color: var(--purple);
    border: 1px solid rgba(188,140,255,0.3);
  }
  .note-body { flex: 1; }
  .note-meta { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
  .notes-input-row { display: flex; gap: 8px; align-items: center; }
  .notes-input-wrap {
    flex: 1; display: flex; align-items: center;
    background: var(--bg-elevated); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 8px 12px;
    transition: border-color 0.15s;
  }
  .notes-input-wrap:focus-within { border-color: var(--accent); }
  .notes-input {
    flex: 1; background: none; border: none;
    color: var(--text-primary); font-size: 13px;
    font-family: inherit; outline: none;
  }
  .notes-input::placeholder { color: var(--text-muted); }
  .btn-send-note {
    width: 32px; height: 32px; border-radius: 6px;
    background: var(--accent); border: none; color: #fff;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: opacity 0.15s;
  }
  .btn-send-note:hover { opacity: 0.85; }

// ══════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════

let currentPhase = 'specify';
let currentDiff = 'auth-readme';
let codeDiffView = null; // { stepId, file } when drilling into code diff
let approvedDiffs = new Set();
let decisions = {}; // id -> answer
let ticketNotes = [];
let stepsExecuted = new Set();
let stepsExecuting = new Set();
let allExecuting = false;
let chatOpen = false;
let chatMessages = [];

// ══════════════════════════════════════════════════
// RENDER: PROGRESS BAR
// ══════════════════════════════════════════════════

function renderProgressBar() {
  const bar = document.getElementById('progressBar');
  let html = '';
  phases.forEach((p, i) => {
    const isActive = p.id === currentPhase;
    const isDone = p.status === 'done';
    let iconHtml = '';
    if (isDone) iconHtml = '<span style="font-size:12px;">&#10003;</span>';
    else if (p.status === 'active') iconHtml = '<span style="font-size:10px;">&#9679;</span>';
    else iconHtml = '<span style="font-size:10px;">&#9675;</span>';

    const cls = isActive ? 'active' : isDone ? 'done-phase' : '';
    html += `<div class="phase-item ${cls}" onclick="switchPhase('${p.id}')">
      <div class="phase-icon ${p.status}">${iconHtml}</div>
      <span class="phase-label">${p.name}</span>
      ${p.progress ? '<span class="phase-count">' + p.progress + '</span>' : ''}
    </div>`;
    if (i < phases.length - 1) {
      const connDone = isDone ? 'done' : '';
      html += `<div class="phase-connector ${connDone}"></div>`;
    }
  });
  bar.innerHTML = html;
}

// ══════════════════════════════════════════════════
// RENDER: NEXT ACTION BANNER
// ══════════════════════════════════════════════════

function getNextAction() {
  // All done?
  if (phases.every(p => p.status === 'done')) {
    return { text: 'All done! This ticket is complete.', complete: true };
  }
  // Describe phase
  if (currentPhase === 'describe') {
    return { text: 'Description is complete. Move to Specify phase.', action: () => switchPhase('specify'), btnLabel: 'Go to Specify' };
  }
  // Specify phase: find next unapproved diff
  if (phases[1].status === 'active' || phases[1].status === 'done') {
    const pendingDiff = specDiffs.find(d => !approvedDiffs.has(d));
    if (pendingDiff) {
      const a = artifacts[pendingDiff];
      return {
        text: `Review and approve ${a.title}`,
        action: () => { currentPhase = 'specify'; currentDiff = pendingDiff; renderAll(); },
        btnLabel: 'Open',
        skipAction: () => {
          const nextIdx = specDiffs.indexOf(pendingDiff) + 1;
          if (nextIdx < specDiffs.length) {
            currentDiff = specDiffs[nextIdx];
            renderAll();
          }
        }
      };
    }
  }
  // Plan phase
  if (phases[2].status === 'active') {
    const pendingStep = planSteps.find(s => !stepsExecuted.has(s.id) && !stepsExecuting.has(s.id));
    if (pendingStep) {
      return { text: `Execute step ${planSteps.indexOf(pendingStep) + 1}: ${pendingStep.title}`, action: () => { currentPhase = 'plan'; codeDiffView = null; renderAll(); }, btnLabel: 'View Plan' };
    }
    if (planSteps.every(s => stepsExecuted.has(s.id))) {
      return { text: 'All plan steps executed. Move to Verify.', action: () => switchPhase('verify'), btnLabel: 'Go to Verify' };
    }
  }
  // Verify phase
  if (phases[3].status === 'active') {
    return { text: 'Run verification checks to complete the ticket.', action: () => { currentPhase = 'verify'; renderAll(); }, btnLabel: 'View Verification' };
  }
  return { text: 'Continue working on this ticket.', action: null };
}

function renderNextAction() {
  const container = document.getElementById('nextActionContainer');
  const na = getNextAction();
  const cls = na.complete ? 'next-action complete' : 'next-action';
  const arrow = na.complete ? '&#10003;' : '&#8594;';
  let btns = '';
  if (na.action) {
    btns += `<button class="next-action-btn" onclick="nextActionGo()">${na.btnLabel || 'Open'}</button>`;
  }
  if (na.skipAction) {
    btns += `<button class="next-action-btn secondary" onclick="nextActionSkip()">Skip for now</button>`;
  }
  container.innerHTML = `<div class="${cls}" id="nextActionBanner">
    <span class="next-action-arrow">${arrow}</span>
    <span class="next-action-text">${na.text}</span>
    ${btns}
  </div>`;
  // Store actions for button onclick
  container._action = na.action;
  container._skipAction = na.skipAction;
}

function nextActionGo() {
  const action = document.getElementById('nextActionContainer')._action;
  if (action) action();
}
function nextActionSkip() {
  const skip = document.getElementById('nextActionContainer')._skipAction;
  if (skip) skip();
}

// ══════════════════════════════════════════════════
// RENDER: MAIN CONTENT
// ══════════════════════════════════════════════════

function renderMainContent() {
  const el = document.getElementById('mainContent');

  if (codeDiffView) {
    el.innerHTML = renderCodeDiffView(codeDiffView.stepId, codeDiffView.file);
    scrollMainTop();
    return;
  }

  switch (currentPhase) {
    case 'describe': el.innerHTML = renderDescribePhase(); break;
    case 'specify':  el.innerHTML = renderSpecifyPhase(); break;
    case 'plan':     el.innerHTML = renderPlanPhase(); break;
    case 'verify':   el.innerHTML = renderVerifyPhase(); break;
  }
  scrollMainTop();
}

function scrollMainTop() {
  document.getElementById('mainScroll').scrollTop = 0;
}

// ── Describe ──
function renderDescribePhase() {
  const a = artifacts.description;
  return `<div class="desc-content fade-in">${a.html}</div>`;
}

// ── Specify ──
function renderSpecifyPhase() {
  const a = artifacts[currentDiff];
  if (!a) return '';

  // Non-diff artifacts (design-doc, description)
  if (!a.hunks) {
    let html = `<div class="desc-content fade-in">${a.html}</div>`;
    html += renderDiffSelector();
    return html;
  }

  // Diff artifact
  const isApproved = approvedDiffs.has(currentDiff);
  let html = `<div class="diff-viewer fade-in">`;
  html += `<div class="diff-file-header">
    <span class="op-tag ${a.op}">${a.op}</span>
    <span>${a.path}</span>
    <div class="diff-stats"><span class="add">+${a.add}</span> <span class="del">${a.del > 0 ? '-' + a.del : ''}</span></div>
  </div>`;

  html += `<div class="diff-body" id="diffBody">`;
  a.hunks.forEach(hunk => {
    if (hunk.kind === 'note') {
      // Close diff-body, add note, reopen diff-body
      html += `</div>`;
      html += `<div class="agent-note"><span class="agent-note-icon">&#8505;</span><span>${hunk.text}</span></div>`;
      html += `<div class="diff-body">`;
      return;
    }
    if (hunk.kind === 'decision') {
      html += `</div>`;
      html += renderDecisionCard(hunk);
      html += `<div class="diff-body">`;
      return;
    }
    // Regular hunk
    hunk.lines.forEach(line => {
      const idAttr = line.lineId ? ` id="${line.lineId}"` : '';
      if (line.type === 'hunk') {
        html += `<div class="diff-line hunk"${idAttr}>${esc(line.text)}</div>`;
      } else {
        html += `<div class="diff-line ${line.type}"${idAttr}>${line.ln ? '<span class="ln">' + line.ln + '</span>' : ''}${esc(line.text)}</div>`;
      }
    });
  });
  if (isApproved) {
    html += `<div class="approved-overlay"><div class="approved-stamp">APPROVED</div></div>`;
  }
  html += `</div>`; // diff-body

  // Action buttons
  html += `<div class="diff-actions">`;
  if (isApproved) {
    html += `<span style="font-size:13px;color:var(--green);font-weight:600;">&#10003; Approved</span>`;
  } else {
    html += `<button class="btn-changes" onclick="requestChanges('${currentDiff}')">Request Changes</button>`;
    html += `<button class="btn-approve" onclick="approveDiff('${currentDiff}')">Approve</button>`;
  }
  html += `</div>`;
  html += `</div>`; // diff-viewer

  html += renderDiffSelector();
  return html;
}

function renderDecisionCard(d) {
  const answered = decisions[d.id];
  const collapsed = answered && decisions[d.id + '_collapsed'];
  if (collapsed) {
    return `<div class="decision-card collapsed">
      <span class="decision-answer">&#10003; ${answered}</span>
    </div>`;
  }
  let html = `<div class="decision-card${answered ? ' answered' : ''}" id="dc-${d.id}">
    <div class="decision-label">Decision Required</div>
    <div class="decision-question">${d.text}</div>
    <div class="decision-options">`;
  d.options.forEach((opt, i) => {
    let cls = '';
    if (answered === opt) cls = 'selected';
    else if (answered) cls = 'dimmed';
    else if (i === d.recIdx) cls = 'recommended';
    html += `<button class="decision-btn ${cls}" onclick="answerDecision('${d.id}', '${escAttr(opt)}')">${opt}${!answered && i === d.recIdx ? ' &#9733;' : ''}</button>`;
  });
  html += `</div>`;
  html += `<div class="decision-hint">${d.hint}</div>`;
  if (answered) {
    html += `<div class="decision-answer">&#10003; Selected: ${answered}</div>`;
  }
  html += `</div>`;
  return html;
}

function renderDiffSelector() {
  const allDiffs = [
    { id: 'design-doc', label: 'design-doc' },
    { id: 'auth-readme', label: 'auth/README' },
    { id: 'design-doc-diff', label: 'DESIGN_DOC' },
    { id: 'core-readme', label: 'core/README' }
  ];
  let html = `<div class="diff-selector fade-in">
    <span class="diff-selector-label">Artifacts:</span>`;
  allDiffs.forEach(d => {
    const a = artifacts[d.id];
    const status = approvedDiffs.has(d.id) ? 'approved' : a.status;
    const isActive = d.id === currentDiff;
    const tabCls = isActive ? 'diff-tab active' : approvedDiffs.has(d.id) ? 'diff-tab approved' : 'diff-tab';
    const dotCls = approvedDiffs.has(d.id) ? 'approved' : status;
    html += `<button class="${tabCls}" onclick="switchDiff('${d.id}')">
      <span class="dt-status ${dotCls}"></span>${d.label}
    </button>`;
  });
  html += `</div>`;
  return html;
}

// ── Plan ──
function renderPlanPhase() {
  let html = `<div class="plan-container fade-in">`;
  html += `<div class="plan-header">
    <h3>Implementation Plan</h3>
    <button class="btn-execute-all" onclick="executeAll()"${allExecuting ? ' disabled' : ''}>
      ${allExecuting ? '<span class="dots"><span></span><span></span><span></span></span> Executing...' : '&#9654; Execute All'}
    </button>
  </div>`;

  if (allExecuting) {
    const done = stepsExecuted.size;
    const total = planSteps.length;
    const pct = Math.round((done / total) * 100);
    html += `<div class="exec-progress"><div class="exec-progress-bar" style="width:${pct}%"></div></div>`;
  }

  planSteps.forEach((step, i) => {
    const isDone = stepsExecuted.has(step.id);
    const isExecuting = stepsExecuting.has(step.id);
    const cls = isDone ? 'plan-step done' : isExecuting ? 'plan-step executing' : 'plan-step';
    const statusTag = isDone ? '<span class="step-status-tag done">&#10003; Done</span>' :
                      isExecuting ? '<span class="step-status-tag running">Running...</span>' :
                      '<span class="step-status-tag ready">Ready</span>';

    html += `<div class="${cls}">
      <div class="step-num">${isDone ? '&#10003;' : i + 1}</div>
      <div class="step-info">
        <div class="step-title">${step.title}</div>
        <div class="step-desc">${step.desc}</div>
        <div class="step-files">`;
    step.files.forEach(f => {
      const hasDiff = codeDiffs[f];
      const showDiff = isDone && hasDiff;
      html += `<span class="step-file" ${showDiff ? `onclick="viewCodeDiff('${step.id}', '${f}')"` : ''}>${f}${showDiff ? ' <span class="sf-change">&#916;</span>' : ''}</span>`;
    });
    html += `</div></div>
      <div class="step-actions">
        ${statusTag}
        ${!isDone && !isExecuting ? `<button class="btn-execute" onclick="executeStep('${step.id}')">Execute</button>` : ''}
      </div>
    </div>`;
  });
  html += `</div>`;
  return html;
}

// ── Code Diff Drill-in ──
function renderCodeDiffView(stepId, file) {
  const diff = codeDiffs[file];
  if (!diff) return '<p>No diff available.</p>';

  let html = `<div class="breadcrumb-nav fade-in">
    <span class="bc-back" onclick="exitCodeDiff()">&#8592; Back to Plan</span>
    <span class="bc-sep">&#8250;</span>
    <span class="bc-current">${file}</span>
  </div>`;

  html += `<div class="diff-viewer fade-in">
    <div class="diff-file-header">
      <span class="op-tag ${diff.op}">${diff.op}</span>
      <span>${file}</span>
      <div class="diff-stats"><span class="add">+${diff.add}</span> <span class="del">${diff.del > 0 ? '-' + diff.del : ''}</span></div>
    </div>
    <div class="diff-body">`;
  diff.lines.forEach(line => {
    if (line.type === 'hunk') {
      html += `<div class="diff-line hunk">${esc(line.text)}</div>`;
    } else {
      html += `<div class="diff-line ${line.type}"><span class="ln">${line.ln}</span>${esc(line.text)}</div>`;
    }
  });
  html += `</div></div>`;
  return html;
}

// ── Verify ──
function renderVerifyPhase() {
  const allDone = planSteps.every(s => stepsExecuted.has(s.id));
  let html = `<div class="verify-container fade-in">`;

  html += `<div class="verify-card">
    <h4>Verification Checklist</h4>
    <div class="verify-check">
      <span class="verify-icon pass">&#10003;</span>
      <span class="verify-text">All spec diffs approved (${specDiffs.length}/${specDiffs.length})</span>
    </div>
    <div class="verify-check">
      <span class="verify-icon ${allDone ? 'pass' : 'pending'}">&#${allDone ? '10003' : '9675'};</span>
      <span class="verify-text">All plan steps executed (${stepsExecuted.size}/${planSteps.length})</span>
    </div>
    <div class="verify-check">
      <span class="verify-icon pending">&#9675;</span>
      <span class="verify-text">Backend tests pass (<code>uv run pytest</code>)</span>
    </div>
    <div class="verify-check">
      <span class="verify-icon pending">&#9675;</span>
      <span class="verify-text">Frontend types generated (<code>npm run generate</code>)</span>
    </div>
    <div class="verify-check">
      <span class="verify-icon pending">&#9675;</span>
      <span class="verify-text">Frontend lint clean (<code>npm run lint</code>)</span>
    </div>
    <div class="verify-check">
      <span class="verify-icon pending">&#9675;</span>

  return html;

// ══════════════════════════════════════════════════
// RENDER: TICKET NOTES
// ══════════════════════════════════════════════════

function renderNotes() {
  const list = document.getElementById('notesList');
  list.innerHTML = ticketNotes.map(n =>
    `<div class="note-card">
      <div class="note-avatar">${n.author[0].toUpperCase()}</div>
      <div class="note-body">
        ${esc(n.text)}

      </div>
    </div>`
  ).join('');

// ══════════════════════════════════════════════════
// ACTIONS
// ══════════════════════════════════════════════════

function switchPhase(id) {
  currentPhase = id;
  codeDiffView = null;
  // Reset to first diff when entering specify
  if (id === 'specify') {
    const pending = specDiffs.find(d => !approvedDiffs.has(d));
    if (pending) currentDiff = pending;
    else currentDiff = specDiffs[0];
  }
  renderAll();
}

function switchDiff(id) {
  if (id === currentDiff) return;
  currentDiff = id;
  renderMainContent();
  renderNextAction();
  // Update diff selector active state without full rerender
}

function approveDiff(id) {
  approvedDiffs.add(id);
  artifacts[id].status = 'approved';
  showToast(`${artifacts[id].title} approved`);

  // Update progress count
  const remaining = specDiffs.filter(d => !approvedDiffs.has(d)).length;
  if (remaining > 0) {
    phases[1].progress = `${specDiffs.length - remaining}/${specDiffs.length}`;
    // Auto-advance to next pending diff
    const next = specDiffs.find(d => !approvedDiffs.has(d));
    if (next) {
      artifacts[next].status = 'reviewing';
      setTimeout(() => { currentDiff = next; renderAll(); }, 400);
      return;
    }
  } else {
    // All approved
    phases[1].status = 'done';
    phases[1].progress = '3/3';
    phases[2].status = 'active';
    artifacts['design-doc'].status = 'done';
    setTimeout(() => {
      showToast('All specs approved! Moving to Plan phase...');
      currentPhase = 'plan';
      renderAll();
    }, 600);
    return;
  }
  renderAll();
}

function requestChanges(id) {
  showToast('Requesting changes — describe what to revise');
  // Open chat drawer with context
  if (!chatOpen) toggleChat();
  const cm = document.getElementById('chatMessages');
  cm.innerHTML += `<div class="chat-msg agent fade-in">What would you like me to change in <code>${artifacts[id].title}</code>?</div>`;
  cm.scrollTop = cm.scrollHeight;
}

function answerDecision(id, answer) {
  decisions[id] = answer;
  showToast('Decision recorded — spec updated');

  // Update the strategy line in the diff if it's the auth decision
  renderMainContent();
  setTimeout(() => {
    if (id === 'q-auth') {
      const line = document.getElementById('strategy-line');
      if (line) {
        if (answer.includes('JWT')) {
          line.innerHTML = '<span class="ln">21</span>+JWT-based authentication with access/refresh token pairs';
        } else if (answer.includes('Session')) {
          line.innerHTML = '<span class="ln">21</span>+Server-side sessions with secure httpOnly cookies';
        } else {
          line.innerHTML = '<span class="ln">21</span>+Hybrid: JWT for API, session cookies for browser UI';
        }
        line.classList.add('highlight');
        setTimeout(() => line.classList.remove('highlight'), 2500);
      }
    }
    // Auto-collapse decision after 2 seconds
    setTimeout(() => {
      decisions[id + '_collapsed'] = true;
      renderMainContent();
    }, 2000);
  }, 100);
}

function executeStep(stepId) {
  stepsExecuting.add(stepId);
  renderAll();
  // Simulate execution
  setTimeout(() => {
    stepsExecuting.delete(stepId);
    stepsExecuted.add(stepId);
    const step = planSteps.find(s => s.id === stepId);
    showToast(`Step "${step.title}" completed`);

    // Check if all done
    if (planSteps.every(s => stepsExecuted.has(s.id))) {
      phases[2].status = 'done';
      phases[3].status = 'active';
      setTimeout(() => {
        showToast('All steps executed! Moving to Verify phase...');
        renderAll();
      }, 500);
    }
    renderAll();
  }, 1200 + Math.random() * 800);
}

function executeAll() {
  if (allExecuting) return;
  allExecuting = true;
  renderAll();

  const pending = planSteps.filter(s => !stepsExecuted.has(s.id));
  let delay = 0;
  pending.forEach((step, i) => {
    delay += 400;
    setTimeout(() => {
      stepsExecuting.add(step.id);
      renderAll();
    }, delay);
    delay += 800 + Math.random() * 600;
    setTimeout(() => {
      stepsExecuting.delete(step.id);
      stepsExecuted.add(step.id);
      showToast(`Step "${step.title}" completed`);
      if (i === pending.length - 1) {
        allExecuting = false;
        phases[2].status = 'done';
        phases[3].status = 'active';
        setTimeout(() => {
          showToast('All steps executed! Moving to Verify...');
          currentPhase = 'verify';
          renderAll();
        }, 500);
      }
      renderAll();
    }, delay);
  });
}

function viewCodeDiff(stepId, file) {
  codeDiffView = { stepId, file };
  renderMainContent();
}

function exitCodeDiff() {
  codeDiffView = null;
  renderMainContent();
}

function runVerification() {
  const btn = document.getElementById('btnRunVerify');
  if (btn) { btn.disabled = true; btn.textContent = 'Running...'; }
  showToast('Running verification checks...');

  const checks = document.querySelectorAll('.verify-check');
  let delay = 0;
  checks.forEach((check, i) => {
    if (i < 2) return; // First two already set
    delay += 800 + Math.random() * 400;
    setTimeout(() => {
      const icon = check.querySelector('.verify-icon');
      icon.className = 'verify-icon pass';
      icon.innerHTML = '&#10003;';
      icon.style.animation = 'checkPop 0.4s ease';
    }, delay);
  });

  setTimeout(() => {
    phases[3].status = 'done';
    showToast('All checks passed! Ticket complete.');
    renderProgressBar();
    renderNextAction();
  }, delay + 600);
}

function addNote() {
  const input = document.getElementById('notesInput');
  const text = input.value.trim();
  if (!text) return;
  ticketNotes.push({
    text: text,
    author: 'You',
    time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
  });
  input.value = '';
  renderNotes();
  // Scroll notes list to bottom
  const list = document.getElementById('notesList');
  list.scrollTop = list.scrollHeight;
}

function toggleChat() {
  chatOpen = !chatOpen;
  document.getElementById('chatDrawer').classList.toggle('open', chatOpen);
  if (chatOpen) {
    document.getElementById('chatInput').focus();
    const cm = document.getElementById('chatMessages');
    cm.scrollTop = cm.scrollHeight;
  }
}

function sendChatMessage() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;
  const cm = document.getElementById('chatMessages');
  cm.innerHTML += `<div class="chat-msg user fade-in">${esc(text)}</div>`;
  input.value = '';
  cm.scrollTop = cm.scrollHeight;

  // Simulate agent reply
  setTimeout(() => {
    const replies = [
      'Got it — I\'ll update the spec to reflect that.',
      'Good point! I\'ll incorporate that into the current draft.',
      'Understood. Revising the relevant section now.',
      'That makes sense. Noted and updating accordingly.',
      'Interesting approach. Let me adjust the spec to account for that.'
    ];
    const reply = replies[Math.floor(Math.random() * replies.length)];
    cm.innerHTML += `<div class="chat-msg agent fade-in">${reply}</div>`;
    cm.scrollTop = cm.scrollHeight;
  }, 600 + Math.random() * 600);
}

function renderAll() {
  renderProgressBar();
  renderNextAction();
  renderMainContent();
  renderNotes();
}

// ══════════════════════════════════════════════════
// UTILITIES
// ══════════════════════════════════════════════════

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function escAttr(s) {
  return s.replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  t.className = 'toast show';
  clearTimeout(showToast._timer);
  showToast._timer = setTimeout(() => { t.className = 'toast'; }, 3000);
}

// ══════════════════════════════════════════════════
// KEYBOARD SHORTCUTS
// ══════════════════════════════════════════════════

document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  // 1-4 for phases
  if (e.key >= '1' && e.key <= '4') {
    const idx = parseInt(e.key) - 1;
    if (phases[idx]) switchPhase(phases[idx].id);
  }
  // Escape to close chat
  if (e.key === 'Escape' && chatOpen) toggleChat();
  // Left/Right for diff navigation in specify phase
  if (currentPhase === 'specify' && !codeDiffView) {
    const allDiffs = ['design-doc', ...specDiffs];
    const idx = allDiffs.indexOf(currentDiff);
    if (e.key === 'ArrowLeft' && idx > 0) { e.preventDefault(); switchDiff(allDiffs[idx - 1]); }
    if (e.key === 'ArrowRight' && idx < allDiffs.length - 1) { e.preventDefault(); switchDiff(allDiffs[idx + 1]); }
  }
});

// ══════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════

renderAll();
</script>
