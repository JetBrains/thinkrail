<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Model E — Artifact-as-Page with Phase Breadcrumb</title>
<style>
  :root {
    --bg-base: #0e1117; --bg-surface: #161b22; --bg-elevated: #1c2129; --bg-hover: #242b35; --bg-inset: #0d1117;
    --border: #2d333b; --border-bright: #3d444d;
    --text-primary: #e6edf3; --text-secondary: #8b949e; --text-muted: #656d76;
    --accent: #58a6ff; --accent-subtle: #1f3a5f;
    --green: #3fb950; --green-subtle: #1a3a2a;
    --yellow: #d29922; --yellow-subtle: #3d2e00;
    --purple: #bc8cff; --purple-subtle: #2a1f3d;
    --red: #f85149; --red-subtle: #3d1418;
    --orange: #db6d28; --orange-subtle: #3d2200;
    --radius: 8px; --radius-lg: 12px;
    --mono: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg-base); color: var(--text-primary); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  /* ── Breadcrumb bar ── */
  .breadcrumb-bar { height: 48px; min-height: 48px; background: var(--bg-surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; gap: 0; }
  .bc-nav { display: flex; align-items: center; gap: 4px; margin-right: 8px; }
  .bc-arrow { width: 28px; height: 28px; border-radius: 6px; background: var(--bg-elevated); border: 1px solid var(--border); color: var(--text-muted); font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; user-select: none; }
  .bc-arrow:hover { color: var(--text-primary); border-color: var(--border-bright); }
  .bc-arrow.disabled { opacity: 0.3; cursor: default; pointer-events: none; }
  .bc-trail { display: flex; align-items: center; gap: 0; flex: 1; min-width: 0; }
  .bc-item { font-size: 13px; font-weight: 500; color: var(--text-muted); cursor: pointer; padding: 4px 8px; border-radius: 4px; transition: all 0.15s; white-space: nowrap; }
  .bc-item:hover { color: var(--text-primary); background: var(--bg-hover); }
  .bc-item.current { color: var(--text-primary); font-weight: 600; cursor: default; }
  .bc-item.current:hover { background: transparent; }
  .bc-sep { color: var(--text-muted); font-size: 11px; margin: 0 2px; opacity: 0.5; }
  .bc-ticket-id { font-family: var(--mono); font-size: 12px; }
  .bc-actions { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .bc-approve-btn { padding: 5px 14px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; border: none; background: var(--green); color: #fff; transition: all 0.15s; }
  .bc-approve-btn:hover { opacity: 0.85; }
  .bc-approve-btn.disabled { background: var(--bg-elevated); color: var(--text-muted); border: 1px solid var(--border); cursor: default; pointer-events: none; }
  .bc-approve-btn.approved-state { background: var(--green-subtle); color: var(--green); pointer-events: none; }
  .bc-changes-btn { padding: 5px 12px; border-radius: 6px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--text-secondary); transition: all 0.15s; }
  .bc-changes-btn:hover { border-color: var(--text-muted); }
  .bc-status { font-size: 10px; padding: 3px 8px; border-radius: 100px; font-weight: 600; text-transform: uppercase; }
  .bc-status.reviewing { background: var(--accent-subtle); color: var(--accent); }
  .bc-status.pending { background: var(--bg-elevated); color: var(--text-muted); border: 1px solid var(--border); }
  .bc-status.approved { background: var(--green-subtle); color: var(--green); }
  .bc-status.draft { background: var(--yellow-subtle); color: var(--yellow); }
  .bc-status.done { background: var(--green-subtle); color: var(--green); }
  .model-tag { font-size: 10px; font-weight: 600; color: var(--accent); background: var(--accent-subtle); padding: 3px 8px; border-radius: 100px; margin-left: 8px; }
  .back-link { position: fixed; top: 8px; right: 70px; z-index: 200; font-size: 12px; color: var(--text-muted); text-decoration: none; padding: 4px 10px; border-radius: 4px; background: var(--bg-elevated); border: 1px solid var(--border); }
  .back-link:hover { color: var(--accent); border-color: var(--accent); }

  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }

  /* ── Main layout: content + minimap ── */
  .main { flex: 1; display: flex; overflow: hidden; }

  /* ── Page content (scrollable document) ── */
  .page-content { flex: 1; overflow-y: auto; padding: 24px 40px 120px; }
  .page-content::-webkit-scrollbar { width: 6px; }
  .page-content::-webkit-scrollbar-track { background: transparent; }
  .page-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .page-inner { max-width: 820px; margin: 0 auto; }

  /* ── Diff sections ── */
  .diff-section { background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-lg); margin-bottom: 16px; overflow: hidden; }
  .diff-section-header { padding: 10px 16px; background: var(--bg-elevated); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; font-size: 12px; font-family: var(--mono); color: var(--text-muted); }
  .diff-section-header .op-tag { font-size: 10px; padding: 2px 7px; border-radius: 100px; font-weight: 600; text-transform: uppercase; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  .diff-section-header .op-tag.new { background: var(--green-subtle); color: var(--green); }
  .diff-section-header .op-tag.modified { background: var(--yellow-subtle); color: var(--yellow); }
  .diff-section-header .diff-stats { margin-left: auto; display: flex; gap: 8px; font-size: 11px; }
  .diff-section-header .diff-stats .add { color: var(--green); }
  .diff-section-header .diff-stats .del { color: var(--red); }
  .diff-section-body { background: var(--bg-inset); position: relative; }
  .diff-line { padding: 1px 16px 1px 52px; font-family: var(--mono); font-size: 12px; line-height: 1.7; white-space: pre; position: relative; min-height: 22px; }
  .diff-line .ln { position: absolute; left: 0; width: 44px; text-align: right; padding-right: 8px; color: var(--text-muted); opacity: 0.5; user-select: none; }
  .diff-line.add { background: rgba(63,185,80,0.1); color: var(--green); }
  .diff-line.del { background: rgba(248,81,73,0.1); color: var(--red); }
  .diff-line.ctx { color: var(--text-muted); }
  .diff-line.hunk { background: var(--accent-subtle); color: var(--accent); font-weight: 600; }
  .diff-line.highlight { background: rgba(63,185,80,0.22); transition: background 2s; }

  .approved-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(63,185,80,0.06); display: flex; align-items: center; justify-content: center; z-index: 5; pointer-events: none; }
  .approved-stamp { color: var(--green); font-size: 18px; font-weight: 700; border: 3px solid var(--green); padding: 6px 20px; border-radius: 8px; transform: rotate(-8deg); opacity: 0.6; }

  /* ── Agent comment cards (inline between diff hunks) ── */
  .agent-comment { background: var(--bg-surface); border: 1px solid var(--border); border-left: 3px solid var(--accent); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 16px; }
  .agent-comment .ac-head { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
  .agent-comment .ac-avatar { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; background: var(--accent-subtle); color: var(--accent); border: 1px solid rgba(88,166,255,0.3); flex-shrink: 0; }
  .agent-comment .ac-name { font-size: 12px; font-weight: 600; color: var(--text-secondary); }
  .agent-comment .ac-time { font-size: 10px; color: var(--text-muted); margin-left: auto; }
  .agent-comment .ac-body { font-size: 13px; line-height: 1.6; color: var(--text-secondary); padding-left: 28px; }
  .agent-comment .ac-body code { font-family: var(--mono); font-size: 12px; background: var(--bg-inset); padding: 1px 4px; border-radius: 3px; color: var(--accent); }

  /* ── Agent question cards ── */
  .agent-question { background: var(--bg-surface); border: 1px solid var(--accent-subtle); border-left: 3px solid var(--accent); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 16px; transition: opacity 0.3s; }
  .agent-question.answered { opacity: 0.55; }
  .agent-question .aq-head { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
  .agent-question .aq-avatar { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; background: var(--accent-subtle); color: var(--accent); border: 1px solid rgba(88,166,255,0.3); flex-shrink: 0; }
  .agent-question .aq-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--accent); }
  .agent-question .aq-text { font-size: 14px; font-weight: 500; color: var(--text-primary); margin-bottom: 10px; padding-left: 28px; line-height: 1.4; }
  .agent-question .aq-options { display: flex; gap: 6px; flex-wrap: wrap; padding-left: 28px; }
  .aq-btn { padding: 7px 14px; border-radius: 6px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid var(--border-bright); background: var(--bg-elevated); color: var(--text-primary); transition: all 0.15s; }
  .aq-btn:hover { border-color: var(--accent); background: var(--accent-subtle); }
  .aq-btn.rec { border-color: var(--accent); background: var(--accent-subtle); color: var(--accent); }
  .aq-btn.selected { border-color: var(--green); background: var(--green-subtle); color: var(--green); pointer-events: none; }
  .agent-question .aq-hint { margin-top: 8px; font-size: 11px; color: var(--text-muted); line-height: 1.4; padding-left: 28px; }
  .agent-question .aq-response { margin-top: 10px; padding-left: 28px; }
  .aq-response-msg { display: flex; align-items: flex-start; gap: 6px; margin-top: 8px; }
  .aq-response-msg .aq-resp-av { width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: 700; flex-shrink: 0; }
  .aq-response-msg .aq-resp-av.human { background: var(--purple-subtle); color: var(--purple); border: 1px solid rgba(188,140,255,0.3); }
  .aq-response-msg .aq-resp-av.ai { background: var(--accent-subtle); color: var(--accent); border: 1px solid rgba(88,166,255,0.3); }
  .aq-response-msg .aq-resp-text { font-size: 12px; color: var(--text-secondary); line-height: 1.5; }
  .aq-response-msg .aq-resp-text code { font-family: var(--mono); font-size: 11px; background: var(--bg-inset); padding: 1px 3px; border-radius: 3px; color: var(--accent); }

  /* ── User message cards (inline) ── */
  .user-message { background: var(--bg-surface); border: 1px solid var(--border); border-left: 3px solid var(--purple); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 16px; }
  .user-message .um-head { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
  .user-message .um-avatar { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; background: var(--purple-subtle); color: var(--purple); border: 1px solid rgba(188,140,255,0.3); flex-shrink: 0; }
  .user-message .um-name { font-size: 12px; font-weight: 600; color: var(--text-secondary); }
  .user-message .um-body { font-size: 13px; line-height: 1.6; color: var(--text-secondary); padding-left: 28px; }

  /* agent reply to user message */
  .agent-reply { margin-top: 10px; padding-top: 8px; border-top: 1px solid var(--border); }
  .agent-reply .ar-head { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
  .agent-reply .ar-avatar { width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: 700; background: var(--accent-subtle); color: var(--accent); border: 1px solid rgba(88,166,255,0.3); flex-shrink: 0; }
  .agent-reply .ar-name { font-size: 11px; font-weight: 600; color: var(--text-muted); }
  .agent-reply .ar-body { font-size: 12px; color: var(--text-secondary); padding-left: 24px; line-height: 1.5; }

  /* ── Description content (for non-diff artifacts) ── */
  .desc-content { background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 24px; margin-bottom: 16px; font-size: 14px; line-height: 1.7; color: var(--text-secondary); }
  .desc-content h3 { font-size: 15px; font-weight: 600; color: var(--text-primary); margin: 16px 0 6px; }
  .desc-content h3:first-child { margin-top: 0; }
  .desc-content code { font-family: var(--mono); font-size: 13px; background: var(--bg-inset); padding: 1px 5px; border-radius: 3px; color: var(--accent); }
  .desc-content ul { padding-left: 20px; margin: 6px 0; }
  .desc-content em { color: var(--yellow); }
  .desc-content p { margin: 6px 0; }

  /* ── Plan steps ── */
  .plan-step { background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px; display: flex; align-items: flex-start; gap: 12px; }
  .plan-num { width: 28px; height: 28px; border-radius: 50%; background: var(--bg-elevated); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: var(--text-muted); flex-shrink: 0; }
  .plan-info { flex: 1; }
  .plan-title { font-size: 14px; font-weight: 500; }
  .plan-desc { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

  /* ── Sticky input bar ── */
  .input-bar { position: sticky; bottom: 0; background: var(--bg-surface); border-top: 1px solid var(--border); padding: 12px 40px; margin: 0 -40px; }
  .input-bar-inner { max-width: 820px; margin: 0 auto; display: flex; align-items: center; gap: 8px; }
  .input-wrap { flex: 1; display: flex; align-items: center; gap: 8px; background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 12px; }
  .input-wrap:focus-within { border-color: var(--accent); }
  .msg-input { flex: 1; background: none; border: none; color: var(--text-primary); font-size: 13px; font-family: inherit; outline: none; }
  .msg-input::placeholder { color: var(--text-muted); }
  .send-btn { width: 28px; height: 28px; border-radius: 6px; background: var(--accent); border: none; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .send-btn:hover { opacity: 0.85; }
  .send-btn svg { width: 12px; height: 12px; }

  /* ── Minimap sidebar ── */
  .minimap { width: 52px; min-width: 52px; background: var(--bg-surface); border-left: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 16px 0; gap: 0; overflow-y: auto; }
  .minimap::-webkit-scrollbar { width: 0; }
  .mm-phase { font-size: 8px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); margin: 12px 0 6px; white-space: nowrap; }
  .mm-phase:first-child { margin-top: 4px; }
  .mm-dot-wrap { position: relative; display: flex; align-items: center; justify-content: center; width: 36px; height: 36px; cursor: pointer; border-radius: 8px; transition: background 0.15s; }
  .mm-dot-wrap:hover { background: var(--bg-hover); }
  .mm-dot-wrap.active { background: var(--accent-subtle); }
  .mm-dot { width: 10px; height: 10px; border-radius: 50%; transition: all 0.25s; }
  .mm-dot-wrap.active .mm-dot { width: 14px; height: 14px; }
  .mm-dot.done { background: var(--green); }
  .mm-dot.reviewing { background: var(--accent); }
  .mm-dot.pending { background: var(--text-muted); opacity: 0.5; border: 1.5px solid var(--text-muted); }
  .mm-dot.draft { background: var(--yellow); }
  .mm-dot.approved { background: var(--green); box-shadow: 0 0 0 2px var(--green-subtle); }

  .mm-tooltip { position: absolute; right: 100%; top: 50%; transform: translateY(-50%); background: var(--bg-elevated); border: 1px solid var(--border-bright); border-radius: 4px; padding: 4px 8px; font-size: 11px; color: var(--text-primary); white-space: nowrap; pointer-events: none; opacity: 0; transition: opacity 0.15s; z-index: 50; margin-right: 6px; }
  .mm-dot-wrap:hover .mm-tooltip { opacity: 1; }
  .mm-dot-label { font-size: 7px; color: var(--text-muted); margin-top: 1px; text-align: center; max-width: 46px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* ── Toast ── */
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--bg-elevated); border: 1px solid var(--green); border-radius: var(--radius); padding: 10px 20px; font-size: 13px; color: var(--text-primary); z-index: 300; transition: transform 0.3s, opacity 0.3s; opacity: 0; box-shadow: 0 8px 24px rgba(0,0,0,0.4); display: flex; align-items: center; gap: 8px; }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  .toast .t-icon { color: var(--green); font-size: 14px; }

  /* ── Transitions ── */
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .fade-in { animation: fadeIn 0.3s ease; }

  /* Streaming dots */
  .streaming { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-muted); padding: 8px 0 8px 28px; }
  .dots { display: flex; gap: 3px; }
  .dots span { width: 4px; height: 4px; border-radius: 50%; background: var(--accent); animation: bounce 1.4s ease-in-out infinite; }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100%{opacity:0.3;transform:scale(0.8)}40%{opacity:1;transform:scale(1)} }
</style>
</head>

<!-- Breadcrumb bar -->
<div class="breadcrumb-bar" id="breadcrumbBar">
  <div class="bc-nav">
    <button class="bc-arrow" id="bcPrev" onclick="navigatePrev()" title="Previous artifact (Left arrow)">&#8249;</button>
    <button class="bc-arrow" id="bcNext" onclick="navigateNext()" title="Next artifact (Right arrow)">&#8250;</button>

</div>

<!-- Main -->
<div class="main">
  <div class="page-content" id="pageContent">
    <div class="page-inner" id="pageInner"></div>
  </div>

</div>

<div class="toast" id="toast"><span class="t-icon">&#10003;</span><span class="t-msg" id="toastMsg"></span></div>

<script>
// ── Data ──
const phases = [
  { id: 'describe', name: 'Describe', status: 'done' },
  { id: 'specify',  name: 'Specify',  status: 'active' },
  { id: 'plan',     name: 'Plan',     status: 'pending' },
  { id: 'execute',  name: 'Execute',  status: 'pending' }
];

const artifactOrder = ['description', 'design-doc', 'auth-readme', 'design-doc-diff', 'core-readme'];
const specDiffs = ['auth-readme', 'design-doc-diff', 'core-readme'];

const artifacts = {
  description: {
    phase: 'describe', title: 'Ticket Description', type: 'desc', status: 'done',
    content: [
      { kind: 'desc', html: '<h3>What</h3><p>Add a complete user authentication system with signup, login, session management, and role-based access control (RBAC) supporting admin and regular user roles.</p><h3>Purpose</h3><p>Enable secure multi-user access to the Bonsai workspace with appropriate permission boundaries.</p><h3>Success Criteria</h3><p>Users can sign up, log in, and have sessions managed. Admin users can manage other users. Regular users have restricted access.</p>' },
      { kind: 'comment', text: 'Formalized the ticket description from your initial input. Description phase is complete.' }
    ]
  },
  'design-doc': {
    phase: 'specify', title: 'Design Specification', type: 'doc', status: 'draft', path: 'design-doc.md',
    content: [
      { kind: 'desc', html: '<h3>1. Purpose</h3><p>The Auth module provides user authentication, authorization, and session management for the Bonsai workspace. It extends the existing token-based system with proper signup/login flows and RBAC.</p><h3>2. Architecture</h3><p>Follows the existing layered pattern:</p><ul><li><code>auth/models.py</code> &mdash; Pydantic models for User, Session, Role</li><li><code>auth/service.py</code> &mdash; Business logic (signup, login, verify)</li><li><code>auth/storage.py</code> &mdash; SQLite persistence via aiosqlite</li><li><code>auth/middleware.py</code> &mdash; FastAPI dependency injection</li></ul><h3>3. Authentication Strategy</h3><p><em>[Pending your decision on JWT vs. session-based auth]</em></p><h3>4. Data Model</h3><p>User table extends existing schema with password_hash, role, timestamps, is_active.</p>' },
      { kind: 'comment', text: 'Working on the design document. Some sections are blocked pending your decisions on the spec diffs.' }
    ]
  },
  'auth-readme': {
    phase: 'specify', title: 'auth/README.md', type: 'diff', status: 'reviewing',
    path: 'backend/app/auth/README.md', op: 'new', add: 47, del: 0, canApprove: true,
    content: [
      { kind: 'diff-header', file: 'auth/README.md', op: 'new', add: 47, del: 0 },
      { kind: 'diff', id: 'hunk1', lines: [
        { type: 'hunk', text: '@@ -0,0 +1,47 @@' },
        { type: 'add', ln: '1', text: '+# Auth Module — Design Specification' },
        { type: 'add', ln: '2', text: '+' },
        { type: 'add', ln: '3', text: '+> Status: **Draft** | Parent: DESIGN_DOC.md' },
        { type: 'add', ln: '5', text: '+## Purpose' },
        { type: 'add', ln: '7', text: '+User authentication, authorization, and session management' },
        { type: 'add', ln: '8', text: '+for the Bonsai workspace.' },
        { type: 'add', ln: '10', text: '+## Architecture' },

// ── State ──
let currentArtifact = 'auth-readme';
let approved = new Set();
let questionsAnswered = {};
let userMessages = {};  // per artifact

// ── Render functions ──

function renderBreadcrumb(id) {
  const a = artifacts[id];
  const phase = phases.find(p => p.id === a.phase);
  const trail = document.getElementById('bcTrail');
  const actions = document.getElementById('bcActions');
  const idx = artifactOrder.indexOf(id);

  // Prev/next arrows
  document.getElementById('bcPrev').classList.toggle('disabled', idx <= 0);
  document.getElementById('bcNext').classList.toggle('disabled', idx >= artifactOrder.length - 1);

  // Trail
  trail.innerHTML = `
    <span class="bc-item bc-ticket-id" onclick="showToast('Navigate to ticket list')">AUTH-42</span>
    <span class="bc-sep">&#8250;</span>
    <span class="bc-item" onclick="showToast('Phase overview: ${phase.name}')">${phase.name}</span>
    <span class="bc-sep">&#8250;</span>
    <span class="bc-item current">${a.title}</span>
  `;

  // Actions
  const status = approved.has(id) ? 'approved' : a.status;
  const statusLabels = { done: 'Complete', approved: 'Approved', reviewing: 'Reviewing', pending: 'Pending', draft: 'Draft' };
  let actionsHtml = `<span class="bc-status ${status}">${statusLabels[status] || status}</span>`;

  if (a.canApprove && !approved.has(id)) {
    actionsHtml += `<button class="bc-changes-btn" onclick="requestChanges('${id}')">Request Changes</button>`;
    actionsHtml += `<button class="bc-approve-btn" onclick="approveArtifact('${id}')">Approve</button>`;
  } else if (approved.has(id)) {
    actionsHtml += `<button class="bc-approve-btn approved-state">Approved</button>`;
  }
  actions.innerHTML = actionsHtml;
}

function renderMinimap() {
  const mm = document.getElementById('minimap');
  let html = '';
  let lastPhase = null;

  artifactOrder.forEach(id => {
    const a = artifacts[id];
    if (a.phase !== lastPhase) {
      const phase = phases.find(p => p.id === a.phase);
      html += `<div class="mm-phase">${phase.name}</div>`;
      lastPhase = a.phase;
    }

    const isActive = id === currentArtifact;
    let dotStatus = approved.has(id) ? 'approved' : a.status;
    // Map status to dot class
    const dotClass = dotStatus === 'done' ? 'done' :
                     dotStatus === 'approved' ? 'approved' :
                     dotStatus === 'reviewing' ? 'reviewing' :
                     dotStatus === 'draft' ? 'draft' : 'pending';

    html += `<div class="mm-dot-wrap${isActive ? ' active' : ''}" onclick="navigateTo('${id}')" title="${a.title}">
      <div class="mm-dot ${dotClass}"></div>
      <div class="mm-tooltip">${a.title}</div>
    </div>`;
  });

  // Show plan dot if all diffs approved
  if (specDiffs.every(d => approved.has(d))) {
    html += `<div class="mm-phase">Plan</div>`;
    html += `<div class="mm-dot-wrap${currentArtifact === 'plan' ? ' active' : ''}" onclick="showToast('Plan phase ready')">
      <div class="mm-dot reviewing"></div>
      <div class="mm-tooltip">Implementation Plan</div>
    </div>`;
  }

  mm.innerHTML = html;
}

function renderPage(id) {
  const a = artifacts[id];
  const inner = document.getElementById('pageInner');
  let html = '';

  a.content.forEach((block, blockIdx) => {
    switch (block.kind) {
      case 'diff-header':
        html += `<div class="diff-section" style="margin-bottom:0;border-bottom:none;border-radius:var(--radius-lg) var(--radius-lg) 0 0;">
          <div class="diff-section-header">
            <span class="op-tag ${block.op}">${block.op}</span>
            ${block.file}
            <div class="diff-stats"><span class="add">+${block.add}</span> <span class="del">${block.del > 0 ? '-' + block.del : '0'}</span></div>
          </div>
        </div>`;
        break;

      case 'diff':
        const isFirst = blockIdx === 1; // right after diff-header
        const isLast = blockIdx === a.content.length - 1 || a.content[blockIdx + 1]?.kind !== 'diff';
        const borderTop = isFirst ? 'border-top:none;border-radius:0;' : '';
        const borderBottom = !isLast ? 'border-radius:0 0 0 0;' : '';

        html += `<div class="diff-section" style="margin-bottom:0;${borderTop}${isFirst ? 'border-top-left-radius:0;border-top-right-radius:0;' : ''}">
          <div class="diff-section-body" id="diff-body-${block.id}">`;
        block.lines.forEach(line => {
          const idAttr = line.id ? ` id="${line.id}"` : '';
          html += `<div class="diff-line ${line.type}"${idAttr}>${line.ln ? '<span class="ln">' + line.ln + '</span>' : ''}${escHtml(line.text)}</div>`;
        });
        if (approved.has(id)) {
          html += `<div class="approved-overlay"><div class="approved-stamp">APPROVED</div></div>`;
        }
        html += `</div></div>`;
        break;

      case 'desc':
        html += `<div class="desc-content fade-in">${block.html}</div>`;
        break;

      case 'comment':
        html += `<div class="agent-comment fade-in">
          <div class="ac-head">
            <div class="ac-avatar">B</div>
            <span class="ac-name">Agent</span>
            <span class="ac-time">10:24</span>
          </div>
          <div class="ac-body">${block.text}</div>
        </div>`;
        break;

      case 'question':
        const isAnswered = questionsAnswered[block.id];
        html += `<div class="agent-question fade-in${isAnswered ? ' answered' : ''}" id="q-card-${block.id}">
          <div class="aq-head">
            <div class="aq-avatar">B</div>
            <span class="aq-label">Design Decision</span>
          </div>
          <div class="aq-text">${block.text}</div>
          <div class="aq-options" id="q-opts-${block.id}">`;
        block.options.forEach((opt, i) => {
          const cls = isAnswered && isAnswered === opt ? 'selected' :
                      isAnswered ? '' :
                      i === block.recIdx ? 'rec' : '';
          const disabled = isAnswered ? ' style="opacity:0.4;pointer-events:none;"' : '';
          const selectedStyle = (isAnswered && isAnswered === opt) ? '' : disabled;
          html += `<button class="aq-btn ${cls}" onclick="answerQuestion('${block.id}', '${escAttr(opt)}', this)"${isAnswered && isAnswered !== opt ? disabled : ''}>${opt}</button>`;
        });
        html += `</div>`;
        html += `<div class="aq-hint">${block.hint}</div>`;
        if (isAnswered) {
          html += `<div class="aq-response">
            <div class="aq-response-msg"><div class="aq-resp-av human">S</div><div class="aq-resp-text"><strong>${isAnswered}</strong></div></div>
            <div class="aq-response-msg" style="margin-top:6px;"><div class="aq-resp-av ai">B</div><div class="aq-resp-text">Spec updated with your decision. The diff has been revised.</div></div>
          </div>`;
        }
        html += `</div>`;
        break;
    }
  });

  // User messages for this artifact
  if (userMessages[id]) {
    userMessages[id].forEach(um => {
      html += `<div class="user-message fade-in">
        <div class="um-head"><div class="um-avatar">S</div><span class="um-name">You</span></div>
        <div class="um-body">${escHtml(um.text)}</div>
        ${um.reply ? `<div class="agent-reply"><div class="ar-head"><div class="ar-avatar">B</div><span class="ar-name">Agent</span></div><div class="ar-body">${um.reply}</div></div>` : ''}
      </div>`;
    });
  }

  // Input bar (sticky at bottom of scroll)
  html += `<div class="input-bar">
    <div class="input-bar-inner">
      <div class="input-wrap">
        <input class="msg-input" id="msgInput" placeholder="Reply to agent about ${a.title}..." onkeydown="if(event.key==='Enter')sendMessage()">
      </div>
      <button class="send-btn" onclick="sendMessage()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
    </div>
  </div>`;

  inner.innerHTML = html;

  // Scroll to top
  document.getElementById('pageContent').scrollTop = 0;
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function escAttr(s) {
  return s.replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

// ── Navigation ──

function navigateTo(id) {
  if (id === currentArtifact) return;
  currentArtifact = id;
  renderAll();
}

function navigatePrev() {
  const idx = artifactOrder.indexOf(currentArtifact);
  if (idx > 0) navigateTo(artifactOrder[idx - 1]);
}

function navigateNext() {
  const idx = artifactOrder.indexOf(currentArtifact);
  if (idx < artifactOrder.length - 1) navigateTo(artifactOrder[idx + 1]);
}

// ── Actions ──

function answerQuestion(qId, answer, btn) {
  questionsAnswered[qId] = answer;
  renderPage(currentArtifact);

  // Update strategy line for auth question
  if (qId === 'q-auth') {
    setTimeout(() => {
      const line = document.getElementById('strategy-line');
      if (line) {
        if (answer.includes('JWT')) {
          line.innerHTML = '<span class="ln">22</span>+JWT-based authentication with access/refresh token pairs';
        } else if (answer.includes('Session')) {
          line.innerHTML = '<span class="ln">22</span>+Server-side sessions with secure httpOnly cookies';
        } else {
          line.innerHTML = '<span class="ln">22</span>+Hybrid: JWT for API, session cookies for browser UI';
        }
        line.classList.add('highlight');
        setTimeout(() => line.classList.remove('highlight'), 2500);
      }
    }, 100);
  }

  showToast('Decision recorded — spec updated');
}

function approveArtifact(id) {
  approved.add(id);
  artifacts[id].status = 'approved';
  showToast(`${artifacts[id].title} approved`);

  // Check if all spec diffs are approved
  if (specDiffs.every(d => approved.has(d))) {
    setTimeout(() => {
      phases[1].status = 'done';
      phases[2].status = 'active';
      artifacts['design-doc'].status = 'done';
      showToast('All specs approved! Moving to Plan phase...');
      renderMinimap();
      renderBreadcrumb(currentArtifact);
    }, 800);
  } else {
    // Auto-navigate to next pending diff
    const next = specDiffs.find(d => !approved.has(d));
    if (next) {
      // Update the next one to "reviewing"
      artifacts[next].status = 'reviewing';
      setTimeout(() => navigateTo(next), 500);
      return;
    }
  }

  renderAll();
}

function requestChanges(id) {
  if (!userMessages[id]) userMessages[id] = [];
  // Add agent comment about requesting changes
  artifacts[id].content.push({
    kind: 'comment',
    text: "I'll revise this diff based on your feedback. What would you like me to change?"
  });
  renderPage(currentArtifact);
  showToast('Requesting changes — describe what to revise');
}

function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) return;

  if (!userMessages[currentArtifact]) userMessages[currentArtifact] = [];
  const msgObj = { text: text, reply: null };
  userMessages[currentArtifact].push(msgObj);

  renderPage(currentArtifact);

  // Scroll to bottom
  const pc = document.getElementById('pageContent');
  pc.scrollTop = pc.scrollHeight;

  // Simulate agent reply
  setTimeout(() => {
    const replies = [
      'Got it — updating the spec to reflect this change.',
      'Good point! I\'ll incorporate that into the current draft and update the diff.',
      'Understood. Revising the relevant section now.',
      'That makes sense. I\'ve noted this and will update the spec accordingly.'
    ];
    msgObj.reply = replies[Math.floor(Math.random() * replies.length)];
    renderPage(currentArtifact);
    const pc2 = document.getElementById('pageContent');
    pc2.scrollTop = pc2.scrollHeight;
  }, 600 + Math.random() * 600);
}

function renderAll() {
  renderBreadcrumb(currentArtifact);
  renderMinimap();
  renderPage(currentArtifact);
}

// ── Toast ──

function showToast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  t.className = 'toast show';
  clearTimeout(showToast._timer);
  showToast._timer = setTimeout(() => { t.className = 'toast'; }, 3000);
}

// ── Keyboard navigation ──

document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'ArrowLeft') { e.preventDefault(); navigatePrev(); }
  if (e.key === 'ArrowRight') { e.preventDefault(); navigateNext(); }
});

// ── Init ──
renderAll();
</script>
