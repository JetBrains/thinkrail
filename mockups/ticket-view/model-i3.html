<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I3: Focus Mode — Bonsai Ticket View</title>
<link rel="stylesheet" href="shared/base.css">
<link rel="stylesheet" href="shared/sidebar.css">
<style>
/* ── I3: Inline subsession blocks ────────────────────────────── */
.inline-sub { border: 1px solid var(--border-bright); border-radius: var(--r); background: var(--surface); overflow: hidden; animation: fadeIn 0.35s ease both; margin: 12px 0; }
.inline-sub.collapsed { border-color: var(--border); background: transparent; padding: 8px 14px; }
.is-header { padding: 8px 14px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--border); background: var(--elevated); font-size: 12px; }
.is-icon { flex-shrink: 0; }
.is-title { font-weight: 600; color: var(--text); flex: 1; }
.is-body { padding: 10px 14px; font-size: 13px; color: var(--text-sec); line-height: 1.7; }
.is-body .msg { padding: 4px 0 4px 12px; font-size: 13px; }
.is-actions { padding: 8px 14px; border-top: 1px solid var(--border); display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.is-actions .dc-opt { font-size: 11px; padding: 4px 12px; }
.is-input { display: flex; gap: 6px; align-items: center; flex: 1; min-width: 200px; }
.is-input input { flex: 1; padding: 5px 10px; border-radius: 5px; font-size: 12px; border: 1px solid var(--border); background: var(--elevated); color: var(--text); font-family: inherit; outline: none; }
.is-input input:focus { border-color: var(--accent); }
.is-input button { padding: 5px 12px; border-radius: 5px; font-size: 11px; font-weight: 600; cursor: pointer; border: none; background: var(--accent); color: #fff; font-family: inherit; }
.is-complete-btn { font-size: 11px; color: var(--text-dim); cursor: pointer; padding: 4px 10px; border-radius: 4px; border: 1px solid var(--border); background: transparent; font-family: inherit; transition: all 0.15s; margin-left: auto; }
.is-complete-btn:hover { border-color: var(--green); color: var(--green); }
.is-collapsed-summary { font-size: 13px; color: var(--text-sec); display: flex; align-items: center; gap: 8px; }
.is-collapsed-summary .is-check { color: var(--green); font-weight: 700; }
.is-collapsed-summary .is-dur { font-size: 10px; color: var(--text-dim); font-family: var(--mono); margin-left: auto; }
/* ── I3: Focus button ────────────────────────────────────────── */
.ss-focus-btn { font-size: 11px; color: var(--accent); cursor: pointer; padding: 3px 8px; border-radius: 4px; border: 1px solid transparent; transition: all 0.15s; margin-left: auto; background: transparent; font-family: inherit; font-weight: 500; }
.ss-focus-btn:hover { background: var(--accent-sub); border-color: var(--accent); }
/* ── I3: Focus mode header ───────────────────────────────────── */
.focus-header { display: none; padding: 8px 16px; background: var(--yellow-sub); border-bottom: 2px solid var(--yellow); align-items: center; gap: 8px; font-size: 13px; flex-shrink: 0; }
.focus-header.visible { display: flex; }
.focus-back { color: var(--accent); cursor: pointer; font-weight: 500; font-size: 12px; background: transparent; border: none; font-family: inherit; padding: 2px 6px; border-radius: 4px; transition: all 0.15s; }
.focus-back:hover { text-decoration: underline; background: var(--accent-sub); }
.focus-title { font-weight: 600; color: var(--yellow); }
.focus-complete { margin-left: auto; font-size: 11px; color: var(--text-dim); cursor: pointer; padding: 4px 10px; border: 1px solid var(--border); border-radius: 4px; background: transparent; font-family: inherit; transition: all 0.15s; }
.focus-complete:hover { border-color: var(--green); color: var(--green); }
/* ── I3: Focus mode body + toggle ────────────────────────────── */
.focus-conv { display: none; max-width: 700px; margin: 0 auto; }
.focus-conv > * + * { margin-top: 16px; }
body.focus-mode .conv-inner { display: none; }
body.focus-mode .focus-conv { display: block; }
body.focus-mode .focus-header { display: flex; }
/* ── I3: Recommendation card ─────────────────────────────────── */
.rec-card { border: 1px solid var(--green); border-radius: var(--r); background: var(--green-sub); padding: 14px; margin: 8px 0; animation: fadeIn 0.35s ease both; }
.rec-card-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--green); margin-bottom: 8px; }
.rec-card-row { font-size: 13px; color: var(--text); line-height: 1.7; padding-left: 8px; }
.rec-card-row strong { color: var(--green); }
/* ── I3: Suggestion card ─────────────────────────────────────── */
.suggestion-card { border: 1px dashed var(--accent); border-radius: var(--r); background: var(--accent-sub); padding: 10px 14px; animation: fadeIn 0.35s ease both; margin: 8px 0; }
.sug-header { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--accent); margin-bottom: 6px; }
.sug-body { font-size: 13px; color: var(--text-sec); line-height: 1.5; }
.sug-body strong { color: var(--text); }
.sug-actions { margin-top: 8px; display: flex; gap: 8px; }
.sug-btn { padding: 5px 14px; border-radius: 6px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid var(--border); background: var(--elevated); color: var(--text-sec); transition: all 0.15s; font-family: inherit; }
.sug-btn:hover { border-color: var(--accent); color: var(--text); }
.sug-btn.primary { border-color: var(--accent); color: var(--accent); background: var(--accent-sub); }
.sug-btn.primary:hover { background: rgba(88,166,255,0.2); }
</style>

    <div class="sidebar-scroll" id="sidebarScroll">
      <div class="sidebar-group" id="sg-describe"><div class="sidebar-group-header" onclick="toggleSidebarGroup('describe')"><span class="group-toggle" id="gt-describe">&#9662;</span><span>Describe</span></div><div class="sidebar-group-items" id="gi-describe"></div></div>
      <div class="sidebar-group" id="sg-specify"><div class="sidebar-group-header" onclick="toggleSidebarGroup('specify')"><span class="group-toggle" id="gt-specify">&#9662;</span><span>Specify</span></div><div class="sidebar-group-items" id="gi-specify"></div></div>

      <div class="sidebar-group" id="sg-execute"><div class="sidebar-group-header" onclick="toggleSidebarGroup('execute')"><span class="group-toggle" id="gt-execute">&#9662;</span><span>Execute</span></div><div class="sidebar-group-items" id="gi-execute"></div></div>
      <div class="sidebar-group" id="sg-verify"><div class="sidebar-group-header" onclick="toggleSidebarGroup('verify')"><span class="group-toggle" id="gt-verify">&#9662;</span><span>Verify</span></div><div class="sidebar-group-items" id="gi-verify"></div></div>

  </div>
  <!-- Conversation -->
  <div class="conversation">
    <div class="conv-scroll" id="convScroll">
      <div class="conv-inner" id="convInner"></div>
      <div class="focus-conv" id="focusConv"></div>
    </div>
    <div class="input-bar">

  </div>
</div>

<script>
focusConvEl = document.getElementById('focusConv');

window.onSidebarNavigate = function(key) {
  var s = sidebarItems[key];
  if (s && s.status === 'done') peekSubsession(key);
};

function peekSubsession(key) {
  var def = SUBSESSIONS.find(function(s) { return s.key === key; });
  if (!def) return;
  peekMode = true;
  document.body.classList.add('split-mode', 'peek-mode');
  var closeBtn = '<button class="ap-close" onclick="closePeek()" style="display:inline-flex;align-items:center;gap:4px;margin-left:auto;cursor:pointer;font-size:12px;color:var(--text-dim);background:none;border:1px solid var(--border);border-radius:4px;padding:4px 12px;font-family:inherit">';
  document.getElementById('apHeader').innerHTML = '<span class="ap-badge doc">DOC</span><span class="ap-path">' + def.label + '</span><span class="ap-stats">' + def.context + '</span>' + closeBtn + '&times; Close</button>';
  document.getElementById('apBody').innerHTML = '<div class="doc-preview"><h2>' + def.label + '</h2><p>Completed subsession. Context: ' + def.context + '</p><p style="color:var(--text-dim);font-style:italic;margin-top:16px">Full conversation replay not implemented in mockup.</p></div>';
  document.getElementById('apActions').innerHTML = closeBtn + '&larr; Back to flow</button>';
}

// ── Inline subsession management ─────────────────────────────────
function openInlineSub(key) {
  var def = SUBSESSIONS.find(function(s) { return s.key === key; });
  if (!def) return;
  addSidebarItem(key); setSidebarStatus(key, 'active');
  var c = document.createElement('div');
  c.className = 'inline-sub fade-in'; c.id = 'isub-' + key;
  c.innerHTML = '<div class="is-header"><span class="is-icon">' + def.icon + '</span><span class="is-title">' + def.label + '</span><button class="ss-focus-btn" onclick="enterFocusMode(\'' + key + '\')">Focus &rarr;</button></div><div class="is-body" id="isub-body-' + key + '"></div><div class="is-actions" id="isub-actions-' + key + '"><div class="is-input"><input type="text" placeholder="Ask about this..." /><button>Send</button></div><button class="is-complete-btn" onclick="completeInlineSub(\'' + key + '\')">Complete subsession</button></div>';
  convInner.appendChild(c); inlineSubEls[key] = c; scrollConv();
}
function addSubMsg(key, role, text) {
  var b = document.getElementById('isub-body-' + key); if (!b) return;
  var d = document.createElement('div'); d.className = 'msg ' + role + ' fade-in'; d.innerHTML = text;
  b.appendChild(d); scrollConv();
}
function addSubTyping(key) {
  var b = document.getElementById('isub-body-' + key); if (!b) return;
  var d = document.createElement('div'); d.className = 'typing-indicator fade-in'; d.id = 'sub-typing-' + key;
  d.innerHTML = '<span class="dot"></span><span class="dot"></span><span class="dot"></span>';
  b.appendChild(d); scrollConv();
}
function removeSubTyping(key) { var e = document.getElementById('sub-typing-' + key); if (e) e.remove(); }
function resolveSubDecision(key, idx, label) {
  var a = document.getElementById('isub-actions-' + key);
  if (a) a.innerHTML = '<span style="font-size:12px;color:var(--green);font-weight:500">&#10003; ' + label.replace(/\s*[★&#9733;]+/g, '') + '</span>';
  waitingForInteraction = false;
  if (!playing) setTimeout(function() { advanceInteractive(); }, 400);
}
function completeInlineSub(key) { collapseInlineSub(key, 'Completed.'); waitingForInteraction = false; if (!playing) setTimeout(function() { advanceInteractive(); }, 400); }
function collapseInlineSub(key, summary) {
  var el = document.getElementById('isub-' + key); if (!el) return;
  var def = SUBSESSIONS.find(function(s) { return s.key === key; });
  var dur = sidebarItems[key] ? sidebarItems[key].duration : '';
  el.className = 'inline-sub collapsed';
  el.innerHTML = '<div class="is-collapsed-summary"><span class="is-check">&#10003;</span><span class="is-icon">' + (def ? def.icon : '') + '</span><span>' + (def ? def.label : key) + ': ' + summary + '</span>' + (dur ? '<span class="is-dur">' + dur + '</span>' : '') + '</div>';
}

// ── Suggestion card ──────────────────────────────────────────────
function addSuggestionCard(key, reason) {
  var def = SUBSESSIONS.find(function(s) { return s.key === key; }); if (!def) return;
  var d = document.createElement('div'); d.className = 'suggestion-card fade-in'; d.id = 'sug-' + key;
  d.innerHTML = '<div class="sug-header">SUGGESTED SUBSESSION</div><div class="sug-body"><strong>' + def.icon + ' ' + def.label + '</strong><br>' + reason + '</div><div class="sug-actions"><button class="sug-btn primary" onclick="acceptSuggestion(\'' + key + '\')">Accept &amp; open</button><button class="sug-btn" onclick="dismissSuggestion(\'' + key + '\')">Skip</button></div>';
  convInner.appendChild(d); scrollConv();
}
function acceptSuggestion(key) { var s = document.getElementById('sug-' + key); if (s) s.remove(); waitingForInteraction = false; if (!playing) setTimeout(function() { advanceInteractive(); }, 200); }
function dismissSuggestion(key) { var s = document.getElementById('sug-' + key); if (s) { s.innerHTML = '<span style="font-size:12px;color:var(--text-dim)">Subsession skipped.</span>'; s.className = 'suggestion-card'; } }

// ── FOCUS MODE ───────────────────────────────────────────────────
function enterFocusMode(key) {
  var def = SUBSESSIONS.find(function(s) { return s.key === key; }); if (!def) return;
  focusedSub = key; document.body.classList.add('focus-mode');
  document.getElementById('focusTitle').textContent = def.icon + ' ' + def.label;
  focusConvEl.innerHTML = '';
  var ib = document.getElementById('isub-body-' + key);
  if (ib) ib.querySelectorAll('.msg').forEach(function(m) { focusConvEl.appendChild(m.cloneNode(true)); });
  scrollConv();
}
function exitFocusMode() {
  if (!focusedSub) return;
  document.body.classList.remove('focus-mode');
  focusConvEl.innerHTML = '';
  focusedSub = null;
}

function completeFocusedSub() {
  if (!focusedSub) return;
  var k = focusedSub;
  exitFocusMode();
  collapseInlineSub(k, 'Completed via focused mode.');
  waitingForInteraction = false;
  if (!playing) setTimeout(function() { advanceInteractive(); }, 400);
}

// ── Focus message helpers ────────────────────────────────────────

function addFocusMsg(role, text) {
  if (!focusConvEl) return;
  var d = document.createElement('div');
  d.className = 'msg ' + role + ' fade-in';
  d.innerHTML = text;
  focusConvEl.appendChild(d);
  scrollConv();
}

function addFocusTyping() {
  if (!focusConvEl) return;
  var d = document.createElement('div');
  d.className = 'typing-indicator fade-in';
  d.id = 'focusTyping';
  d.innerHTML = '<span class="dot"></span><span class="dot"></span><span class="dot"></span>';
  focusConvEl.appendChild(d);
  scrollConv();
}

function removeFocusTyping() {
  var e = document.getElementById('focusTyping');
  if (e) e.remove();
}
function addFocusRec(title, rows) {
  if (!focusConvEl) return; var d = document.createElement('div'); d.className = 'rec-card fade-in';
  d.innerHTML = '<div class="rec-card-title">' + title + '</div>' + rows.map(function(r) { return '<div class="rec-card-row">' + r + '</div>'; }).join('');
  focusConvEl.appendChild(d); scrollConv();
}
function addFocusDecision(question, options, recommended, stepId) {
  if (!focusConvEl) return; var d = document.createElement('div'); d.className = 'decision-card fade-in'; d.id = 'dc-focus-' + (stepId || 'x');
  var opts = ''; options.forEach(function(o, i) { opts += '<button class="dc-opt' + (i === recommended ? ' recommended' : '') + '" onclick="resolveFocusDecision(' + i + ',\'' + o.replace(/'/g, "\\'") + '\')">' + o + '</button>'; });
  d.innerHTML = '<div class="dc-label">DECISION</div><div class="dc-q">' + question + '</div><div class="dc-opts">' + opts + '</div>';
  focusConvEl.appendChild(d); scrollConv();
}
function resolveFocusDecision(idx, label) {
  focusConvEl.querySelectorAll('.decision-card:not(.resolved)').forEach(function(c) { c.className = 'decision-card resolved'; c.innerHTML = '<span class="dc-resolved">&#10003; ' + label.replace(/\s*[★&#9733;]+/g, '') + '</span>'; });
  waitingForInteraction = false; if (!playing) setTimeout(function() { advanceInteractive(); }, 400);
}

// ── Override: executeStep ─────────────────────────────────────────
var _engineExecuteStep = executeStep;
executeStep = function(step) {
  if (stepNumEl) stepNumEl.textContent = currentStep + 1;
  if (progressFill && SCRIPT) progressFill.style.width = ((currentStep + 1) / SCRIPT.length * 100) + '%';
  switch (step.type) {
    case 'sidebar-add':    addSidebarItem(step.sub); if (step.status) setSidebarStatus(step.sub, step.status, step.duration); break;
    case 'sidebar-update': setSidebarStatus(step.sub, step.status, step.duration); break;
    case 'suggest-sub':    addSuggestionCard(step.sub, step.reason); break;
    case 'open-inline-sub':openInlineSub(step.sub); break;
    case 'sub-msg':        removeSubTyping(step.sub); addSubMsg(step.sub, step.role, step.text); break;
    case 'sub-typing':     addSubTyping(step.sub); break;
    case 'focus-sub':      enterFocusMode(step.sub); break;
    case 'focus-msg':      removeFocusTyping(); addFocusMsg(step.role, step.text); break;
    case 'focus-typing':   addFocusTyping(); break;
    case 'focus-rec':      addFocusRec(step.title, step.rows); break;
    case 'focus-decision': addFocusDecision(step.question, step.options, step.recommended, step.id); break;
    case 'exit-focus':     exitFocusMode(); collapseInlineSub(step.sub, step.summary || 'Completed.'); setSidebarStatus(step.sub, 'done', step.duration); break;
    case 'complete':       completeAllPhases(); pause(); break;
    default:               _engineExecuteStep(step); break;
  }
};

// ── Override: advanceAutoPlay ─────────────────────────────────────
advanceAutoPlay = function() {
  if (!playing || currentStep >= SCRIPT.length) { pause(); return; }
  var step = SCRIPT[currentStep]; executeStep(step); currentStep++;
  var delay, clean = function(s) { return s.replace(/\s*[★&#9733;]+/g, ''); };
  switch (step.type) {
    case 'typing': delay = step.duration; break;
    case 'decision':
      delay = 1800; var sid = step.id, ro = step.options[step.recommended];
      setTimeout(function() { if (playing) resolveDecisionCard(sid, clean(ro)); }, 1500); break;
    case 'approve':
      delay = 1200; var ai = step.artifact;
      setTimeout(function() { if (playing) autoApprove(ai); }, 900); break;
    case 'approve-doc':
      delay = 1200; setTimeout(function() { if (playing) autoApproveDoc(); }, 900); break;
    case 'suggest-sub':
      delay = 1800; var sk = step.sub;
      setTimeout(function() { if (playing) acceptSuggestion(sk); }, 1500); break;
    case 'focus-decision':
      delay = 1800; var fro = step.options[step.recommended], fri = step.recommended;
      setTimeout(function() { if (playing) resolveFocusDecision(fri, fro); }, 1500); break;
    case 'exec-progress':
      runExecAnimation(function() { if (playing) stepTimer = setTimeout(advanceAutoPlay, 600); }); return;
    case 'complete': return;
    case 'layout': delay = 700; break;
    case 'focus-sub': delay = 2000; break;
    case 'focus-msg': case 'focus-rec': delay = 1200; break;
    case 'focus-typing': case 'sub-typing': delay = step.duration || 800; break;
    case 'exit-focus': delay = 1000; break;
    case 'all-approved': delay = 1500; break;
    case 'sidebar-add': case 'sidebar-update': delay = 400; break;
    case 'open-inline-sub': delay = 600; break;
    case 'sub-msg': delay = 800; break;
    case 'user': case 'phase': delay = 800; break;
    default: delay = 1200; break;
  }
  stepTimer = setTimeout(advanceAutoPlay, delay);
};

// ── Override: advanceInteractive ──────────────────────────────────
advanceInteractive = function() {
  if (currentStep >= SCRIPT.length) return;
  var step = SCRIPT[currentStep];
  // Wait-for-interaction types (interactive mode only)
  if (!playing) {
    if (step.type === 'user' && step.interactive) {
      currentStep++; waitingForInteraction = true;
      if (userInput) { userInput.value = ''; userInput.placeholder = step.placeholder || 'Type a message...'; userInput.focus(); }
      if (sendBtn) sendBtn.disabled = false;
      return;
    }
    if (step.type === 'decision' || step.type === 'focus-decision' || step.type === 'suggest-sub') {
      executeStep(step); currentStep++; waitingForInteraction = true; return;
    }
    if (step.type === 'approve') {
      if (approvedArtifacts[step.artifact]) { currentStep++; setTimeout(function() { advanceInteractive(); }, 200); return; }
      waitingForInteraction = true; currentStep++; return;
    }
    if (step.type === 'approve-doc') {
      if (productDesignApproved) { currentStep++; setTimeout(function() { advanceInteractive(); }, 200); return; }
      waitingForInteraction = true; currentStep++; return;
    }
  }
  executeStep(step); currentStep++;
  var d;
  switch (step.type) {
    case 'typing': d = step.duration; break;
    case 'sub-typing': d = step.duration || 800; setTimeout(function() { removeSubTyping(step.sub); }, d - 50); break;
    case 'focus-typing': d = step.duration || 800; setTimeout(function() { removeFocusTyping(); }, d - 50); break;
    case 'exec-progress': runExecAnimation(function() { setTimeout(function() { advanceInteractive(); }, 600); }); return;
    case 'all-approved': d = 1200; break;
    case 'layout': d = 500; break;
    case 'sidebar-add': case 'sidebar-update': d = 300; break;
    case 'open-inline-sub': d = 500; break;
    case 'sub-msg': d = 600; break;
    case 'focus-sub': d = 800; break;
    case 'focus-msg': case 'focus-rec': d = 700; break;
    case 'exit-focus': d = 600; break;
    case 'complete': return;
    default: d = 600; break;
  }
  setTimeout(function() { advanceInteractive(); }, d);
};

// ── Override: stepForward ─────────────────────────────────────────
var _engineStepForward = stepForward;
stepForward = function() {
  if (playing) return;
  if (waitingForInteraction) {
    var ps = SCRIPT[currentStep - 1] || SCRIPT[currentStep];
    if (ps && ps.type === 'focus-decision') { resolveFocusDecision(ps.recommended, ps.options[ps.recommended]); return; }
    if (ps && ps.type === 'suggest-sub') { acceptSuggestion(ps.sub); return; }
  }
  _engineStepForward();
};

// ── Override: resetFlow ───────────────────────────────────────────
var _engineResetFlow = resetFlow;
resetFlow = function() {
  // Escape exits focus mode first
  if (focusedSub) { exitFocusMode(); return; }

  pause();
  currentStep = 0;
  approvedArtifacts = [false, false, false];
  currentArtifact = 0;
  waitingForInteraction = false;
  currentPhase = null;
  peekMode = false;
  peekSavedState = null;
  productDesignApproved = false;
  execAnimationRunning = false;
  focusedSub = null;
  inlineSubEls = {};
  sidebarItems = {};

  // Reset focus mode UI
  document.body.classList.remove('focus-mode');
  if (focusConvEl) focusConvEl.innerHTML = '';

  // Reset conversation + panels
  if (convInner) convInner.innerHTML = '';
  closeArtifactPanel();
  if (stepNumEl) stepNumEl.textContent = '0';
  if (progressFill) progressFill.style.width = '0%';
  if (userInput) { userInput.value = ''; userInput.placeholder = 'Type a message...'; }
  if (sendBtn) sendBtn.disabled = true;

  // Reset sidebar groups
  ['describe','specify','plan','execute','verify'].forEach(function(g) {
    var i = document.getElementById('gi-' + g);
    var t = document.getElementById('gt-' + g);
    if (i) { i.innerHTML = ''; i.classList.remove('collapsed'); }
    if (t) t.classList.remove('collapsed');
  });

  // Reset phase dots
  ['D','S','P','E','V'].forEach(function(p) {
    var e = document.getElementById('pd-' + p);
    if (!e) return;
    e.classList.remove('is-done','is-active');
    var d = e.querySelector('.dot'), l = e.querySelector('.label');
    if (d) d.className = 'dot pending';
    if (l) l.className = 'label';
  });

  // Reset artifact panel actions
  var a = document.getElementById('apActions');
  if (a) a.innerHTML = '<button class="btn-request" onclick="requestChanges()">Request Changes</button><button class="btn-approve" id="approveBtn" onclick="handleApprove()">Approve &#10003;</button>';

  setTimeout(function() { advanceInteractive(); }, 300);
};

// ── Keyboard: B toggles sidebar ──────────────────────────────────
document.addEventListener('keydown', function(e) {
  if (userInput && e.target === userInput) return;
  if (e.code === 'KeyB') { e.preventDefault(); toggleSidebarCollapse(); }
});
</script>
