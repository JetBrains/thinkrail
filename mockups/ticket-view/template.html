<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Template — Bonsai Ticket View</title>
<link rel="stylesheet" href="shared/base.css">
<!-- <link rel="stylesheet" href="shared/sidebar.css"> -->
<style>
  /* ── Experiment-specific CSS ── */
</style>
</head>
<body>

<a href="index.html" class="back-link">← All Models</a>
<span class="model-tag">Template</span>

<!-- Controls bar -->
<div class="controls">
  <button class="ctrl-btn" id="playBtn" onclick="togglePlay()">▶ Play</button>
  <button class="ctrl-btn" onclick="resetFlow()">⟳ Reset</button>
  <span class="step-counter">Step <span id="stepNum">0</span> / <span id="stepTotal">0</span></span>
  <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
  <span class="kbd-hint"><kbd>Space</kbd> play <kbd>→</kbd> step <kbd>Esc</kbd> reset</span>
</div>

<!-- Status bar -->
<div class="status-bar">
  <span class="ticket-id">AUTH-42</span>
  <div class="sb-sep"></div>
  <span class="ticket-title">Add user authentication</span>
  <div class="sb-spacer"></div>
  <div class="phase-dots">
    <div class="phase-dot" id="pd-D"><span class="dot pending"></span><span class="check">✓</span><span class="label">Describe</span></div>
    <span class="phase-sep">›</span>
    <div class="phase-dot" id="pd-S"><span class="dot pending"></span><span class="check">✓</span><span class="label">Specify</span></div>
    <span class="phase-sep">›</span>
    <div class="phase-dot" id="pd-P"><span class="dot pending"></span><span class="check">✓</span><span class="label">Plan</span></div>
    <span class="phase-sep">›</span>
    <div class="phase-dot" id="pd-E"><span class="dot pending"></span><span class="check">✓</span><span class="label">Execute</span></div>
  </div>
</div>

<!-- Main area -->
<div class="main-area">
  <div class="conversation">
    <div class="conv-scroll" id="convScroll">
      <div class="conv-inner" id="convInner"></div>
    </div>
    <div class="input-bar">
      <input type="text" id="userInput" placeholder="Type a message..." onkeydown="handleInputKey(event)">
      <button class="send-btn" id="sendBtn" onclick="handleSend()" disabled>Send</button>
    </div>
  </div>

  <div class="artifact-panel" id="artifactPanel">
    <div class="ap-header" id="apHeader">
      <span class="ap-badge new" id="apBadge">NEW</span>
      <span class="ap-path" id="apPath"></span>
      <span class="ap-stats" id="apStats"></span>
      <button class="ap-close" onclick="closePeek()">× Close</button>
    </div>
    <div class="ap-body" id="apBody"></div>
    <div class="ap-actions" id="apActions">
      <button class="btn-request" onclick="requestChanges()">Request Changes</button>
      <button class="btn-approve" id="approveBtn" onclick="handleApprove()">Approve ✓</button>
    </div>
  </div>
</div>

<!-- Shared scripts -->
<script src="shared/data.js"></script>
<script>
// ── Define SCRIPT before loading engine ──
window.SCRIPT = [
  { id: 1,  type: 'agent',    text: 'What would you like to work on?', phase: 'D' },
  { id: 2,  type: 'user',     text: 'Add user authentication to the Bonsai workspace', interactive: true, placeholder: 'Add user authentication to the Bonsai workspace' },
  { id: 3,  type: 'agent',    text: "Got it — an auth module. Let me ask a scoping question." },
  { id: 4,  type: 'decision', question: 'What kind of authentication?', options: ['Token-based ★', 'OAuth/SSO', 'Simple password'], recommended: 0, hint: 'Extends your existing bns_ token system.' },
  { id: 5,  type: 'agent',    text: "Token-based — great choice. Here's the description:" },
  { id: 6,  type: 'artifact-card', header: 'Ticket Description', body: '<strong>What:</strong> Add JWT-based user authentication.<br><strong>Purpose:</strong> Enable multi-user access with role-based permissions.' },
  { id: 7,  type: 'phase',    phase: 'S', label: 'SPECIFY' },
  { id: 8,  type: 'agent',    text: 'Creating spec diffs...' },
  { id: 9,  type: 'typing',   duration: 1200 },
  { id: 10, type: 'layout',   action: 'open', artifact: 0 },
  { id: 11, type: 'agent',    text: 'Review <code>auth/README.md</code> — the new module design spec.' },
  { id: 12, type: 'approve',  artifact: 0 },
  { id: 13, type: 'layout',   action: 'close' },
  { id: 14, type: 'agent',    text: 'Spec approved ✓ Moving to planning.' },
  { id: 15, type: 'phase',    phase: 'P', label: 'PLAN' },
  { id: 16, type: 'layout',   action: 'open-plan' },
  { id: 17, type: 'decision', question: 'Ready to execute?', options: ['Execute this plan ★', 'Adjust order'], recommended: 0 },
  { id: 18, type: 'phase',    phase: 'E', label: 'EXECUTE' },
  { id: 19, type: 'layout',   action: 'close' },
  { id: 20, type: 'layout',   action: 'open-exec' },
  { id: 21, type: 'exec-progress' },
  { id: 22, type: 'agent',    text: 'All steps complete.' },
  { id: 23, type: 'layout',   action: 'close' },
  { id: 24, type: 'agent',    text: '✔ All checks passed. Ticket complete!' },
  { id: 25, type: 'complete' }

// ── Optional hooks ──
window.onStepExecute = function(step) {
  // Handle experiment-specific step types
};
window.onReset = function() {
  // Reset experiment-specific state
};
</script>
<script src="shared/engine.js"></script>
</body>
</html>
