<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Model D — Smart Columns: Focus + Collapse</title>
<style>
  :root {
    --bg-base: #0e1117;
    --bg-surface: #161b22;
    --bg-elevated: #1c2129;
    --bg-hover: #242b35;
    --bg-inset: #0d1117;
    --border: #2d333b;
    --border-bright: #3d444d;
    --text-primary: #e6edf3;
    --text-secondary: #8b949e;
    --text-muted: #656d76;
    --accent: #58a6ff;
    --accent-subtle: #1f3a5f;
    --green: #3fb950;
    --green-subtle: #1a3a2a;
    --yellow: #d29922;
    --yellow-subtle: #3d2e00;
    --purple: #bc8cff;
    --purple-subtle: #2a1f3d;
    --red: #f85149;
    --red-subtle: #3d1418;
    --orange: #db6d28;
    --orange-subtle: #3d2200;
    --radius: 8px;
    --radius-lg: 12px;
    --mono: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-base);
    color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Back link ───────────────────────────────── */
  .back-link {
    position: fixed;
    top: 12px;
    right: 16px;
    z-index: 200;
    font-size: 12px;
    color: var(--text-muted);
    text-decoration: none;
    padding: 4px 10px;
    border-radius: 4px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    transition: color 0.15s, border-color 0.15s;
  }
  .back-link:hover { color: var(--accent); border-color: var(--accent); }

  /* ── Header ──────────────────────────────────── */
  .header {
    height: 52px;
    min-height: 52px;
    background: var(--bg-surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 12px;
    flex-shrink: 0;
    z-index: 10;
  }
  .ticket-id {
    font-size: 13px;
    font-weight: 700;
    font-family: var(--mono);
    color: var(--accent);
  }
  .ticket-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-primary);
  }
  .header-sep {
    color: var(--text-muted);
    font-size: 14px;
  }
  .header-spacer { flex: 1; }
  .model-tag {
    font-size: 10px;
    font-weight: 600;
    color: var(--accent);
    background: var(--accent-subtle);
    padding: 3px 8px;
    border-radius: 100px;
    letter-spacing: 0.04em;
  }

  /* ── Animations ──────────────────────────────── */
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideInRight { from { opacity: 0; transform: translateX(16px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes bounce { 0%,80%,100%{opacity:0.3;transform:scale(0.8)}40%{opacity:1;transform:scale(1)} }

  /* ── Columns container ──────────────────────── */
  .columns {
    flex: 1;
    display: flex;
    padding: 12px;
    gap: 8px;
    overflow: hidden;
    min-height: 0;
  }

  /* ── Column ─────────────────────────────────── */
  .col {
    display: flex;
    flex-direction: column;
    min-width: 0;
    background: var(--bg-surface);
    border-radius: var(--radius-lg);
    border: 1px solid var(--border);
    overflow: hidden;
    transition: flex 0.35s cubic-bezier(0.4, 0, 0.2, 1),
                border-color 0.35s ease,
                min-width 0.35s cubic-bezier(0.4, 0, 0.2, 1),
                max-width 0.35s cubic-bezier(0.4, 0, 0.2, 1),
                opacity 0.35s ease;
  }

  /* Default: equal columns */
  .col { flex: 1; }

  /* Focused column takes ~70% */
  .col.focused {
    flex: 8;
    border-color: var(--accent);
  }

  /* Collapsed columns: narrow strips */
  .col.collapsed {
    flex: 0 0 48px;
    min-width: 48px;
    max-width: 48px;
    cursor: pointer;
  }
  .col.collapsed:hover {
    border-color: var(--border-bright);
    background: var(--bg-hover);
  }

  /* Phase status adjustments */
  .col.phase-pending { opacity: 0.55; }
  .col.collapsed.phase-pending { opacity: 0.35; }
  .col.focused.phase-pending { opacity: 0.7; }

  /* ── Collapsed column interior ──────────────── */
  .col-collapsed-inner {
    display: none;
    flex-direction: column;
    align-items: center;
    padding: 14px 0;
    gap: 12px;
    height: 100%;
  }
  .col.collapsed .col-collapsed-inner { display: flex; }
  .col.collapsed .col-focused-inner { display: none; }

  .col-vert-label {
    writing-mode: vertical-rl;
    text-orientation: mixed;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    white-space: nowrap;
    user-select: none;
  }
  .phase-done .col-vert-label { color: var(--green); }
  .phase-active .col-vert-label { color: var(--yellow); }
  .phase-pending .col-vert-label { color: var(--text-muted); }

  .col-status-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .phase-done .col-status-dot { background: var(--green); }
  .phase-active .col-status-dot { background: var(--yellow); animation: pulse 2s ease-in-out infinite; }
  .phase-pending .col-status-dot { background: var(--text-muted); }

  .col-artifact-dots {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    margin-top: auto;
  }
  .artifact-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    transition: transform 0.15s ease;
  }
  .artifact-dot:hover { transform: scale(1.4); }
  .artifact-dot.status-done { background: var(--green); }
  .artifact-dot.status-reviewing { background: var(--accent); }
  .artifact-dot.status-draft { background: var(--yellow); }
  .artifact-dot.status-pending { background: var(--text-muted); }
  .artifact-dot.status-approved { background: var(--green); opacity: 0.7; }
  .artifact-dot.has-question { background: var(--accent); box-shadow: 0 0 6px rgba(88,166,255,0.4); }

  /* ── Focused column interior ────────────────── */
  .col-focused-inner {
    display: none;
    flex-direction: column;
    flex: 1;
    min-height: 0;
    overflow: hidden;
  }
  .col.focused .col-focused-inner { display: flex; }
  .col.focused .col-collapsed-inner { display: none; }

  /* Default (no focus) — show a simple compact view */
  .col-default-inner {
    display: flex;
    flex-direction: column;
    flex: 1;
    min-height: 0;
    overflow: hidden;
  }
  .col.focused .col-default-inner { display: none; }
  .col.collapsed .col-default-inner { display: none; }

  /* ── Focused header bar ─────────────────────── */
  .focused-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
    background: var(--bg-elevated);
  }
  .focused-phase-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .phase-done .focused-phase-dot { background: var(--green); }
  .phase-active .focused-phase-dot { background: var(--yellow); animation: pulse 2s ease-in-out infinite; }
  .phase-pending .focused-phase-dot { background: var(--text-muted); }

  .focused-phase-name {
    font-size: 14px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .phase-done .focused-phase-name { color: var(--green); }
  .phase-active .focused-phase-name { color: var(--yellow); }
  .phase-pending .focused-phase-name { color: var(--text-muted); }

  .focused-status-label {
    font-size: 11px;
    color: var(--text-muted);
    margin-left: auto;
  }

  /* ── Default column header (when none focused) ── */
  .default-col-header {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
    cursor: pointer;
  }
  .default-col-header:hover { background: var(--bg-hover); }
  .default-col-name {
    font-size: 13px;
    font-weight: 600;
  }
  .phase-done .default-col-name { color: var(--green); }
  .phase-active .default-col-name { color: var(--yellow); }
  .phase-pending .default-col-name { color: var(--text-muted); }
  .default-col-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .phase-done .default-col-dot { background: var(--green); }
  .phase-active .default-col-dot { background: var(--yellow); animation: pulse 2s ease-in-out infinite; }
  .phase-pending .default-col-dot { background: var(--text-muted); }
  .default-col-count {
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 100px;
    background: var(--bg-elevated);
    color: var(--text-muted);
    margin-left: auto;
    flex-shrink: 0;
  }
  .default-col-body {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .default-col-body::-webkit-scrollbar { width: 4px; }
  .default-col-body::-webkit-scrollbar-track { background: transparent; }
  .default-col-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── Mini cards (default view) ──────────────── */
  .mini-card {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
    font-size: 11px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .mini-card:hover { border-color: var(--border-bright); background: var(--bg-hover); }
  .mini-card-icon {
    width: 20px;
    height: 20px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .mini-card-icon.desc { background: var(--accent-subtle); color: var(--accent); }
  .mini-card-icon.doc { background: var(--green-subtle); color: var(--green); }
  .mini-card-icon.new { background: var(--green-subtle); color: var(--green); }
  .mini-card-icon.mod { background: var(--yellow-subtle); color: var(--yellow); }
  .mini-card-icon.plan { background: var(--purple-subtle); color: var(--purple); }
  .mini-card-icon.exec { background: var(--orange-subtle); color: var(--orange); }
  .mini-card-name {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-weight: 500;
  }
  .mini-card-badge {
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 100px;
    font-weight: 600;
    text-transform: uppercase;
    flex-shrink: 0;
  }
  .mini-card-badge.done { background: var(--green-subtle); color: var(--green); }
  .mini-card-badge.draft { background: var(--yellow-subtle); color: var(--yellow); }
  .mini-card-badge.reviewing { background: var(--accent-subtle); color: var(--accent); }
  .mini-card-badge.pending { background: var(--bg-surface); color: var(--text-muted); border: 1px solid var(--border); }
  .mini-card-badge.approved { background: var(--green-subtle); color: var(--green); }

  .pending-placeholder {
    text-align: center;
    color: var(--text-muted);
    font-size: 11px;
    font-style: italic;
    padding: 20px 8px;
  }

  /* ── DESCRIBE phase (focused) ───────────────── */
  .describe-content {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
    animation: fadeIn 0.3s ease;
  }
  .describe-content::-webkit-scrollbar { width: 5px; }
  .describe-content::-webkit-scrollbar-track { background: transparent; }
  .describe-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .describe-field {
    margin-bottom: 16px;
  }
  .describe-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    margin-bottom: 4px;
  }
  .describe-value {
    font-size: 14px;
    line-height: 1.6;
    color: var(--text-secondary);
  }
  .describe-completed {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--green);
    background: var(--green-subtle);
    padding: 4px 10px;
    border-radius: 100px;
    margin-top: 8px;
  }

  /* ── SPECIFY phase (focused) ────────────────── */
  .specify-layout {
    flex: 1;
    display: flex;
    min-height: 0;
    overflow: hidden;
    animation: fadeIn 0.3s ease;
  }

  /* Diff list sidebar */
  .diff-list {
    width: 220px;
    min-width: 220px;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    background: var(--bg-surface);
    flex-shrink: 0;
  }
  .diff-list-header {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .diff-list-items {
    flex: 1;
    overflow-y: auto;
    padding: 6px;
  }
  .diff-list-items::-webkit-scrollbar { width: 3px; }
  .diff-list-items::-webkit-scrollbar-track { background: transparent; }
  .diff-list-items::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .diff-item {
    padding: 8px 10px;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: background 0.15s;
    margin-bottom: 2px;
  }
  .diff-item:hover { background: var(--bg-hover); }
  .diff-item.active { background: var(--accent-subtle); }
  .diff-item-icon {
    width: 18px;
    height: 18px;
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .diff-item-icon.new { background: var(--green-subtle); color: var(--green); }
  .diff-item-icon.mod { background: var(--yellow-subtle); color: var(--yellow); }
  .diff-item-icon.doc { background: var(--green-subtle); color: var(--green); }
  .diff-item-info {
    flex: 1;
    min-width: 0;
  }
  .diff-item-name {
    font-size: 12px;
    font-weight: 500;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .diff-item-badge {
    font-size: 9px;
    font-weight: 600;
    text-transform: uppercase;
    padding: 1px 5px;
    border-radius: 100px;
  }
  .diff-item-badge.draft { background: var(--yellow-subtle); color: var(--yellow); }
  .diff-item-badge.reviewing { background: var(--accent-subtle); color: var(--accent); }
  .diff-item-badge.pending { color: var(--text-muted); }
  .diff-item-badge.approved { background: var(--green-subtle); color: var(--green); }

  .diff-item-question {
    font-size: 9px;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 3px;
    margin-top: 2px;
  }

  .diff-list-progress {
    padding: 10px 12px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--text-muted);
    flex-shrink: 0;
  }
  .progress-bar {
    height: 3px;
    background: var(--bg-elevated);
    border-radius: 2px;
    margin-top: 6px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--green);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  /* Diff viewer area */
  .diff-viewer {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    overflow: hidden;
  }
  .diff-viewer-toolbar {
    padding: 8px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
    background: var(--bg-surface);
  }
  .diff-viewer-path {
    font-size: 12px;
    font-family: var(--mono);
    color: var(--text-muted);
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .diff-viewer-op {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 100px;
    font-weight: 600;
    text-transform: uppercase;
  }
  .diff-viewer-op.new { background: var(--green-subtle); color: var(--green); }
  .diff-viewer-op.modified { background: var(--yellow-subtle); color: var(--yellow); }
  .diff-viewer-stats {
    font-size: 11px;
    font-family: var(--mono);
    display: flex;
    gap: 6px;
  }
  .diff-viewer-stats .add { color: var(--green); }
  .diff-viewer-stats .del { color: var(--red); }

  .diff-viewer-content {
    flex: 1;
    overflow-y: auto;
    background: var(--bg-inset);
    position: relative;
  }
  .diff-viewer-content::-webkit-scrollbar { width: 5px; }
  .diff-viewer-content::-webkit-scrollbar-track { background: transparent; }
  .diff-viewer-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .diff-line {
    padding: 1px 14px 1px 52px;
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.7;
    white-space: pre;
    position: relative;
    min-height: 22px;
  }
  .diff-line .ln {
    position: absolute;
    left: 0;
    width: 44px;
    text-align: right;
    padding-right: 8px;
    color: var(--text-muted);
    opacity: 0.5;
    user-select: none;
  }
  .diff-line.add { background: rgba(63,185,80,0.1); color: var(--green); }
  .diff-line.del { background: rgba(248,81,73,0.1); color: var(--red); }
  .diff-line.ctx { color: var(--text-muted); }
  .diff-line.hunk { background: var(--accent-subtle); color: var(--accent); font-weight: 600; }
  .diff-line.highlight { background: rgba(88,166,255,0.08); }

  .approved-overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(63,185,80,0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 5;
    pointer-events: none;
  }
  .approved-stamp {
    color: var(--green);
    font-size: 18px;
    font-weight: 700;
    border: 3px solid var(--green);
    padding: 6px 20px;
    border-radius: 8px;
    transform: rotate(-8deg);
    opacity: 0.6;
  }

  /* Action buttons (used in bottom bar) */
  .action-btn {
    padding: 5px 14px;
    border-radius: 5px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .action-btn.primary { background: var(--green); color: #fff; }
  .action-btn.primary:hover { opacity: 0.85; }
  .action-btn.secondary {
    background: transparent;
    color: var(--text-secondary);
    border: 1px solid var(--border);
  }
  .action-btn.secondary:hover { border-color: var(--text-muted); }

  /* Description content in diff viewer area (for design-doc) */
  .doc-content {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
  }
  .doc-content::-webkit-scrollbar { width: 5px; }
  .doc-content::-webkit-scrollbar-track { background: transparent; }
  .doc-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .doc-content h3 {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-primary);
    margin: 14px 0 4px;
  }
  .doc-content h3:first-child { margin-top: 0; }
  .doc-content p { font-size: 13px; line-height: 1.6; color: var(--text-secondary); margin: 4px 0; }
  .doc-content code {
    font-family: var(--mono);
    font-size: 12px;
    background: var(--bg-inset);
    padding: 1px 4px;
    border-radius: 3px;
    color: var(--accent);
  }
  .doc-content ul { padding-left: 18px; margin: 4px 0; font-size: 13px; color: var(--text-secondary); line-height: 1.6; }
  .doc-content em { color: var(--yellow); }

  /* ── Inline agent notes ──────────────────────── */
  .inline-notes {
    flex-shrink: 0;
    padding: 8px 14px 0;
    display: flex;
    flex-direction: column;
    gap: 6px;
    animation: fadeIn 0.2s ease;
  }

  /* Info note — PROMINENT informational card */
  .agent-note {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 12px 14px;
    background: rgba(31, 58, 95, 0.25);
    border: 1px solid rgba(88,166,255,0.2);
    border-left: 3px solid var(--accent);
    border-radius: 6px;
    font-size: 12px;
    line-height: 1.6;
    color: var(--text-secondary);
    animation: fadeIn 0.3s ease;
  }
  .agent-note.note-question {
    background: rgba(61, 46, 0, 0.25);
    border-color: rgba(210,153,34,0.3);
    border-left-color: var(--yellow);
  }
  .agent-note code {
    font-family: var(--mono);
    font-size: 11px;
    background: var(--bg-inset);

  const toast = document.getElementById('toast');
  toast.querySelector('.t-icon').textContent = type === 'success' ? '✓' : 'ℹ';
  toast.querySelector('.t-msg').textContent = msg;
  toast.className = 'toast show' + (type === 'success' ? ' success' : '');
  setTimeout(() => { toast.className = 'toast'; }, 3000);
}

// ── Render: Collapsed column ───────────────────────────────────

function renderCollapsedColumn(phase) {
  const items = (phase.id === 'specify') ? specDiffs : [];
  let h = '';
  h += '<div class="col-collapsed-inner">';
  h += '<div class="col-status-dot"></div>';
  h += `<div class="col-vert-label">${phase.name}</div>`;
  h += '<div class="col-artifact-dots">';
  if (phase.id === 'describe') {
    h += '<div class="artifact-dot status-done" title="Description (done)"></div>';
  } else if (phase.id === 'specify') {
    items.forEach(d => {
      const isApproved = approvedSet.has(d.id);
      const hasQ = d.hasQuestion && !answeredMap[d.id] && !isApproved;
      let cls = 'artifact-dot';
      if (isApproved) cls += ' status-approved';
      else if (hasQ) cls += ' has-question';
      else if (d.badge === 'reviewing') cls += ' status-reviewing';
      else if (d.badge === 'draft') cls += ' status-draft';
      else cls += ' status-pending';
      h += `<div class="${cls}" title="${esc(d.title)}"></div>`;
    });
  } else if (phase.id === 'plan' && phase.status !== 'pending') {
    planSteps.forEach(s => {
      h += `<div class="artifact-dot status-${s.status === 'done' ? 'done' : 'pending'}" title="${esc(s.title)}"></div>`;
    });
  }
  h += '</div>';
  h += '</div>';
  return h;
}

// ── Render: Default column (no column focused) ─────────────────

function renderDefaultColumn(phase) {
  let h = '';
  const items = (phase.id === 'specify') ? specDiffs : [];
  const count = phase.id === 'describe' ? 1 : phase.id === 'specify' ? items.length : planSteps.length;

  h += '<div class="col-default-inner">';
  h += `<div class="default-col-header" onclick="focusPhase('${phase.id}')">`;
  h += '<div class="default-col-dot"></div>';
  h += `<span class="default-col-name">${phase.name}</span>`;
  if (phase.status !== 'pending') h += `<span class="default-col-count">${count}</span>`;
  h += '</div>';
  h += '<div class="default-col-body">';

  if (phase.id === 'describe') {
    h += '<div class="mini-card" onclick="focusPhase(\'describe\')">';
    h += '<div class="mini-card-icon desc">D</div>';
    h += '<span class="mini-card-name">Ticket Description</span>';
    h += '<span class="mini-card-badge done">done</span>';
    h += '</div>';
  } else if (phase.id === 'specify') {
    items.forEach((d, i) => {
      const isApproved = approvedSet.has(d.id);
      const badge = isApproved ? 'approved' : d.badge;
      h += `<div class="mini-card" onclick="focusPhase('specify'); selectedDiffIdx=${i}; render();">`;
      h += `<div class="mini-card-icon ${d.iconCls}">${d.iconChar}</div>`;
      h += `<span class="mini-card-name">${esc(d.title)}</span>`;
      h += `<span class="mini-card-badge ${badge}">${badge}</span>`;
      h += '</div>';
    });
  } else if (phase.status === 'pending') {
    h += '<div class="pending-placeholder">Waiting for previous phases</div>';
  } else if (phase.id === 'plan') {
    planSteps.forEach(s => {
      h += '<div class="mini-card">';
      h += '<div class="mini-card-icon plan">P</div>';
      h += `<span class="mini-card-name">${esc(s.title)}</span>`;
      h += '</div>';
    });
  }

  h += '</div>';
  h += '</div>';
  return h;
}

// ── Render: Focused column content ─────────────────────────────

function renderFocusedDescribe() {
  let h = '<div class="describe-content">';
  h += '<div class="describe-field"><div class="describe-label">What</div>';
  h += '<div class="describe-value">Add user authentication with signup, login, session management, and RBAC supporting admin and regular user roles.</div></div>';
  h += '<div class="describe-field"><div class="describe-label">Purpose</div>';
  h += '<div class="describe-value">Enable secure multi-user access to the Bonsai workspace with appropriate permission boundaries.</div></div>';
  h += '<div class="describe-field"><div class="describe-label">Success Criteria</div>';
  h += '<div class="describe-value">Users can sign up, log in, and have persistent sessions. Admin users can manage others. Regular users have restricted access. All endpoints enforce RBAC.</div></div>';
  h += '<div class="describe-completed"><span>✓</span> Description complete</div>';
  h += '</div>';
  return h;
}

function renderDiffLines(diffArr) {
  return diffArr.map(d => {
    if (d.type === 'hunk') return `<div class="diff-line hunk">${esc(d.text)}</div>`;
    const lnHtml = d.ln ? `<span class="ln">${d.ln}</span>` : '';
    return `<div class="diff-line ${d.type}">${lnHtml}${esc(d.text)}</div>`;
  }).join('');
}

function renderFocusedSpecify() {
  const sel = specDiffs[selectedDiffIdx];
  const isApproved = approvedSet.has(sel.id);

  let h = '<div class="specify-layout">';

  // Left: diff list
  h += '<div class="diff-list">';
  h += '<div class="diff-list-header">Spec Diffs</div>';
  h += '<div class="diff-list-items">';
  specDiffs.forEach((d, i) => {
    const active = i === selectedDiffIdx;
    const diffApproved = approvedSet.has(d.id);
    const badge = diffApproved ? 'approved' : d.badge;
    const hasQ = d.hasQuestion && !answeredMap[d.id] && !diffApproved;
    h += `<div class="diff-item${active ? ' active' : ''}" onclick="selectedDiffIdx=${i}; render();">`;
    h += `<div class="diff-item-icon ${d.iconCls}">${d.iconChar}</div>`;
    h += '<div class="diff-item-info">';
    h += `<div class="diff-item-name">${esc(d.title)}</div>`;
    if (hasQ) h += '<div class="diff-item-question">? Decision needed</div>';
    h += '</div>';
    h += `<span class="diff-item-badge ${badge}">${badge}</span>`;
    h += '</div>';
  });
  h += '</div>'; // diff-list-items

  // Progress
  const ac = approvedCount();
  const td = totalDiffs();
  h += '<div class="diff-list-progress">';
  h += `Progress: ${ac}/${td} approved`;
  h += `<div class="progress-bar"><div class="progress-fill" style="width:${td ? (ac/td*100) : 0}%"></div></div>`;
  h += '</div>';

  h += '</div>'; // diff-list

  // Right: diff viewer + bottom bar area (column fills remaining space)
  h += '<div class="diff-viewer">';
  if (sel.type === 'diff') {
    h += '<div class="diff-viewer-toolbar">';
    h += `<span class="diff-viewer-path">${esc(sel.path)}</span>`;
    h += `<span class="diff-viewer-op ${sel.op}">${sel.op}</span>`;
    h += `<span class="diff-viewer-stats"><span class="add">+${sel.add}</span><span class="del">${sel.del > 0 ? '-' + sel.del : ''}</span></span>`;
    h += '</div>';
    h += '<div class="diff-viewer-content">';
    h += renderDiffLines(sel.diff);
    if (isApproved) {
      h += '<div class="approved-overlay"><div class="approved-stamp">APPROVED</div></div>';
    }
    h += '</div>';
  } else {
    // Doc-type content
    h += '<div class="diff-viewer-toolbar">';
    h += `<span class="diff-viewer-path">${esc(sel.path)}</span>`;
    h += `<span class="diff-item-badge ${sel.badge}">${sel.badge}</span>`;
    h += '</div>';
    h += `<div class="doc-content">${sel.html}</div>`;
  }

  // Inline agent notes and decision cards (contextual, not chat)
  h += renderInlineNotes(sel);

  // Bottom bar: action buttons + note input
  h += renderBottomBar(sel, isApproved);

  h += '</div>'; // diff-viewer
  h += '</div>'; // specify-layout
  return h;
}

function renderInlineNotes(sel) {
  const msgs = sel.msgs || [];
  const isApproved = approvedSet.has(sel.id);

  let h = '<div class="inline-notes">';

  // Render agent notes and tool use as subtle cards
  msgs.forEach(m => {
    if (m.r === 'tool') {
      h += '<div class="agent-note">';
      h += '<div class="agent-note-icon tool">&gt;</div>';
      h += `<div class="agent-note-text">${esc(m.t)}</div>`;
      h += '</div>';
    } else if (m.r === 'agent') {
      h += '<div class="agent-note">';
      h += '<div class="agent-note-icon info">i</div>';
      h += `<div class="agent-note-text">${m.t}</div>`;
      h += '</div>';
    } else if (m.r === 'status') {
      h += '<div class="agent-note">';
      h += '<div class="agent-note-icon status">&#10003;</div>';
      h += `<div class="agent-note-text">${m.t}</div>`;
      h += '</div>';
    }
  });

  // Decision card — contextual, prominent with question styling
  if (sel.hasQuestion && !answeredMap[sel.id] && !isApproved) {
    h += '<div class="decision-card">';
    h += '<div class="decision-label"><span class="decision-label-icon">?</span> Design Decision</div>';
    h += `<div class="decision-text">${sel.question.text}</div>`;
    h += '<div class="decision-opts">';
    sel.question.opts.forEach((o, i) => {
      h += `<button class="decision-btn${i === sel.question.recIdx ? ' rec' : ''}" onclick="answerDecision('${sel.id}',${i})">${esc(o)}${i === sel.question.recIdx ? ' ★' : ''}</button>`;
    });
    h += '</div>';
    h += `<div class="decision-hint">${sel.question.hint}</div>`;
    h += '</div>';
  } else if (answeredMap[sel.id]) {
    h += '<div class="decision-card resolved">';
    h += `<div class="decision-answered"><span>&#10003;</span> ${esc(answeredMap[sel.id])}</div>`;
    h += '</div>';
  }

  h += '</div>';
  return h;
}

function renderBottomBar(sel, isApproved) {
  let h = '<div class="bottom-bar">';
  h += '<div class="bottom-input-wrap">';

  // Action buttons first
  if (sel.type === 'diff' && !isApproved) {
    h += `<button class="action-btn primary" onclick="approveDiff('${sel.id}')">Approve</button>`;
    h += `<button class="action-btn secondary" onclick="requestChanges('${sel.id}')">Request Changes</button>`;
    h += '<span class="bottom-bar-sep"></span>';
  } else if (isApproved) {
    h += '<span class="bottom-approved-label"><span>&#10003;</span> Approved</span>';
    h += '<span class="bottom-bar-sep"></span>';
  }

  // Simple note input (not a full chat)
  h += `<input class="note-input" placeholder="Add a note..." onkeydown="if(event.key==='Enter'){addNote(this.value);this.value='';}" />`;

  h += '</div>';
  h += '</div>';
  return h;
}

function renderFocusedPlan() {
  // If viewing a file diff, show the diff viewer instead
  if (planDiffView) {
    return renderPlanDiffView();
  }

  const allDone = planSteps.every(s => s.status === 'done');
  const anyRunning = planSteps.some(s => s.status === 'running');
  const total = planSteps.length;

  let h = '';

  // Execute All button at top
  h += '<div class="plan-execute-all-wrap">';
  if (allDone) {
    h += '<button class="plan-execute-all-btn" disabled><span class="btn-icon">&#10003;</span> All Steps Complete</button>';
  } else if (anyRunning || executeAllInProgress) {
    h += '<button class="plan-execute-all-btn" disabled><span class="btn-icon">&#8635;</span> Executing...</button>';
  } else {
    h += `<button class="plan-execute-all-btn" onclick="executeAllPlanSteps()"><span class="btn-icon">&#9654;</span> Execute All (${total} steps)</button>`;
  }
  h += `<div class="plan-execute-all-progress" id="execute-all-progress">${executeAllProgressMsg}</div>`;
  h += '</div>';

  // Overall progress bar
  const doneCount = planSteps.filter(s => s.status === 'done').length;
  const totalSteps = planSteps.length;
  if (doneCount > 0) {
    h += '<div class="plan-progress-wrap">';
    h += `<div class="plan-progress-label">${doneCount}/${totalSteps} steps complete</div>`;
    h += `<div class="progress-bar"><div class="progress-fill" style="width:${(doneCount/totalSteps*100)}%"></div></div>`;
    h += '</div>';
  }

  h += '<div class="plan-content">';
  planSteps.forEach((s, i) => {
    const cls = s.status === 'done' ? ' done' : s.status === 'running' ? ' running' : '';
    h += `<div class="plan-step${cls}">`;
    h += `<div class="plan-num">${s.status === 'done' ? '&#10003;' : (i + 1)}</div>`;
    h += '<div class="plan-info">';
    h += `<div class="plan-title">${esc(s.title)}${s.status === 'done' ? ' <span class="plan-done-tag">Done</span>' : s.status === 'running' ? ' <span class="plan-running-tag">Running...</span>' : ''}</div>`;
    h += `<div class="plan-desc">${esc(s.desc)}</div>`;
    // Changed files for done steps — now CLICKABLE
    if (s.status === 'done' && s.changedFiles && s.changedFiles.length > 0) {
      const isExpanded = expandedFiles[i];
      h += `<div class="plan-changed-files">`;
      h += `<div class="plan-changed-toggle" onclick="event.stopPropagation(); toggleFiles(${i})">`;
      h += `<span class="plan-changed-arrow">${isExpanded ? '&#9660;' : '&#9654;'}</span> Changed files (${s.changedFiles.length}):`;
      h += '</div>';
      if (isExpanded) {
        h += '<div class="plan-changed-list">';
        s.changedFiles.forEach(f => {
          const opCls = f.op === '+' ? 'file-added' : 'file-modified';
          const hasCodeDiff = planFileDiffs[f.path];
          if (hasCodeDiff) {
            h += `<div class="plan-changed-item ${opCls} clickable" onclick="event.stopPropagation(); openPlanDiff(${i}, '${esc(f.path)}')"><span class="plan-changed-op">${f.op}</span> ${esc(f.path)}</div>`;
          } else {
            h += `<div class="plan-changed-item ${opCls}"><span class="plan-changed-op">${f.op}</span> ${esc(f.path)}</div>`;
          }
        });
        h += '</div>';
      }
      h += '</div>';
    }
    h += '</div>';
    const btnLabel = s.status === 'running' ? 'Running...' : s.status === 'done' ? '' : 'Execute &#9654;';
    if (s.status !== 'done') {
      h += `<button class="plan-execute-btn" onclick="executePlanStep(${i})"${executeAllInProgress ? ' disabled' : ''}>${btnLabel}</button>`;
    }
    h += '</div>';

    // Inline agent note after done step
    if (s.status === 'done' && planStepNotes[i]) {
      h += `<div class="plan-agent-note"><span style="flex-shrink:0;color:var(--accent);">i</span> ${planStepNotes[i]}</div>`;
    }
  });

  // Verification card — appears when all steps are done
  if (allDone) {
    h += renderVerificationCard();
  }

  h += '</div>';
  return h;
}

function renderPlanDiffView() {
  const { stepIdx, filePath } = planDiffView;
  const step = planSteps[stepIdx];
  const fileDiff = planFileDiffs[filePath];
  if (!fileDiff) { planDiffView = null; return renderFocusedPlan(); }

  const fileEntry = step.changedFiles.find(f => f.path === filePath);
  const opLabel = fileEntry && fileEntry.op === '+' ? 'new' : 'modified';

  let h = '<div class="plan-diff-viewer">';

  // Back button + context
  h += '<div class="plan-diff-back">';
  h += '<button class="plan-diff-back-btn" onclick="closePlanDiff()">&larr; Back to steps</button>';
  h += `<span class="plan-diff-back-step">Step ${stepIdx + 1}: ${esc(step.title)}</span>`;
  h += '</div>';

  // File toolbar
  h += '<div class="plan-diff-toolbar">';
  h += `<span class="plan-diff-path">${esc(filePath)}</span>`;
  h += `<span class="plan-diff-op ${opLabel}">${opLabel}</span>`;
  h += '</div>';

  // Diff content
  h += '<div class="plan-diff-content">';
  h += renderDiffLines(fileDiff.lines);
  h += '</div>';

  // Agent note below the diff
  if (planStepNotes[stepIdx]) {
    h += '<div class="inline-notes" style="padding-bottom:10px;">';
    h += '<div class="agent-note">';
    h += '<div class="agent-note-icon info">i</div>';
    h += `<div class="agent-note-text">${planStepNotes[stepIdx]}</div>`;
    h += '</div>';
    h += '</div>';
  }

  h += '</div>';
  return h;
}

function renderVerificationCard() {
  let h = '<div class="verification-card">';
  h += '<div class="verification-card-header">';
  h += '<span class="v-label">optional</span>';
  h += 'Verification';
  h += '</div>';

  if (verificationState === 'idle') {
    h += '<div class="verification-card-desc">Run spec-review to verify specs match code.</div>';
    h += '<button class="verification-btn" onclick="runVerification()">Run Verification</button>';
  } else if (verificationState === 'running') {
    h += '<div class="verification-card-desc" style="color:var(--yellow);">Verifying...</div>';
    h += '<button class="verification-btn" disabled>Running...</button>';
  } else {
    h += '<div class="verification-result"><span>&#10003;</span> All specs aligned.</div>';
  }

  h += '</div>';
  return h;
}

function renderFocusedContent(phaseId) {
  let h = '<div class="col-focused-inner">';
  // Header
  h += '<div class="focused-header">';
  h += '<div class="focused-phase-dot"></div>';
  h += `<span class="focused-phase-name">${phases.find(p => p.id === phaseId).name}</span>`;

  // Status label
  const status = getPhaseStatus(phaseId);
  if (status === 'done') h += '<span class="focused-status-label">Completed</span>';
  else if (status === 'active') h += '<span class="focused-status-label">In Progress</span>';
  else h += '<span class="focused-status-label">Pending</span>';

  h += '</div>';

  // Phase-specific content
  if (phaseId === 'describe') h += renderFocusedDescribe();
  else if (phaseId === 'specify') h += renderFocusedSpecify();
  else if (phaseId === 'plan') h += renderFocusedPlan();

  // Ticket notes section — always present at the bottom of focused column
  h += renderTicketNotes();

  h += '</div>';
  return h;
}

function renderTicketNotes() {
  let h = '<div class="ticket-notes">';
  h += '<div class="ticket-notes-label">Ticket Notes</div>';

  // Show existing notes
  ticketNotes.forEach(n => {
    h += `<div class="ticket-note-card"><span class="note-author">${esc(n.author)}:</span> ${esc(n.text)}</div>`;
  });

  // Input for adding new notes
  h += `<textarea class="ticket-notes-input" placeholder="Add a note about this ticket..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();addTicketNote(this.value);this.value='';}"></textarea>`;
  h += '</div>';
  return h;
}

function addTicketNote(text) {
  if (!text || !text.trim()) return;
  ticketNotes.push({ author: 'You', text: text.trim() });
  render();
  showToast('Ticket note added', 'success');
}

// ── Main render ────────────────────────────────────────────────

function render() {
  const container = document.getElementById('columns');

  container.innerHTML = phases.map(p => {
    const isFocused = focusedPhase === p.id;
    const isCollapsed = focusedPhase && focusedPhase !== p.id;

    const classes = ['col', 'phase-' + p.status];
    if (isFocused) classes.push('focused');
    if (isCollapsed) classes.push('collapsed');

    let h = `<div class="${classes.join(' ')}" id="col-${p.id}"${isCollapsed ? ` onclick="focusPhase('${p.id}')"` : ''}>`;

    // Always render collapsed interior (hidden via CSS when not collapsed)
    h += renderCollapsedColumn(p);

    // Focused content
    if (isFocused) {
      h += renderFocusedContent(p.id);
    }

    // Default (no phase focused) - not used currently but kept for completeness
    if (!focusedPhase) {
      h += renderDefaultColumn(p);
    }

    h += '</div>';
    return h;
  }).join('');

  // No post-render focus management needed
}

// ── Interactions ───────────────────────────────────────────────

function focusPhase(phaseId) {
  if (focusedPhase === phaseId) return; // already focused
  focusedPhase = phaseId;
  planDiffView = null;
  render();
}

function answerDecision(diffId, idx) {
  const diff = specDiffs.find(d => d.id === diffId);
  if (!diff || !diff.question) return;

  const answer = diff.question.opts[idx];
  answeredMap[diffId] = answer;

  // Update the diff line
  if (diffId === 'auth-readme') {
    const stratLine = diff.diff.find(d => d.id === 'strat-line');
    if (stratLine) {
      stratLine.text = '+## Authentication Strategy — JWT';
    }
    const pendingLine = diff.diff.find(d => d.text.includes('[Pending'));
    if (pendingLine) {
      pendingLine.text = '+JWT-based authentication with access/refresh token pairs';
    }
  }

  render();
  showToast('Decision recorded — spec updated', 'success');

  // Agent status note appears after a short delay
  setTimeout(() => {
    const responses = {
      0: 'Updated section 3 with JWT strategy — access tokens (15min TTL) + refresh tokens (7d).',
      1: 'Updated the spec to use server-side sessions with secure cookies.',
      2: 'Specified JWT for API access and secure session cookies for browser UI.'
    };
    diff.msgs.push({ r: 'status', t: responses[idx] || 'Spec updated.' });
    render();
  }, 800);
}

function addNote(text) {
  if (!text || !text.trim()) return;
  const sel = specDiffs[selectedDiffIdx];
  if (!sel) return;
  // Notes are not chat — just store and show a toast
  showToast('Note added: "' + text.trim().substring(0, 40) + (text.trim().length > 40 ? '...' : '') + '"', 'success');
}

function openPlanDiff(stepIdx, filePath) {
  planDiffView = { stepIdx, filePath };
  render();
}

function closePlanDiff() {
  planDiffView = null;
  render();
}

function runVerification() {
  verificationState = 'running';
  render();
  setTimeout(() => {
    verificationState = 'done';
    render();
    showToast('Verification complete — all specs aligned', 'success');
  }, 1800);
}

function approveDiff(diffId) {
  approvedSet.add(diffId);
  showToast(specDiffs.find(d => d.id === diffId).title + ' approved', 'success');

  // Auto-advance to next unapproved diff
  const nextIdx = specDiffs.findIndex(d => d.type === 'diff' && !approvedSet.has(d.id));
  if (nextIdx >= 0) {
    setTimeout(() => {
      selectedDiffIdx = nextIdx;
      render();
    }, 300);
  } else {
    // All diffs approved! Transition to Plan phase
    setTimeout(() => {
      phases[1].status = 'done';   // Specify done
      phases[2].status = 'active'; // Plan active
      focusedPhase = 'plan';
      render();
      showToast('All specs approved! Moving to Plan phase...', 'success');
    }, 600);
  }

  render();
}

function requestChanges(diffId) {
  const diff = specDiffs.find(d => d.id === diffId);
  diff.msgs.push({ r: 'agent', t: 'Ready to revise this spec. Add a note below describing what to change.' });
  render();
  showToast('Request changes — add a note describing what to change', '');
}

function toggleFiles(idx) {
  expandedFiles[idx] = !expandedFiles[idx];
  render();
}

function executePlanStep(idx) {
  if (planSteps[idx].status !== 'pending') return;
  planSteps[idx].status = 'running';
  render();
  showToast('Executing: ' + planSteps[idx].title, 'success');

  // Simulate completion
  setTimeout(() => {
    planSteps[idx].status = 'done';
    expandedFiles[idx] = true;  // Auto-expand changed files on completion
    render();
    showToast(planSteps[idx].title + ' — complete', 'success');

    // Check if all done
    if (!executeAllInProgress && planSteps.every(s => s.status === 'done')) {
      setTimeout(() => {
        phases[2].status = 'done';
        render();
        showToast('All plan steps executed!', 'success');
      }, 500);
    }
  }, 1500);
}

function executeAllPlanSteps() {
  if (executeAllInProgress) return;
  if (planSteps.every(s => s.status === 'done')) return;

  executeAllInProgress = true;
  const total = planSteps.length;
  const pendingIndices = [];

  // Collect all non-done steps in order
  planSteps.forEach((s, i) => {
    if (s.status !== 'done') pendingIndices.push(i);
  });

  if (pendingIndices.length === 0) {
    executeAllInProgress = false;
    return;
  }

  let step = 0;

  function processNext() {
    if (step >= pendingIndices.length) {
      // All steps finished
      executeAllInProgress = false;
      executeAllProgressMsg = '';
      showToast('All steps executed!', 'success');

      setTimeout(() => {
        phases[2].status = 'done';
        render();
      }, 500);
      return;
    }

    const idx = pendingIndices[step];
    const stepNum = step + 1;
    const totalPending = pendingIndices.length;

    // Mark as executing (yellow/running)
    planSteps[idx].status = 'running';
    executeAllProgressMsg = `Executing step ${stepNum} of ${totalPending}...`;
    render();

    // After delay, mark as done and move to next
    setTimeout(() => {
      planSteps[idx].status = 'done';
      expandedFiles[idx] = true;
      render();
      step++;

      // Small pause before starting next step
      setTimeout(processNext, 200);
    }, 400);
  }

  processNext();
}

// ── Initial render ─────────────────────────────────────────────
render();
</script>
</body>
</html>
