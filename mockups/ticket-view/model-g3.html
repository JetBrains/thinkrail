<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G3: Advanced Mode Toggle — Bonsai Ticket View</title>
<style>
  :root {
    --bg: #0e1117; --surface: #161b22; --elevated: #1c2129; --hover: #242b35; --inset: #0d1117;
    --border: #2d333b; --border-bright: #3d444d;
    --text: #e6edf3; --text-sec: #8b949e; --text-dim: #656d76;
    --accent: #58a6ff; --accent-sub: #1f3a5f;
    --green: #3fb950; --green-sub: #1a3a2a;
    --yellow: #d29922; --yellow-sub: #3d2e00;
    --purple: #bc8cff; --purple-sub: #2a1f3d;
    --red: #f85149; --red-sub: #3d1418;
    --r: 8px; --rl: 12px;
    --mono: 'SF Mono','Cascadia Code','Consolas',monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
    height: 100vh; display: flex; flex-direction: column; overflow: hidden;
  }

  /* -- Back link + model tag -- */
  .back-link {
    position: fixed; top: 8px; right: 16px; z-index: 500;
    font-size: 12px; color: var(--text-dim); text-decoration: none;
    padding: 4px 12px; border-radius: 6px;
    background: var(--elevated); border: 1px solid var(--border);
    transition: all 0.15s;
  }
  .back-link:hover { color: var(--accent); border-color: var(--accent); }
  .model-tag {
    position: fixed; top: 8px; right: 140px; z-index: 500;
    font-size: 10px; font-weight: 600; color: var(--purple);
    background: var(--purple-sub); padding: 4px 10px; border-radius: 100px;
  }

  /* -- Animations -- */
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes dotPulse { 0%,80%,100%{ opacity:0.3; transform:scale(0.8); } 40%{ opacity:1; transform:scale(1); } }
  @keyframes checkPop { 0%{transform:scale(0)} 60%{transform:scale(1.3)} 100%{transform:scale(1)} }
  @keyframes slideInRight { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  @keyframes progressPulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
  @keyframes progressStripe { 0% { background-position: 0 0; } 100% { background-position: 20px 0; } }
  @keyframes codeLineIn { from { opacity: 0; transform: translateX(-4px); } to { opacity: 1; transform: translateX(0); } }
  .fade-in { animation: fadeIn 0.35s ease both; }

  /* -- Controls bar -- */
  .controls {
    height: 36px; min-height: 36px;
    background: var(--surface); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 20px; gap: 12px;
    flex-shrink: 0; z-index: 20;
  }
  .ctrl-btn {
    padding: 3px 14px; border-radius: 6px; font-size: 12px; font-weight: 600;
    cursor: pointer; border: 1px solid var(--border); background: var(--elevated);
    color: var(--text-sec); transition: all 0.15s; font-family: inherit;
  }
  .ctrl-btn:hover { border-color: var(--accent); color: var(--accent); }
  .ctrl-btn.playing { background: var(--accent-sub); border-color: var(--accent); color: var(--accent); }
  .step-counter { font-size: 12px; color: var(--text-dim); font-family: var(--mono); }
  .progress-track {
    flex: 1; max-width: 300px; height: 4px; background: var(--elevated);
    border-radius: 2px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; width: 0%; background: var(--accent);
    border-radius: 2px; transition: width 0.3s ease;
  }
  .kbd-hint { font-size: 10px; color: var(--text-dim); margin-left: auto; }
  .kbd-hint kbd {
    display: inline-block; padding: 1px 5px; border-radius: 3px; font-family: var(--mono);
    background: var(--elevated); border: 1px solid var(--border); font-size: 10px;
  }

  /* -- Status bar -- */
  .status-bar {
    min-height: 40px;
    background: var(--surface); border-bottom: 1px solid var(--border);
    display: flex; flex-direction: column; justify-content: center;
    padding: 0 20px;
    flex-shrink: 0;
    transition: min-height 0.15s ease;
  }
  .status-bar-main {
    display: flex; align-items: center; gap: 12px;
    height: 40px; min-height: 40px;
  }
  .ticket-id {
    font-family: var(--mono); font-size: 12px; color: var(--accent);
    background: var(--accent-sub); padding: 2px 8px; border-radius: 4px; font-weight: 600;
  }
  .sb-sep { width: 1px; height: 18px; background: var(--border); }
  .ticket-title { font-size: 13px; font-weight: 600; color: var(--text); }
  .sb-spacer { flex: 1; }
  .phase-dots { display: flex; gap: 4px; align-items: center; }
  .phase-dot {
    font-size: 12px; font-weight: 500; display: flex; align-items: center; gap: 5px;
    padding: 4px 10px; border-radius: 6px; cursor: default;
    border: 1px solid transparent;
    transition: all 0.3s ease;
    position: relative;
  }
  .phase-dot .dot {
    display: inline-block; width: 7px; height: 7px; border-radius: 50%;
    transition: all 0.3s ease; flex-shrink: 0;
  }
  .phase-dot .dot.pending { background: var(--text-dim); opacity: 0.35; }
  .phase-dot .dot.active { background: var(--accent); box-shadow: 0 0 6px rgba(88,166,255,0.4); }
  .phase-dot .dot.done { background: var(--green); }
  .phase-dot .label { font-size: 11px; color: var(--text-dim); transition: color 0.3s; }
  .phase-dot .label.active { color: var(--accent); font-weight: 600; }
  .phase-dot .label.done { color: var(--green); }
  .phase-dot.is-active { background: var(--accent-sub); border-color: rgba(88,166,255,0.2); }
  .phase-dot .check {
    display: none; color: var(--green); font-size: 11px; font-weight: 700;
  }
  .phase-dot.is-done .dot { display: none; }
  .phase-dot.is-done .check { display: inline; animation: checkPop 0.3s ease; }
  .phase-sep { color: var(--text-dim); opacity: 0.3; font-size: 10px; margin: 0 2px; }

  /* -- Mode toggle (Standard / Advanced) -- */
  .mode-toggle {
    display: flex; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; margin-left: 12px;
  }
  .mode-btn {
    font-size: 10px; font-weight: 600; padding: 3px 10px;
    background: transparent; border: none; color: var(--text-dim);
    cursor: pointer; transition: all 0.15s; font-family: inherit;
  }
  .mode-btn.active { background: var(--accent-sub); color: var(--accent); }
  .mode-btn:hover { color: var(--text-sec); }

  /* -- Advanced-only elements: hidden by default, shown in advanced mode -- */
  .advanced-only { display: none !important; }
  body.advanced-mode .advanced-only { display: flex !important; }
  body.advanced-mode .advanced-only-block { display: block !important; }
  body.advanced-mode .advanced-only-inline { display: inline !important; }

  /* -- Status bar metadata line (advanced) -- */
  .status-bar-meta { display: none !important; height: 28px; align-items: center; gap: 10px; font-size: 11px; color: var(--text-dim); font-family: var(--mono); padding-bottom: 4px; border-top: 1px solid rgba(45,51,59,0.5); margin-top: -2px; }
  body.advanced-mode .status-bar-meta { display: flex !important; }
  .meta-item { display: flex; align-items: center; gap: 4px; }
  .meta-item .meta-val { color: var(--text-sec); }
  .meta-sep { width: 1px; height: 12px; background: var(--border); opacity: 0.5; }

  /* -- Phase detail popover (advanced hover) -- */
  .phase-popover { display: none; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); margin-top: 6px; z-index: 200; background: var(--elevated); border: 1px solid var(--border-bright); border-radius: var(--r); padding: 12px 16px; min-width: 240px; font-size: 12px; color: var(--text-sec); line-height: 1.7; box-shadow: 0 8px 24px rgba(0,0,0,0.4); pointer-events: none; }
  .phase-popover .pop-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--accent); margin-bottom: 6px; border-bottom: 1px solid var(--border); padding-bottom: 4px; }
  .phase-popover .pop-row { display: flex; justify-content: space-between; gap: 12px; }
  .phase-popover .pop-label { color: var(--text-dim); }
  .phase-popover .pop-val { color: var(--text); font-family: var(--mono); font-size: 11px; }
  body.advanced-mode .phase-dot:hover .phase-popover { display: block; }

  /* -- Artifact trail strip -- */
  .trail-strip { height: 0; min-height: 0; opacity: 0; overflow: hidden; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; flex-direction: column; justify-content: center; padding: 0 20px; overflow-x: auto; transition: height 0.35s cubic-bezier(0.4,0,0.2,1), min-height 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.35s ease; flex-shrink: 0; }
  .trail-strip.visible { height: 36px; min-height: 36px; opacity: 1; overflow-x: auto; }
  body.advanced-mode .trail-strip.visible { height: 52px; min-height: 52px; }
  .trail-strip::-webkit-scrollbar { height: 3px; }
  .trail-strip-main { display: flex; align-items: center; gap: 6px; min-height: 36px; }
  .trail-strip-meta { display: none !important; align-items: center; gap: 6px; font-size: 10px; color: var(--text-dim); font-family: var(--mono); padding-bottom: 4px; min-height: 16px; overflow-x: auto; white-space: nowrap; }
  body.advanced-mode .trail-strip-meta { display: flex !important; }

  .trail-sep {
    font-size: 9px; color: var(--text-dim); opacity: 0.4; margin: 0 4px;
    align-self: center;
  }
  .trail-label {
    font-size: 9px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.06em; color: var(--text-dim); opacity: 0.6;
    white-space: nowrap; align-self: center; margin-right: 2px;
  }
  .trail-chip { font-size: 11px; padding: 3px 10px; border-radius: 6px; background: var(--elevated); border: 1px solid var(--border); color: var(--text-sec); cursor: pointer; white-space: nowrap; display: flex; align-items: center; gap: 5px; transition: all 0.15s; border-left: 2px solid var(--border); animation: fadeIn 0.3s ease both; }
  .trail-chip:hover { border-color: var(--accent); color: var(--text); border-left-color: var(--accent); }
  .trail-chip.active { border-color: var(--accent); background: var(--accent-sub); color: var(--accent); border-left-color: var(--accent); }
  .trail-chip.approved { color: var(--green); border-left-color: var(--green); }
  .trail-chip.approved::after { content: ' \2713'; font-size: 10px; }
  /* Artifact categories */
  .trail-chip.cat-ticket { border-left-color: var(--purple); }
  .trail-chip.cat-ticket:hover { border-left-color: var(--purple); }
  .trail-chip.cat-ticket.approved { border-left-color: var(--green); }
  .trail-chip.cat-spec { border-left-color: var(--yellow); }
  .trail-chip.cat-spec:hover { border-left-color: var(--yellow); }
  .trail-chip.cat-spec.approved { border-left-color: var(--green); }
  .trail-chip.cat-plan { border-left-color: var(--accent); }
  .trail-chip .chip-icon { font-size: 10px; opacity: 0.7; }

  /* -- Main area -- */
  .main-area { flex: 1; display: flex; overflow: hidden; position: relative; }

  /* -- Conversation panel -- */
  .conversation {
    flex: 1; display: flex; flex-direction: column; overflow: hidden;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .conv-scroll {
    flex: 1; overflow-y: auto; padding: 24px 20px;
    scroll-behavior: smooth;
  }
  .conv-inner {
    max-width: 650px; margin: 0 auto;
    transition: max-width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }
  body.split-mode .conv-inner { max-width: none; }
  .conv-inner > * + * { margin-top: 16px; }

  /* -- Messages -- */
  .msg {
    padding: 8px 0 8px 16px; font-size: 14px; line-height: 1.6;
    animation: fadeIn 0.35s ease both;
  }
  .msg.agent { border-left: 2px solid var(--accent); color: var(--text-sec); }
  .msg.user { border-left: 2px solid var(--purple); color: var(--text); font-weight: 500; }
  .msg strong { color: var(--text); font-weight: 600; }
  .msg code { font-family: var(--mono); font-size: 12px; background: var(--elevated); padding: 2px 6px; border-radius: 4px; }
  .msg .arrow-hint { color: var(--accent); font-size: 13px; }

  /* -- Typing indicator -- */
  .typing-indicator {
    padding: 8px 0 8px 16px; border-left: 2px solid var(--accent);
    display: flex; gap: 4px; align-items: center; height: 34px;
    animation: fadeIn 0.2s ease both;
  }
  .typing-indicator .dot {
    width: 6px; height: 6px; border-radius: 50%; background: var(--text-dim);
    animation: dotPulse 1.4s ease-in-out infinite;
  }
  .typing-indicator .dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator .dot:nth-child(3) { animation-delay: 0.4s; }

  /* -- Decision cards -- */
  .decision-card { border: 1px solid var(--border-bright); border-radius: var(--r); background: var(--surface); overflow: hidden; animation: fadeIn 0.35s ease both; }
  .decision-card.resolved { border-color: var(--border); background: transparent; padding: 8px 16px; }
  .dc-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--yellow); padding: 8px 14px 0; }
  .dc-q { font-size: 13px; color: var(--text); padding: 6px 14px; font-weight: 500; }
  .dc-opts { padding: 4px 14px 10px; display: flex; gap: 8px; flex-wrap: wrap; }
  .dc-opt { padding: 6px 14px; border-radius: 6px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid var(--border); background: var(--elevated); color: var(--text-sec); transition: all 0.15s; font-family: inherit; }
  .dc-opt:hover { border-color: var(--accent); color: var(--text); background: var(--hover); }
  .dc-opt.recommended { border-color: var(--accent); color: var(--accent); background: var(--accent-sub); }
  .dc-opt.recommended:hover { background: rgba(88,166,255,0.2); }
  .dc-hint { font-size: 11px; color: var(--text-dim); padding: 0 14px 10px; font-style: italic; }
  .dc-resolved { font-size: 13px; color: var(--green); font-weight: 500; }

  /* -- Inline artifact card (clickable) -- */
  .artifact-card { border: 1px solid var(--border); border-radius: var(--r); background: var(--surface); overflow: hidden; animation: fadeIn 0.35s ease both; cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s; position: relative; }
  .artifact-card:hover { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent-sub); }
  .artifact-card .card-peek-hint { position: absolute; top: 10px; right: 12px; font-size: 10px; color: var(--accent); opacity: 0; transition: opacity 0.15s; pointer-events: none; }
  .artifact-card:hover .card-peek-hint { opacity: 1; }
  .ac-header { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--accent); padding: 10px 14px; background: var(--elevated); border-bottom: 1px solid var(--border); }
  .ac-body { padding: 14px; font-size: 13px; color: var(--text-sec); line-height: 1.7; }
  .ac-body strong { color: var(--text); }

  /* -- Progress card -- */
  .progress-card {
    border: 1px solid var(--border); border-radius: var(--r);
    background: var(--surface); overflow: hidden; padding: 14px;
    animation: fadeIn 0.35s ease both;
  }
  .pc-step {
    font-size: 13px; line-height: 1.8; font-family: var(--mono);
    display: flex; align-items: center; gap: 8px;
  }
  .pc-step.done { color: var(--green); }
  .pc-step.running { color: var(--accent); }
  .pc-step.running .pc-icon { animation: progressPulse 1.2s infinite; }
  .pc-step.pending { color: var(--text-dim); }
  .pc-icon { width: 16px; text-align: center; flex-shrink: 0; }

  /* -- Artifact panel (right side) -- */
  .artifact-panel { width: 0; min-width: 0; overflow: hidden; background: var(--bg); border-left: 1px solid var(--border); display: flex; flex-direction: column; transition: width 0.4s cubic-bezier(0.4,0,0.2,1), min-width 0.4s cubic-bezier(0.4,0,0.2,1), opacity 0.3s ease; opacity: 0; }
  body.split-mode .artifact-panel { width: 55%; min-width: 55%; opacity: 1; }
  body.split-mode .conversation { flex: 0 0 45%; }
  .ap-header { padding: 12px 16px; border-bottom: 1px solid var(--border); background: var(--surface); display: flex; flex-direction: column; gap: 0; min-height: 48px; }
  .ap-header-main { display: flex; align-items: center; gap: 10px; min-height: 24px; }
  .ap-badge {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    padding: 2px 7px; border-radius: 4px; letter-spacing: 0.5px;
  }
  .ap-badge.new { background: var(--green-sub); color: var(--green); }
  .ap-badge.modified { background: var(--yellow-sub); color: var(--yellow); }
  .ap-badge.doc { background: var(--purple-sub); color: var(--purple); }
  .ap-badge.spec { background: var(--yellow-sub); color: var(--yellow); }
  .ap-badge.exec { background: var(--accent-sub); color: var(--accent); }
  .ap-path { font-size: 13px; font-family: var(--mono); color: var(--text); font-weight: 500; }
  .ap-stats { font-size: 11px; color: var(--text-dim); margin-left: auto; }
  .ap-stats .stat-add { color: var(--green); }
  .ap-stats .stat-del { color: var(--red); }

  /* -- Artifact metadata bar (advanced) -- */
  .ap-meta-bar { display: none !important; align-items: center; gap: 8px; font-size: 10px; color: var(--text-dim); font-family: var(--mono); padding-top: 6px; border-top: 1px solid rgba(45,51,59,0.4); margin-top: 6px; }
  body.advanced-mode .ap-meta-bar { display: flex !important; }
  .ap-meta-bar .ameta-item { display: flex; align-items: center; gap: 3px; }
  .ap-meta-bar .ameta-val { color: var(--text-sec); }
  .ap-meta-bar .ameta-sep { width: 1px; height: 10px; background: var(--border); opacity: 0.5; }

  /* -- Close/back button for peek mode -- */
  .ap-close { margin-left: auto; cursor: pointer; font-size: 14px; color: var(--text-dim); background: none; border: 1px solid var(--border); border-radius: 4px; padding: 2px 8px; font-family: inherit; transition: all 0.15s; display: none; }
  .ap-close:hover { color: var(--text); border-color: var(--border-bright); }
  body.peek-mode .ap-close { display: inline-flex; align-items: center; gap: 4px; }
  .ap-body { flex: 1; overflow-y: auto; }

  /* -- Diff view -- */
  .diff-view { font-family: var(--mono); font-size: 12px; line-height: 1.7; }
  .diff-hunk-header {
    color: var(--purple); background: var(--purple-sub);
    padding: 4px 16px; font-size: 11px;
    border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
  }
  .diff-line { padding: 0 16px; white-space: pre-wrap; }
  .diff-line.add { background: rgba(63,185,80,0.08); color: var(--green); }
  .diff-line.del { background: rgba(248,81,73,0.08); color: var(--red); }
  .diff-line.ctx { color: var(--text-dim); }
  .diff-line .ln {
    display: inline-block; width: 32px; color: var(--text-dim);
    text-align: right; margin-right: 12px; user-select: none; opacity: 0.5;
  }

  /* -- Document preview (product design) -- */
  .doc-preview {
    padding: 24px; color: var(--text-sec); font-size: 14px; line-height: 1.7;
  }
  .doc-preview h1 { font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 12px; }
  .doc-preview h2 { font-size: 15px; font-weight: 600; color: var(--text); margin: 20px 0 8px; }
  .doc-preview p { margin: 6px 0; }
  .doc-preview ol, .doc-preview ul { padding-left: 20px; margin: 6px 0; }
  .doc-preview li { margin: 3px 0; }
  .doc-preview table { width: 100%; border-collapse: collapse; margin: 8px 0; }
  .doc-preview th, .doc-preview td { padding: 6px 12px; border: 1px solid var(--border); font-size: 13px; text-align: left; }
  .doc-preview th { background: var(--elevated); font-weight: 600; color: var(--text); }
  .doc-preview code { font-family: var(--mono); font-size: 13px; background: var(--inset); padding: 1px 4px; border-radius: 3px; }

  /* -- Document building hint -- */
  .doc-building-hint {
    margin-top: 16px; padding: 8px 12px; border-radius: 6px;
    background: var(--accent-sub); border: 1px dashed var(--accent);
    color: var(--accent); font-size: 11px; font-style: italic;
  }

  /* -- Steps panel (shared Plan + Execute view) -- */
  .steps-panel { display: flex; flex-direction: column; height: 100%; }
  .steps-list { padding: 14px 16px; overflow-y: auto; }
  .steps-milestone { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--accent); margin: 16px 0 6px; padding-left: 2px; }
  .steps-milestone:first-child { margin-top: 0; }
  .step-row { display: flex; align-items: center; gap: 10px; padding: 7px 10px; font-size: 13px; border-radius: 6px; transition: all 0.2s; border: 1px solid transparent; }
  .step-row:hover { background: var(--hover); }
  .step-row .step-icon { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; flex-shrink: 0; transition: all 0.3s; border: 1.5px solid var(--border); color: var(--text-dim); background: var(--elevated); }
  .step-row .step-num { font-size: 11px; color: var(--text-dim); font-family: var(--mono); min-width: 16px; }
  .step-row .step-name { flex: 1; color: var(--text-sec); }
  .step-row .step-file { font-family: var(--mono); font-size: 10px; color: var(--text-dim); padding: 2px 8px; background: var(--elevated); border-radius: 4px; border: 1px solid var(--border); }
  .step-row.ready .step-icon { color: var(--text-dim); font-size: 10px; }
  .step-row.running { background: var(--accent-sub); border-color: rgba(88,166,255,0.2); }
  .step-row.running .step-icon { border-color: var(--accent); color: var(--accent); background: var(--accent-sub); animation: progressPulse 1.5s infinite; }

// ── Trail strip management ───────────────────────────────────────

function showTrailStrip() {
  trailStripEl.classList.add('visible');
}

function addTrailChip(key) {
  var def = TRAIL_ARTIFACTS.find(function(a) { return a.key === key; });
  if (!def || trailChips[key]) return;
  showTrailStrip();

  var existingCats = Object.keys(trailChips).map(function(k) { return TRAIL_ARTIFACTS.find(function(a) { return a.key === k; }); }).filter(Boolean).map(function(a) { return a.cat; });
  if (!existingCats.includes(def.cat)) {
    if (existingCats.length > 0) {
      var sep = document.createElement('span');
      sep.className = 'trail-sep';
      sep.textContent = '│';
      trailStripMain.appendChild(sep);
    }
    var label = document.createElement('span');
    label.className = 'trail-label';
    label.textContent = def.cat === 'ticket' ? 'Ticket' : def.cat === 'spec' ? 'Specs' : 'Plan';
    label.dataset.cat = def.cat;
    trailStripMain.appendChild(label);
  }

  var icons = { ticket: '📋', spec: '📄', plan: '📦' };
  var chip = document.createElement('span');
  chip.className = 'trail-chip cat-' + def.cat;
  chip.dataset.key = key;
  chip.innerHTML = '<span class="chip-icon">' + (icons[def.cat] || '📄') + '</span>' + def.label;
  chip.onclick = function() { peekArtifact(key); };
  trailStripMain.appendChild(chip);
  trailChips[key] = { status: 'pending', el: chip, createdAt: Date.now() };
  bumpPhaseArtifacts();
  updateTrailStripMeta();
}

function setTrailStatus(key, status) {
  var chip = trailChips[key];
  if (!chip) return;
  chip.status = status;
  chip.el.classList.remove('active', 'approved');
  if (status === 'reviewing') chip.el.classList.add('active');
  if (status === 'approved') chip.el.classList.add('approved');
  updateTrailStripMeta();
}

function setActiveTrailChip(key) {
  activeTrailKey = key;
  Object.keys(trailChips).forEach(function(k) {
    if (trailChips[k].status !== 'approved') {
      trailChips[k].el.classList.remove('active');
    }
  });
  if (key && trailChips[key]) {
    trailChips[key].el.classList.add('active');
  }
}

function updateTrailStripMeta() {
  var metaEl = document.getElementById('trailStripMeta');
  if (!metaEl) return;
  var parts = [];
  var keys = Object.keys(trailChips);
  if (keys.length === 0) { metaEl.innerHTML = ''; return; }

  var cats = {};
  keys.forEach(function(k) {
    var def = TRAIL_ARTIFACTS.find(function(a) { return a.key === k; });
    if (!def) return;
    if (!cats[def.cat]) cats[def.cat] = [];
    var c = trailChips[k];
    var elapsed = Math.max(1, Math.floor((Date.now() - c.createdAt) / 60000));
    var statusText = c.status === 'approved' ? '✓' : c.status === 'reviewing' ? 'reviewing' : 'waiting';
    cats[def.cat].push(def.label + ' ' + statusText + ' (' + elapsed + 'min ago)');
  });

  var catNames = { ticket: 'Ticket:', spec: 'Specs:', plan: 'Plan:' };
  var metaParts = [];
  ['ticket', 'spec', 'plan'].forEach(function(cat) {
    if (cats[cat]) {
      metaParts.push('<span style="color:var(--text-dim);font-weight:600">' + catNames[cat] + '</span> ' + cats[cat].join(' · '));
    }
  });
  metaEl.innerHTML = metaParts.join(' <span style="margin:0 6px;color:var(--border)">│</span> ');
}

      el.classList.add('is-done');
      dot.className = 'dot done';
      label.className = 'label done';
    } else if (idx === activeIdx) {
      el.classList.add('is-active');
      dot.className = 'dot active';
      label.className = 'label active';
      // Update phase popover
      if (!phaseData[p].started) {

    } else {
      dot.className = 'dot pending';
      label.className = 'label';
    }
  });
}

  document.getElementById('apBody').innerHTML = buildStepsHTML('exec');
  document.getElementById('apActions').innerHTML = '';
  document.getElementById('apNav').style.display = 'none';
  var cp = document.getElementById('codePreview');
  if (cp) cp.classList.add('visible');
}

function closeArtifactPanel() {
  document.body.classList.remove('split-mode', 'peek-mode');
  peekMode = false;
  peekSavedState = null;
  setActiveTrailChip(null);
  document.getElementById('apNav').style.display = '';
}

function renderArtifact(idx) {
  var d = DIFFS[idx];
  var count = approvedArtifacts.filter(Boolean).length;
  document.getElementById('apHeader').innerHTML = buildApHeader('SPEC', 'spec', d.path, d.stats + ' · ' + count + '/3 approved');
  updateApMeta('just now', 'just now', idx === 0 ? '2 applied' : '0', idx === 0 ? '1 (JWT research)' : '0');
  document.getElementById('apBody').innerHTML = '<div class="diff-view">' + d.content + '</div>';

  document.getElementById('apActions').innerHTML = approvedArtifacts[idx]
    ? '<span style="font-size:13px;color:var(--green);font-weight:600;padding:0 8px;">✓ Approved</span>'
    : '<button class="btn-request" onclick="requestChanges()">Request Changes</button><button class="btn-approve" id="approveBtn" onclick="handleApprove()">Approve ✓</button>';
}

function switchArtifact(idx) {
  currentArtifact = idx;
  renderArtifact(idx);
  var keys = ['auth-readme', 'design-doc', 'core-readme'];
  setActiveTrailChip(keys[idx]);
}

function updateNavCounter() {
  // Counter shown in artifact panel header via renderArtifact
}

// ── Message rendering ────────────────────────────────────────────

function addAgentMsg(text) {
  var div = document.createElement('div');
  div.className = 'msg agent fade-in';
  div.innerHTML = text;
  convInner.appendChild(div);
  bumpContext();
  scrollConv();
}

function addUserMsg(text) {
  var div = document.createElement('div');
  div.className = 'msg user fade-in';
  div.textContent = text;
  convInner.appendChild(div);
  bumpContext(400);
  scrollConv();
}

function addTypingIndicator() {
  var div = document.createElement('div');
  div.className = 'typing-indicator fade-in';
  div.id = 'typingIndicator';
  div.innerHTML = '<span class="dot"></span><span class="dot"></span><span class="dot"></span>';
  convInner.appendChild(div);
  scrollConv();
}

function removeTypingIndicator() {
  var el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

function addDecisionCard(step) {
  var div = document.createElement('div');
  div.className = 'decision-card fade-in';
  div.id = 'dc-' + step.id;

  var optsHtml = '';
  step.options.forEach(function(opt, i) {
    var rec = i === step.recommended ? ' recommended' : '';
    optsHtml += '<button class="dc-opt' + rec + '" onclick="handleDecision(\'' + step.id + '\', ' + i + ', \'' + opt.replace(/'/g, "\\'") + '\')">' + opt + '</button>';
  });

  var hintHtml = step.hint ? '<div class="dc-hint">' + step.hint + '</div>' : '';

  div.innerHTML = '<div class="dc-label">DECISION</div><div class="dc-q">' + step.question + '</div><div class="dc-opts">' + optsHtml + '</div>' + hintHtml;
  convInner.appendChild(div);
  bumpContext(300);
  scrollConv();
}

function resolveDecisionCard(id, label) {
  var el = document.getElementById('dc-' + id);
  if (el) {
    el.className = 'decision-card resolved';
    el.innerHTML = '<span class="dc-resolved">✓ ' + label + '</span>';
  }
  bumpPhaseDecisions();
}

function addArtifactCard(step) {
  var div = document.createElement('div');
  div.className = 'artifact-card fade-in';
  var artifactKey = step.artifactKey || null;
  if (artifactKey) {
    div.dataset.artifactKey = artifactKey;
    div.onclick = function() { peekArtifact(artifactKey); };
  }
  div.innerHTML = '<div class="ac-header">' + step.header + '</div><div class="ac-body">' + step.body + '</div><span class="card-peek-hint">Click to review →</span>';
  convInner.appendChild(div);
  bumpContext(1200);
  scrollConv();

  if (artifactKey) {
    addTrailChip(artifactKey);
    setTrailStatus(artifactKey, 'approved');
  }
}

function addSubsessionBlock(step) {
  // Subsession summary blocks: visible only in advanced mode
  var div = document.createElement('div');
  div.className = 'subsession-block';
  div.innerHTML = '<div class="sub-header"><span class="sub-icon">🔬</span><span class="sub-title">Subsession: ' + step.title + '</span><span class="sub-meta"><span>⏱ ' + step.duration + '</span><span>📊 ' + step.tokens + '</span></span></div><div class="sub-body"><span class="sub-result">✓</span> ' + step.result + '</div>';
  convInner.appendChild(div);
  subsessionCount++;
  bumpContext(parseInt(step.tokens) * 1000 || 3000);
  if (currentPhase && phaseData[currentPhase]) {
    phaseData[currentPhase].sub++;
    updatePhasePopover(currentPhase);
  }
  updateAdvancedMeta();
  scrollConv();
}

function addProgressCard(steps) {
  var div = document.createElement('div');
  div.className = 'progress-card fade-in';
  div.id = 'progressCard';
  var html = '';
  steps.forEach(function(s, i) {
    html += '<div class="pc-step pending" id="pc-step-' + i + '"><span class="pc-icon">○</span>' + s + '</div>';
  });
  div.innerHTML = html;
  convInner.appendChild(div);
  scrollConv();
  animateProgress(steps);
}

function animateProgress(steps) {
  var i = 0;
  function nextStep() {
    if (i >= steps.length) {
      if (!waitingForInteraction) advanceSoon(600);
      return;
    }
    var el = document.getElementById('pc-step-' + i);
    el.className = 'pc-step running';
    el.querySelector('.pc-icon').textContent = '●';
    scrollConv();

    setTimeout(function() {
      el.className = 'pc-step done';
      el.querySelector('.pc-icon').textContent = '✓';
      i++;
      nextStep();
    }, 500 + Math.random() * 300);
  }
  nextStep();
}

function addPhaseDivider(label) {
  var div = document.createElement('div');
  div.className = 'phase-divider fade-in';
  div.innerHTML = '<span class="pd-label">' + label + '</span>';
  convInner.appendChild(div);
  scrollConv();
}

function scrollConv() {
  requestAnimationFrame(function() {
    convScroll.scrollTop = convScroll.scrollHeight;
  });
}

// ── Execution animation (side-by-side) ───────────────────────────

function runExecAnimation(callback) {
  execAnimationRunning = true;
  var stepIdx = 0;
  var msgIdx = 0;

  function runNextExecStep() {
    if (stepIdx >= EXEC_STEPS.length) {
      execAnimationRunning = false;
      var counter = document.getElementById('execCounter');
      if (counter) counter.textContent = '6/6 complete';
      if (callback) callback();
      return;
    }

    var stepEl = document.getElementById('sr-' + stepIdx);
    if (stepEl) {
      stepEl.className = 'step-row running';
      stepEl.querySelector('.step-icon').textContent = '●';
    }

    var codeHeader = document.getElementById('codePreviewHeader');
    if (codeHeader) {
      codeHeader.innerHTML = '<span class="cph-file">' + EXEC_STEPS[stepIdx].file + '</span>';
    }

    var codeBody = document.getElementById('codePreviewBody');
    if (codeBody) {
      codeBody.innerHTML = '';
      var snippet = EXEC_CODE_SNIPPETS[stepIdx];
      var lineIdx = 0;

      function addNextLine() {
        if (lineIdx >= snippet.length) {
          setTimeout(function() {
            if (stepEl) {
              stepEl.className = 'step-row done';
              stepEl.querySelector('.step-icon').textContent = '✓';
            }
            var counter = document.getElementById('execCounter');
            if (counter) counter.textContent = (stepIdx + 1) + '/6 complete';
            bumpContext(2000);
            if (msgIdx < EXEC_MESSAGES.length) {
              addAgentMsg(EXEC_MESSAGES[msgIdx]);
              msgIdx++;
            }
            if (msgIdx < EXEC_MESSAGES.length) {
              setTimeout(function() {
                addAgentMsg(EXEC_MESSAGES[msgIdx]);
                msgIdx++;
                stepIdx++;
                setTimeout(runNextExecStep, 200);
              }, 250);
            } else {
              stepIdx++;
              setTimeout(runNextExecStep, 200);
            }
          }, 300);
          return;
        }
        var line = snippet[lineIdx];
        var lineEl = document.createElement('div');
        if (line.t === 'hunk') {
          lineEl.className = 'diff-hunk-header';
          lineEl.textContent = line.v;
        } else {
          lineEl.className = 'diff-line add';
          lineEl.style.animationDelay = (lineIdx * 0.03) + 's';
          lineEl.innerHTML = '<span class="ln">' + line.ln + '</span>' + escapeHtml(line.v);
        }
        codeBody.appendChild(lineEl);
        codeBody.scrollTop = codeBody.scrollHeight;
        lineIdx++;
        setTimeout(addNextLine, 60 + Math.random() * 40);
      }
      addNextLine();
    } else {
      stepIdx++;
      setTimeout(runNextExecStep, 500);
    }
  }

  if (EXEC_MESSAGES.length > 0) {
    addAgentMsg(EXEC_MESSAGES[msgIdx]);
    msgIdx++;
  }
  setTimeout(runNextExecStep, 400);
}

function escapeHtml(text) {
  var div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// ── Step execution ───────────────────────────────────────────────

function executeStep(step) {
  stepNumEl.textContent = currentStep + 1;
  var pct = ((currentStep + 1) / SCRIPT.length) * 100;
  progressFill.style.width = pct + '%';

  switch (step.type) {
    case 'agent':
      removeTypingIndicator();
      addAgentMsg(step.text);
      if (step.phase) setPhaseActive(step.phase);
      break;

    case 'user':
      addUserMsg(step.text);
      break;

    case 'typing':
      addTypingIndicator();
      break;

    case 'decision':
      addDecisionCard(step);
      break;

    case 'artifact-card':
      addArtifactCard(step);
      break;

    case 'subsession':
      addSubsessionBlock(step);
      break;

    case 'phase':
      setPhaseActive(step.phase);
      addPhaseDivider(step.label);
      break;

    case 'layout':
      if (step.action === 'open-doc-section') openDocSection(step.section);
      else if (step.action === 'update-doc') updateDocContent(step.section);
      else if (step.action === 'open') {
        openArtifactPanel(step.artifact);
        addTrailChip(['auth-readme', 'design-doc', 'core-readme'][step.artifact]);
      }
      else if (step.action === 'open-plan') openPlanPanel();
      else if (step.action === 'open-exec') openExecPanel();
      else if (step.action === 'close') closeArtifactPanel();
      break;

    case 'approve':
      break;

    case 'approve-doc':
      break;

    case 'switch-artifact':
      switchArtifact(step.artifact);
      addTrailChip(['auth-readme', 'design-doc', 'core-readme'][step.artifact]);
      setTrailStatus(['auth-readme', 'design-doc', 'core-readme'][step.artifact], 'reviewing');
      break;

    case 'all-approved':
      showAllApproved();
      break;

    case 'progress':
      addProgressCard(step.steps);
      return;

    case 'exec-progress':
      return;

    case 'complete':
      completeAllPhases();
      pause();
      break;
  }
}

// ── Auto-play ────────────────────────────────────────────────────

function togglePlay() {
  if (playing) pause();
  else play();
}

function play() {
  playing = true;
  waitingForInteraction = false;
  updatePlayBtn();
  advanceAutoPlay();
}

function pause() {
  playing = false;
  clearTimeout(stepTimer);
  updatePlayBtn();
}

function updatePlayBtn() {
  playBtn.textContent = playing ? '❚❚ Pause' : '▶ Play';
  playBtn.className = playing ? 'ctrl-btn playing' : 'ctrl-btn';
}

function advanceAutoPlay() {
  if (!playing || currentStep >= SCRIPT.length) { pause(); return; }

  var step = SCRIPT[currentStep];
  executeStep(step);
  currentStep++;

  var delay;
  if (step.type === 'typing') {
    delay = step.duration;
  } else if (step.type === 'decision') {
    delay = 1800;
    setTimeout(function() {
      if (playing) {
        resolveDecisionCard(step.id, step.options[step.recommended].replace(/\s*★/, ''));
      }
    }, 1500);
  } else if (step.type === 'approve') {
    delay = 1200;
    setTimeout(function() {
      if (playing) autoApprove(step.artifact);
    }, 900);
  } else if (step.type === 'approve-doc') {
    delay = 1200;
    setTimeout(function() {
      if (playing) autoApproveDoc();
    }, 900);
  } else if (step.type === 'layout') {
    delay = 700;
  } else if (step.type === 'switch-artifact') {
    delay = 500;
  } else if (step.type === 'all-approved') {
    delay = 1500;
  } else if (step.type === 'progress') {
    delay = 4500;
  } else if (step.type === 'subsession') {
    delay = 1000;
  } else if (step.type === 'exec-progress') {
    runExecAnimation(function() {
      if (playing) {
        stepTimer = setTimeout(advanceAutoPlay, 600);
      }
    });
    return;
  } else if (step.type === 'complete') {
    return;
  } else if (step.type === 'user') {
    delay = 800;
  } else {
    delay = 1200;
  }

  stepTimer = setTimeout(advanceAutoPlay, delay);
}

function autoApprove(idx) {
  approvedArtifacts[idx] = true;
  if (currentArtifact === idx) renderArtifact(idx);
  updateNavCounter();
  var keys = ['auth-readme', 'design-doc', 'core-readme'];
  setTrailStatus(keys[idx], 'approved');
}

function autoApproveDoc() {
  productDesignApproved = true;
  setTrailStatus('product-design', 'approved');
  var btn = document.getElementById('approveDocBtn');
  if (btn) {
    btn.textContent = 'Approved ✔';
    btn.style.background = 'var(--green-sub)';
    btn.style.color = 'var(--green)';
    btn.style.pointerEvents = 'none';
  }
}

function showAllApproved() {
  var panel = document.getElementById('artifactPanel');
  var flash = document.createElement('div');
  flash.className = 'all-approved-flash';
  flash.textContent = 'All specs approved ✔';
  panel.style.position = 'relative';
  panel.appendChild(flash);
  setTimeout(function() { flash.remove(); }, 1400);
}

// ── Interactive mode ─────────────────────────────────────────────

function advanceInteractive() {
  if (currentStep >= SCRIPT.length) return;

  var step = SCRIPT[currentStep];

  if (step.type === 'user' && step.interactive && !playing) {
    currentStep++;
    waitingForInteraction = true;
    userInput.value = '';
    userInput.placeholder = step.placeholder || 'Type a message...';
    userInput.focus();
    sendBtn.disabled = false;
    return;
  }

  if (step.type === 'decision' && !playing) {
    executeStep(step);
    currentStep++;
    waitingForInteraction = true;
    return;
  }

  if (step.type === 'approve' && !playing) {
    if (step.artifact !== undefined && approvedArtifacts[step.artifact]) {
      currentStep++;
      setTimeout(function() { advanceInteractive(); }, 200);
      return;
    }
    waitingForInteraction = true;
    currentStep++;
    return;
  }

  if (step.type === 'approve-doc' && !playing) {
    if (productDesignApproved) {
      currentStep++;
      setTimeout(function() { advanceInteractive(); }, 200);
      return;
    }
    waitingForInteraction = true;
    currentStep++;
    return;
  }

  executeStep(step);
  currentStep++;

  if (step.type === 'typing') {
    setTimeout(function() { advanceInteractive(); }, step.duration);
  } else if (step.type === 'progress') {
    setTimeout(function() { advanceInteractive(); }, 4500);
  } else if (step.type === 'exec-progress') {
    runExecAnimation(function() {
      setTimeout(function() { advanceInteractive(); }, 600);
    });
    return;
  } else if (step.type === 'all-approved') {
    setTimeout(function() { advanceInteractive(); }, 1200);
  } else if (step.type === 'layout') {
    setTimeout(function() { advanceInteractive(); }, 500);
  } else if (step.type === 'switch-artifact') {
    setTimeout(function() { advanceInteractive(); }, 400);
  } else if (step.type === 'subsession') {
    setTimeout(function() { advanceInteractive(); }, 600);
  } else if (step.type === 'complete') {
    // Done
  } else {
    setTimeout(function() { advanceInteractive(); }, 600);
  }
}

function advanceSoon(delay) {
  setTimeout(function() {
    if (!playing && !waitingForInteraction) advanceInteractive();
  }, delay || 600);
}

// Start interactive mode on load
setTimeout(function() { advanceInteractive(); }, 300);

// ── User interactions ────────────────────────────────────────────

function handleDecision(id, choiceIdx, label) {
  var cleanLabel = label.replace(/\s*★/, '');
  resolveDecisionCard(id, cleanLabel);
  waitingForInteraction = false;

  if (playing) return;
  setTimeout(function() { advanceInteractive(); }, 400);
}

function handleApprove() {
  approvedArtifacts[currentArtifact] = true;
  renderArtifact(currentArtifact);
  updateNavCounter();
  var keys = ['auth-readme', 'design-doc', 'core-readme'];
  setTrailStatus(keys[currentArtifact], 'approved');
  waitingForInteraction = false;

  if (!playing) {
    setTimeout(function() { advanceInteractive(); }, 400);
  }
}

function handleApproveDoc() {
  productDesignApproved = true;
  setTrailStatus('product-design', 'approved');
  var btn = document.getElementById('approveDocBtn');
  if (btn) {
    btn.textContent = 'Approved ✔';
    btn.style.background = 'var(--green-sub)';
    btn.style.color = 'var(--green)';
    btn.style.pointerEvents = 'none';
  }
  waitingForInteraction = false;

  if (!playing) {
    setTimeout(function() { advanceInteractive(); }, 400);
  }
}

function handlePlanExecute() {
  waitingForInteraction = false;
  setTrailStatus('plan', 'approved');
  if (!playing) {
    var unresolved = document.querySelectorAll('.decision-card:not(.resolved)');
    unresolved.forEach(function(dc) {
      dc.className = 'decision-card resolved';
      dc.innerHTML = '<span class="dc-resolved">✓ Execute this plan</span>';
    });
    setTimeout(function() { advanceInteractive(); }, 400);
  }
}

function requestChanges() {
  var btn = document.querySelector('.btn-request');
  btn.textContent = 'Not in mockup';
  setTimeout(function() { btn.textContent = 'Request Changes'; }, 1000);
}

function handleSend() {
  var text = userInput.value.trim();
  if (!text) return;
  addUserMsg(text);
  userInput.value = '';
  userInput.placeholder = 'Type a message...';
  sendBtn.disabled = true;
  waitingForInteraction = false;

  if (!playing) {
    setTimeout(function() { advanceInteractive(); }, 400);
  }
}

function handleInputKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (waitingForInteraction && userInput.value.trim()) {
      handleSend();
    }
  }
}

userInput.addEventListener('input', function() {
  sendBtn.disabled = !userInput.value.trim();
});

// ── Reset ────────────────────────────────────────────────────────

function resetFlow() {
  pause();
  currentStep = 0;
  approvedArtifacts = [false, false, false];
  currentArtifact = 0;
  waitingForInteraction = false;
  currentPhase = null;
  peekMode = false;
  peekSavedState = null;
  productDesignApproved = false;
  trailChips = {};
  activeTrailKey = null;
  execAnimationRunning = false;
  subsessionCount = 0;
  artifactCount = 0;
  decisionsMade = 0;
  tokenCount = 0;
  sessionStartTime = Date.now();
  phaseData = {
    D: { started: null, dur: 0, art: 0, dec: 0, sub: 0 },
    S: { started: null, dur: 0, art: 0, dec: 0, sub: 0 },
    P: { started: null, dur: 0, art: 0, dec: 0, sub: 0 },
    E: { started: null, dur: 0, art: 0, dec: 0, sub: 0 }
  };

  convInner.innerHTML = '';
  closeArtifactPanel();
  stepNumEl.textContent = '0';
  progressFill.style.width = '0%';
  userInput.value = '';
  userInput.placeholder = 'Type a message...';
  sendBtn.disabled = true;

  trailStripMain.innerHTML = '';
  document.getElementById('trailStripMeta').innerHTML = '';
  trailStripEl.classList.remove('visible');

  ['D', 'S', 'P', 'E'].forEach(function(ph) {
    var el = document.getElementById('pd-' + ph);
    el.classList.remove('is-done', 'is-active');
    el.querySelector('.dot').className = 'dot pending';
    el.querySelector('.label').className = 'label';
  });

  document.getElementById('apActions').innerHTML = '<button class="btn-request" onclick="requestChanges()">Request Changes</button><button class="btn-approve" id="approveBtn" onclick="handleApprove()">Approve ✓</button>';
  document.getElementById('apNav').style.display = '';
  updateAdvancedMeta();

  setTimeout(function() { advanceInteractive(); }, 300);
}

// ── Step forward (manual) ────────────────────────────────────────

function stepForward() {
  if (playing) return;

  if (peekMode) {
    closePeek();
    return;
  }

  if (waitingForInteraction) {
    var step = SCRIPT[currentStep - 1] || SCRIPT[currentStep];
    if (step && step.type === 'decision') {
      resolveDecisionCard(step.id, step.options[step.recommended].replace(/\s*★/, ''));
      waitingForInteraction = false;
      setTimeout(function() { advanceInteractive(); }, 200);
    } else if (step && step.type === 'approve') {
      handleApprove();
    } else if (step && step.type === 'approve-doc') {
      handleApproveDoc();
    } else if (step && step.type === 'user' && step.interactive) {
      addUserMsg(step.placeholder || step.text);
      userInput.value = '';
      sendBtn.disabled = true;
      waitingForInteraction = false;
      setTimeout(function() { advanceInteractive(); }, 200);
    }
    return;
  }
  advanceInteractive();
}

// ── Keyboard shortcuts ───────────────────────────────────────────

document.addEventListener('keydown', function(e) {
  if (e.target === userInput) return;

  if (e.code === 'Space') {
    e.preventDefault();
    togglePlay();
  } else if (e.code === 'Escape') {
    e.preventDefault();
    if (peekMode) {
      closePeek();
    } else {
      resetFlow();
    }
  } else if (e.code === 'ArrowRight') {
    e.preventDefault();
    stepForward();
  } else if (e.code === 'KeyA') {
    e.preventDefault();
    toggleMode();
  }
});
