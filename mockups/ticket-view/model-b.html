<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Model B — Inline Wizard Chat</title>
<style>
  :root {
    --bg-base: #0e1117;
    --bg-surface: #161b22;
    --bg-elevated: #1c2129;
    --bg-hover: #242b35;
    --bg-inset: #0d1117;
    --border: #2d333b;
    --border-bright: #3d444d;
    --text-primary: #e6edf3;
    --text-secondary: #8b949e;
    --text-muted: #656d76;
    --accent: #58a6ff;
    --accent-subtle: #1f3a5f;
    --green: #3fb950;
    --green-subtle: #1a3a2a;
    --yellow: #d29922;
    --yellow-subtle: #3d2e00;
    --purple: #bc8cff;
    --purple-subtle: #2a1f3d;
    --red: #f85149;
    --red-subtle: #3d1418;
    --radius: 8px;
    --radius-lg: 12px;
    --mono: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-base);
    color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Back link ───────────────────────────────── */
  .back-link {
    position: fixed;
    top: 12px;
    right: 16px;
    z-index: 200;
    font-size: 12px;
    color: var(--text-muted);
    text-decoration: none;
    padding: 4px 10px;
    border-radius: 4px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    transition: color 0.15s, border-color 0.15s;
  }
  .back-link:hover { color: var(--accent); border-color: var(--accent); }

  /* ── Header ──────────────────────────────────── */
  .header {
    height: 52px;
    min-height: 52px;
    background: var(--bg-surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 12px;
    flex-shrink: 0;
    z-index: 10;
  }
  .ticket-type {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: 600;
    background: var(--purple-subtle);
    color: var(--purple);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .ticket-id {
    font-size: 13px;
    font-weight: 700;
    font-family: var(--mono);
    color: var(--accent);
  }
  .ticket-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-primary);
  }
  .header-spacer { flex: 1; }
  .model-tag {
    font-size: 10px;
    font-weight: 600;
    color: var(--accent);
    background: var(--accent-subtle);
    padding: 3px 8px;
    border-radius: 100px;
  }

  /* ── Chat container (scrolling area) ─────────── */
  .chat-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 0 0 16px 0;
  }
  .chat-scroll::-webkit-scrollbar { width: 6px; }
  .chat-scroll::-webkit-scrollbar-track { background: transparent; }
  .chat-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .chat-scroll::-webkit-scrollbar-thumb:hover { background: var(--border-bright); }

  .chat-inner {
    max-width: 780px;
    margin: 0 auto;
    padding: 0 24px;
  }

  /* ── Phase section headers ───────────────────── */
  .phase-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 28px 0 20px 0;
    cursor: default;
    user-select: none;
  }
  .phase-header.collapsible { cursor: pointer; }
  .phase-header.collapsible:hover .phase-name { color: var(--accent); }

  .phase-rule-left {
    height: 2px;
    width: 8px;
    flex-shrink: 0;
  }
  .phase-name {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    white-space: nowrap;
    transition: color 0.15s;
  }
  .phase-rule-right {
    flex: 1;
    height: 2px;
  }
  .phase-status {
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
    padding: 3px 10px;
    border-radius: 100px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .phase-collapse-icon {
    font-size: 10px;
    transition: transform 0.2s;
    margin-left: 4px;
    color: var(--text-muted);
  }
  .phase-header.collapsible .phase-collapse-icon { display: inline; }

  /* Phase states */
  .phase-header.done .phase-rule-left,
  .phase-header.done .phase-rule-right { background: var(--green); opacity: 0.4; }
  .phase-header.done .phase-name { color: var(--green); }
  .phase-header.done .phase-status { background: var(--green-subtle); color: var(--green); }

  .phase-header.active .phase-rule-left,
  .phase-header.active .phase-rule-right { background: var(--yellow); opacity: 0.5; }
  .phase-header.active .phase-name { color: var(--yellow); }
  .phase-header.active .phase-status { background: var(--yellow-subtle); color: var(--yellow); }

  .phase-header.locked .phase-rule-left,
  .phase-header.locked .phase-rule-right { background: var(--text-muted); opacity: 0.2; }
  .phase-header.locked .phase-name { color: var(--text-muted); opacity: 0.5; }
  .phase-header.locked .phase-status { background: var(--bg-elevated); color: var(--text-muted); border: 1px solid var(--border); opacity: 0.5; }

  /* Phase active dot */
  .active-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--yellow);
    animation: pulse 2s ease-in-out infinite;
    flex-shrink: 0;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* Phase body */
  .phase-body {
    overflow: hidden;
    transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
    max-height: 5000px;
    opacity: 1;
  }
  .phase-body.collapsed {
    max-height: 0 !important;
    opacity: 0;
    margin: 0;
  }

  /* Locked phase body */
  .phase-body.locked-body {
    padding: 12px 0;
  }
  .locked-message {
    font-size: 13px;
    color: var(--text-muted);
    opacity: 0.5;
    font-style: italic;
  }

  /* ── Agent messages ──────────────────────────── */
  .msg-agent {
    margin-bottom: 16px;
    animation: msgIn 0.3s ease;
  }
  @keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .msg-agent p {
    font-size: 14px;
    line-height: 1.7;
    color: var(--text-secondary);
  }
  .msg-agent p code {
    font-family: var(--mono);
    font-size: 12px;
    background: var(--bg-elevated);
    padding: 2px 6px;
    border-radius: 4px;
    color: var(--accent);
  }

  /* ── User messages ───────────────────────────── */
  .msg-user {
    margin-bottom: 16px;
    display: flex;
    justify-content: flex-end;
    animation: msgIn 0.3s ease;
  }
  .msg-user-bubble {
    font-size: 14px;
    line-height: 1.6;
    color: var(--text-primary);
    padding: 10px 16px;
    background: var(--accent-subtle);
    border: 1px solid rgba(88,166,255,0.25);
    border-radius: var(--radius-lg) var(--radius-lg) 4px var(--radius-lg);
    max-width: 70%;
  }

  /* ── Formalized description card ─────────────── */
  .formalized-card {
    margin: 16px 0;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 16px 20px;
    animation: msgIn 0.3s ease;
  }
  .formalized-card .fc-row {
    margin-bottom: 10px;
  }
  .formalized-card .fc-row:last-child { margin-bottom: 0; }
  .fc-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    margin-bottom: 4px;
  }
  .fc-value {
    font-size: 13px;
    line-height: 1.6;
    color: var(--text-secondary);
  }

  /* ── Artifact cards ──────────────────────────── */
  .artifact-card {
    margin: 16px 0;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    animation: msgIn 0.3s ease;
    transition: border-color 0.2s;
  }
  .artifact-card.approved-card {
    border-color: rgba(63,185,80,0.35);
  }
  .artifact-card-header {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    gap: 10px;
    background: var(--bg-elevated);
    border-bottom: 1px solid var(--border);
  }
  .artifact-filename {
    font-size: 13px;
    font-weight: 600;
    font-family: var(--mono);
    color: var(--text-primary);
  }
  .artifact-op {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 100px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .artifact-op.new { background: var(--green-subtle); color: var(--green); }
  .artifact-op.mod { background: var(--yellow-subtle); color: var(--yellow); }
  .artifact-stats {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--green);
  }
  .artifact-header-spacer { flex: 1; }
  .artifact-actions {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .review-btn, .approve-inline-btn {
    padding: 5px 12px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .review-btn {
    background: var(--bg-surface);
    color: var(--text-secondary);
    border: 1px solid var(--border-bright);
  }
  .review-btn:hover { border-color: var(--accent); color: var(--accent); }
  .approve-inline-btn {
    background: var(--green);
    color: #fff;
  }
  .approve-inline-btn:hover { opacity: 0.85; }
  .approve-inline-btn.is-approved {
    background: var(--green-subtle);
    color: var(--green);
    cursor: default;
    pointer-events: none;
  }
  .artifact-desc {
    padding: 10px 16px;
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.5;
  }
  .artifact-approved-badge {
    display: none;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    font-weight: 600;
    color: var(--green);
  }
  .artifact-card.approved-card .artifact-approved-badge { display: flex; }

  /* ── Inline diff expand ──────────────────────── */
  .diff-expand {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    border-top: none;
  }
  .diff-expand.open {
    max-height: 600px;
    overflow-y: auto;
    border-top: 1px solid var(--border);
  }
  .diff-expand::-webkit-scrollbar { width: 4px; }
  .diff-expand::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .diff-hunk-header {
    padding: 6px 16px 6px 56px;
    background: var(--accent-subtle);
    color: var(--accent);
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    border-bottom: 1px solid var(--border);
  }
  .diff-line {
    padding: 1px 16px 1px 56px;
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.75;
    white-space: pre;
    position: relative;
    min-height: 22px;
  }
  .diff-line .ln {
    position: absolute;
    left: 0;
    width: 46px;
    text-align: right;
    padding-right: 10px;
    color: var(--text-muted);
    opacity: 0.4;
    user-select: none;
  }
  .diff-line.add { background: rgba(63,185,80,0.08); color: var(--green); }
  .diff-line.del { background: rgba(248,81,73,0.08); color: var(--red); }
  .diff-line.ctx { color: var(--text-secondary); }

  .diff-collapse-btn {
    display: block;
    width: 100%;
    padding: 6px;
    background: var(--bg-elevated);
    border: none;
    border-top: 1px solid var(--border);
    color: var(--text-muted);
    font-size: 11px;
    cursor: pointer;
    text-align: center;
    transition: color 0.15s;
  }
  .diff-collapse-btn:hover { color: var(--accent); }

  /* ── Decision cards ──────────────────────────── */
  .decision-card {
    margin: 16px 0;
    background: var(--bg-surface);
    border: 1px solid rgba(88,166,255,0.25);
    border-left: 3px solid var(--accent);
    border-radius: var(--radius-lg);
    padding: 16px 20px;
    animation: msgIn 0.3s ease;
    transition: all 0.3s;
  }
  .decision-card.resolved {
    border-color: rgba(63,185,80,0.25);
    border-left-color: var(--green);
    background: var(--green-subtle);
    padding: 10px 16px;
  }
  .decision-label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .decision-card.resolved .decision-label { display: none; }
  .decision-question {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 12px;
    line-height: 1.5;
  }
  .decision-card.resolved .decision-question {
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 0;
    color: var(--green);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .decision-options {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 8px;
  }
  .decision-card.resolved .decision-options { display: none; }
  .dec-option {
    padding: 8px 16px;
    border-radius: var(--radius);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--border-bright);
    background: var(--bg-elevated);
    color: var(--text-primary);
    transition: all 0.15s;
  }
  .dec-option:hover { border-color: var(--accent); background: var(--accent-subtle); color: var(--accent); }
  .dec-option.recommended {
    border-color: rgba(88,166,255,0.4);
    background: var(--accent-subtle);
    color: var(--accent);
  }
  .dec-option.recommended::after { content: ' \2605'; font-size: 10px; }
  .decision-hint {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.5;
  }
  .decision-card.resolved .decision-hint { display: none; }

  /* ── Progress bar ────────────────────────────── */
  .progress-bar-container {
    margin: 16px 0;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    animation: msgIn 0.3s ease;
  }
  .progress-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    white-space: nowrap;
    min-width: 130px;
  }
  .progress-track {
    flex: 1;
    height: 6px;
    background: var(--bg-elevated);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .progress-fill.green { background: var(--green); }
  .progress-fill.yellow { background: var(--yellow); }
  .progress-fill.accent { background: var(--accent); }
  .progress-text {
    font-size: 12px;
    font-family: var(--mono);
    color: var(--text-muted);
    white-space: nowrap;
  }
  .approve-all-btn {
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid rgba(63,185,80,0.4);
    background: var(--green-subtle);
    color: var(--green);
    white-space: nowrap;
    transition: all 0.15s;
  }
  .approve-all-btn:hover { background: var(--green); color: #fff; border-color: var(--green); }
  .approve-all-btn:disabled { opacity: 0.4; cursor: default; pointer-events: none; }

  /* ── Plan step cards ─────────────────────────── */
  .plan-step {
    margin: 10px 0;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    animation: msgIn 0.3s ease;
    transition: border-color 0.2s, background 0.2s;
  }
  .plan-step.step-done { border-color: rgba(63,185,80,0.3); }
  .plan-step.step-running { border-color: rgba(210,153,34,0.3); }
  .plan-step-num {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .plan-step-num.pending-num { background: var(--bg-elevated); color: var(--text-muted); border: 1px solid var(--border); }
  .plan-step-num.running-num { background: var(--yellow-subtle); color: var(--yellow); animation: pulse 2s ease-in-out infinite; }
  .plan-step-num.done-num { background: var(--green-subtle); color: var(--green); }
  .plan-step-info { flex: 1; }
  .plan-step-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 2px;
  }
  .plan-step-desc {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.5;
  }
  .plan-step-desc code {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    background: var(--accent-subtle);
    padding: 1px 5px;
    border-radius: 3px;
  }
  .plan-step-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .exec-step-btn {
    padding: 5px 14px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid var(--border-bright);
    background: var(--bg-elevated);
    color: var(--text-secondary);
    transition: all 0.15s;
  }
  .exec-step-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-subtle); }
  .exec-step-btn:disabled { opacity: 0.35; cursor: default; pointer-events: none; }
  .step-status-badge {
    font-size: 11px;
    font-weight: 500;
    padding: 3px 10px;
    border-radius: 100px;
    white-space: nowrap;
  }
  .step-status-badge.badge-pending { background: var(--bg-elevated); color: var(--text-muted); border: 1px solid var(--border); }
  .step-status-badge.badge-running { background: var(--yellow-subtle); color: var(--yellow); }
  .step-status-badge.badge-done { background: var(--green-subtle); color: var(--green); }

  .execute-all-wrap {
    margin: 16px 0;
    display: flex;
    justify-content: flex-end;
  }
  .execute-all-btn {
    padding: 8px 22px;
    border-radius: var(--radius);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    background: var(--accent);
    color: #fff;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .execute-all-btn:hover { opacity: 0.85; }
  .execute-all-btn:disabled { opacity: 0.4; cursor: default; }

  /* ── Streaming dots ──────────────────────────── */
  .streaming-dots {
    display: inline-flex;
    gap: 3px;
    vertical-align: middle;
    margin-left: 4px;
  }
  .streaming-dots span {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--accent);
    animation: dotBounce 1.4s ease-in-out infinite;
  }
  .streaming-dots span:nth-child(2) { animation-delay: 0.2s; }
  .streaming-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dotBounce { 0%,80%,100%{opacity:0.3;transform:scale(0.8)} 40%{opacity:1;transform:scale(1)} }

  /* ── Chat input bar (sticky bottom) ──────────── */
  .input-bar {
    flex-shrink: 0;
    background: var(--bg-surface);
    border-top: 1px solid var(--border);
    padding: 12px 20px;
  }
  .input-bar-inner {
    max-width: 780px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .input-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0 14px;
    height: 42px;
    transition: border-color 0.15s;
  }
  .input-wrap:focus-within { border-color: var(--accent); }
  .input-wrap input {
    flex: 1;
    background: none;
    border: none;
    color: var(--text-primary);
    font-size: 14px;
    font-family: inherit;
    outline: none;
    height: 100%;
  }
  .input-wrap input::placeholder { color: var(--text-muted); }
  .send-btn {
    width: 42px;
    height: 42px;
    border-radius: var(--radius);
    background: var(--accent);
    border: none;
    color: white;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.15s;
  }
  .send-btn:hover { opacity: 0.85; }
  .send-btn svg { width: 14px; height: 14px; }

  /* ── Toast ─────────────────────────────────── */
  .toast {
    position: fixed;
    bottom: 80px;
    left: 50%;

// Render
// ═══════════════════════════════════════════════════════════════════════
function render() {
  const el = document.getElementById('chatInner');
  let html = '';

  // ── DESCRIBE phase ──────────────────────────
  html += renderPhaseHeader('describe', 'Describe');
  html += `<div class="phase-body${state.collapsed.describe ? ' collapsed' : ''}" id="body-describe">`;
  html += agentMsg('We need to add user authentication to the API. Users should be able to sign up, log in, and have their sessions managed.');
  html += `<div class="formalized-card">
    <div class="fc-row"><div class="fc-label">What</div><div class="fc-value">Add user auth with signup, login, RBAC</div></div>
    <div class="fc-row"><div class="fc-label">Purpose</div><div class="fc-value">Secure multi-user access</div></div>
    <div class="fc-row"><div class="fc-label">Success Criteria</div><div class="fc-value">Users can register, authenticate, roles work</div></div>
  </div>`;
  html += `</div>`;

  // ── SPECIFY phase ───────────────────────────
  html += renderPhaseHeader('specify', 'Specify');
  html += `<div class="phase-body" id="body-specify">`;

  html += agentMsg('I\'ve analyzed your codebase and found existing auth patterns in <code>core/server_store.py</code>. Creating the specifications now...');

  // Artifact: auth/README.md
  html += renderArtifact('auth-readme');

  // Decision card
  html += renderDecision();

  // After decision is resolved, show the confirmation and more artifacts
  if (state.decisionResolved) {
    html += agentMsg('<span class="resolved-marker">&#10003; Decided: JWT tokens.</span> Updated auth strategy section.');
    html += renderArtifact('design-doc');
    html += renderArtifact('core-readme');
  }

  // Progress bar
  html += renderSpecifyProgress();

  html += `</div>`;

  // ── PLAN phase (merged Plan + Execute) ──────
  html += renderPhaseHeader('plan', 'Plan');
  html += `<div class="phase-body${state.phases.plan === 'locked' ? ' locked-body' : ''}" id="body-plan">`;
  if (state.phases.plan === 'locked') {
    html += `<div class="locked-message">Approve all specs to unlock the planning phase.</div>`;
  } else {
    html += renderPlanContent();
  }
  html += `</div>`;

  el.innerHTML = html;

  // Render status bar (sidebar removed per design feedback)
  renderStatusBar();
}

function renderPhaseHeader(id, name) {
  const status = state.phases[id];
  const isCollapsible = status === 'done';
  const isCollapsed = state.collapsed[id] || false;
  let statusHtml = '';
  let statusClass = status;

  if (status === 'done') {
    statusHtml = `<span class="phase-status">&#10003; Done</span>`;
    if (isCollapsible) {
      statusHtml += `<span class="phase-collapse-icon">${isCollapsed ? '&#9654;' : '&#9660;'}</span>`;
    }
  } else if (status === 'active') {
    statusHtml = `<span class="phase-status"><span class="active-dot"></span> In Progress</span>`;
  } else {
    statusHtml = `<span class="phase-status">(locked)</span>`;
  }

  const clickHandler = isCollapsible ? ` onclick="toggleCollapse('${id}')"` : '';
  const collapsibleClass = isCollapsible ? ' collapsible' : '';

  return `<div class="phase-header ${statusClass}${collapsibleClass}" id="header-${id}"${clickHandler}>
    <span class="phase-rule-left"></span>
    <span class="phase-name">${name}</span>
    <span class="phase-rule-right"></span>
    ${statusHtml}
  </div>`;
}

function agentMsg(html) {
  return `<div class="msg-agent"><p>${html}</p></div>`;
}

function userMsg(text) {
  return `<div class="msg-user"><div class="msg-user-bubble">${escHtml(text)}</div></div>`;
}

function renderArtifact(id) {
  const d = diffData[id];
  const isApproved = state.approved.has(id);
  const isDiffOpen = state.diffOpen[id] || false;
  const approvedClass = isApproved ? ' approved-card' : ' pending-card';

  let actionsHtml = '';
  if (isApproved) {
    actionsHtml = `<span class="artifact-approved-badge" style="display:flex">&#10003; Approved</span>`;
  } else {
    const reviewLabel = isDiffOpen ? 'Hide diff' : 'Review';
    actionsHtml = `<button class="review-btn" onclick="toggleDiff('${id}')">${reviewLabel}</button>
      <button class="approve-inline-btn" onclick="approveArtifact('${id}')">Approve</button>`;
  }

  // Full diff (when expanded)
  let diffHtml = '';
  if (isDiffOpen) {
    diffHtml = `<div class="diff-expand open">`;
    d.lines.forEach(line => {
      if (line.type === 'hunk') {
        diffHtml += `<div class="diff-hunk-header">${escHtml(line.text)}</div>`;
      } else {
        const cls = line.type === 'add' ? 'add' : line.type === 'del' ? 'del' : 'ctx';
        const prefix = line.type === 'add' ? '+' : line.type === 'del' ? '-' : ' ';
        diffHtml += `<div class="diff-line ${cls}"><span class="ln">${line.ln}</span>${prefix}${escHtml(line.text)}</div>`;
      }
    });
    diffHtml += `<button class="diff-collapse-btn" onclick="toggleDiff('${id}')">Collapse diff</button>`;
    diffHtml += `</div>`;
  }

  // Diff preview (first few lines, shown when diff is NOT open)
  let previewHtml = '';
  if (!isDiffOpen) {
    const previewLines = d.lines.filter(l => l.type !== 'hunk').slice(0, 4);
    if (previewLines.length > 0) {
      previewHtml = `<div class="artifact-diff-preview" onclick="toggleDiff('${id}')">`;
      previewLines.forEach(line => {
        const cls = line.type === 'add' ? 'p-add' : line.type === 'del' ? 'p-del' : 'p-ctx';
        const prefix = line.type === 'add' ? '+' : line.type === 'del' ? '-' : ' ';
        previewHtml += `<div class="preview-line ${cls}">${prefix} ${escHtml(line.text)}</div>`;
      });
      previewHtml += `<div class="preview-fade"></div>`;
      previewHtml += `<span class="preview-click-hint">Click to expand</span>`;
      previewHtml += `</div>`;
    }
  }

  return `<div class="artifact-card${approvedClass}" id="artifact-${id}">
    <div class="artifact-card-header">
      <span class="artifact-filename">${d.filename}</span>
      <span class="artifact-op ${d.opClass}">${d.op}</span>
      <span class="artifact-stats">${d.stats}</span>
      <span class="artifact-header-spacer"></span>
      <div class="artifact-actions">${actionsHtml}</div>
    </div>
    <div class="artifact-desc">${d.desc}</div>
    ${previewHtml}
    ${diffHtml}
  </div>`;
}

function renderDecision() {
  if (state.decisionResolved) {
    return `<div class="decision-card resolved">
      <div class="decision-question">&#10003; Decided: JWT tokens. Your bns_ token pattern aligns with JWT.</div>
    </div>`;
  }

  return `<div class="decision-card" id="decisionCard">
    <div class="decision-label">Decision needed</div>
    <div class="decision-question">Should we use JWT or session-based auth?</div>
    <div class="decision-options">
      <button class="dec-option recommended" onclick="resolveDecision('jwt')">JWT tokens</button>
      <button class="dec-option" onclick="resolveDecision('session')">Session-based</button>
      <button class="dec-option" onclick="resolveDecision('hybrid')">Hybrid</button>
    </div>
    <div class="decision-hint">Your <code>bns_</code> token pattern aligns with JWT.</div>
  </div>`;
}

function renderSpecifyProgress() {
  const total = SPEC_DIFFS.length;
  const approvedCount = state.approved.size;
  // Only count diffs that are visible (auth-readme is always visible; others only after decision)
  const visibleDiffs = state.decisionResolved ? total : 1;
  const pct = visibleDiffs > 0 ? Math.round((approvedCount / total) * 100) : 0;
  const allDone = approvedCount === total;

  let approveAllHtml = '';
  if (state.decisionResolved && !allDone) {
    const remaining = total - approvedCount;
    approveAllHtml = `<button class="approve-all-btn" onclick="approveAllRemaining()">Approve All Remaining (${remaining})</button>`;
  }

  return `<div class="progress-bar-container">
    <span class="progress-label">Specify Progress:</span>
    <div class="progress-track"><div class="progress-fill green" style="width:${pct}%"></div></div>
    <span class="progress-text">${approvedCount}/${total} approved</span>
    ${approveAllHtml}
  </div>`;
}

function renderPlanContent() {
  let html = '';
  const anyExecuted = state.planSteps.some(s => s.status === 'done' || s.status === 'running');
  const allDone = state.planSteps.every(s => s.status === 'done');
  const anyRunning = state.planSteps.some(s => s.status === 'running');

  if (anyExecuted) {
    html += agentMsg('Executing the implementation plan. Steps complete as the agent works through each one.');
  } else {
    html += agentMsg('I\'ve created an implementation plan based on the approved specs. Approve to start execution.');
  }

  state.planSteps.forEach(step => {
    const numClass = step.status === 'done' ? 'done-num' : step.status === 'running' ? 'running-num' : 'pending-num';
    const cardClass = step.status === 'done' ? ' step-done' : step.status === 'running' ? ' step-running' : '';
    const numContent = step.status === 'done' ? '&#10003;' : step.id;

    let badgeClass = 'badge-pending';
    let badgeText = 'Pending';
    if (step.status === 'done') { badgeClass = 'badge-done'; badgeText = 'Done'; }
    if (step.status === 'running') { badgeClass = 'badge-running'; badgeText = 'Running'; }

    let actionsHtml = `<span class="step-status-badge ${badgeClass}">${badgeText}</span>`;
    if (step.status === 'pending' && !anyRunning) {
      actionsHtml += `<button class="exec-step-btn" onclick="executeStep(${step.id})">Execute &#9654;</button>`;
    }
    if (step.status === 'running') {
      actionsHtml += `<span class="streaming-dots"><span></span><span></span><span></span></span>`;
    }

    // Changed files section for completed steps
    let changedFilesHtml = '';
    if (step.status === 'done' && step.changedFiles && step.changedFiles.length > 0) {
      const isOpen = state.changedFilesOpen[step.id] || false;
      changedFilesHtml = `<div class="changed-files">
        <button class="changed-files-toggle" onclick="toggleChangedFiles(${step.id})">
          <span class="cf-arrow${isOpen ? ' open' : ''}">&#9654;</span>
          Changed files (${step.changedFiles.length})
        </button>
        <div class="changed-files-list${isOpen ? ' open' : ''}">`;
      step.changedFiles.forEach((f, fi) => {
        const opClass = f.op === '+' ? 'cf-add' : 'cf-mod';
        const diffKey = step.id + '-' + fi;
        const hasDiff = !!fileDiffData[diffKey];
        const isDiffOpen = state.fileDiffOpen[diffKey] || false;
        const clickAttr = hasDiff ? ` onclick="toggleFileDiff('${diffKey}')"` : '';
        changedFilesHtml += `<div class="changed-file-item"${clickAttr}><span class="cf-op ${opClass}">${f.op === '+' ? '+' : '~'}</span>${f.path}`;
        if (hasDiff) {
          changedFilesHtml += `<span class="cf-expand-hint">${isDiffOpen ? 'hide' : 'diff'}</span>`;
        }
        changedFilesHtml += `</div>`;
        // Inline code diff
        if (isDiffOpen && hasDiff) {
          const fd = fileDiffData[diffKey];
          changedFilesHtml += `<div class="file-code-diff">`;
          changedFilesHtml += `<div class="diff-hunk-header">${escHtml(fd.hunk)}</div>`;
          fd.lines.forEach(line => {
            const cls = line.type === 'add' ? 'add' : line.type === 'del' ? 'del' : 'ctx';
            const prefix = line.type === 'add' ? '+' : line.type === 'del' ? '-' : ' ';
            changedFilesHtml += `<div class="diff-line ${cls}"><span class="ln">${line.ln}</span>${prefix}${escHtml(line.text)}</div>`;
          });
          changedFilesHtml += `</div>`;
        }
      });
      changedFilesHtml += `</div></div>`;
    }

    html += `<div class="plan-step${cardClass}" id="plan-step-${step.id}">
      <span class="plan-step-num ${numClass}">${numContent}</span>
      <div class="plan-step-info">
        <div class="plan-step-title">Step ${step.id}: ${step.title}${step.status === 'done' ? ' <span style="color:var(--text-muted);font-weight:400;font-size:12px;">── &#10003; Done</span>' : ''}</div>
        <div class="plan-step-desc">${step.desc} <span style="color:var(--text-muted);font-size:11px;">Specs: ${step.specs}</span></div>
        ${changedFilesHtml}
      </div>
      <div class="plan-step-actions">${actionsHtml}</div>
    </div>`;
  });

  if (!allDone) {
    html += `<div class="execute-all-wrap">
      <button class="execute-all-btn" onclick="executeAllSteps()"${anyRunning ? ' disabled' : ''}>Execute All &#9654;</button>
    </div>`;
  }

  // Progress
  const doneCount = state.planSteps.filter(s => s.status === 'done').length;
  const total = state.planSteps.length;
  const pct = Math.round((doneCount / total) * 100);
  const fillClass = allDone ? 'green' : 'yellow';
  html += `<div class="progress-bar-container">
    <span class="progress-label">Plan Progress:</span>
    <div class="progress-track"><div class="progress-fill ${fillClass}" style="width:${pct}%"></div></div>
    <span class="progress-text">${doneCount}/${total} steps</span>
  </div>`;

  // Verification section (shown after all steps are done)
  if (allDone) {
    html += renderVerifySection();
  }

  return html;
}

function renderVerifySection() {
  let innerHtml = '';
  if (state.verifyState === 'idle') {
    innerHtml = `<div class="verify-card-inner">
      <button class="verify-btn" onclick="runVerification()">Run spec-review</button>
      <span class="verify-desc">Verify that specs match the implementation.</span>
    </div>`;
  } else if (state.verifyState === 'running') {
    innerHtml = `<div class="verify-card-inner">
      <span class="verify-running">Running spec-review<span class="streaming-dots"><span></span><span></span><span></span></span></span>
    </div>`;
  } else {
    innerHtml = `<div class="verify-card-inner">
      <span class="verify-result">&#10003; All specs aligned with implementation.</span>
    </div>`;
  }

  const cardClass = state.verifyState === 'done' ? ' verify-done' : '';

  return `<div class="verify-section">
    <div class="verify-header">
      <span class="vr-left"></span>
      <span class="vr-label">Verify <span class="vr-optional">(optional)</span></span>
      <span class="vr-right"></span>
    </div>
    <div class="verify-card${cardClass}">
      ${innerHtml}
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════════════════════
// Interactions
// ═══════════════════════════════════════════════════════════════════════

// Sidebar removed per design feedback (status bar is sufficient for artifact navigation)

function toggleFileDiff(key) {
  state.fileDiffOpen[key] = !state.fileDiffOpen[key];
  render();
}

function runVerification() {
  state.verifyState = 'running';
  render();
  showToast('Running spec-review...', 'info');

  setTimeout(() => {
    state.verifyState = 'done';
    render();
    showToast('Verification complete: all specs aligned.', 'success');
    renderStatusBar();
  }, 2500);
}

function renderStatusBar() {
  const bar = document.getElementById('statusBar');
  if (!bar) return;

  const phaseConfig = [
    { id: 'describe', label: 'Describe' },
    { id: 'specify', label: 'Specify' },
    { id: 'plan', label: 'Plan' },
  ];

  // Phase pills
  let pillsHtml = '';
  phaseConfig.forEach(p => {
    const status = state.phases[p.id];
    let icon = '';
    let pillClass = '';
    let extra = '';

    if (status === 'done') {
      icon = '&#10003;';
      pillClass = 'sb-done';
    } else if (status === 'active') {
      icon = '&#9679;';
      pillClass = 'sb-active';
      // Add progress info for active phases
      if (p.id === 'specify') {
        const total = SPEC_DIFFS.length;
        const done = state.approved.size;
        extra = `: ${done}/${total}`;
      } else if (p.id === 'plan') {
        const total = state.planSteps.length;
        const done = state.planSteps.filter(s => s.status === 'done').length;
        extra = `: ${done}/${total}`;
      }
    } else {
      icon = '&#9675;';
      pillClass = 'sb-locked';
    }

    pillsHtml += `<span class="sb-pill ${pillClass}"><span class="sb-icon">${icon}</span>${p.label}${extra}</span>`;
  });

  // Artifact status dots
  const artifactNames = {
    'auth-readme': 'auth',
    'design-doc': 'DOC',
    'core-readme': 'core',
  };
  let artifactsHtml = '';
  SPEC_DIFFS.forEach(id => {
    const isApproved = state.approved.has(id);
    const isVisible = id === 'auth-readme' || state.decisionResolved;
    let dotClass = 'dot-hidden';
    if (isVisible && isApproved) dotClass = 'dot-approved';
    else if (isVisible && !isApproved) dotClass = 'dot-pending';
    artifactsHtml += `<span class="sb-artifact-item"><span class="sb-dot ${dotClass}"></span>${artifactNames[id]}</span>`;
  });

  // Plan step progress (if plan is active or done)
  let planProgressHtml = '';
  if (state.phases.plan === 'active' || state.phases.plan === 'done') {
    const planDone = state.planSteps.filter(s => s.status === 'done').length;
    const planTotal = state.planSteps.length;
    const planRunning = state.planSteps.filter(s => s.status === 'running').length;
    let stepText = `${planDone}/${planTotal} steps`;
    if (planRunning > 0) stepText += ` (${planRunning} running)`;
    planProgressHtml = `<span class="sb-divider"></span>
      <span class="sb-artifact-item" style="gap:6px;">
        <span style="font-size:10px;color:var(--text-muted);">Plan:</span>
        <span style="font-family:var(--mono);font-size:11px;color:${planDone === planTotal ? 'var(--green)' : 'var(--yellow)'};">${stepText}</span>
      </span>`;
  }

  // Verification status
  let verifyHtml = '';
  if (state.verifyState === 'running') {
    verifyHtml = `<span class="sb-divider"></span>
      <span class="sb-pill sb-active" style="font-size:10px;"><span class="sb-icon">&#9679;</span>Verifying</span>`;
  } else if (state.verifyState === 'done') {
    verifyHtml = `<span class="sb-divider"></span>
      <span class="sb-pill sb-done" style="font-size:10px;"><span class="sb-icon">&#10003;</span>Verified</span>`;
  }

  // Brief title
  const titleText = '"Add user authentication"';

  bar.innerHTML = `
    <div class="sb-phases">${pillsHtml}</div>
    ${planProgressHtml}
    ${verifyHtml}
    <span class="sb-divider"></span>
    <span class="sb-title">${titleText}</span>
  `;
}

function toggleChangedFiles(stepId) {
  state.changedFilesOpen[stepId] = !state.changedFilesOpen[stepId];
  render();
}

function toggleCollapse(phaseId) {
  state.collapsed[phaseId] = !state.collapsed[phaseId];
  render();
}

function toggleDiff(artifactId) {
  state.diffOpen[artifactId] = !state.diffOpen[artifactId];
  render();
  // Scroll the artifact into view
  setTimeout(() => {
    const el = document.getElementById('artifact-' + artifactId);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }, 50);
}

function approveArtifact(id) {
  state.approved.add(id);
  state.diffOpen[id] = false;
  showToast('Approved: ' + diffData[id].filename, 'success');
  checkAllApproved();
  render();
  scrollToBottom();
}

function approveAllRemaining() {
  SPEC_DIFFS.forEach(id => state.approved.add(id));
  Object.keys(state.diffOpen).forEach(k => state.diffOpen[k] = false);
  showToast('All specs approved!', 'success');
  checkAllApproved();
  render();
  scrollToBottom();
}

function checkAllApproved() {
  if (SPEC_DIFFS.every(id => state.approved.has(id))) {
    // Transition specify to done, plan to active (merged plan+execute)
    state.phases.specify = 'done';
    state.phases.plan = 'active';
    state.planVisible = true;

    setTimeout(() => {
      render();
      scrollToBottom();
      showToast('All specs approved! Plan phase unlocked.', 'success');
    }, 400);
  }
}

function resolveDecision(choice) {
  state.decisionResolved = true;
  showToast('Decided: JWT tokens. Specs updated.', 'success');
  render();
  scrollToBottom();
}

function executeStep(stepId) {
  const step = state.planSteps.find(s => s.id === stepId);
  if (!step || step.status !== 'pending') return;

  step.status = 'running';
  render();
  showToast('Executing: ' + step.title, 'info');

  setTimeout(() => {
    step.status = 'done';
    state.changedFilesOpen[step.id] = true; // Auto-expand changed files
    render();
    showToast('Completed: ' + step.title, 'success');
    scrollToBottom();

    // Check if all done
    if (state.planSteps.every(s => s.status === 'done')) {
      state.phases.plan = 'done';
      render();
      setTimeout(() => showToast('All steps completed! Ticket is done.', 'success'), 500);
    }
  }, 1500 + Math.random() * 1000);
}

function executeAllSteps() {
  const pending = state.planSteps.filter(s => s.status === 'pending');
  if (pending.length === 0) return;

  render();

  let delay = 0;
  pending.forEach((step, i) => {
    setTimeout(() => {
      step.status = 'running';
      render();
      scrollToBottom();
    }, delay);

    delay += 800;

    setTimeout(() => {
      step.status = 'done';
      state.changedFilesOpen[step.id] = true; // Auto-expand changed files
      render();
      scrollToBottom();
      showToast('Completed: ' + step.title, 'success');

      if (state.planSteps.every(s => s.status === 'done')) {
        state.phases.plan = 'done';
        render();
        scrollToBottom();
        setTimeout(() => showToast('All steps completed! Ticket is done.', 'success'), 500);
      }
    }, delay + 1200);

    delay += 1800;
  });
}

function sendMessage() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';

  // Find the active phase body and inject the user message
  const activePhase = Object.keys(state.phases).find(p => state.phases[p] === 'active');
  if (!activePhase) return;

  // We'll inject directly into the DOM for responsiveness
  const body = document.getElementById('body-' + activePhase);
  if (!body) return;

  const userDiv = document.createElement('div');
  userDiv.className = 'msg-user';
  userDiv.innerHTML = `<div class="msg-user-bubble">${escHtml(text)}</div>`;
  body.appendChild(userDiv);
  scrollToBottom();

  // Simulated agent response
  setTimeout(() => {
    const responses = [
      'Good point. I\'ll incorporate that into the spec and update the diff.',
      'Noted. Let me revise the relevant section.',
      'That aligns with the existing patterns in <code>core/</code>. Updating now.',
      'Makes sense. I\'ll adjust the integration points accordingly.',
      'Great question. The auth module handles that in the <code>middleware.py</code> layer.',
    ];
    const agentDiv = document.createElement('div');
    agentDiv.className = 'msg-agent';
    agentDiv.innerHTML = `<p>${responses[Math.floor(Math.random() * responses.length)]}</p>`;
    body.appendChild(agentDiv);
    scrollToBottom();
  }, 600 + Math.random() * 600);
}

// ═══════════════════════════════════════════════════════════════════════
// Utilities
// ═══════════════════════════════════════════════════════════════════════

function scrollToBottom() {
  const sc = document.getElementById('chatScroll');
  setTimeout(() => { sc.scrollTop = sc.scrollHeight; }, 50);
}

function showToast(msg, type) {
  const toast = document.getElementById('toast');
  toast.className = 'toast ' + type;
  const icon = type === 'success' ? '&#10003;' : 'i';
  toast.querySelector('.t-icon').innerHTML = icon;
  toast.querySelector('.t-msg').textContent = msg;
  toast.classList.add('show');
  clearTimeout(state._toastTimer);
  state._toastTimer = setTimeout(() => toast.classList.remove('show'), 3000);
}

function escHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

// ═══════════════════════════════════════════════════════════════════════
// Init
// ═══════════════════════════════════════════════════════════════════════
render();

// Smooth entry: auto-scroll to the Specify phase header after a beat
setTimeout(() => {
  const specHeader = document.getElementById('header-specify');
  if (specHeader) specHeader.scrollIntoView({ behavior: 'smooth', block: 'start' });
}, 600);
</script>
