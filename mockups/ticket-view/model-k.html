<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K: Merged — Bonsai Ticket View</title>
<link rel="stylesheet" href="shared/base.css">
<link rel="stylesheet" href="shared/sidebar.css">
<style>
/* ── Ticket summary in sidebar ────────────────────────────── */

.sidebar-summary {
  padding: 12px 14px; border-bottom: 1px solid var(--border);
}
.sidebar-summary .ss-id {
  font-family: var(--mono); font-size: 11px; color: var(--accent);
  background: var(--accent-sub); padding: 2px 6px; border-radius: 3px; font-weight: 600;
}
.sidebar-summary .ss-title {
  font-size: 12px; font-weight: 600; color: var(--text); margin-top: 6px;
  line-height: 1.4;
}
.sidebar-summary .ss-meta {
  font-size: 10px; color: var(--text-dim); margin-top: 4px;
  display: flex; gap: 8px; align-items: center;
}
.sidebar-summary .ss-badge {
  font-size: 9px; font-weight: 700; text-transform: uppercase;
  padding: 1px 5px; border-radius: 3px; letter-spacing: 0.04em;
}
.sidebar-summary .ss-badge.feature { background: var(--purple-sub); color: var(--purple); }
.sidebar-summary .ss-badge.phase-badge { background: var(--accent-sub); color: var(--accent); }

.sidebar.collapsed .sidebar-summary { padding: 8px 0; text-align: center; }
.sidebar.collapsed .sidebar-summary .ss-title,
.sidebar.collapsed .sidebar-summary .ss-meta { display: none; }

/* ── Breadcrumb bar ───────────────────────────────────────── */

.breadcrumb {
  height: 28px; background: var(--surface); border-bottom: 1px solid var(--border);
  display: none; align-items: center; padding: 0 20px; gap: 4px;
  font-size: 12px; flex-shrink: 0;
}
body.focus-mode .breadcrumb { display: flex; }
.bc-item { color: var(--text-dim); cursor: pointer; transition: color 0.15s; }
.bc-item:hover { color: var(--accent); }
.bc-item.current { color: var(--text); font-weight: 500; cursor: default; }
.bc-sep { color: var(--text-dim); opacity: 0.4; font-size: 10px; }

/* ── Subsession enter divider (J1-style) ─────────────────── */

.ss-enter {
  display: flex; align-items: center; gap: 8px;
  padding: 4px 0; margin: 14px 0 8px;
  font-size: 12px; color: var(--text-dim);
  animation: fadeIn 0.35s ease both;
}
.ss-enter::before, .ss-enter::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}
.ss-enter .ss-icon { font-size: 12px; }
.ss-enter .ss-name { font-weight: 600; }

/* Nested: slightly indented */
.ss-enter.nested { margin-left: 16px; font-size: 11px; }
.ss-enter.nested::before, .ss-enter.nested::after { background: var(--border); opacity: 0.5; }

/* ── Review notification card ────────────────────────────── */

.review-notification {
  border: 1px solid var(--border); border-radius: var(--r);
  padding: 12px 16px; margin: 8px 0;
  display: flex; align-items: center; gap: 10px;
  background: var(--surface);
  animation: fadeIn 0.35s ease both;
}
.review-notification .rn-icon { font-size: 14px; }
.review-notification .rn-info { flex: 1; }
.review-notification .rn-title { font-size: 13px; font-weight: 500; }
.review-notification .rn-meta { font-size: 11px; color: var(--text-dim); }
.review-notification .rn-actions { display: flex; gap: 6px; }
.rn-btn {
  font-size: 11px; padding: 5px 10px; border-radius: 5px;
  border: 1px solid var(--border); background: var(--elevated);
  color: var(--text-sec); cursor: pointer; transition: all 0.15s;
  font-family: inherit;
}
.rn-btn:hover { border-color: var(--accent); color: var(--accent); }
.rn-btn.primary { background: var(--green); color: #fff; border-color: var(--green); }
.rn-btn.primary:hover { filter: brightness(1.1); }

/* Approved state */
.review-notification.approved {
  border-color: var(--green-sub); background: transparent;
}
.review-notification.approved .rn-title { color: var(--green); }
.review-notification.approved .rn-actions { display: none; }

/* ── Output card (KEY new element) ────────────────────────── */

.output-card {
  border: 1px solid var(--green-sub); border-left: 3px solid var(--green);
  border-radius: var(--r); padding: 10px 14px; margin: 8px 0;
  background: var(--surface);
  animation: fadeIn 0.35s ease both;
}
.output-card .oc-header {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; font-weight: 600; color: var(--green);
  margin-bottom: 6px;
}
.output-card .oc-body { font-size: 12px; color: var(--text-sec); line-height: 1.6; }
.output-card .oc-body strong { color: var(--text); }
.output-card .oc-expand {
  font-size: 11px; color: var(--text-dim); cursor: pointer;
  margin-top: 6px; text-align: right;
  transition: color 0.15s;
}
.output-card .oc-expand:hover { color: var(--accent); }

/* Nested output card: slightly indented */
.output-card.nested { margin-left: 16px; }

/* Expanded history */
.output-card .oc-history {
  display: none; margin-top: 8px; padding-top: 8px;
  border-top: 1px solid var(--border);
}
.output-card .oc-history.visible { display: block; }
.output-card .oc-history .hist-msg { font-size: 12px; padding: 3px 0 3px 10px; opacity: 0.7; }

/* ── Artifact panel subsession actions ────────────────────── */

.ap-subsession-actions {
  padding: 8px 16px 12px; border-top: 1px solid var(--border);
  display: flex; gap: 6px; background: var(--surface);
}
.ap-ss-btn {
  font-size: 10px; color: var(--text-dim); padding: 4px 10px;
  border: 1px solid var(--border); border-radius: 4px;
  cursor: pointer; background: none; transition: all 0.15s;
  display: flex; align-items: center; gap: 3px;
  font-family: inherit;
}
.ap-ss-btn:hover {
  color: var(--accent); border-color: var(--accent-sub); background: var(--accent-sub);
}

/* ── Nested messages inside subsessions ───────────────────── */

.msg.nested { margin-left: 16px; font-size: 13px; }

/* ── Finished subsession collapse ─────────────────────────── */

/* Finished subsession: hide enter divider and messages, show only output card */
.ss-finished .ss-enter { display: none; }
.ss-finished .msg { display: none; }
.ss-finished .decision-card { display: none; }
.ss-finished .typing-indicator { display: none; }
.ss-finished .output-card { display: block; }
/* But when expanded for retro, show everything */
.ss-finished.expanded .ss-enter { display: flex; }
.ss-finished.expanded .msg { display: block; }
.ss-finished.expanded .decision-card { display: block; }

/* Subsession group container (JS wraps finished subsession content) */
.ss-group { transition: all 0.3s; }
.ss-group.collapsed > :not(.output-card) { display: none; }
.ss-group.collapsed > .output-card { display: block; }
.ss-group.collapsed > .output-card .oc-expand::after { content: ' ▸'; }
/* When expanded */
.ss-group.expanded > * { display: block; }
.ss-group.expanded > .ss-enter { display: flex; }
.ss-group.expanded > .output-card .oc-expand::after { content: ' ▾'; }

/* ── Focus button on subsession enter ────────────────────── */

.ss-enter .ss-focus-btn {
  font-size: 10px; color: var(--text-dim); cursor: pointer;
  padding: 2px 8px; border-radius: 4px; border: 1px solid transparent;
  transition: all 0.15s; background: none; font-family: inherit;
  margin-left: auto;
}
.ss-enter .ss-focus-btn:hover {
  color: var(--accent); border-color: var(--accent-sub); background: var(--accent-sub);
}

/* ── Focus mode header ───────────────────────────────────── */

.focus-header {
  display: none; padding: 8px 16px;
  background: var(--surface); border-bottom: 2px solid var(--yellow);
  align-items: center; gap: 8px; font-size: 12px; flex-shrink: 0;
}
.focus-header.visible { display: flex; }
.focus-back {
  color: var(--accent); cursor: pointer; font-weight: 500;
  display: flex; align-items: center; gap: 4px;
  font-size: 12px; background: none; border: none; font-family: inherit;
}
.focus-back:hover { text-decoration: underline; }
.focus-title { font-weight: 600; color: var(--yellow); }
.focus-spacer { flex: 1; }
.focus-complete {
  font-size: 11px; color: var(--text-dim); cursor: pointer;
  padding: 4px 10px; border: 1px solid var(--border); border-radius: 4px;
  background: none; font-family: inherit;
}
.focus-complete:hover { border-color: var(--green); color: var(--green); }

/* When in focus mode */
body.focus-mode .conv-inner { display: none; }
body.focus-mode .focus-conv { display: block; }
body.focus-mode .focus-header { display: flex; }

.focus-conv { display: none; padding: 0; }

/* ── Split mode adjustment for sidebar ────────────────────── */

body.split-mode .conversation { flex: 0 0 auto; width: 35%; }
</style>

<script>
// ── K1-specific state ────────────────────────────────────────

var breadcrumbStack = ['AUTH-42'];
var reviewNotifications = {};  // id -> { approved }
var outputCardHistories = {};  // id -> expanded

// ── Sidebar phase label updater ──────────────────────────────

function updateSidebarPhase(label) {
  var el = document.getElementById('sidebarPhase');
  if (el) el.textContent = label;
}

// ── Breadcrumb management ────────────────────────────────────

function updateBreadcrumb() {
  var bc = document.getElementById('breadcrumb');
  if (!bc) return;
  var html = '';
  breadcrumbStack.forEach(function(item, i) {
    if (i > 0) html += '<span class="bc-sep">&#8250;</span>';
    var isCurrent = (i === breadcrumbStack.length - 1);
    html += '<span class="bc-item' + (isCurrent ? ' current' : '') + '"' +
      (!isCurrent ? ' onclick="popBreadcrumbTo(' + i + ')"' : '') +
      '>' + item + '</span>';
  });
  bc.innerHTML = html;
}

function pushBreadcrumb(label) {
  breadcrumbStack.push(label);
  updateBreadcrumb();
}

function popBreadcrumb() {
  if (breadcrumbStack.length > 1) breadcrumbStack.pop();
  updateBreadcrumb();
}

function popBreadcrumbTo(idx) {
  breadcrumbStack = breadcrumbStack.slice(0, idx + 1);
  updateBreadcrumb();
}

// ── Subsession enter divider ─────────────────────────────────

function addSubsessionEnter(icon, name, nested) {
  var div = document.createElement('div');
  div.className = 'ss-enter fade-in' + (nested ? ' nested' : '');
  var escapedName = name.replace(/'/g, "\\'");
  div.innerHTML = '<span class="ss-icon">' + icon + '</span> <span class="ss-name">' + name + '</span>' +
    '<button class="ss-focus-btn" onclick="enterFocusMode(\'' + escapedName + '\')">Focus &rarr;</button>';
  if (convInner) convInner.appendChild(div);
  pushBreadcrumb(icon + ' ' + name);
  scrollConv();
}

// ── Output card ──────────────────────────────────────────────

function addOutputCard(id, icon, name, bodyHtml, historyHtml, nested) {
  var div = document.createElement('div');
  div.className = 'output-card fade-in' + (nested ? ' nested' : '');
  div.id = 'oc-' + id;
  div.innerHTML =
    '<div class="oc-header">&#10003; ' + icon + ' ' + name + ' &#8212; Output</div>' +
    '<div class="oc-body">' + bodyHtml + '</div>' +
    '<div class="oc-expand" onclick="toggleHistory(\'' + id + '\')">[Show history]</div>';
  if (convInner) convInner.appendChild(div);
  popBreadcrumb();
  // Wrap the subsession elements into a collapsible group
  wrapSubsession(div);
  scrollConv();
}

function wrapSubsession(outputCardEl) {
  // Walk backwards from the output card to find the matching ss-enter
  var els = [];
  var prev = outputCardEl.previousElementSibling;
  while (prev) {
    els.unshift(prev);
    if (prev.classList && prev.classList.contains('ss-enter')) break;
    prev = prev.previousElementSibling;
  }
  // Only wrap if we found an ss-enter
  if (els.length === 0 || !els[0].classList.contains('ss-enter')) return;
  // Create wrapper
  var group = document.createElement('div');
  group.className = 'ss-group collapsed';
  // Insert before the first element
  els[0].parentNode.insertBefore(group, els[0]);
  els.forEach(function(el) { group.appendChild(el); });
  group.appendChild(outputCardEl);
}

function toggleHistory(cardId) {
  var card = document.getElementById('oc-' + cardId);
  if (!card) return;
  var group = card.closest('.ss-group');
  if (group) {
    group.classList.toggle('collapsed');
    group.classList.toggle('expanded');
  }
}

function toggleOutputHistory(id) {
  // Legacy alias
  toggleHistory(id);
}

// ── Focus mode ──────────────────────────────────────────────

var focusActive = false;

function enterFocusMode(name) {
  focusActive = true;
  document.body.classList.add('focus-mode');
  // Show focus header with name
  var header = document.getElementById('focusHeader');
  if (header) {
    header.querySelector('.focus-title').textContent = name;
    header.classList.add('visible');
  }
  // Create focus conversation area if needed
  var focusConv = document.getElementById('focusConv');
  if (!focusConv) {
    focusConv = document.createElement('div');
    focusConv.id = 'focusConv';
    focusConv.className = 'focus-conv';
    convScroll.querySelector('.conv-inner').parentNode.appendChild(focusConv);
  }
  focusConv.innerHTML = '';
  focusConv.style.display = 'block';
}

function exitFocusMode() {
  focusActive = false;
  document.body.classList.remove('focus-mode');
  var header = document.getElementById('focusHeader');
  if (header) header.classList.remove('visible');
  var focusConv = document.getElementById('focusConv');
  if (focusConv) focusConv.style.display = 'none';
}

// ── Review notification card ─────────────────────────────────

function addReviewNotification(id, path, badge, stats, actions) {
  var div = document.createElement('div');
  div.className = 'review-notification fade-in';
  div.id = 'rn-' + id;

  var actionsHtml = '';
  actions.forEach(function(a) {
    var cls = a.primary ? 'rn-btn primary' : 'rn-btn';
    actionsHtml += '<button class="' + cls + '" onclick="handleReviewAction(\'' + id + '\', \'' + a.action + '\')">' + a.label + '</button>';
  });

  div.innerHTML =
    '<span class="rn-icon">&#128196;</span>' +
    '<div class="rn-info">' +
      '<div class="rn-title">' + path + '</div>' +
      '<div class="rn-meta">' + badge + ' &#183; ' + stats + '</div>' +
    '</div>' +
    '<div class="rn-actions">' + actionsHtml + '</div>';
  if (convInner) convInner.appendChild(div);
  reviewNotifications[id] = { approved: false };
  scrollConv();
}

function approveReviewNotification(id) {
  var el = document.getElementById('rn-' + id);
  if (!el) return;
  el.classList.add('approved');
  var titleEl = el.querySelector('.rn-title');
  if (titleEl) titleEl.textContent = '✓ ' + titleEl.textContent;
  reviewNotifications[id] = { approved: true };
}

function handleReviewAction(id, action) {
  if (action === 'approve') {
    approveReviewNotification(id);
    waitingForInteraction = false;
    if (!playing) setTimeout(function() { advanceInteractive(); }, 400);
  } else if (action === 'discuss') {
    addAgentMsg('(Discussion subsession for this artifact would open here.)');
  } else if (action === 'research') {
    addAgentMsg('(Research subsession for this artifact would open here.)');
  }
}

// ── Sidebar navigation handler ───────────────────────────────

window.onSidebarNavigate = function(key) {
  var artifactMap = {
    'description': { type: 'card' },
    'product-design': { type: 'doc' },
    'auth-readme': { type: 'diff', idx: 0 },
    'design-doc': { type: 'diff', idx: 1 },
    'core-readme': { type: 'diff', idx: 2 },
    'impl-plan': { type: 'plan' }
  };
  var art = artifactMap[key];
  if (!art) return;

  if (document.body.classList.contains('split-mode') && !peekMode) {
    peekSavedState = {
      header: document.getElementById('apHeader').innerHTML,
      body: document.getElementById('apBody').innerHTML,
      actions: document.getElementById('apActions').innerHTML
    };
  }
  peekMode = true;
  document.body.classList.add('split-mode', 'peek-mode');
  setActiveSidebarItem(key);

  var headerEl = document.getElementById('apHeader');
  var bodyEl = document.getElementById('apBody');
  var actionsEl = document.getElementById('apActions');
  var closeBtn = '<button class="ap-close" onclick="closePeek()" style="display:inline-flex">&#8592; Back to flow</button>';

  if (art.type === 'card') {
    headerEl.innerHTML = '<span class="ap-badge doc">DOC</span><span class="ap-path">Ticket Description</span><span class="ap-stats"></span>' + closeBtn;
    bodyEl.innerHTML = '<div class="doc-preview"><h1>Ticket: Add user authentication</h1><h2>What</h2><p>Add JWT-based user authentication with signup, login, session management, and role-based access control.</p><h2>Purpose</h2><p>Enable multi-user access to Bonsai workspaces with permission boundaries between admin, regular, and viewer roles.</p><h2>Success Criteria</h2><ul><li>Users can sign up, log in, receive a JWT token</li><li>Access resources according to their role</li><li>Admin can manage users and permissions</li></ul></div>';
    actionsEl.innerHTML = closeBtn;
  } else if (art.type === 'doc') {
    headerEl.innerHTML = '<span class="ap-badge doc">DOC</span><span class="ap-path">product-design.md</span><span class="ap-stats"></span>' + closeBtn;
    bodyEl.innerHTML = DOC_SECTIONS.full;
    actionsEl.innerHTML = closeBtn;
  } else if (art.type === 'diff') {
    var d = DIFFS[art.idx];
    headerEl.innerHTML = '<span class="ap-badge ' + d.badgeClass + '">' + d.badge + '</span><span class="ap-path">' + d.path + '</span><span class="ap-stats">' + d.stats + '</span>' + closeBtn;
    bodyEl.innerHTML = '<div class="diff-view">' + d.content + '</div>';
    actionsEl.innerHTML = closeBtn;
  } else if (art.type === 'plan') {
    headerEl.innerHTML = '<span class="ap-badge new">PLAN</span><span class="ap-path">Implementation Plan</span><span class="ap-stats">2 milestones &#183; 6 steps</span>' + closeBtn;
    bodyEl.innerHTML = buildStepsHTML('plan');
    actionsEl.innerHTML = closeBtn;
  }
};

// ── Output card history content ──────────────────────────────

var OC_HISTORIES = {
  'build-pd':
    '<div class="hist-msg" style="border-left:2px solid var(--accent);padding:4px 0 4px 10px">Starting with Goal section...</div>' +

window.onStepExecute = function(step) {
  if (step.type === 'ss-enter') {
    addSubsessionEnter(step.icon, step.name, step.nested);
  } else if (step.type === 'output-card') {
    addOutputCard(step.cardId, step.icon, step.name, step.body, OC_HISTORIES[step.cardId] || '', step.nested);
  } else if (step.type === 'review-notification') {
    addReviewNotification(step.rnId, step.path, step.badge, step.stats, step.actions);
  } else if (step.type === 'review-approve') {
    approveReviewNotification(step.rnId);
  } else if (step.type === 'sidebar-add') {
    addSidebarItem(step.key, step.group, step.label, step.icon);
  } else if (step.type === 'sidebar-status') {
    setSidebarStatus(step.key, step.status, step.duration);
  } else if (step.type === 'sidebar-phase') {
    updateSidebarPhase(step.label);
  } else if (step.type === 'breadcrumb-push') {
    pushBreadcrumb(step.label);
  } else if (step.type === 'breadcrumb-pop') {
    popBreadcrumb();
  }
};

<script>
// ── B key for sidebar toggle + Esc exits focus mode ─────────

document.addEventListener('keydown', function(e) {
  if (userInput && e.target === userInput) return;
  if (e.code === 'KeyB') {
    e.preventDefault();
    toggleSidebarCollapse();
  }
  if (e.code === 'Escape' && focusActive) {
    e.preventDefault();
    e.stopImmediatePropagation();
    exitFocusMode();
    return;
  }
});

// ── Patch engine for K1 step types ───────────────────────────

(function() {
  var origAdvanceAutoPlay = window.advanceAutoPlay;
  window.advanceAutoPlay = function() {
    if (!playing || !window.SCRIPT || currentStep >= window.SCRIPT.length) { pause(); return; }
    var step = window.SCRIPT[currentStep];

    // Subsession enter
    if (step.type === 'ss-enter') {
      executeStep(step);
      currentStep++;
      stepTimer = setTimeout(advanceAutoPlay, 600);
      return;
    }
    // Output card
    if (step.type === 'output-card') {
      executeStep(step);
      currentStep++;
      stepTimer = setTimeout(advanceAutoPlay, 800);
      return;
    }
    // Review notification
    if (step.type === 'review-notification') {
      executeStep(step);
      currentStep++;
      stepTimer = setTimeout(advanceAutoPlay, 700);
      return;
    }
    // Review approve (auto)
    if (step.type === 'review-approve') {
      executeStep(step);
      currentStep++;
      stepTimer = setTimeout(advanceAutoPlay, 400);
      return;
    }
    // Sidebar actions
    if (step.type === 'sidebar-add' || step.type === 'sidebar-status' || step.type === 'sidebar-phase') {
      executeStep(step);
      currentStep++;
      stepTimer = setTimeout(advanceAutoPlay, 300);
      return;
    }
    // Breadcrumb actions
    if (step.type === 'breadcrumb-push' || step.type === 'breadcrumb-pop') {
      executeStep(step);
      currentStep++;
      stepTimer = setTimeout(advanceAutoPlay, 200);
      return;
    }

    origAdvanceAutoPlay();
  };

  var origAdvanceInteractive = window.advanceInteractive;
  window.advanceInteractive = function() {
    if (!window.SCRIPT || currentStep >= window.SCRIPT.length) return;
    var step = window.SCRIPT[currentStep];

    // Subsession enter
    if (step.type === 'ss-enter') {
      executeStep(step);
      currentStep++;
      setTimeout(function() { advanceInteractive(); }, 400);
      return;
    }
    // Output card
    if (step.type === 'output-card') {
      executeStep(step);
      currentStep++;
      setTimeout(function() { advanceInteractive(); }, 500);
      return;
    }
    // Review notification
    if (step.type === 'review-notification') {
      executeStep(step);
      currentStep++;
      // Pause briefly then continue (user can click buttons)
      setTimeout(function() { advanceInteractive(); }, 500);
      return;
    }
    // Review approve
    if (step.type === 'review-approve') {
      executeStep(step);
      currentStep++;
      setTimeout(function() { advanceInteractive(); }, 300);
      return;
    }
    // Sidebar actions
    if (step.type === 'sidebar-add' || step.type === 'sidebar-status' || step.type === 'sidebar-phase') {
      executeStep(step);
      currentStep++;
      setTimeout(function() { advanceInteractive(); }, 200);
      return;
    }
    // Breadcrumb actions
    if (step.type === 'breadcrumb-push' || step.type === 'breadcrumb-pop') {
      executeStep(step);
      currentStep++;
      setTimeout(function() { advanceInteractive(); }, 150);
      return;
    }

    origAdvanceInteractive();
  };
})();
</script>
