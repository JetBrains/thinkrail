<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spec-Code Mapping — ChatFlow Example</title>
<style>
:root {
  --bg: #0d1117; --bg-card: #161b22; --bg-hover: #1c2333; --border: #30363d;
  --text: #e6edf3; --text-dim: #8b949e; --text-muted: #484f58;
  --accent: #58a6ff; --green: #3fb950; --yellow: #d29922; --red: #f85149;
  --orange: #db6d28; --purple: #bc8cff;
  --green-bg: rgba(63,185,80,0.15); --yellow-bg: rgba(210,153,34,0.15);
  --red-bg: rgba(248,81,73,0.15); --orange-bg: rgba(219,109,40,0.15);
  --purple-bg: rgba(188,140,255,0.15); --blue-bg: rgba(88,166,255,0.15);
  --radius: 8px; --radius-sm: 4px;
  --font: 'SF Mono','Cascadia Code','Fira Code',Consolas,monospace;
  --font-sans: -apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body { background: var(--bg); color: var(--text); font-family: var(--font-sans); font-size: 14px; line-height: 1.5; }
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

.app { display: flex; flex-direction: column; height: 100vh; }
.header { padding: 16px 24px; border-bottom: 1px solid var(--border); }
.header h1 { font-size: 20px; font-weight: 600; }
.header h1 span { margin-right: 8px; }
.header .subtitle { color: var(--text-dim); font-size: 13px; margin-top: 2px; }

.tabs { display: flex; gap: 2px; padding: 0 24px; border-bottom: 1px solid var(--border); background: var(--bg-card); overflow-x: auto; flex-shrink: 0; }
.tab-btn { padding: 10px 16px; background: none; border: none; border-bottom: 2px solid transparent; color: var(--text-dim); font-family: var(--font-sans); font-size: 13px; cursor: pointer; white-space: nowrap; transition: color .15s, border-color .15s; }
.tab-btn:hover { color: var(--text); background: var(--bg-hover); }
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

.content { flex: 1; overflow: auto; padding: 20px 24px; }
.panel { display: none; }
.panel.active { display: block; }

.card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 12px; overflow: hidden; }
.card-header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap; }
.card-title { font-weight: 600; font-size: 14px; }
.card-body { padding: 16px; }

.badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; line-height: 1.5; }
.badge-green { background: var(--green-bg); color: var(--green); }
.badge-yellow { background: var(--yellow-bg); color: var(--yellow); }
.badge-red { background: var(--red-bg); color: var(--red); }
.badge-orange { background: var(--orange-bg); color: var(--orange); }
.badge-purple { background: var(--purple-bg); color: var(--purple); }
.badge-blue { background: var(--blue-bg); color: var(--accent); }
.badge-muted { background: rgba(72,79,88,0.2); color: var(--text-muted); }

.health-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
.health-dot.green { background: var(--green); }
.health-dot.orange { background: var(--orange); }
.health-dot.red { background: var(--red); }
.health-dot.gray { background: var(--text-muted); }

.code-block { background: #0d1117; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; font-family: var(--font); font-size: 12px; line-height: 1.6; overflow-x: auto; white-space: pre; color: var(--text); }
.kw { color: var(--purple); }
.fn { color: var(--accent); }
.str { color: var(--green); }
.cm { color: var(--text-muted); }
.num { color: var(--orange); }

.diff-line { font-family: var(--font); font-size: 12px; padding: 1px 12px; line-height: 1.6; white-space: pre; }
.diff-line.added { background: var(--green-bg); color: var(--green); }
.diff-line.removed { background: var(--red-bg); color: var(--red); }
.diff-line.modified { background: var(--yellow-bg); color: var(--yellow); }
.diff-line.context { color: var(--text-dim); }

.chain-step { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
.chain-arrow { text-align: center; padding: 6px 0; color: var(--text-muted); font-size: 18px; }
.chain-step-header { display: flex; align-items: center; gap: 8px; cursor: pointer; }
.chain-step-header:hover { color: var(--accent); }
.chain-step-body { display: none; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
.chain-step-body.open { display: block; }

.timeline-item { position: relative; padding: 8px 0 8px 28px; border-left: 2px solid var(--border); margin-left: 8px; }
.timeline-dot { position: absolute; left: -6px; top: 12px; width: 10px; height: 10px; border-radius: 50%; border: 2px solid var(--bg); }
.timeline-dot.spec { background: var(--purple); }
.timeline-dot.code { background: var(--green); }
.timeline-dot.task { background: var(--accent); }
.timeline-dot.stale { background: var(--orange); }
.timeline-date { color: var(--text-muted); font-size: 12px; font-family: var(--font); }
.timeline-text { color: var(--text-dim); font-size: 13px; margin-top: 2px; }
.timeline-text strong { color: var(--text); font-weight: 600; }

.metrics-row { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
.metric-box { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 20px; text-align: center; flex: 1; min-width: 100px; }
.metric-num { font-size: 28px; font-weight: 700; font-family: var(--font); }
.metric-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px; }

.tree-node { padding: 2px 0; }
.tree-row { display: flex; align-items: center; gap: 6px; padding: 4px 8px; border-radius: var(--radius-sm); cursor: pointer; font-size: 13px; }
.tree-row:hover { background: var(--bg-hover); }
.tree-row.selected { background: var(--blue-bg); }
.tree-toggle { width: 16px; text-align: center; color: var(--text-muted); font-size: 11px; flex-shrink: 0; user-select: none; }
.tree-icon { flex-shrink: 0; }
.tree-label { flex: 1; }
.tree-children { padding-left: 20px; }
.tree-children.collapsed { display: none; }

.btn { display: inline-flex; align-items: center; gap: 4px; padding: 4px 12px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg-card); color: var(--text-dim); font-size: 12px; font-family: var(--font-sans); cursor: pointer; transition: all .15s; }
.btn:hover { background: var(--bg-hover); color: var(--text); border-color: var(--text-muted); }
.btn-accent { border-color: var(--accent); color: var(--accent); }
.btn-accent:hover { background: var(--blue-bg); }
.btn-sm { padding: 2px 8px; font-size: 11px; }

.filter-bar { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
.filter-btn { padding: 4px 12px; border-radius: 16px; border: 1px solid var(--border); background: none; color: var(--text-dim); font-size: 12px; cursor: pointer; font-family: var(--font-sans); }
.filter-btn:hover { border-color: var(--text-muted); color: var(--text); }
.filter-btn.active { background: var(--blue-bg); border-color: var(--accent); color: var(--accent); }

.data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.data-table th { text-align: left; padding: 8px 12px; border-bottom: 2px solid var(--border); color: var(--text-dim); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
.data-table td { padding: 8px 12px; border-bottom: 1px solid var(--border); }
.data-table tr:hover td { background: var(--bg-hover); }
.data-table .id-col { font-family: var(--font); color: var(--accent); white-space: nowrap; }

.spec-detail-header { margin-bottom: 20px; }
.spec-detail-header h2 { font-size: 18px; margin-bottom: 4px; }
.spec-detail-header .spec-path { font-family: var(--font); color: var(--text-dim); font-size: 12px; }
.item-row { display: flex; align-items: flex-start; gap: 12px; padding: 12px; border-bottom: 1px solid var(--border); }
.item-row:last-child { border-bottom: none; }
.item-row:hover { background: var(--bg-hover); }
.item-id { font-family: var(--font); color: var(--accent); font-size: 12px; white-space: nowrap; min-width: 60px; }
.item-desc { flex: 1; font-size: 13px; }
.item-actions { display: flex; gap: 4px; flex-shrink: 0; }

.impact-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
.impact-card h4 { font-size: 14px; margin-bottom: 8px; }
.impact-list { list-style: none; }
.impact-list li { padding: 6px 0; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; font-size: 13px; }
.impact-list li:last-child { border-bottom: none; }

.select-wrap { position: relative; display: inline-block; }
.select-wrap select { appearance: none; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); padding: 6px 32px 6px 12px; font-size: 13px; font-family: var(--font-sans); cursor: pointer; }
.select-wrap::after { content: '\25BC'; position: absolute; right: 10px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 10px; pointer-events: none; }

.diff-container { display: grid; grid-template-columns: 1fr 0.8fr 0.7fr 1.2fr; gap: 0; }
.diff-4col { display: grid; grid-template-columns: 1fr 0.8fr 0.7fr 1.2fr; gap: 0; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.diff-pane { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.diff-pane-header { padding: 8px 12px; border-bottom: 1px solid var(--border); font-size: 12px; color: var(--text-dim); font-weight: 600; }

.collapsible-toggle { cursor: pointer; user-select: none; }
.collapsible-toggle::before { content: '\25B6'; display: inline-block; width: 16px; font-size: 10px; transition: transform .15s; }
.collapsible-toggle.open::before { transform: rotate(90deg); }

@media (max-width: 768px) {
  .content { padding: 12px; }
  .diff-container { grid-template-columns: 1fr; }
  .diff-4col { grid-template-columns: 1fr; }
  .metrics-row { flex-direction: column; }
  .tabs { padding: 0 12px; }
  .header { padding: 12px 16px; }
}
</style>
</head>

// ── HELPERS ───────────────────────────────────────────────────────
function getAllItems() {
  const items = [];
  for (const [specKey, spec] of Object.entries(DATA.specs)) {
    for (const item of spec.items) {
      items.push({ ...item, specKey, specPath: spec.path, specIcon: spec.icon });
    }
  }
  return items;
}

function findItem(id) {
  for (const [specKey, spec] of Object.entries(DATA.specs)) {
    for (const item of spec.items) {
      if (item.id === id) return { ...item, specKey, specPath: spec.path };
    }
  }
  return null;
}

function statusBadge(status) {
  const map = { mapped: 'badge-green', stale: 'badge-yellow', unmapped: 'badge-red', linked: 'badge-purple', Done: 'badge-green', Open: 'badge-blue', 'In Progress': 'badge-orange' };
  return '<span class="badge ' + (map[status] || 'badge-muted') + '">' + status + '</span>';
}

function kindBadge(kind) {
  const map = { actionable: 'badge-blue', constraint: 'badge-purple', conceptual: 'badge-muted' };
  return '<span class="badge ' + (map[kind] || 'badge-muted') + '">' + kind + '</span>';
}

function healthDot(h) {
  return '<span class="health-dot ' + h + '"></span>';
}

function esc(s) {
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ── STATE ─────────────────────────────────────────────────────────
var currentTab = 'tree';
var selectedSpec = 'ARCHITECTURE.spec.md';
var selectedChainItem = null;
var timelineFilter = 'all';
var stateSpecSelector = 'ARCHITECTURE.spec.md';
var expandedTreeNodes = new Set(['ARCHITECTURE.spec.md', 'backend/BACKEND.spec.md', 'frontend/FRONTEND.spec.md']);
var expandedChainSteps = new Set();
var chainStepCounter = 0;

// ── TAB BAR ──────────────────────────────────────────────────────
var TABS = [
  { id: 'tree', label: 'Spec Tree' },
  { id: 'detail', label: 'Spec Detail' },
  { id: 'chain', label: 'Mapping Chain' },
  { id: 'diff', label: 'Side-by-Side Diff' },
  { id: 'impact', label: 'Impact Advisory' },
  { id: 'staleness', label: 'Staleness' },
  { id: 'timeline', label: 'Timeline' },
  { id: 'state', label: 'Current State' },
];

function renderTabs() {
  var bar = document.getElementById('tab-bar');
  bar.innerHTML = TABS.map(function(t) {
    return '<button class="tab-btn' + (currentTab === t.id ? ' active' : '') + '" data-tab="' + t.id + '">' + t.label + '</button>';
  }).join('');
  bar.querySelectorAll('.tab-btn').forEach(function(btn) {
    btn.addEventListener('click', function() { switchTab(btn.dataset.tab); });
  });
}

function switchTab(id) {
  currentTab = id;
  renderTabs();
  document.querySelectorAll('.panel').forEach(function(p) { p.classList.remove('active'); });
  document.getElementById('panel-' + id).classList.add('active');
  renderPanel(id);
}

function navigateToDetail(specKey) {
  selectedSpec = specKey;
  switchTab('detail');
}

function navigateToChain(itemId) {
  selectedChainItem = itemId;
  expandedChainSteps = new Set();
  chainStepCounter = 0;
  switchTab('chain');
}

function renderPanel(id) {
  var renderers = { tree: renderTree, detail: renderDetail, chain: renderChain, diff: renderDiff, impact: renderImpact, staleness: renderStaleness, timeline: renderTimeline, state: renderState };
  renderers[id]();
}

// ── TREE ─────────────────────────────────────────────────────────
function renderTree() {
  var panel = document.getElementById('panel-tree');

  function renderNode(key) {
    var spec = DATA.specs[key];
    if (!spec) return '';
    var expanded = expandedTreeNodes.has(key);
    var hasChildren = spec.children && spec.children.length > 0;
    var toggle = hasChildren ? (expanded ? '\u25BC' : '\u25B6') : '&nbsp;';
    var sel = selectedSpec === key ? ' selected' : '';
    var html = '<div class="tree-node"><div class="tree-row' + sel + '" data-spec="' + key + '">' +
      '<span class="tree-toggle" data-toggle="' + key + '">' + toggle + '</span>' +
      '<span class="tree-icon">' + spec.icon + '</span>' +
      '<span class="tree-label">' + esc(key.split('/').pop()) + '</span>' +
      healthDot(spec.health) +
      '<span class="badge badge-muted" style="font-size:10px">' + spec.items.length + ' items</span>' +
      '</div>';
    if (hasChildren) {
      html += '<div class="tree-children' + (expanded ? '' : ' collapsed') + '">';
      for (var i = 0; i < spec.children.length; i++) {
        html += renderNode(spec.children[i]);
      }
      html += '</div>';
    }
    html += '</div>';
    return html;
  }

  var summary = '<div class="metrics-row">' +
    '<div class="metric-box"><div class="metric-num" style="color:var(--text)">' + DATA.metrics.total + '</div><div class="metric-label">Total Items</div></div>' +
    '<div class="metric-box"><div class="metric-num" style="color:var(--green)">' + DATA.metrics.mapped + '</div><div class="metric-label">Mapped</div></div>' +
    '<div class="metric-box"><div class="metric-num" style="color:var(--yellow)">' + DATA.metrics.stale + '</div><div class="metric-label">Stale</div></div>' +
    '<div class="metric-box"><div class="metric-num" style="color:var(--orange)">' + DATA.metrics.drift + '</div><div class="metric-label">Drift</div></div>' +
    '<div class="metric-box"><div class="metric-num" style="color:var(--red)">' + DATA.metrics.unmapped + '</div><div class="metric-label">Unmapped</div></div>' +
    '</div>';

  panel.innerHTML = summary + '<div class="card"><div class="card-header"><span class="card-title">Specification Hierarchy</span></div><div class="card-body">' + renderNode(DATA.treeRoot) + '</div></div>';

  panel.querySelectorAll('.tree-toggle').forEach(function(el) {
    el.addEventListener('click', function(e) {
      e.stopPropagation();
      var key = el.dataset.toggle;
      if (expandedTreeNodes.has(key)) expandedTreeNodes.delete(key);
      else expandedTreeNodes.add(key);
      renderTree();
    });
  });
  panel.querySelectorAll('.tree-row').forEach(function(el) {
    el.addEventListener('click', function() { navigateToDetail(el.dataset.spec); });
  });
}

// ── DETAIL ───────────────────────────────────────────────────────

  if (!spec) { panel.innerHTML = '<p>Select a spec from the tree.</p>'; return; }

  var html = '<div class="spec-detail-header">' +
    '<h2>' + spec.icon + ' ' + esc(selectedSpec.split('/').pop()) + '</h2>' +
    '<div class="spec-path">' + esc(spec.path) + '</div>' +
    '<div style="margin-top:8px">' + healthDot(spec.health) + ' <span class="badge badge-muted">' + spec.type + '</span> <span class="badge badge-muted">' + spec.items.length + ' items</span></div>' +
    '</div>';

  if (spec.overview) {
    html += '<div class="card" style="margin-bottom:16px"><div class="card-body" style="color:var(--text-dim);font-size:13px">' + esc(spec.overview) + '</div></div>';
  }

  html += '<div class="card"><div class="card-header"><span class="card-title">Spec Items</span></div><div class="card-body" style="padding:0">';

  for (var i = 0; i < spec.items.length; i++) {
    var item = spec.items[i];
    var codeLinks = item.code ? item.code.map(function(c) { return '<span style="font-family:var(--font);font-size:11px;color:var(--text-dim)">' + esc(c) + '</span>'; }).join(', ') : '';

    var staleNote = item.staleReason ? '<div style="color:var(--yellow);font-size:12px;margin-top:4px">' + esc(item.staleReason) + '</div>' : '';

    html += '<div class="item-row">' +
      '<div class="item-id">' + item.id + '</div>' +
      '<div class="item-desc">' +
        '<div>' + esc(item.desc) + '</div>' +
        staleNote +
        '<div style="margin-top:4px;display:flex;gap:6px;align-items:center;flex-wrap:wrap">' +
          kindBadge(item.kind) + ' ' + statusBadge(item.status) + ' ' + taskLink + ' ' + codeLinks +
        '</div>' +
      '</div>' +
      '<div class="item-actions">' + linkBtn + ' ' + chainBtn + '</div>' +
      '</div>';
  }
  html += '</div></div>';

  if (spec.children && spec.children.length > 0) {
    html += '<div class="card" style="margin-top:16px"><div class="card-header"><span class="card-title">Child Specs</span></div><div class="card-body">';
    for (var j = 0; j < spec.children.length; j++) {
      var child = spec.children[j];
      var cs = DATA.specs[child];
      if (!cs) continue;
      html += '<div class="tree-row" data-nav-spec="' + child + '" style="cursor:pointer">' +
        '<span class="tree-icon">' + cs.icon + '</span>' +
        '<span class="tree-label">' + esc(child) + '</span>' +
        healthDot(cs.health) +
        '<span class="badge badge-muted" style="font-size:10px">' + cs.items.length + ' items</span>' +
        '</div>';

  }

  panel.innerHTML = html;
  panel.querySelectorAll('[data-nav-spec]').forEach(function(el) {
    el.addEventListener('click', function() { navigateToDetail(el.dataset.navSpec); });
  });
  panel.querySelectorAll('[data-chain]').forEach(function(el) {
    el.addEventListener('click', function() { navigateToChain(el.dataset.chain); });
  });
}

// ── CHAIN ────────────────────────────────────────────────────────
function makeChainStep(type, title, subtitle, content) {
  var id = 'cs-' + (chainStepCounter++);
  var isOpen = expandedChainSteps.has(id);
  return '<div class="chain-step">' +
    '<div class="chain-step-header" data-step-id="' + id + '">' +
      '<span class="collapsible-toggle' + (isOpen ? ' open' : '') + '"></span>' +
      '<strong>' + title + '</strong>' +
      '<span style="color:var(--text-dim);font-size:12px;margin-left:8px">' + subtitle + '</span>' +
    '</div>' +
    '<div class="chain-step-body' + (isOpen ? ' open' : '') + '">' + content + '</div>' +
    '</div>';
}

function renderChain() {
  chainStepCounter = 0;
  var panel = document.getElementById('panel-chain');
  if (!selectedChainItem) {
    var mapped = getAllItems().filter(function(i) { return i.status === 'mapped' || i.status === 'stale'; });
    var html = '<div class="card"><div class="card-header"><span class="card-title">Select an item to view its mapping chain</span></div><div class="card-body">' +
      '<table class="data-table"><thead><tr><th>ID</th><th>Description</th><th>Status</th><th></th></tr></thead><tbody>';
    for (var i = 0; i < mapped.length; i++) {
      html += '<tr><td class="id-col">' + mapped[i].id + '</td><td>' + esc(mapped[i].desc) + '</td><td>' + statusBadge(mapped[i].status) + '</td><td><button class="btn btn-sm btn-accent" data-chain="' + mapped[i].id + '">View Chain</button></td></tr>';
    }
    html += '</tbody></table></div></div>';
    panel.innerHTML = html;
    panel.querySelectorAll('[data-chain]').forEach(function(el) {
      el.addEventListener('click', function() { navigateToChain(el.dataset.chain); });
    });
    return;
  }

  var item = findItem(selectedChainItem);
  if (!item) { panel.innerHTML = '<p>Item not found.</p>'; return; }

  var html = '<div style="margin-bottom:16px;display:flex;align-items:center;gap:12px">' +
    '<button class="btn" id="chain-back">\u2190 Back to list</button>' +
    '<h3 style="font-size:16px">Mapping Chain: ' + item.id + '</h3></div>';

  // Step 1: Spec Item
  html += makeChainStep('spec', '\u{1F4CB} Spec Item', item.id + ' in ' + item.specPath,
    '<div style="margin-bottom:8px"><strong>Spec:</strong> ' + esc(item.specPath) + '</div>' +
    '<div style="margin-bottom:8px"><strong>Kind:</strong> ' + kindBadge(item.kind) + ' <strong>Status:</strong> ' + statusBadge(item.status) + '</div>' +
    '<div style="margin-bottom:8px"><strong>Description:</strong> ' + esc(item.desc) + '</div>' +
    (item.staleReason ? '<div style="color:var(--yellow);margin-top:8px">\u26A0 ' + esc(item.staleReason) + '</div>' : '')
  );

  html += '<div class="chain-arrow">\u2193</div>';

  // Step 2: Task
  if (item.task) {
    var task = DATA.tasks[item.task];
    if (task) {
      var planHtml = '<ol style="padding-left:20px;color:var(--text-dim);font-size:13px">';
      for (var p = 0; p < task.plan.length; p++) planHtml += '<li>' + esc(task.plan[p]) + '</li>';
      planHtml += '</ol>';

      html += makeChainStep('task', '\u{1F4DD} Task', task.title,
        '<div style="margin-bottom:8px"><strong>Task:</strong> ' + esc(task.title) + ' ' + statusBadge(task.status) + ' <span class="badge badge-muted">' + task.priority + '</span></div>' +
        '<div style="margin-bottom:8px"><strong>Implements:</strong> ' + task.implements.map(function(x) { return '<span style="font-family:var(--font);color:var(--accent)">' + x + '</span>'; }).join(', ') + '</div>' +
        '<div style="margin-bottom:8px"><strong>Plan:</strong></div>' + planHtml +
        '<div style="margin-top:8px"><strong>Acceptance:</strong> <span style="color:var(--text-dim)">' + esc(task.acceptance) + '</span></div>'
      );
      html += '<div class="chain-arrow">\u2193</div>';

      // Step 3: Commits
      if (task.commits.length > 0) {
        var commitHtml = '';
        for (var c = 0; c < task.commits.length; c++) {
          commitHtml += '<div style="margin-bottom:6px"><span style="font-family:var(--font);color:var(--accent)">' + task.commits[c].hash + '</span><span style="color:var(--text-dim);margin-left:8px">' + esc(task.commits[c].msg) + '</span></div>';
        }
        html += makeChainStep('commit', '\u{1F500} Commits', task.commits.length + ' commit(s)', commitHtml);
        html += '<div class="chain-arrow">\u2193</div>';
      }
    }
  }

  // Step 4: Code
  if (item.code && item.code.length > 0) {
    var codeContent = '';
    for (var k = 0; k < item.code.length; k++) {
      var ref = item.code[k];
      var snippet = DATA.codeSnippets[ref];
      if (snippet) {
        codeContent += '<div style="margin-bottom:12px">' +
          '<div style="font-family:var(--font);font-size:12px;color:var(--text-dim);margin-bottom:4px">' + esc(snippet.file) + ' : ' + snippet.lines + ' \u2014 ' + esc(snippet.fn) + '</div>' +
          '<div class="code-block">' + snippet.code + '</div></div>';
      } else {
        codeContent += '<div style="font-family:var(--font);color:var(--text-dim);font-size:12px;margin-bottom:4px">' + esc(ref) + '</div>';
      }
    }
    html += makeChainStep('code', '\u{1F4BB} Source Code', item.code.join(', '), codeContent);
  }

  panel.innerHTML = html;

  document.getElementById('chain-back').addEventListener('click', function() {
    selectedChainItem = null;
    renderChain();
  });

  panel.querySelectorAll('.chain-step-header').forEach(function(el) {
    el.addEventListener('click', function() {
      var id = el.dataset.stepId;
      var body = el.parentElement.querySelector('.chain-step-body');
      if (expandedChainSteps.has(id)) {
        expandedChainSteps.delete(id);
        body.classList.remove('open');
        el.querySelector('.collapsible-toggle').classList.remove('open');
      } else {
        expandedChainSteps.add(id);
        body.classList.add('open');
        el.querySelector('.collapsible-toggle').classList.add('open');
      }
    });
  });
}

    // Column 1: Spec Diff
    html += '<div style="border-right:1px solid var(--border);font-family:var(--font);font-size:12px;line-height:1.7;overflow-x:auto">';
    for (var s = 0; s < sc.specDiff.length; s++) html += diffLine(sc.specDiff[s]);
    html += '</div>';

    // Column 2: Connected Specs
    html += '<div style="border-right:1px solid var(--border);font-size:12px">';
    for (var c = 0; c < sc.connectedSpecs.length; c++) {
      var cs = sc.connectedSpecs[c];
      html += '<div style="padding:8px 12px;' + (c > 0 ? 'border-top:1px solid var(--border);' : '') + '">' +
        '<div style="font-weight:600;margin-bottom:6px;font-size:11px;color:var(--accent)">' + esc(cs.file) + '</div>';
      for (var ci = 0; ci < cs.items.length; ci++) {

      }
      html += '</div>';
    }
    html += '</div>';

    // Column 3: Tasks
    html += '<div style="border-right:1px solid var(--border);font-size:12px">';
    for (var t = 0; t < sc.tasks.length; t++) {
      var tk = sc.tasks[t];
      var taskStatusBadge = tk.status === 'Done' ? '<span class="badge badge-green">' + tk.status + '</span>'
        : tk.status === 'In Progress' ? '<span class="badge badge-blue">' + tk.status + '</span>'
        : tk.status === 'Open' ? '<span class="badge badge-yellow">' + tk.status + '</span>'
        : '<span class="badge badge-muted">No task</span>';
      html += '<div style="padding:10px 12px;' + (t > 0 ? 'border-top:1px solid var(--border);' : '') + '">' +
        '<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">' +

        '<div style="color:var(--text-dim);font-size:11px;margin-bottom:4px">' + esc(tk.desc) + '</div>' +
        '<div style="color:var(--text-muted);font-size:11px;font-style:italic">' + esc(tk.note) + '</div>' +
      '</div>';
    }
    html += '</div>';

    // Column 4: Code Diff
    html += '<div style="font-family:var(--font);font-size:12px;line-height:1.7;overflow-x:auto">';
    for (var d = 0; d < sc.codeDiff.length; d++) html += diffLine(sc.codeDiff[d]);
    html += '</div>';

    html += '</div>'; // close diff-4col

    // Action buttons
    html += '<div style="margin-top:12px;display:flex;gap:8px">' +
      '<button class="btn btn-accent" data-chain="' + item.id + '">View Full Chain</button>' +
      '<button class="btn" data-nav-spec="' + item.specKey + '">View Spec Detail</button>' +
    '</div>';

    container.innerHTML = html;

    container.querySelectorAll('[data-chain]').forEach(function(el) {
      el.addEventListener('click', function() { navigateToChain(el.dataset.chain); });
    });
    container.querySelectorAll('[data-nav-spec]').forEach(function(el) {
      el.addEventListener('click', function() { navigateToDetail(el.dataset.navSpec); });
    });
  }

  var sel = document.getElementById('diff-selector');
  sel.addEventListener('change', function() { renderDiffContent(sel.value); });
  if (staleItems.length > 0) renderDiffContent(staleItems[0].id);
}

    { id: 'code', label: 'Code Changes' },
    { id: 'task', label: 'Tasks' },
    { id: 'stale', label: 'Staleness' },
  ];

  var html = '<div class="filter-bar">';
  for (var i = 0; i < filters.length; i++) {
    html += '<button class="filter-btn' + (timelineFilter === filters[i].id ? ' active' : '') + '" data-filter="' + filters[i].id + '">' + filters[i].label + '</button>';
  }
  html += '</div>';

  var filtered = timelineFilter === 'all' ? DATA.timeline : DATA.timeline.filter(function(e) { return e.type === timelineFilter; });

  html += '<div class="card"><div class="card-body">';
  if (filtered.length === 0) {
    html += '<p style="color:var(--text-muted)">No events match this filter.</p>';
  } else {
    for (var j = 0; j < filtered.length; j++) {
      html += '<div class="timeline-item"><div class="timeline-dot ' + filtered[j].type + '"></div>' +
        '<div class="timeline-date">' + filtered[j].date + '</div>' +
        '<div class="timeline-text">' + filtered[j].text + '</div></div>';
    }
  }
  html += '</div></div>';

  panel.innerHTML = html;
  panel.querySelectorAll('.filter-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      timelineFilter = btn.dataset.filter;
      renderTimeline();
    });
  });
}

// ── CURRENT STATE ────────────────────────────────────────────────
function renderState() {
  var panel = document.getElementById('panel-state');

  var html = '<div class="metrics-row">' +
    '<div class="metric-box"><div class="metric-num" style="color:var(--text)">' + DATA.metrics.total + '</div><div class="metric-label">Total Items</div></div>' +
    '<div class="metric-box"><div class="metric-num" style="color:var(--green)">' + DATA.metrics.mapped + '</div><div class="metric-label">Mapped</div></div>' +
    '<div class="metric-box"><div class="metric-num" style="color:var(--yellow)">' + DATA.metrics.stale + '</div><div class="metric-label">Stale</div></div>' +
    '<div class="metric-box"><div class="metric-num" style="color:var(--orange)">' + DATA.metrics.drift + '</div><div class="metric-label">Drift</div></div>' +
    '<div class="metric-box"><div class="metric-num" style="color:var(--red)">' + DATA.metrics.unmapped + '</div><div class="metric-label">Unmapped</div></div></div>';

  html += '<div style="margin-bottom:16px;display:flex;align-items:center;gap:12px">' +
    '<span style="color:var(--text-dim);font-size:13px">Show items for:</span>' +
    '<div class="select-wrap"><select id="state-spec-selector">';
  var specKeys = Object.keys(DATA.specs);
  for (var i = 0; i < specKeys.length; i++) {
    var key = specKeys[i];
    html += '<option value="' + key + '"' + (stateSpecSelector === key ? ' selected' : '') + '>' + DATA.specs[key].icon + ' ' + key + '</option>';
  }
  html += '</select></div></div><div id="state-table-content"></div>';

  panel.innerHTML = html;

  function renderStateTable(specKey) {
    var spec = DATA.specs[specKey];
    var container = document.getElementById('state-table-content');
    if (!spec) { container.innerHTML = ''; return; }

    var t = '<div class="card"><div class="card-header"><span class="card-title">' + spec.icon + ' ' + esc(specKey) + '</span>' + healthDot(spec.health) + '<span class="badge badge-muted">' + spec.type + '</span></div>' +
      '<div class="card-body" style="padding:0"><table class="data-table"><thead><tr><th>ID</th><th>Kind</th><th>Description</th><th>Status</th><th>Task</th><th>Code</th><th></th></tr></thead><tbody>';

    for (var i = 0; i < spec.items.length; i++) {
      var item = spec.items[i];
      var taskCell = item.task ? '<span class="badge badge-blue" style="font-size:10px">' + esc(item.task) + '</span>' : '<span style="color:var(--text-muted)">\u2014</span>';
      var codeCell;
      if (item.code) {
        codeCell = item.code.map(function(c) { return '<span style="font-family:var(--font);font-size:11px;color:var(--text-dim)">' + esc(c.split(':')[0]) + '</span>'; }).join('<br>');
      } else if (item.link) {
        codeCell = '<span style="font-size:11px;color:var(--purple)">\u2192 ' + esc(item.link.split('/').pop()) + '</span>';
      } else {
        codeCell = '<span style="color:var(--text-muted)">\u2014</span>';
      }
      var actions = '';
      if (item.status === 'mapped' || item.status === 'stale') {
        actions = '<button class="btn btn-sm btn-accent" data-chain="' + item.id + '">Chain</button>';
      } else if (item.link) {
        actions = '<button class="btn btn-sm" data-nav-spec="' + item.link + '">Go</button>';
      }

      t += '<tr><td class="id-col">' + item.id + '</td>' +
        '<td>' + kindBadge(item.kind) + '</td>' +
        '<td style="max-width:300px">' + esc(item.desc) + (item.staleReason ? '<div style="color:var(--yellow);font-size:11px;margin-top:2px">' + esc(item.staleReason) + '</div>' : '') + '</td>' +
        '<td>' + statusBadge(item.status) + '</td>' +
        '<td>' + taskCell + '</td>' +
        '<td>' + codeCell + '</td>' +
        '<td>' + actions + '</td></tr>';
    }
    t += '</tbody></table></div></div>';

    // Related tasks
    var relatedTasks = new Set();
    for (var j = 0; j < spec.items.length; j++) {
      if (spec.items[j].task) relatedTasks.add(spec.items[j].task);
    }

    if (relatedTasks.size > 0) {
      t += '<div class="card" style="margin-top:16px"><div class="card-header"><span class="card-title">Related Tasks</span></div><div class="card-body" style="padding:0">' +
        '<table class="data-table"><thead><tr><th>Task</th><th>Status</th><th>Priority</th><th>Implements</th><th>Commits</th></tr></thead><tbody>';
      relatedTasks.forEach(function(tid) {
        var task = DATA.tasks[tid];
        if (!task) return;
        t += '<tr><td><strong>' + esc(task.title) + '</strong><div style="font-family:var(--font);font-size:11px;color:var(--text-muted)">' + task.id + '</div></td>' +
          '<td>' + statusBadge(task.status) + '</td>' +
          '<td><span class="badge badge-muted">' + task.priority + '</span></td>' +
          '<td>' + task.implements.map(function(x) { return '<span style="font-family:var(--font);font-size:11px;color:var(--accent)">' + x + '</span>'; }).join(', ') + '</td>' +
          '<td>' + (task.commits.length > 0 ? task.commits.map(function(c) { return '<span style="font-family:var(--font);font-size:11px;color:var(--text-dim)">' + c.hash + '</span>'; }).join(', ') : '<span style="color:var(--text-muted)">none</span>') + '</td></tr>';
      });
      t += '</tbody></table></div></div>';
    }

    container.innerHTML = t;
    container.querySelectorAll('[data-chain]').forEach(function(el) {
      el.addEventListener('click', function() { navigateToChain(el.dataset.chain); });
    });
    container.querySelectorAll('[data-nav-spec]').forEach(function(el) {
      el.addEventListener('click', function() { navigateToDetail(el.dataset.navSpec); });
    });
  }

  var sel = document.getElementById('state-spec-selector');
  sel.addEventListener('change', function() {
    stateSpecSelector = sel.value;
    renderStateTable(sel.value);
  });
  renderStateTable(stateSpecSelector);
}

// ── INIT ─────────────────────────────────────────────────────────
renderTabs();
switchTab('tree');
</script>
</body>
</html>
