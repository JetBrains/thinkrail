<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: transparent; overflow: auto; display: flex; justify-content: center; padding: 8px; }
  #output { width: 100%; }
  #output svg { width: 100%; height: auto; }
  #error { color: #ff6464; font-family: monospace; font-size: 12px; padding: 8px; white-space: pre-wrap; }
  @media (prefers-color-scheme: dark) {
    body { color: #e0e0e0; }
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<script>
  mermaid.initialize({
    startOnLoad: false,
    theme: 'dark',
    themeVariables: {
      primaryColor: '#393b40',
      primaryTextColor: '#e0e0e0',
      lineColor: '#4CAF50',
      secondaryColor: '#1a1a2e',
    },
    flowchart: { curve: 'basis' },
    securityLevel: 'loose',
  });

  async function renderDiagram(definition) {
    try {
      const { svg } = await mermaid.render('diagram', definition);
      document.getElementById('output').innerHTML = svg;
      document.getElementById('error').textContent = '';
    } catch (e) {
      document.getElementById('output').innerHTML = '';
      document.getElementById('error').textContent = 'Diagram error: ' + e.message + '\n\n' + definition;
    }
  }
</script>
</head>
<body>
  <div id="output"></div>
  <div id="error"></div>
</body>
</html>
