name: Sign and notarize macOS binary
description: Codesigns a macOS binary with Developer ID and submits it to Apple notary. Does not staple (bare executables can't be stapled).

inputs:
  binary-path:
    description: Path to the macOS binary to sign and notarize
    required: true
  signing-identity:
    description: 'Developer ID Application identity string (e.g. "Developer ID Application: Foo (ABCD1234EF)")'
    required: true
  cert-p12:
    description: Base64-encoded P12 file containing the Developer ID Application cert
    required: true
  cert-password:
    description: Password for the P12
    required: true
  notarize-api-key:
    description: Base64-encoded .p8 App Store Connect API key
    required: true
  notarize-api-key-id:
    description: App Store Connect API key ID
    required: true
  notarize-api-issuer:
    description: App Store Connect API issuer UUID
    required: true

runs:
  using: composite
  steps:
    - name: Import signing certificate
      shell: bash
      env:
        CERT_P12: ${{ inputs.cert-p12 }}
        CERT_PASSWORD: ${{ inputs.cert-password }}
      run: |
        set -eu
        cert_path="$RUNNER_TEMP/cert.p12"
        keychain_path="$RUNNER_TEMP/build.keychain-db"
        keychain_password="$(openssl rand -hex 16)"

        echo "$CERT_P12" | base64 --decode > "$cert_path"

        security create-keychain -p "$keychain_password" "$keychain_path"
        security set-keychain-settings -lut 3600 "$keychain_path"
        security unlock-keychain -p "$keychain_password" "$keychain_path"
        security import "$cert_path" -P "$CERT_PASSWORD" -A -t cert -f pkcs12 -k "$keychain_path"
        security list-keychain -d user -s "$keychain_path" $(security list-keychains -d user | tr -d '"')
        security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$keychain_password" "$keychain_path"

        rm -f "$cert_path"
        echo "THINKRAIL_KEYCHAIN=$keychain_path" >> "$GITHUB_ENV"

    - name: Codesign binary
      shell: bash
      env:
        BINARY_PATH: ${{ inputs.binary-path }}
        SIGNING_IDENTITY: ${{ inputs.signing-identity }}
      run: |
        set -eu
        codesign --force --timestamp --options=runtime \
          --keychain "$THINKRAIL_KEYCHAIN" \
          --sign "$SIGNING_IDENTITY" \
          "$BINARY_PATH"
        codesign --verify --verbose=2 "$BINARY_PATH"

    - name: Notarize
      shell: bash
      env:
        BINARY_PATH: ${{ inputs.binary-path }}
        API_KEY: ${{ inputs.notarize-api-key }}
        API_KEY_ID: ${{ inputs.notarize-api-key-id }}
        API_ISSUER: ${{ inputs.notarize-api-issuer }}
      run: |
        set -eu
        api_key_path="$RUNNER_TEMP/notarize-api-key.p8"
        zip_path="$RUNNER_TEMP/notarize.zip"

        echo "$API_KEY" | base64 --decode > "$api_key_path"
        ditto -c -k --keepParent "$BINARY_PATH" "$zip_path"

        xcrun notarytool submit "$zip_path" \
          --key "$api_key_path" \
          --key-id "$API_KEY_ID" \
          --issuer "$API_ISSUER" \
          --wait

        rm -f "$api_key_path" "$zip_path"

    - name: Tear down keychain
      if: always()
      shell: bash
      run: |
        set +e
        [ -n "${THINKRAIL_KEYCHAIN:-}" ] && security delete-keychain "$THINKRAIL_KEYCHAIN"
        exit 0
