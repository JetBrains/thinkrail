name: Stable release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "How to derive the new version"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - explicit
      version:
        description: "Explicit version X.Y.Z (only when bump=explicit)"
        required: false
        type: string
        default: ""

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.compute.outputs.version }}
      prev_tag: ${{ steps.compute.outputs.prev_tag }}
    steps:
      - name: Verify branch is main
        run: |
          if [ "$GITHUB_REF" != "refs/heads/main" ]; then
            echo "::error::Stable releases must run from main (got: $GITHUB_REF)"
            exit 1
          fi

      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - id: compute
        name: Compute and validate next stable version
        env:
          BUMP: ${{ inputs.bump }}
          VERSION_INPUT: ${{ inputs.version }}
        run: |
          set -eu
          if [ "$BUMP" = "explicit" ]; then
            if [ -z "$VERSION_INPUT" ]; then
              echo "::error::bump=explicit requires the 'version' input"
              exit 1
            fi
            version=$(bash .github/scripts/next-version.sh stable --bump=explicit --version="$VERSION_INPUT")
          else
            version=$(bash .github/scripts/next-version.sh stable --bump="$BUMP")
          fi
          prev=$(bash .github/scripts/next-version.sh latest-stable)
          echo "Next stable: $version (previous: ${prev:-<none>})"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "prev_tag=${prev:+v${prev}}" >> "$GITHUB_OUTPUT"

  release:
    needs: prepare
    uses: ./.github/workflows/_release.yml
    with:
      version: ${{ needs.prepare.outputs.version }}
      channel: stable
      prev_tag: ${{ needs.prepare.outputs.prev_tag }}
    secrets: inherit
