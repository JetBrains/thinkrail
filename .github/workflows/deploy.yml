name: Deploy

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "What to do after building"
        required: true
        type: choice
        options:
          - artifacts only
          - nightly release
          - stable release
      tag_name:
        description: "Release tag (leave empty to use branch name)"
        required: false
        type: string
        default: ""

jobs:
  build:
    uses: ./.github/workflows/build.yml
    with:
      release_type: >-
        ${{
          inputs.release_type == 'artifacts only' && 'none' ||
          inputs.release_type == 'nightly release' && 'nightly' ||
          'stable'
        }}
      tag_name: >-
        ${{
          inputs.release_type == 'artifacts only' && '' ||
          (inputs.tag_name != '' && inputs.tag_name || github.ref_name)
        }}
      release_name: >-
        ${{
          inputs.release_type == 'artifacts only' && '' ||
          inputs.release_type == 'nightly release' && 'Nightly Build' ||
          format('Release {0}', (inputs.tag_name != '' && inputs.tag_name || github.ref_name))
        }}
