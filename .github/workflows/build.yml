name: Build

on:
  workflow_call:
    inputs:
      release_type:
        description: "Release type: none, nightly, or stable"
        required: true
        type: string
      tag_name:
        description: "Release tag name"
        required: false
        type: string
        default: ""
      release_name:
        description: "Release display name"
        required: false
        type: string
        default: ""

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: bonsai-linux
            binary_name: bonsai
          - os: macos-latest
            artifact_name: bonsai-macos
            binary_name: bonsai
          - os: windows-latest
            artifact_name: bonsai-windows
            binary_name: bonsai.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: false

      - name: Build frontend
        run: cd frontend && npm ci && npm run build

      - name: Install backend dependencies and PyInstaller
        run: pip install ./backend pyinstaller

      - name: Build executable
        run: cd packaging && pyinstaller bonsai.spec --noconfirm --distpath dist --workpath build

      - name: Rename artifact
        shell: bash
        run: |
          mv packaging/dist/${{ matrix.binary_name }} packaging/dist/${{ matrix.artifact_name }}${{ matrix.os == 'windows-latest' && '.exe' || '' }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: packaging/dist/${{ matrix.artifact_name }}*

  release:
    if: inputs.release_type != 'none'
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect binaries
        run: |
          mkdir -p release
          cp artifacts/bonsai-linux/bonsai-linux release/
          cp artifacts/bonsai-macos/bonsai-macos release/
          cp artifacts/bonsai-windows/bonsai-windows.exe release/

      - name: Compose release body
        run: |
          cat <<EOF > release-body.md
          ${{ inputs.release_name }} from the \`${{ github.ref_name }}\` branch.

          **How to use:**
          1. Download the file for your OS below
          2. Make it executable: \`chmod +x bonsai-linux\` (Linux/macOS)
          3. Set your API key: \`export ANTHROPIC_API_KEY=sk-ant-...\`
          4. Run: \`./bonsai-linux\` (or \`./bonsai-macos\`, \`bonsai-windows.exe\`)

          Bonsai will start and open your browser to http://localhost:8000

          **Options:** \`--port 9000\`, \`--no-browser\`, \`--host 0.0.0.0\`
          EOF

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name }}
          name: ${{ inputs.release_name }}
          prerelease: ${{ inputs.release_type == 'nightly' }}
          generate_release_notes: ${{ inputs.release_type == 'stable' }}
          body_path: release-body.md
          files: |
            release/bonsai-linux
            release/bonsai-macos
            release/bonsai-windows.exe
