name: Release

# Reusable: build every platform binary, (optionally) sign, checksum, and publish a GitHub release.
# Called by nightly.yml (channel=nightly) and stable.yml (channel=stable).

on:
  workflow_call:
    inputs:
      version:
        description: "Version to release (e.g. 0.2.0 or 0.2.0-nightly.5)"
        required: true
        type: string
      channel:
        description: "Release channel: nightly or stable"
        required: true
        type: string
      prev_tag:
        description: "Previous tag of the same channel, for release-notes diff (empty if none)"
        required: false
        type: string
        default: ""

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/_build.yml
    with:
      version: ${{ inputs.version }}
      channel: ${{ inputs.channel }}
    secrets: inherit

  sign:
    needs: build
    # Codesigning is scaffolded but off — flip this to `${{ vars.CODESIGN_RUNNER != '' }}` and provide the
    # JetBrains CodeSign secrets/runner to enable it (see .github/actions/codesign).
    if: false
    runs-on: ${{ vars.CODESIGN_RUNNER || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - id: resolve
        shell: bash
        run: |
          set -eu
          mac=$(ls artifacts/thinkrail-darwin-arm64 2>/dev/null | head -1)
          win=$(ls artifacts/thinkrail-windows-x64.exe 2>/dev/null | head -1)
          [ -n "$mac" ] || { echo "::error::no darwin-arm64 artifact to sign"; exit 1; }
          [ -n "$win" ] || { echo "::error::no windows-x64 artifact to sign"; exit 1; }
          {
            echo "mac=$mac"
            echo "win=$win"
            echo "mac_name=$(basename "$mac")"
            echo "win_name=$(basename "$win")"
          } >> "$GITHUB_OUTPUT"

      - uses: ./.github/actions/codesign
        with:
          macos-binary: ${{ steps.resolve.outputs.mac }}
          windows-binary: ${{ steps.resolve.outputs.win }}
          service-account-name: ${{ secrets.CODESIGN_SERVICE_ACCOUNT_NAME }}
          service-account-token: ${{ secrets.CODESIGN_SERVICE_ACCOUNT_TOKEN }}

      - uses: actions/upload-artifact@v5
        with:
          name: ${{ steps.resolve.outputs.mac_name }}
          path: ${{ steps.resolve.outputs.mac }}
          overwrite: true

      - uses: actions/upload-artifact@v5
        with:
          name: ${{ steps.resolve.outputs.win_name }}
          path: ${{ steps.resolve.outputs.win }}
          overwrite: true

  release:
    needs: [build, sign]
    if: ${{ always() && needs.build.result == 'success' && needs.sign.result != 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - uses: ./.github/actions/make-checksums
        with:
          directory: artifacts

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: >-
            ${{ inputs.channel == 'nightly'
                && format('Nightly {0}', inputs.version)
                || format('v{0}', inputs.version) }}
          prerelease: ${{ inputs.channel == 'nightly' }}
          generate_release_notes: true
          previous_tag: ${{ inputs.prev_tag }}
          files: artifacts/*
          fail_on_unmatched_files: true
