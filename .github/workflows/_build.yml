name: Build binaries

on:
  workflow_call:
    inputs:
      version:
        description: "Version to bake into binaries (e.g. 0.2.0-nightly.5)"
        required: true
        type: string
      channel:
        description: "Release channel: nightly, stable, or dev"
        required: true
        type: string

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: thinkrail-linux-x64
          - os: ubuntu-24.04-arm
            artifact_name: thinkrail-linux-arm64
#          Disabled for now because runner waiting time is too long.
#          - os: macos-13
#            artifact_name: thinkrail-macos-x64
          - os: macos-14
            artifact_name: thinkrail-macos-arm64
          - os: windows-latest
            artifact_name: thinkrail-windows-x64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-toolchain

      - id: build
        uses: ./.github/actions/build-binary
        with:
          version: ${{ inputs.version }}
          channel: ${{ inputs.channel }}
          artifact-name: ${{ matrix.artifact_name }}

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ steps.build.outputs.artifact-path }}
          retention-days: 7
