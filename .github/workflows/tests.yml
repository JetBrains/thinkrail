name: Tests

on:
  push:
  pull_request:

jobs:
  test-python:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: UV sync
        working-directory: backend
        run: uv sync --all-groups

      - name: Run tests
        working-directory: backend
        run: uv run pytest

      - name: Check OpenAPI schema is up to date
        working-directory: backend
        run: |
          uv run python -m app.cli export-schema -o ../frontend/openapi.json.new
          diff ../frontend/openapi.json ../frontend/openapi.json.new || \
            (echo "openapi.json is out of date — run: cd backend && uv run python -m app.cli export-schema -o ../frontend/openapi.json" && exit 1)
