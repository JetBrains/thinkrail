<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="3">
  <title>Bonsai Dashboard</title>
  <script src="vendor/cytoscape.min.js"></script>
  <script src="vendor/dagre.min.js"></script>
  <script src="vendor/cytoscape-dagre.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Cascadia Code', monospace;
      background: #1e1e1e;
      color: #d4d4d4;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #252526;
      padding: 12px 20px;
      border-bottom: 1px solid #3c3c3c;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 { font-size: 16px; font-weight: 500; color: #4ec9b0; }
    header .meta { font-size: 12px; color: #858585; }

    .summary-bar {
      background: #2d2d30;
      padding: 10px 20px;
      border-bottom: 1px solid #3c3c3c;
      display: flex;
      gap: 24px;
      align-items: center;
      flex-wrap: wrap;
    }

    .stat {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
    }

    .stat .label { color: #858585; }
    .stat .value { font-weight: 600; }
    .stat .value.green { color: #4ec9b0; }
    .stat .value.yellow { color: #dcdcaa; }
    .stat .value.red { color: #f44747; }

    .progress-bar {
      width: 120px;
      height: 6px;
      background: #3c3c3c;
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-bar .fill {
      height: 100%;
      background: #4ec9b0;
      border-radius: 3px;
      transition: width 0.3s;
    }

    .tabs {
      background: #252526;
      display: flex;
      border-bottom: 1px solid #3c3c3c;
    }

    .tab {
      padding: 8px 20px;
      cursor: pointer;
      font-size: 13px;
      color: #858585;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }

    .tab:hover { color: #d4d4d4; }
    .tab.active { color: #d4d4d4; border-bottom-color: #4ec9b0; }

    .tab-content { flex: 1; overflow: auto; display: none; }
    .tab-content.active { display: flex; flex-direction: column; }

    /* Overview Tab */
    .overview { padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .overview-full { grid-column: 1 / -1; }

    .card {
      background: #252526;
      border: 1px solid #3c3c3c;
      border-radius: 6px;
      padding: 16px;
    }

    .card h3 {
      font-size: 13px;
      color: #858585;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .workflow-step {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      font-size: 13px;
    }

    .workflow-step .icon { width: 20px; text-align: center; }
    .workflow-step .icon.done { color: #4ec9b0; }
    .workflow-step .icon.current { color: #dcdcaa; }
    .workflow-step .icon.pending { color: #858585; }

    .rec-item {
      padding: 8px 0;
      border-bottom: 1px solid #2d2d30;
      font-size: 13px;
    }

    .rec-item:last-child { border-bottom: none; }
    .rec-item .title { margin-bottom: 4px; }
    .rec-item .reason { color: #858585; font-size: 12px; }
    .rec-item .action { color: #569cd6; font-size: 12px; }

    /* Graph Tab */
    #cy { flex: 1; min-height: 400px; }

    .graph-controls {
      padding: 8px 20px;
      background: #2d2d30;
      display: flex;
      gap: 8px;
    }

    .graph-controls button {
      background: #0e639c;
      color: white;
      border: none;
      padding: 4px 12px;
      border-radius: 3px;
      cursor: pointer;
      font-size: 12px;
    }

    .graph-controls button:hover { background: #1177bb; }

    .info-panel {
      position: fixed;
      right: 20px;
      top: 120px;
      width: 280px;
      background: #252526;
      border: 1px solid #3c3c3c;
      border-radius: 6px;
      padding: 16px;
      display: none;
      z-index: 100;
      font-size: 13px;
    }

    .info-panel.visible { display: block; }
    .info-panel h4 { color: #4ec9b0; margin-bottom: 8px; }
    .info-panel .field { margin: 4px 0; color: #858585; }
    .info-panel .field span { color: #d4d4d4; }

    /* Table styles */
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    th {
      text-align: left;
      padding: 8px 12px;
      border-bottom: 1px solid #3c3c3c;
      color: #858585;
      font-weight: 500;
      text-transform: uppercase;
      font-size: 11px;
      letter-spacing: 0.5px;
    }

    td {
      padding: 6px 12px;
      border-bottom: 1px solid #2d2d30;
    }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 3px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .badge.fresh { background: #2d4a3e; color: #4ec9b0; }
    .badge.stale { background: #4a3d2d; color: #dcdcaa; }
    .badge.gap { background: #3c3c3c; color: #858585; }
    .badge.error { background: #4a2d2d; color: #f44747; }
    .badge.warning { background: #4a3d2d; color: #dcdcaa; }
    .badge.done { background: #2d4a3e; color: #4ec9b0; }
    .badge.pending { background: #3c3c3c; color: #858585; }
    .badge.unknown { background: #3c3c3c; color: #858585; }

    .table-wrapper { padding: 20px; overflow: auto; flex: 1; }
  </style>
</head>
<body>
  <header>
    <h1>Bonsai Dashboard</h1>
    <div class="meta" id="meta"></div>
  </header>

  <div class="summary-bar" id="summary-bar"></div>

  <div class="tabs" id="tabs">
    <div class="tab active" data-tab="overview">Overview</div>
    <div class="tab" data-tab="graph">Graph</div>
    <div class="tab" data-tab="specs">Specs</div>
    <div class="tab" data-tab="tasks">Tasks</div>
    <div class="tab" data-tab="lint">Lint</div>
  </div>

  <!-- Overview Tab -->
  <div class="tab-content active" id="tab-overview">
    <div class="overview">
      <div class="card" id="card-workflow">
        <h3>Workflow</h3>
        <div id="workflow-steps"></div>
      </div>
      <div class="card" id="card-recs">
        <h3>Recommendations</h3>
        <div id="recommendations"></div>
      </div>
    </div>
  </div>

  <!-- Graph Tab -->
  <div class="tab-content" id="tab-graph">
    <div class="graph-controls">
      <button onclick="cy && cy.fit()">Fit</button>
      <button onclick="cy && cy.zoom(cy.zoom()*1.2)">Zoom +</button>
      <button onclick="cy && cy.zoom(cy.zoom()/1.2)">Zoom -</button>
      <button onclick="cy && cy.layout({name:'dagre',rankDir:'TB',padding:50}).run()">Hierarchical</button>
      <button onclick="cy && cy.layout({name:'circle'}).run()">Circular</button>
    </div>
    <div id="cy"></div>
    <div class="info-panel" id="info-panel">
      <h4 id="info-title"></h4>
      <div class="field">Type: <span id="info-type"></span></div>
      <div class="field">Status: <span id="info-status"></span></div>
      <div class="field">Freshness: <span id="info-freshness"></span></div>
    </div>
  </div>

  <!-- Specs Tab -->
  <div class="tab-content" id="tab-specs">
    <div class="table-wrapper">
      <table id="specs-table">
        <thead>
          <tr><th>Path</th><th>Spec</th><th>Freshness</th><th>Spec Updated</th><th>Code Updated</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <!-- Tasks Tab -->
  <div class="tab-content" id="tab-tasks">
    <div class="table-wrapper">
      <table id="tasks-table">
        <thead>
          <tr><th>Module</th><th>Task</th><th>Status</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <!-- Lint Tab -->
  <div class="tab-content" id="tab-lint">
    <div class="table-wrapper">
      <table id="lint-table">
        <thead>
          <tr><th>Severity</th><th>Spec</th><th>Issue</th><th>Fixable</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <script>
    const data = {{DASHBOARD_DATA}};

    // Meta
    const computed = new Date(data.meta.computed_at);
    document.getElementById('meta').textContent =
      `${data.meta.project} | Updated: ${computed.toLocaleTimeString()} | ${data.meta.computation_ms}ms`;

    // Summary bar
    const s = data.summary;
    document.getElementById('summary-bar').innerHTML = `
      <div class="stat">
        <span class="label">Phase:</span>
        <span class="value">${s.phase}</span>
      </div>
      <div class="stat">
        <span class="label">Coverage:</span>
        <div class="progress-bar"><div class="fill" style="width:${s.coverage_pct}%"></div></div>
        <span class="value green">${s.coverage_pct}%</span>
      </div>
      <div class="stat">
        <span class="label">Tasks:</span>
        <span class="value green">${s.tasks.done}/${s.tasks.total}</span>
      </div>
      <div class="stat">
        <span class="label">Specs:</span>
        <span class="value">${s.specs.total}</span>
        ${s.specs.stale ? `<span class="value yellow">${s.specs.stale} stale</span>` : ''}
      </div>
      <div class="stat">
        <span class="label">Lint:</span>
        ${s.lint.errors ? `<span class="value red">${s.lint.errors} errors</span>` : ''}
        ${s.lint.warnings ? `<span class="value yellow">${s.lint.warnings} warnings</span>` : ''}
        ${!s.lint.errors && !s.lint.warnings ? '<span class="value green">clean</span>' : ''}
      </div>
    `;

    // Tabs
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
        if (tab.dataset.tab === 'graph' && cy) cy.resize();
      });
    });

    // Workflow
    const wfEl = document.getElementById('workflow-steps');
    if (data.workflow.steps) {
      data.workflow.steps.forEach(step => {
        const icon = step.status === 'completed' ? '✓' : step.status === 'in_progress' ? '▶' : '○';
        const cls = step.status === 'completed' ? 'done' : step.status === 'in_progress' ? 'current' : 'pending';
        const name = step.name.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
        let extra = '';
        if (step.progress) {
          const d = step.progress.done || 0, t = step.progress.total || 0;
          extra = ` <span style="color:#858585">(${d}/${t})</span>`;
        }
        wfEl.innerHTML += `<div class="workflow-step"><span class="icon ${cls}">${icon}</span><span>${name}${extra}</span></div>`;
      });
    }

    // Recommendations
    const recEl = document.getElementById('recommendations');
    const catIcons = { stale: '⚠', lint: '✗', coverage: '○', progress: '→' };
    const catColors = { stale: '#dcdcaa', lint: '#f44747', coverage: '#569cd6', progress: '#858585' };
    (data.recommendations || []).forEach(r => {
      recEl.innerHTML += `
        <div class="rec-item">
          <div class="title"><span style="color:${catColors[r.category] || '#858585'}">${catIcons[r.category] || '·'}</span> ${r.title}</div>
          <div class="reason">${r.reason}</div>
          <div class="action">${r.action}</div>
        </div>`;
    });

    // Specs table
    const specsTbody = document.querySelector('#specs-table tbody');
    (data.coverage || []).forEach(c => {
      const freshBadge = c.freshness === 'fresh' ? '<span class="badge fresh">fresh</span>'
        : c.freshness === 'stale' ? '<span class="badge stale">stale</span>'
        : c.spec_id ? '<span class="badge gap">n/a</span>'
        : '<span class="badge gap">no spec</span>';
      specsTbody.innerHTML += `<tr>
        <td>${c.path}</td>
        <td>${c.spec_id || '—'}</td>
        <td>${freshBadge}</td>
        <td>${c.spec_mtime || '—'}</td>
        <td>${c.code_mtime || '—'}</td>
      </tr>`;
    });

    // Tasks table
    const tasksTbody = document.querySelector('#tasks-table tbody');
    const allTasks = [...(data.pending_tasks || [])];
    // Add done tasks from summary (we only have pending in detail)
    allTasks.forEach(t => {
      const cls = t.status === 'Done' ? 'done' : t.status === 'In Progress' ? 'warning' : 'pending';
      tasksTbody.innerHTML += `<tr>
        <td>${t.module}</td>
        <td>${t.id}</td>
        <td><span class="badge ${cls}">${t.status}</span></td>
      </tr>`;
    });
    if (allTasks.length === 0) {
      tasksTbody.innerHTML = `<tr><td colspan="3" style="color:#4ec9b0;text-align:center;padding:20px">All tasks done!</td></tr>`;
    }

    // Lint table
    const lintTbody = document.querySelector('#lint-table tbody');
    (data.lint || []).forEach(l => {
      const cls = l.severity === 'error' ? 'error' : 'warning';
      lintTbody.innerHTML += `<tr>
        <td><span class="badge ${cls}">${l.severity}</span></td>
        <td>${l.spec_id || '(disk)'}</td>
        <td>${l.message}</td>
        <td>${l.fixable ? '✓' : '—'}</td>
      </tr>`;
    });
    if (data.lint.length === 0) {
      lintTbody.innerHTML = `<tr><td colspan="4" style="color:#4ec9b0;text-align:center;padding:20px">No issues found!</td></tr>`;
    }

    // Cytoscape graph
    let cy = null;
    const graphData = data.graph || { nodes: [], edges: [] };

    function initGraph() {
      const container = document.getElementById('cy');
      if (!container || !window.cytoscape) return;

      const typeColors = {
        'goal-and-requirements': '#569cd6',
        'architecture-design': '#569cd6',
        'module-design': '#dcdcaa',
        'submodule-design': '#4ec9b0',
      };

      const elements = [
        ...graphData.nodes.map(n => ({
          data: { id: n.id, label: n.label, type: n.type, status: n.status, freshness: n.freshness }
        })),
        ...graphData.edges.map(e => ({
          data: { id: e.source + '->' + e.target, source: e.source, target: e.target, etype: e.type }
        }))
      ];

      cy = cytoscape({
        container,
        elements,
        style: [
          {
            selector: 'node',
            style: {
              'label': 'data(label)',
              'text-valign': 'center',
              'text-halign': 'center',
              'font-size': '10px',
              'color': '#d4d4d4',
              'text-wrap': 'wrap',
              'text-max-width': '100px',
              'width': 50,
              'height': 50,
              'background-color': function(ele) {
                if (ele.data('freshness') === 'stale') return '#ce9178';
                return typeColors[ele.data('type')] || '#4ec9b0';
              },
              'border-width': 2,
              'border-color': '#3c3c3c',
            }
          },
          {
            selector: 'node:selected',
            style: { 'border-color': '#007acc', 'border-width': 3 }
          },
          {
            selector: 'edge',
            style: {
              'width': 1.5,
              'line-color': function(ele) {
                return ele.data('etype') === 'parent' || ele.data('etype') === 'child' ? '#555' : '#569cd6';
              },
              'target-arrow-color': function(ele) {
                return ele.data('etype') === 'parent' || ele.data('etype') === 'child' ? '#555' : '#569cd6';
              },
              'target-arrow-shape': 'triangle',
              'curve-style': 'bezier',
              'line-style': function(ele) {
                return ele.data('etype') === 'parent' || ele.data('etype') === 'child' ? 'dashed' : 'solid';
              }
            }
          }
        ],
        layout: { name: 'dagre', rankDir: 'TB', padding: 50 }
      });

      // Click handler
      cy.on('tap', 'node', function(evt) {
        const d = evt.target.data();
        const panel = document.getElementById('info-panel');
        panel.classList.add('visible');
        document.getElementById('info-title').textContent = d.label;
        document.getElementById('info-type').textContent = d.type;
        document.getElementById('info-status').textContent = d.status || 'active';
        document.getElementById('info-freshness').textContent = d.freshness || 'n/a';
      });

      cy.on('tap', function(evt) {
        if (evt.target === cy) {
          document.getElementById('info-panel').classList.remove('visible');
        }
      });
    }

    // Init graph when tab is shown (lazy)
    const graphTab = document.querySelector('[data-tab="graph"]');
    graphTab.addEventListener('click', () => {
      if (!cy) setTimeout(initGraph, 100);
    });
  </script>
</body>
</html>
